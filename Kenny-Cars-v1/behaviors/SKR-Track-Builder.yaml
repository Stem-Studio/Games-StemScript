    function createOwnedInvisibleBox(name, width, height, length, x, y, z, rotationY, friction, restitution) {
      let geo = new THREE.BoxGeometry(width, height, length);
      let mat = new THREE.MeshBasicNodeMaterial({
        transparent: true,
        opacity: 0.0,
        depthWrite: false
      });
      let mesh = new THREE.Mesh(geo, mat);
      mesh.name = name;
      mesh.position.set(x, y, z);
      mesh.rotation.y = rotationY;
      mesh.visible = false;
