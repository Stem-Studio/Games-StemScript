      }

      {
        const S = GRID_SCALE;
        const CELL_HALF = CELL_RAW / 2;
        const WALL_HALF_THICK = 0.25;
        const WALL_X = 4.75;
        const WALL_HALF_H = 1.5;
        const wallY = (0.5 + WALL_HALF_H) * S - 0.5;
        const hThick = WALL_HALF_THICK * S;
        const hHeight = WALL_HALF_H * S;
        const hLen = CELL_HALF * S;
        const ARC_CENTER_X = -CELL_HALF;
        const ARC_CENTER_Z = CELL_HALF;
        const OUTER_R = 2 * CELL_HALF - WALL_HALF_THICK;
        const OUTER_SEG = 8;
        const OUTER_SEG_HALF_LEN = (OUTER_R * (Math.PI / 2) / OUTER_SEG / 2) * S;
        const INNER_R = WALL_HALF_THICK;
        const INNER_SEG = 3;
        const INNER_SEG_HALF_LEN = (INNER_R * (Math.PI / 2) / INNER_SEG / 2) * S;

        for (let i = 0; i < TRACK_CELLS.length; i++) {
          let gx = TRACK_CELLS[i][0];
          let gz = TRACK_CELLS[i][1];
          let key = TRACK_CELLS[i][2];
          let orient = TRACK_CELLS[i][3];

          if (key === "track-bump") continue;

          let cx = (gx + 0.5) * CELL_RAW * S;
          let cz = (gz + 0.5) * CELL_RAW * S;
          let deg = ORIENT_DEG[orient] || 0;
          let rad = deg * Math.PI / 180;
          let cr = Math.cos(rad);
          let sr = Math.sin(rad);

          if (key === "track-straight" || key === "track-finish") {
            for (let sideIndex = 0; sideIndex < 2; sideIndex++) {
              let side = sideIndex === 0 ? -1 : 1;
              let lx = side * WALL_X;
              let wx = cx + (lx * cr) * S;
              let wz = cz + (-lx * sr) * S;
              colliderGroup.add(createOwnedInvisibleBox(
                "TrackWallStraight_" + i + "_" + sideIndex,
                hThick * 2,
                hHeight * 2,
                hLen * 2,
                wx,
                wallY,
                wz,
                rad,
                0.0,
                0.1
              ));
            }
          } else if (key === "track-corner") {
            let wcx = cx + (ARC_CENTER_X * cr + ARC_CENTER_Z * sr) * S;
            let wcz = cz + (-ARC_CENTER_X * sr + ARC_CENTER_Z * cr) * S;
            let arcStart = -rad;
            addArcWalls(colliderGroup, "TrackWallOuter_" + i, wcx, wcz, arcStart, OUTER_R, OUTER_SEG, OUTER_SEG_HALF_LEN, wallY, hThick, hHeight);
            addArcWalls(colliderGroup, "TrackWallInner_" + i, wcx, wcz, arcStart, INNER_R, INNER_SEG, INNER_SEG_HALF_LEN, wallY, hThick, hHeight);
          }
        }
      }
    }

    trackGroup.updateMatrixWorld(true);
    trackGroup.traverse(function(child) {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    for (let n = 0; n < NPC_TRUCKS.length; n++) {
      let npc = NPC_TRUCKS[n];
      let templateKey = npc[0] === "NpcTruckGreen" ? "npc-green" : npc[0] === "NpcTruckPurple" ? "npc-purple" : "npc-red";
      let src = templates[templateKey];
      if (!src) continue;

      let npcObj = src.clone();
      npcObj.name = npc[0] + "_Runtime";
      npcObj.visible = true;
      npcObj.traverse(function(ch) {
        if (ch.isMesh) {
          ch.castShadow = true;
          ch.receiveShadow = true;
        }
      });
      runtimeRoot.add(npcObj);

      let runner = {
        object: npcObj,
        segmentIndex: npc[1] % this._npcWaypoints.length,
        segmentT: npc[2],
        speed: npc[3],
        baseSpeed: npc[3],
        laneOffset: npc[4],
        aggression: npc[5],
        baseY: 0.01
      };
      this._syncNpcTransform(runner);
      this._npcRunners.push(runner);
    }

    markRuntimeOnly(runtimeRoot);
    if (isPreview) {
      this._editorPreviewRoot = runtimeRoot;
      if (previewParent && previewParent._internal && previewParent._internal.three) {
        previewParent._internal.three.add(runtimeRoot);
      } else if (previewParent && typeof previewParent.add === "function") {
        previewParent.add(runtimeRoot);
      } else {
        scene.add(runtimeRoot);
      }
    } else {
      this._runtimeRoot = runtimeRoot;
      const gameObject = this.erth.object.createFromThreeObject(runtimeRoot);
      await this.erth.scene.addObject(gameObject);
    }

    let finishCell = null;
    for (let c = 0; c < TRACK_CELLS.length; c++) {
      if (TRACK_CELLS[c][2] === "track-finish") {
        finishCell = TRACK_CELLS[c];
        break;
      }
    }

    if (!isPreview && finishCell) {
      let sx = (finishCell[0] + 0.5) * CELL_RAW * GRID_SCALE;
      let sz = (finishCell[1] + 0.5) * CELL_RAW * GRID_SCALE;
      let sAngle = (ORIENT_DEG[finishCell[3]] || 0) * Math.PI / 180;
      this.erth.store.set("skr_spawnX", sx);
      this.erth.store.set("skr_spawnY", 0.5);
      this.erth.store.set("skr_spawnZ", sz);
      this.erth.store.set("skr_spawnAngle", sAngle);
    } else if (!isPreview) {
      this.erth.store.set("skr_spawnX", 3.5);
      this.erth.store.set("skr_spawnY", 0.5);
      this.erth.store.set("skr_spawnZ", 5);
      this.erth.store.set("skr_spawnAngle", 0);
    }

    if (!isPreview) {
      this.erth.store.set("skr_trackReady", true);
    }
  };

  this.onEditorAdded = function(editor) { // @check-ok — guarded
    if (!this._disposeOwnedRoot || !this._buildTrack) return;
    if (!this._dummy) this._dummy = new THREE.Object3D();
    if (this._editorPreviewRoot) {
      this._disposeOwnedRoot(this._editorPreviewRoot, false);
      this._editorPreviewRoot = null;
    }
    this._buildTrack({
      preview: true,
      scene: editor.scene,
      parent: this.gameObject
    });
  };

  this.onEditorRemoved = function() { // @check-ok — guarded
    if (!this._disposeOwnedRoot) return;
    if (this._editorPreviewRoot) {
      this._disposeOwnedRoot(this._editorPreviewRoot, false);
      this._editorPreviewRoot = null;
    }
  };

  this.onEditorDispose = function() { // @check-ok — guarded
    if (!this._disposeOwnedRoot) return;
    if (this._editorPreviewRoot) {
      this._disposeOwnedRoot(this._editorPreviewRoot, false);
      this._editorPreviewRoot = null;
    }
  };

  this.update = function(deltaTime) {
    this._advanceNpcTraffic(deltaTime);
  };

  this.onStop = function() {
    if (this._runtimeRoot) {
      this._disposeOwnedRoot(this._runtimeRoot, true);
      this._runtimeRoot = null;
    }
    this.erth.store.set("skr_trackReady", false);
    this._npcRunners = [];
    this._built = false;
  };

  this.dispose = function() {
    if (this._runtimeRoot) {
      this._disposeOwnedRoot(this._runtimeRoot, true);
      this._runtimeRoot = null;
    }
    if (this._editorPreviewRoot) {
      this._disposeOwnedRoot(this._editorPreviewRoot, false);
      this._editorPreviewRoot = null;
    }
    this._npcRunners = [];
    this._npcWaypoints = [];
    this._built = false;
  };
