  this._disposeOwnedRoot = function(root, removePhysics) {
    if (!root) return;

    root.traverse(function(child) {
      if (removePhysics && child.userData && child.userData.physics && game.physics && typeof game.physics.remove === "function") {
        game.physics.remove(child.uuid);
      }
      if (child.userData && child.userData._ownsGeometry && child.geometry) {
        child.geometry.dispose();
      }
      if (child.userData && child.userData._ownsMaterial && child.material) {
        if (Array.isArray(child.material)) {
          for (let i = 0; i < child.material.length; i++) {
            child.material[i].dispose();
          }
        } else {
          child.material.dispose();
        }
      }
    });

    if (root.parent) {
      root.parent.remove(root);
    }
  };

  this._buildNpcWaypoints = function() {
    const CELL_RAW = 9.99;
    const GRID_SCALE = 0.75;
    const orderedCells = [
      [ 0, 0],
      [ 0, 1],
      [ 0, 2],
      [-1, 2],
      [-2, 2],
      [-2, 1],
      [-2, 0],
      [-2,-1],
      [-3,-1],
      [-3,-2],
      [-3,-3],
      [-2,-3],
      [-1,-3],
      [ 0,-3],
      [ 0,-2],
      [ 0,-1]
    ];

    this._npcWaypoints = [];
    for (let i = 0; i < orderedCells.length; i++) {
      let gx = orderedCells[i][0];
      let gz = orderedCells[i][1];
      this._npcWaypoints.push(new THREE.Vector3(
        (gx + 0.5) * CELL_RAW * GRID_SCALE,
        0,
        (gz + 0.5) * CELL_RAW * GRID_SCALE
      ));
    }
  };

  this._syncNpcTransform = function(npc) {
    if (!npc || !npc.object || this._npcWaypoints.length === 0) return;

    let current = this._npcWaypoints[npc.segmentIndex];
    let next = this._npcWaypoints[(npc.segmentIndex + 1) % this._npcWaypoints.length];
    npc.object.position.lerpVectors(current, next, npc.segmentT);
    let dirX = next.x - current.x;
    let dirZ = next.z - current.z;
    let dirLen = Math.sqrt(dirX * dirX + dirZ * dirZ);
    if (dirLen > 1e-5 && npc.laneOffset) {
      npc.object.position.x += (dirZ / dirLen) * npc.laneOffset;
      npc.object.position.z += (-dirX / dirLen) * npc.laneOffset;
    }
    npc.object.position.y = npc.baseY;

    if (Math.abs(dirX) > 1e-5 || Math.abs(dirZ) > 1e-5) {
      npc.object.rotation.y = Math.atan2(dirX, dirZ);
    }
  };

  this._advanceNpcTraffic = function(deltaTime) {
    if (!this._npcRunners || this._npcRunners.length === 0 || this._npcWaypoints.length < 2) return;

    let dt = Math.min(deltaTime, 1 / 20);
    let player = game && game.scene ? game.scene.getObjectByName("Player") : null;
    let playerWorldSpeed = this.erth && this.erth.store ? this.erth.store.get("skr_playerWorldSpeed") : null;

    for (let i = 0; i < this._npcRunners.length; i++) {
      let npc = this._npcRunners[i];
      let targetSpeed = npc.baseSpeed;
      if (playerWorldSpeed !== undefined && playerWorldSpeed !== null) {
        targetSpeed = Math.max(targetSpeed, playerWorldSpeed * 1.12 + npc.aggression);
      }
      if (player && npc.object) {
        let distToPlayer = npc.object.position.distanceTo(player.position);
        if (distToPlayer < 18) {
          targetSpeed += 2.0;
        } else if (distToPlayer > 45) {
          targetSpeed += 1.4;
        }
      }
      npc.speed = THREE.MathUtils.lerp(npc.speed, targetSpeed, Math.min(1, dt * 4.5));

      let remainingDistance = npc.speed * dt;

      while (remainingDistance > 0) {
        let current = this._npcWaypoints[npc.segmentIndex];
        let nextIndex = (npc.segmentIndex + 1) % this._npcWaypoints.length;
        let next = this._npcWaypoints[nextIndex];
        let segmentLength = current.distanceTo(next);
        if (segmentLength <= 1e-5) {
          npc.segmentIndex = nextIndex;
          npc.segmentT = 0;
          continue;
        }

        let distanceOnSegment = npc.segmentT * segmentLength;
        let segmentRemaining = segmentLength - distanceOnSegment;
        if (remainingDistance >= segmentRemaining) {
          remainingDistance -= segmentRemaining;
          npc.segmentIndex = nextIndex;
          npc.segmentT = 0;
        } else {
          npc.segmentT += remainingDistance / segmentLength;
          remainingDistance = 0;
        }
      }

      this._syncNpcTransform(npc);
    }
  };

