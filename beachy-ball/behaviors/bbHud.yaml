code: |
  // ============================================================
  // Beachy Beachy Ball — HUD
  // UIKit overlay: timer display, game phase indicator,
  // and finished screen with restart hint.
  // Source: Interface.jsx
  // ============================================================

  let g;

  let root = null;
  let timerText = null;
  let phaseText = null;
  let hintText = null;
  let store = null;
  let game;

  let prevPhase = "";
  let prevTimer = "";

  const COLOR_WHITE = 0xffffff;
  const COLOR_GREY = 0xaaaaaa;
  const COLOR_GOLD = 0xffcc00;
  const COLOR_SKY = 0x00bfff;

  this.init = function(_game) {
      game = _game;
    g = game;
    store = this.erth.store;

    UIKitPointerEvents.initialize(game);

    let renderer = game.renderer;
    if (!renderer) return;

    root = new UIKit.Fullscreen(renderer, {
      pointerEvents: "none",
      flexDirection: "column",
      justifyContent: "space-between",
      alignItems: "center", visibility: "visible"
    });

    // --- Top area: phase text ---
    let topArea = new UIKit.Container({
      flexDirection: "column",
      alignItems: "center",
      width: 400,
      height: 60,
      padding: 12,
      backgroundOpacity: 0, visibility: "visible"
    });

    phaseText = new UIKit.Text({
      text: "",
      fontSize: 36,
      fontWeight: "bold",
      color: COLOR_WHITE, visibility: "visible"
    });
    phaseText.setProperties({ visibility: 'hidden' });

    hintText = new UIKit.Text({
      text: "",
      fontSize: 18,
      color: COLOR_GREY, visibility: "visible"
    });
    hintText.setProperties({ visibility: 'hidden' });

    topArea.add(phaseText);
    topArea.add(hintText);

    // --- Bottom area: timer ---
    let bottomArea = new UIKit.Container({
      flexDirection: "column",
      alignItems: "center",
      width: 200,
      height: 50,
      padding: 8,
      backgroundOpacity: 0, visibility: "visible"
    });

    let timerLabel = new UIKit.Text({
      text: "Time",
      fontSize: 14,
      color: COLOR_GREY, visibility: "visible"
    });

    timerText = new UIKit.Text({
      text: "0.00",
      fontSize: 28,
      fontWeight: "bold",
      color: COLOR_WHITE, visibility: "visible"
    });

    bottomArea.add(timerLabel);
    bottomArea.add(timerText);

    // Assemble
    root.add(topArea);
    root.add(bottomArea);

    // Attach to UI camera
    let uiCamera = game.uiCamera;
    if (uiCamera) {
      uiCamera.add(root);
    } else {
      this.gameObject._internal.three.add(root);
    }
    UIKitPointerEvents.registerRoot(root);
  };

  this.update = function(deltaTime) {
    if (!root || !store) return;

    let phase = store.get("bb_phase") || "ready";
    let timer = store.get("bb_timer") || "0.00";

    // Update timer text
    if (timer !== prevTimer && timerText) {
      timerText.setProperties({ text: timer });
      prevTimer = timer;
    }

    // Update phase display
    if (phase !== prevPhase) {
      if (phase === "ready") {
        if (phaseText) {
          phaseText.setProperties({ text: "Ready", color: COLOR_SKY });
          phaseText.setProperties({ visibility: 'visible' });
        }
        if (hintText) {
          hintText.setProperties({ text: "Press any key to start" });
          hintText.setProperties({ visibility: 'visible' });
        }
      } else if (phase === "playing") {
        if (phaseText) phaseText.setProperties({ visibility: 'hidden' });
        if (hintText) hintText.setProperties({ visibility: 'hidden' });
      } else if (phase === "ended") {
        if (phaseText) {
          phaseText.setProperties({ text: "Finished!", color: COLOR_GOLD });
          phaseText.setProperties({ visibility: 'visible' });
        }
        if (hintText) {
          hintText.setProperties({ text: "Press R to restart" });
          hintText.setProperties({ visibility: 'visible' });
        }
      }
      prevPhase = phase;
    }

    UIKitPointerEvents.update(deltaTime);
  };
    this.onEditorAdded = function () { };
    this.onEditorDispose = function () { };

    
  this.dispose = function() {
    if (root) {
      UIKitPointerEvents.unregisterRoot(root);
      root.removeFromParent();

      if (timerText) { timerText.dispose(); timerText = null; }
      if (phaseText) { phaseText.dispose(); phaseText = null; }
      if (hintText) { hintText.dispose(); hintText = null; }

      root.dispose();
      root = null;
    }

    UIKitPointerEvents.deinitialize();
    store = null;
    game = null;
    prevPhase = "";
    prevTimer = "";
  };
