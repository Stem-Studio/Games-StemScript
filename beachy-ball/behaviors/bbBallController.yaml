code: |
  // ============================================================
  // Beachy Beachy Ball — Ball Controller
  // Handles impulse-based movement, jump with ground check,
  // smooth camera follow, game state machine (ready/playing/ended),
  // timer, fall/star detection, audio, and directional light tracking.
  // Source: Ball.jsx + useGame.js + Lights.jsx
  // ============================================================

  let keys = {};

  let game;
  let im;
  let erth;
  let gameObject;
  let onKeyDown = null;
  let onKeyUp = null;
  let smoothCamPos = new THREE.Vector3(0, 4, 6);
  let smoothCamTarget = new THREE.Vector3();
  let _tempVecCamTarget = new THREE.Vector3();
  let _tempVecCamLook = new THREE.Vector3();
  let prevY = 1;
  let jumpCooldown = 0;
  let bgAudio = null;
  let successAudio = null;
  let hasStarted = false;
  let starObject = null;
  let dirLight = null;
  let store = null;
  let touchMoveX = 0;
  let touchMoveZ = 0;
  let touchJump = false;

  this.init = function(_game) {
      game = _game;
      im = game.inputManager;
      erth = this.erth;
      gameObject = this.gameObject;
    store = this.erth.store;

    // Initialize game state
    store.set("bb_phase", "ready");
    store.set("bb_startTime", 0);
    store.set("bb_endTime", 0);
    store.set("bb_timer", "0.00");

    // Find the star object for end-of-level collision
    game.scene.traverse(function(child) {
      if (child.name === "Star") {
        starObject = child;
      }
    });

    // Find directional light for shadow tracking (source: Lights.jsx)
    game.scene.traverse(function(child) {
      if (child.isDirectionalLight) {
        dirLight = child;
      }
    });

    // Keyboard input
    onKeyDown = function(e) {
      keys[e.code] = true;
    };
    onKeyUp = function(e) {
      keys[e.code] = false;
    };

    // Load beach ball texture from bound asset attribute
    const ballTextureRef = this.getAttribute("ballTexture");
    if (ballTextureRef) {
      erth.asset.image.createTexture(ballTextureRef).then(function(tex) {
        let threeObj = gameObject._internal.three;
        if (threeObj && threeObj.material) {
          threeObj.material.map = tex;
          threeObj.material.flatShading = true;
          threeObj.material.needsUpdate = true;
        }
      });
    }

    // Load background music
    this.erth.asset.audio.getUrl({ name: "BackgroundMusic" }).then(function(url) {
      if (url) {
        bgAudio = new Audio(url);
        bgAudio.loop = true;
        bgAudio.volume = 0.1;
      }
    });

    // Load success sound
    this.erth.asset.audio.getUrl({ name: "SuccessSound" }).then(function(url) {
      if (url) {
        successAudio = new Audio(url);
        successAudio.volume = 0.2;
      }
    });

    // Set shadow properties on the ball
    let threeObj = this.gameObject._internal.three;
    threeObj.castShadow = true;
    threeObj.receiveShadow = true;

    prevY = this.gameObject.position.y;
  };

  // Touch/mobile input via touchControls behavior events
  this.onEvent = function(msg, data) {
    if (msg === "move") {
      touchMoveX = data.x || 0;
      touchMoveZ = data.y || 0;
    }
    if (msg === "jump") {
      touchJump = true;
    }
  };

  this.update = function(dt) {
    const _dtCapped = Math.min(dt, 0.1);
    let phase = store.get("bb_phase") || "ready";
    let body = this.gameObject.physics.getBody();

    // --- Start game on first input ---
    if (phase === "ready") {
      let anyKey = (im ? im.getMotion("forward") > 0 : false) || (im ? im.getMotion("forward") < 0 : false) || (im ? im.getMotion("lateral") < 0 : false) || (im ? im.getMotion("lateral") > 0 : false) ||
                   (im ? im.getMotion("forward") > 0 : false) || (im ? im.getMotion("forward") < 0 : false) || (im ? im.getMotion("lateral") < 0 : false) || (im ? im.getMotion("lateral") > 0 : false) ||
                   (im ? im.getAction("jump") : false) || Math.abs(touchMoveX) > 0.1 || Math.abs(touchMoveZ) > 0.1 || touchJump;
      if (anyKey && !hasStarted) {
        hasStarted = true;
        store.set("bb_phase", "playing");
        store.set("bb_startTime", Date.now());
        phase = "playing";
        if (bgAudio) {
          bgAudio.currentTime = 0;
          bgAudio.play().catch(function() {});
        }
      }
    }

    // --- Restart key ---
    if ((im ? im.getAction("reload") : false)) {
      restartGame();
      return;
    }

    // --- Movement (only when playing) ---
    if (phase === "playing" && body) {
      let moveForce = this.getAttribute("moveForce") || 0.6;
      let impulseStrength = moveForce * dt;
      let mx = 0;
      let mz = 0;

      // Keyboard
      if ((im ? im.getMotion("forward") > 0 : false) || (im ? im.getMotion("forward") > 0 : false)) mz -= 1;
      if ((im ? im.getMotion("forward") < 0 : false) || (im ? im.getMotion("forward") < 0 : false)) mz += 1;
      if ((im ? im.getMotion("lateral") < 0 : false) || (im ? im.getMotion("lateral") < 0 : false)) mx -= 1;
      if ((im ? im.getMotion("lateral") > 0 : false) || (im ? im.getMotion("lateral") > 0 : false)) mx += 1;

      // Touch joystick
      mx += touchMoveX;
      mz -= touchMoveZ;

      if (mx !== 0 || mz !== 0) {
        body.applyImpulse({ x: mx * impulseStrength, y: 0, z: mz * impulseStrength });
      }

      // Jump
      let jumpForce = this.getAttribute("jumpForce") || 0.75;
      jumpCooldown -= dt;
      let doJump = (im ? im.getAction("jump") : false) || touchJump;
      touchJump = false;

      if (doJump && jumpCooldown <= 0) {
        let curY = gameObject.position.y;
        let yVel = (curY - prevY) / Math.max(dt, 0.001);
        // Ground check: ball center near ground level and not moving fast vertically
        if (curY < 0.6 && Math.abs(yVel) < 2) {
          body.applyImpulse({ x: 0, y: jumpForce, z: 0 });
          jumpCooldown = 0.3;
        }
      }

      // Update timer
      let startTime = store.get("bb_startTime") || Date.now();
      let elapsed = (Date.now() - startTime) / 1000;
      store.set("bb_timer", elapsed.toFixed(2));

      // Fall detection
      let fallThreshold = this.getAttribute("fallThreshold") || -4;
      if (gameObject.position.y < fallThreshold) {
        restartGame();
        return;
      }

      // Star collision (distance check, radius ~1.0)
      if (starObject) {
        let dx = gameObject.position.x - starObject.position.x;
        let dy = gameObject.position.y - starObject.position.y;
        let dz = gameObject.position.z - starObject.position.z;
        let dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
        if (dist < 1.0) {
          store.set("bb_phase", "ended");
          store.set("bb_endTime", Date.now());
          let endElapsed = (Date.now() - startTime) / 1000;
          store.set("bb_timer", endElapsed.toFixed(2));
          if (successAudio) {
            successAudio.currentTime = 0;
            successAudio.play().catch(function() {});
          }
          if (bgAudio) bgAudio.volume = 0.2;
        }
      }
    }

    // --- Camera follow (runs in all phases) ---
    // Source: behind ball (+Z), slightly above (+Y)
    let ballPos = gameObject.position;
    _tempVecCamTarget.set(ballPos.x, ballPos.y + 0.65, ballPos.z + 2.25);
    _tempVecCamLook.set(ballPos.x, ballPos.y + 0.25, ballPos.z);

    let smooth = this.getAttribute("cameraSmoothing") || 5;
    smoothCamPos.lerp(_tempVecCamTarget, smooth * dt);
    smoothCamTarget.lerp(_tempVecCamLook, smooth * dt);

    game.camera.position.copy(smoothCamPos);
    game.camera.lookAt(smoothCamTarget);

    // --- Directional light tracking (source: Lights.jsx) ---
    if (dirLight) {
      dirLight.position.z = game.camera.position.z + 1 - 4;
      if (dirLight.target) {
        dirLight.target.position.z = game.camera.position.z - 4;
        dirLight.target.updateMatrixWorld();
      }
    }

    prevY = gameObject.position.y;
  };

  function restartGame() {
    hasStarted = false;
    store.set("bb_phase", "ready");
    store.set("bb_startTime", 0);
    store.set("bb_timer", "0.00");

    // Reset ball position and velocity
    gameObject.position.set(0, 0.75, 0);
    let body = gameObject.physics.getBody();
    if (body) {
      body.setVelocity({ x: 0, y: 0, z: 0 });
    }

    if (bgAudio) bgAudio.volume = 0.1;
  }

  this.onReset = function() {
    restartGame();
  };

  this.dispose = function() {
    if (bgAudio) {
      bgAudio.pause();
      bgAudio = null;
    }
    successAudio = null;
    starObject = null;
    dirLight = null;
    store = null;
    keys = {};
  };
