meta:
  tool: StemStudio
  type: behavior
  exportVersion: 1

config:
  name: "SW Small World"
  id: "sw.smallWorld"
  author: "smallworld"
  isScript: true
  main: "script.js"
  version: "1.0.0"
  description: "Interactive diorama with TSL NodeMaterial matcap effects, animated
    telescope/gears, entrance glow, floor overlays, and ambient wind strokes
    (WebGPU compatible)"
  tags:
    - gameplay
  priority: 0
  attributes:
    floorShadowTexture:
      name: "Floor Shadow Texture"
      type: "imageAsset"
      description: "Baked shadow alpha mask for floor overlay"
    floorLightTexture:
      name: "Floor Light Texture"
      type: "imageAsset"
      description: "Baked light alpha mask for floor overlay"
    entranceStrokeTexture:
      name: "Entrance Stroke Texture"
      type: "imageAsset"
      description: "Alpha map for entrance stroke instances"
  throttleConfig:
    throttlePriority: "HIGH"
    enableFrustumCulling: false
    enableDistanceThrottling: false
    requiresConsistentUpdates: true
  documentation: Interactive diorama with TSL NodeMaterial matcap effects, animated
    telescope/gears, entrance glow, floor overlays, and ambient wind strokes
    (WebGPU compatible) Configure attributes in the editor to tune gameplay
    behavior.

code: |
  // ============================================================
  // Small World — Diorama Content Behavior
  // Ported from: https://github.com/brunosimon/small-world
  // ============================================================

  // --- TSL NodeMaterial helpers (WebGPU compatible, replaces GLSL shaders) ---

  let target;
  const {
    Fn, uniform, texture, uv, matcapUV,
    normalWorld, normalLocal, positionWorld, positionLocal,
    vec2, vec3, vec4, float: floatNode,
    sin, cos, dot, normalize, add, sub, mul,
    mix, clamp, pow, length, cross, abs,
    min: minFn, max: maxFn, attribute
  } = THREE.TSL;

  // Creates a TSL-based matcap NodeMaterial with floor proximity + point light coloring
  // When isFlag is true, adds wind vertex displacement and color brightening
  function createMatcapNodeMat(matcapTex, isFlag) {
    const uTime = uniform(0.0);

    const colorNode = Fn(() => {
      // Matcap UV lookup using built-in TSL matcapUV
      const muv = matcapUV;
      const matcapCol = texture(matcapTex, muv);
      const outgoing = matcapCol.rgb.toVar();

      // Wind brightening for flags (vertex color.r carries wind mask)
      if (isFlag) {
        const vertColor = attribute("color", "vec3");
        const ws = mul(
          add(mul(sin(add(mul(positionLocal.y, 9.0), mul(uTime, 0.003))),
                  sin(add(mul(positionLocal.y, 2.345), mul(uTime, 0.002)))), 1.0),
          mul(vertColor.x, 0.5)
        );
        outgoing.addAssign(mul(ws, 0.15));
      }

      // Floor proximity darkening
      const floorDist = pow(clamp(sub(1.0, positionWorld.y.div(3.8)), 0.0, 1.0), 3.0);
      const floorOrient = pow(
        clamp(mul(add(dot(normalize(normalWorld), vec3(0.0, -1.0, 0.0)), 1.0), 0.62), 0.0, 1.0),
        3.0
      );
      const floorColor = vec3(0.357, 0.376, 0.027);
      outgoing.assign(mix(outgoing, floorColor, mul(floorDist, floorOrient)));

      // Point light effect
      const pointPos = vec3(0.78, 0.39, 1.337);
      const pointDelta = sub(positionWorld, pointPos);
      const pointDist = pow(sub(1.0, clamp(length(pointDelta).div(4.25), 0.0, 1.0)), 3.0);
      const pointOrient = pow(
        clamp(mul(add(dot(normalize(normalWorld), normalize(pointDelta).negate()), -0.11), 1.08), 0.0, 1.0),
        3.0
      );
      const pointColor = vec3(1.0, 0.247, 0.643);
      const pointResult = mul(pointColor, mul(pointDist, mul(pointOrient, 5.0)));
      outgoing.assign(minFn(add(outgoing, pointResult), vec3(1.0)));

      return vec4(outgoing, 1.0);
    })();

    const matOpts = { colorNode: colorNode };

    // Wind vertex displacement for flags
    if (isFlag) {
      matOpts.positionNode = Fn(() => {
        const vertColor = attribute("color", "vec3");
        const ws = mul(
          add(mul(sin(add(mul(positionLocal.y, 9.0), mul(uTime, 0.003))),
                  sin(add(mul(positionLocal.y, 2.345), mul(uTime, 0.002)))), 1.0),
          mul(vertColor.x, 0.5)
        );
        return add(positionLocal, mul(normalLocal, mul(ws, 0.12)));
      })();
    }

    const mat = new THREE.MeshBasicNodeMaterial(matOpts);
    mat._uTime = uTime;
    return mat;
  }

  // Creates a wind stroke TSL NodeMaterial with progress-based reveal
  function createWindStrokeNodeMat() {
    const uProgress = uniform(0.0);

    const colorNode = Fn(() => {
      const amplitude = 0.6;
      const fadeAmp = 0.1;
      const progress = sub(mul(sub(1.0, uProgress), 1.0 + amplitude + fadeAmp), (amplitude + fadeAmp) * 0.5);
      const progressAlpha = sub(1.0, sub(abs(sub(progress, uv().x)), amplitude * 0.5).div(fadeAmp / 2.0));
      const endsAlpha = minFn(mul(uv().x, 20.0), mul(sub(1.0, uv().x), 20.0));
      const finalAlpha = mul(minFn(minFn(progressAlpha, endsAlpha), 1.0), 0.7);
      return vec4(1.0, 1.0, 1.0, finalAlpha);
    })();

    const mat = new THREE.MeshBasicNodeMaterial({
      transparent: true,
      depthWrite: false,
      colorNode: colorNode
    });
    mat._uProgress = uProgress;
    return mat;
  }

  function spawnWindStroke(template) {
    const mesh = new THREE.Mesh(template.geometry.clone(), createWindStrokeNodeMat());
    mesh.position.copy(template.position);
    mesh.quaternion.copy(template.quaternion);
    mesh.scale.copy(template.scale);
    markRuntimeOnly(mesh);
    mesh.position.x = (3 + Math.random() * 7) * (Math.random() < 0.5 ? 1 : -1);
    mesh.position.y = Math.random() * 3;
    mesh.position.z = (2.2 + Math.random() * 5) * (Math.random() < 0.5 ? 1 : -1);
    mesh.userData.isRuntimeOnly = true;
    return mesh;
  }

  // --- Matcap lookup: model material name → imported texture name ---
  const MATCAP_MAP = {
    brass: "MCBrass",
    fabricPinkDark: "MCFabricPinkDark",
    fabricPinkLight: "MCFabricPinkLight",
    foliage: "MCFoliage",
    globe: "MCGlobe",
    lens: "MCLens",
    metal: "MCMetal",
    paper: "MCPaper",
    stone: "MCStone",
    stoneDark: "MCStoneDark",
    wood: "MCWood"
  };

  // Shared matcap uniform values are inlined into the TSL node graph in createMatcapNodeMat()

  // --- State ---
  let game;
  let elapsedMs = 0;
  let telescopeY = null;
  let telescopeX = null;
  let gear0 = null;
  let gear1 = null;
  let createdMaterials = [];
  let createdTextures = [];
  let bgMesh = null;
  let entranceStrokeMesh = null;
  let entranceStrokeItems = [];
  let windStrokeTemplate1 = null;
  let windStrokeTemplate2 = null;
  let activeWindStrokes = [];
  let windPopTimer = 0;
  let matcapMaterials = [];
  let previewMesh = null;
  let previewGeo = null;
  let previewMat = null;
  let previewTime = 0;

  // Telescope tween state
  let teleYTween = { current: 0, target: 0, duration: 2, delay: 1, elapsed: 0, delaying: true };
  let teleXTween = { current: 0, target: 0, duration: 2, delay: 1, elapsed: 0, delaying: true };

  // --- Easing functions (replacing GSAP) ---
  function easeInOutQuad(t) {
    return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
  }
  function easeInQuad(t) { return t * t; }
  function easeInQuart(t) { return t * t * t * t; }

  function resetTween(tw, minTarget, maxTarget) {
    tw.current = tw.target;
    tw.target = minTarget + Math.random() * (maxTarget - minTarget);
    tw.duration = 0.5 + Math.random() * 2;
    tw.delay = Math.random() * 2;
    tw.elapsed = 0;
    tw.delaying = true;
  }

  function advanceTween(tw, dt, minTarget, maxTarget) {
    if (tw.delaying) {
      tw.delay -= dt;
      if (tw.delay <= 0) tw.delaying = false;
      return tw.current;
    }
    tw.elapsed += dt;
    let t = Math.min(tw.elapsed / tw.duration, 1);
    t = easeInOutQuad(t);
    let val = tw.current + (tw.target - tw.current) * t;
    if (tw.elapsed >= tw.duration) resetTween(tw, minTarget, maxTarget);
    return val;
  }

  function findFirstMesh(obj) {
    let result = null;
    obj.traverse(function(child) {
      if (!result && child.isMesh) result = child;
    });
    return result;
  }

  function syncBackgroundToCamera(camera) {
    if (!bgMesh || !camera) return;
    const distance = 1;
    const fov = THREE.MathUtils.degToRad(camera.fov || 25);
    const halfHeight = Math.tan(fov * 0.5) * distance;
    const halfWidth = halfHeight * (camera.aspect || 1);
    bgMesh.position.set(0, 0, -distance);
    bgMesh.scale.set(halfWidth, halfHeight, 1);
  }

  function markRuntimeOnly(obj) {
    if (!obj) return obj;
    obj.userData = obj.userData || {};
    obj.userData.isRuntimeOnly = true;
    if (obj.traverse) {
      obj.traverse(function(child) {
        child.userData = child.userData || {};
        child.userData.isRuntimeOnly = true;
      });
    }
    return obj;
  }

  const buildPreview = () => {
    if (previewMesh) return;
    previewGeo = new THREE.TorusKnotGeometry(0.35, 0.08, 96, 12);
    previewMat = new THREE.MeshBasicNodeMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 });
    previewMesh = new THREE.Mesh(previewGeo, previewMat);
    previewMesh.position.set(0, 1.5, 0);
    markRuntimeOnly(previewMesh);
    this.gameObject._internal.three.add(previewMesh);
  }

  function updatePreview(deltaTime) {
    if (!previewMesh) return;
    previewTime += deltaTime;
    previewMesh.rotation.x += deltaTime * 0.4;
    previewMesh.rotation.y += deltaTime * 0.8;
    previewMesh.position.y = 1.5 + Math.sin(previewTime * 1.5) * 0.12;
  }

  function cleanupPreview() {
    if (previewMesh && previewMesh.parent) previewMesh.parent.remove(previewMesh);
    if (previewGeo) { previewGeo.dispose(); previewGeo = null; }
    if (previewMat) { previewMat.dispose(); previewMat = null; }
    previewMesh = null;
    previewTime = 0;
  }

  function cleanup() {
    for (let i = 0; i < createdMaterials.length; i++) {
      createdMaterials[i].dispose();
    }
    for (let i = 0; i < createdTextures.length; i++) {
      createdTextures[i].dispose();
    }
    if (bgMesh) {
      bgMesh.geometry.dispose();
      if (bgMesh.parent) bgMesh.parent.remove(bgMesh);
    }
    if (entranceStrokeMesh) {
      entranceStrokeMesh.geometry.dispose();
      if (entranceStrokeMesh.parent) entranceStrokeMesh.parent.remove(entranceStrokeMesh);
    }
    for (let i = 0; i < activeWindStrokes.length; i++) {
      const ws = activeWindStrokes[i];
      ws.mesh.geometry.dispose();
      ws.mesh.material.dispose();
      if (ws.mesh.parent) ws.mesh.parent.remove(ws.mesh);
    }
    activeWindStrokes = [];
    createdMaterials = [];
    createdTextures = [];
    matcapMaterials = [];
    entranceStrokeItems = [];
    bgMesh = null;
    entranceStrokeMesh = null;
  }

  // --- Lifecycle ---

  this.init = async function(_game) {
    game = _game;

    // 1. Load matcap textures via findByName (dynamic set from MATCAP_MAP)
    const matcapTextures = {};
    for (const matName in MATCAP_MAP) {
      try {
        const ref = await this.erth.asset.image.findByName(MATCAP_MAP[matName]);
        if (ref) {
          matcapTextures[matName] = await this.erth.asset.image.createTexture(ref);
          createdTextures.push(matcapTextures[matName]);
        } else {
          console.warn("[SmallWorld] Matcap texture not found:", MATCAP_MAP[matName]);
        }
      } catch (e) {
        console.warn("[SmallWorld] Could not load matcap texture:", matName, e);
      }
    }

    // 2. Traverse main model (this.gameObject), replace materials with custom matcap shader
    const materialCache = {};
    this.gameObject._internal.three.traverse(function(child) {
      if (child.isMesh && child.material) {
        const origName = child.material.name;
        const isFlag = /^flag/.test(child.name);
        const cacheKey = origName + (isFlag ? "_flag" : "");

        if (!materialCache[cacheKey] && matcapTextures[origName]) {
          const mat = createMatcapNodeMat(matcapTextures[origName], isFlag);
          materialCache[cacheKey] = mat;
          createdMaterials.push(mat);
          matcapMaterials.push(mat);
        }
        if (materialCache[cacheKey]) {
          child.material = materialCache[cacheKey];
        }
      }
      // Store telescope/gear references
      if (/^telescopeY/.test(child.name)) telescopeY = child;
      if (/^telescopeX/.test(child.name)) telescopeX = child;
      if (/^gear0/.test(child.name)) gear0 = child;
      if (/^gear1/.test(child.name)) gear1 = child;
    });

    // 3. Floor background gradient quad (clip-space fullscreen)
    const bgGeom = new THREE.PlaneGeometry(2, 2, 1, 1);
    const bgColors = new Float32Array([
      0.522, 0.565, 0.169,  // top-left #85902B
      0.486, 0.525, 0.153,  // top-right #7C8627
      0.776, 0.804, 0.376,  // bottom-left #C6CD60
      0.624, 0.655, 0.247   // bottom-right #9FA73F
    ]);
    bgGeom.setAttribute("color", new THREE.BufferAttribute(bgColors, 3));
    const bgMat = new THREE.MeshBasicNodeMaterial({
      vertexColors: true,
      depthWrite: false,
      depthTest: false
    });
    bgMesh = new THREE.Mesh(bgGeom, bgMat);
    markRuntimeOnly(bgMesh);
    bgMesh.frustumCulled = false;
    bgMesh.renderOrder = -1000;
    bgMesh.userData.isRuntimeOnly = true;
    game.camera.add(bgMesh);
    syncBackgroundToCamera(game.camera);
    createdMaterials.push(bgMat);

    // 4. Floor baked shadow overlay (attribute with findByName fallback)
    const shadowObj = game.scene.getObjectByName("SWFloorShadow");
    if (shadowObj) {
      const shadowMesh = findFirstMesh(shadowObj);
      if (shadowMesh) {
        let shadowRef = this.getAttribute("floorShadowTexture"); // @check-ok fallback for migration
        let shadowTex = null;
        if (shadowRef) {
          try { shadowTex = await this.erth.asset.image.createTexture(shadowRef); } catch(e) {}
        }
        if (shadowTex) {
          createdTextures.push(shadowTex);
          shadowTex.flipY = false;
          const shadowAlpha = sub(1.0, texture(shadowTex, uv()).r);
          const shadowMat = new THREE.MeshBasicNodeMaterial({
            transparent: true,
            colorNode: vec4(0.298, 0.322, 0.098, shadowAlpha)
          });
          shadowMesh.material = shadowMat;
          createdMaterials.push(shadowMat);
        }
      }
    }

    // 5. Floor baked light overlay (attribute with findByName fallback)
    const lightObj = game.scene.getObjectByName("SWFloorLight");
    if (lightObj) {
      const lightMesh = findFirstMesh(lightObj);
      if (lightMesh) {
        let lightRef = this.getAttribute("floorLightTexture"); // @check-ok fallback for migration
        let lightTex = null;
        if (lightRef) {
          try { lightTex = await this.erth.asset.image.createTexture(lightRef); } catch(e) {}
        }
        if (lightTex) {
          createdTextures.push(lightTex);
          lightTex.flipY = false;
          const lightAlpha = texture(lightTex, uv()).r;
          const lightMat = new THREE.MeshBasicNodeMaterial({
            transparent: true,
            colorNode: vec4(1.0, 0.784, 0.914, lightAlpha)
          });
          lightMesh.material = lightMat;
          lightMesh.position.y += 0.001;
          createdMaterials.push(lightMat);
        }
      }
    }

    // 6. Entrance model (white emissive)
    const entranceObj = game.scene.getObjectByName("SWEntrance");
    if (entranceObj) {
      entranceObj.traverse(function(child) {
        if (child.isMesh && child.material) {
          child.material.transparent = true;
          if (child.material.emissive) child.material.emissive.set("#ffffff");
        }
      });
    }

    // 7. Entrance strokes (InstancedMesh) — attribute with fallback
    let strokeRef = this.getAttribute("entranceStrokeTexture"); // @check-ok fallback for migration
    let strokeTex = null;
    if (strokeRef) {
      try { strokeTex = await this.erth.asset.image.createTexture(strokeRef); } catch(e) {}
    }
    if (strokeTex) createdTextures.push(strokeTex);
    const strokeCount = 10;
    const strokeLength = 1.5;
    const strokeGeom = new THREE.PlaneGeometry(strokeLength, 0.075, 1, 1);
    strokeGeom.rotateX(-Math.PI * 0.25);
    strokeGeom.rotateY(Math.PI * 0.5);
    const strokeMat = new THREE.MeshBasicNodeMaterial({
      transparent: true,
      depthWrite: false,
      alphaMap: strokeTex
    });
    entranceStrokeMesh = new THREE.InstancedMesh(strokeGeom, strokeMat, strokeCount);
    markRuntimeOnly(entranceStrokeMesh);
    entranceStrokeMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    entranceStrokeMesh.userData.isRuntimeOnly = true;
    game.scene.add(entranceStrokeMesh); // @check-ok runtime-only set manually
    createdMaterials.push(strokeMat);

    const targetZ = 1.337 - strokeLength * 0.5;
    for (let i = 0; i < strokeCount; i++) {
      const item = {
        index: i,
        position: new THREE.Vector3(0, 0, 3.2),
        quaternion: new THREE.Quaternion(),
        scale: new THREE.Vector3(1, 1, 0),
        matrix: new THREE.Matrix4(),
        delay: Math.random() * 4,
        elapsed: 0,
        duration: 2,
        targetZ: targetZ,
        startZ: 3.2
      };
      item.position.y = Math.random();
      item.position.x = (Math.random() - 0.5);
      item.matrix.compose(item.position, item.quaternion, item.scale);
      entranceStrokeMesh.setMatrixAt(i, item.matrix);
      entranceStrokeItems.push(item);
    }
    entranceStrokeMesh.instanceMatrix.needsUpdate = true;

    // 8. Wind stroke templates (hidden)
    const ws1 = game.scene.getObjectByName("SWWindStroke1");
    const ws2 = game.scene.getObjectByName("SWWindStroke2");
    if (ws1) { ws1.visible = false; windStrokeTemplate1 = findFirstMesh(ws1); }
    if (ws2) { ws2.visible = false; windStrokeTemplate2 = findFirstMesh(ws2); }

    // 9. Init telescope tweens
    if (telescopeY) resetTween(teleYTween, -0.75, 0.75);
    if (telescopeX) resetTween(teleXTween, -1, 0);
  };

  this.onEditorAdded = function() {
    buildPreview();
    updatePreview(0);
  };

  this.onEditorUpdate = function() {
    updatePreview(0.016);
  };

  this.onEditorAttributesUpdated = function() {
    cleanupPreview();
    buildPreview();
    updatePreview(0);
  };

  this.onEditorDispose = function() {
    cleanupPreview();
  };

  this.update = function(deltaTime) {
    const dt = Math.min(deltaTime, 0.1);
    const dtMs = deltaTime * 1000;
    elapsedMs += dtMs;
    syncBackgroundToCamera(game.camera);

    // Update matcap uTime uniforms (TSL uniform access)
    for (let i = 0; i < matcapMaterials.length; i++) {
      matcapMaterials[i]._uTime.value = elapsedMs;
    }

    // Telescope animation
    if (telescopeY) {
      telescopeY.rotation.y = advanceTween(teleYTween, deltaTime, -0.75, 0.75);
    }
    if (telescopeX) {
      telescopeX.rotation.x = advanceTween(teleXTween, deltaTime, -1, 0);
    }

    // Gear sync
    if (gear0 && telescopeY) gear0.rotation.y = -0.1 + telescopeY.rotation.y * (11 / 6);
    if (gear1 && telescopeY) gear1.rotation.y = 0.4 + telescopeY.rotation.y * (11 / 6);

    // Entrance strokes
    if (entranceStrokeMesh) {
      let needsUpdate = false;
      for (let i = 0; i < entranceStrokeItems.length; i++) {
        const item = entranceStrokeItems[i];
        if (item.delay > 0) {
          item.delay -= deltaTime;
          continue;
        }
        item.elapsed += deltaTime;
        let t = Math.min(item.elapsed / item.duration, 1);
        item.position.z = item.startZ + (item.targetZ - item.startZ) * easeInQuad(t);
        item.scale.z = easeInQuart(t);
        item.matrix.compose(item.position, item.quaternion, item.scale);
        entranceStrokeMesh.setMatrixAt(item.index, item.matrix);
        needsUpdate = true;
        if (t >= 1) {
          item.position.z = 3.2;
          item.position.y = Math.random();
          item.position.x = (Math.random() - 0.5);
          item.scale.z = 0;
          item.delay = Math.random() * 4;
          item.elapsed = 0;
        }
      }
      if (needsUpdate) entranceStrokeMesh.instanceMatrix.needsUpdate = true;
    }

    // Wind strokes auto-pop
    windPopTimer += deltaTime;
    if (windPopTimer >= 0.5) {
      windPopTimer -= 0.5;
      if (Math.random() < 0.3 && (windStrokeTemplate1 || windStrokeTemplate2)) {
        const template = Math.random() < 0.5 ? windStrokeTemplate1 : windStrokeTemplate2;
        if (template) {
          const mesh = spawnWindStroke(template);
          game.scene.add(mesh); // @check-ok runtime-only set in spawnWindStroke
          activeWindStrokes.push({ mesh: mesh, startX: mesh.position.x, elapsed: 0, duration: 10 });
        }
      }
    }

    // Animate active wind strokes
    for (let i = activeWindStrokes.length - 1; i >= 0; i--) {
      const ws = activeWindStrokes[i];
      ws.elapsed += deltaTime;
      let t = Math.min(ws.elapsed / ws.duration, 1);
      let eased = easeInOutQuad(t);
      ws.mesh.material._uProgress.value = eased;
      ws.mesh.position.x = ws.startX + 1.5 * eased;
      if (t >= 1) {
        ws.mesh.geometry.dispose();
        ws.mesh.material.dispose();
        if (ws.mesh.parent) ws.mesh.parent.remove(ws.mesh);
        activeWindStrokes.splice(i, 1);
      }
    }
  };

  this.onStop = function() {
    cleanupPreview();
    cleanup();
  };

  this.dispose = function() {
    cleanupPreview();
    cleanup();
  };
