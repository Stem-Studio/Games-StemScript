# Generated by Script Wizard — bball conversion
meta:
  tool: StemStudio
  type: behavior
  exportVersion: 1

config:
  name: "BB Ball Controller"
  id: "bball.ballController"
  author: "script-wizard"
  isScript: true
  main: "script.js"
  version: "1.0.0"
  priority: 0
  description: "Ball physics (host-only at 20Hz), catch/throw mechanics, scoring
    detection, multiplayer sync. Creates ball mesh and shadow marker."
  tags:
    - gameplay
  attributes:
    ballMarkerTexture:
      name: "Ball Marker Texture"
      type: "imageAsset"
      description: "Ball ground shadow marker texture"
  documentation: Ball physics (host-only at 20Hz), catch/throw mechanics, scoring
    detection, multiplayer sync. Creates ball mesh and shadow marker. Configure
    attributes in the editor to tune gameplay behavior.

code: |
  // Source constants
  const BALL_RADIUS = 0.3;
  const BALL_INITIAL_Y = 2;
  const BALL_CATCH_RADIUS = 0.5;
  const BALL_DRAG = 0.98;
  const BALL_BOUNCE = 0.6;
  const BALL_GRAVITY = 0.04;
  const THROW_POWER = 0.3;
  const SHOULDER_Y = 0.9;
  const ARM_LENGTH = 0.6;
  const TICK_RATE = 1 / 20;

  // Court collision bounds
  const BALL_X_MIN = -6.7;  // -(12/2 + 1) + 0.3
  const BALL_X_MAX = 6.7;
  const BALL_Z_MIN = -4.7;  // -(8/2 + 1) + 0.3
  const BALL_Z_MAX = 4.7;

  // Basket scoring zones
  const BASKET_Y_MIN = 3.0;   // 3.75 - 1.5/2
  const BASKET_Y_MAX = 4.5;   // 3.75 + 1.5/2
  const BASKET_Z_MIN = -1.5;  // -3/2
  const BASKET_Z_MAX = 1.5;

  const RESET_BALL_DURATION = 60;

  let game = null;
  let store = null;
  let mp = null;
  const erth = this.erth;
  // Ball state
  let bx = 0;
  let by = BALL_INITIAL_Y;
  let bz = 0;
  let bvx = 0;
  let bvy = 0.3; // initial small upward toss
  let bvz = 0;
  let ballOwner = ""; // sessionId or ""
  let lastBallPlayerId = "";

  let accumulator = 0;
  let syncTimer = 0;
  const SYNC_INTERVAL = 0.05;

  // Visual elements
  let ballMesh = null;
  let ballGeo = null;
  let ballMat = null;
  let markerMesh = null;
  let markerGeo = null;
  let markerMat = null;
  let markerTex = null;

  // Track throw intents per player to edge-detect
  let lastThrowIntents = {};

  function buildBall(parent) {
    ballGeo = new THREE.SphereGeometry(BALL_RADIUS, 16, 12);
    ballMat = new THREE.MeshStandardNodeMaterial({ color: 0xd65628, roughness: 0.8, metalness: 0.3 });
    ballMesh = new THREE.Mesh(ballGeo, ballMat);
    ballMesh.userData.isRuntimeOnly = true;
    ballMesh.castShadow = true;
    ballMesh.receiveShadow = true;
    parent.add(ballMesh);

    // Ball shadow marker on ground
    markerGeo = new THREE.PlaneGeometry(BALL_RADIUS * 2, BALL_RADIUS * 2);
    markerMat = new THREE.MeshStandardNodeMaterial({
      color: 0x000000, roughness: 1, metalness: 0, transparent: true, opacity: 0.3
    });
    markerMesh = new THREE.Mesh(markerGeo, markerMat);
    markerMesh.userData.isRuntimeOnly = true;
    markerMesh.rotation.x = -Math.PI / 2;
    markerMesh.position.y = 0.01;
    parent.add(markerMesh);
  }

  function cleanupBall() {
    if (ballMesh && ballMesh.parent) ballMesh.parent.remove(ballMesh);
    if (markerMesh && markerMesh.parent) markerMesh.parent.remove(markerMesh);
    if (ballGeo) ballGeo.dispose();
    if (ballMat) ballMat.dispose();
    if (markerGeo) markerGeo.dispose();
    if (markerMat) markerMat.dispose();
    if (markerTex) markerTex.dispose();
    ballMesh = null;
    markerMesh = null;
    ballGeo = null;
    ballMat = null;
    markerGeo = null;
    markerMat = null;
    markerTex = null;
  }

  const loadMarkerTexture = () => {
    let ref = this.getAttribute("ballMarkerTexture");
    if (ref) {
      erth.asset.image.createTexture(ref).then(applyMarkerTex).catch(function() {});
    } else {
      erth.asset.image.findByName("BBBallMarker").then(function(r) { // @check-ok fallback asset name
        if (r) erth.asset.image.createTexture(r).then(applyMarkerTex).catch(function() {});
      }).catch(function() {});
    }
  }

  function applyMarkerTex(tex) {
    if (!markerMesh) return;
    markerTex = tex;
    markerMesh.material.map = tex;
    markerMesh.material.color.setHex(0xffffff);
    markerMesh.material.opacity = 1;
    markerMesh.material.needsUpdate = true;
  }

  function resetBall() {
    bx = 0;
    bz = 0;
    by = BALL_INITIAL_Y;
    bvx = 0;
    bvz = 0;
    bvy = 0.3;
    ballOwner = "";
  }

  // Get arm position for a player given their state
  function getArmPos(px, pz, py, ax, ay, jumpTimer, jumpWithBall) {
    let jumpY = 0;
    if (jumpTimer > 0) {
      let dur = jumpWithBall ? 20 : 25;
      let n = dur - jumpTimer;
      let boost = jumpWithBall ? 0.4 : 0.5;
      jumpY = Math.max(0, boost * n - 0.05 * (n - 1) * n / 2);
    }
    let armX = px + Math.cos(ay) * Math.cos(ax) * ARM_LENGTH;
    let armZ = pz + Math.sin(ay) * Math.cos(ax) * ARM_LENGTH;
    let armY = SHOULDER_Y + jumpY + Math.sin(ax) * ARM_LENGTH;
    return { x: armX, y: armY, z: armZ };
  }

  function tickBallPhysics() {
    let bounce = 0;
    let hitBasketTeam = -1;

    bx += bvx;
    if (bx < BALL_X_MIN) {
      if (by > BASKET_Y_MIN && by < BASKET_Y_MAX && bz > BASKET_Z_MIN && bz < BASKET_Z_MAX) {
        hitBasketTeam = 1; // ball hit left wall in basket zone -> team 1 (blue) scores
      }
      bx = BALL_X_MIN + (BALL_X_MIN - bx) * BALL_BOUNCE;
      bounce = Math.abs(bvx);
      bvx = -bvx * BALL_BOUNCE;
    } else if (bx > BALL_X_MAX) {
      if (by > BASKET_Y_MIN && by < BASKET_Y_MAX && bz > BASKET_Z_MIN && bz < BASKET_Z_MAX) {
        hitBasketTeam = 0; // ball hit right wall in basket zone -> team 0 (red) scores
      }
      bx = BALL_X_MAX + (BALL_X_MAX - bx) * BALL_BOUNCE;
      bounce = Math.abs(bvx);
      bvx = -bvx * BALL_BOUNCE;
    }

    bz += bvz;
    if (bz < BALL_Z_MIN) {
      bz = BALL_Z_MIN + (BALL_Z_MIN - bz) * BALL_BOUNCE;
      bounce = Math.abs(bvz);
      bvz = -bvz * BALL_BOUNCE;
    } else if (bz > BALL_Z_MAX) {
      bz = BALL_Z_MAX + (BALL_Z_MAX - bz) * BALL_BOUNCE;
      bounce = Math.abs(bvz);
      bvz = -bvz * BALL_BOUNCE;
    }

    bvx *= BALL_DRAG;
    bvz *= BALL_DRAG;

    if (by !== BALL_RADIUS || bvy !== 0) {
      by += bvy;
      bvy -= BALL_GRAVITY;
      if (by < BALL_RADIUS) {
        bounce = Math.abs(bvy);
        if (bvy > -0.2) {
          by = BALL_RADIUS;
          bvy = 0;
        } else {
          by = BALL_RADIUS + (BALL_RADIUS - by) * BALL_BOUNCE * BALL_BOUNCE;
          bvy = -bvy * BALL_BOUNCE;
        }
      }
    }

    return { bounce: bounce, hitBasketTeam: hitBasketTeam };
  }

  // Check catches: host iterates all players
  function checkCatches() {
    let scoreTimer = store.get("bb_score_timer") || 0;
    if (scoreTimer > 0) return;
    if (ballOwner !== "") return;

    // Check local player
    let localCatching = store.get("bb_local_catching") || false;
    if (localCatching) {
      let lx = store.get("bb_local_x") || 0;
      let lz = store.get("bb_local_z") || 0;
      let ly = store.get("bb_local_y") || 0;
      let lax = store.get("bb_local_ax") || 0;
      let lay = store.get("bb_local_ay") || 0;
      let ljt = store.get("bb_local_jump_timer") || 0;
      let ljwb = store.get("bb_local_jump_with_ball") || false;
      let arm = getArmPos(lx, lz, ly, lax, lay, ljt, ljwb);
      let dx = bx - arm.x;
      let dz = bz - arm.z;
      let dy = (by > SHOULDER_Y || ljt > 0) ? by - arm.y : 0;
      let dist = Math.sqrt(dx * dx + dz * dz + dy * dy);
      if (dist <= BALL_CATCH_RADIUS) {
        let mySession = (mp && mp.player) ? mp.player.sessionId : "local";
        ballOwner = mySession;
        lastBallPlayerId = mySession;
        store.set("bb_ball_owner", ballOwner);
        store.set("bb_audio", "catch:0.5:" + performance.now());
        return;
      }
    }

    // Check remote players
    if (!mp) return;
    let players = mp.getPlayers();
    if (!players) return;
    let mySession = mp.player ? mp.player.sessionId : "";
    players.forEach(function(player, sessionId) {
      if (sessionId === mySession) return;
      if (ballOwner !== "") return;
      let isCatching = player.data.get("bb_catching") === "1";
      if (!isCatching) return;

      let posRaw = player.data.get("bb_pos");
      if (!posRaw) return;
      let pos;
      try { pos = JSON.parse(posRaw); } catch (e) { return; }

      let ax = parseFloat(player.data.get("bb_ax")) || 0;
      let ay = parseFloat(player.data.get("bb_ay")) || 0;
      let jumpRaw = player.data.get("bb_jump");
      let jt = 0;
      let jwb = false;
      if (jumpRaw) {
        try {
          let j = JSON.parse(jumpRaw);
          jt = j.timer || 0;
          jwb = j.withBall || false;
        } catch (e) {}
      }

      let arm = getArmPos(pos.x || 0, pos.z || 0, 0, ax, ay, jt, jwb);
      let dx = bx - arm.x;
      let dz = bz - arm.z;
      let dy = (by > SHOULDER_Y || jt > 0) ? by - arm.y : 0;
      let dist = Math.sqrt(dx * dx + dz * dz + dy * dy);
      if (dist <= BALL_CATCH_RADIUS) {
        ballOwner = sessionId;
        lastBallPlayerId = sessionId;
        store.set("bb_ball_owner", ballOwner);
        store.set("bb_audio", "catch:0.5:" + performance.now());
      }
    });
  }

  // Check throws: host detects throw intent changes
  function checkThrows() {
    if (ballOwner === "") return;

    // Check local player throw
    let mySession = (mp && mp.player) ? mp.player.sessionId : "local";
    if (ballOwner === mySession) {
      let localThrow = store.get("bb_local_throw") || 0;
      let prevThrow = lastThrowIntents[mySession] || 0;
      if (localThrow > prevThrow) {
        lastThrowIntents[mySession] = localThrow;
        executeThrowing(mySession);
        return;
      }
    }

    // Check remote player throws
    if (!mp) return;
    let players = mp.getPlayers();
    if (!players) return;
    players.forEach(function(player, sessionId) {
      if (sessionId === mySession) return;
      if (ballOwner !== sessionId) return;
      let throwVal = parseInt(player.data.get("bb_throw")) || 0;
      let prevThrow = lastThrowIntents[sessionId] || 0;
      if (throwVal > prevThrow) {
        lastThrowIntents[sessionId] = throwVal;
        executeThrowing(sessionId);
      }
    });
  }

  function executeThrowing(sessionId) {
    // Get thrower's aim from their data
    let ax = 0;
    let ay = 0;
    let px = 0;
    let pz = 0;
    let jt = 0;
    let jwb = false;

    let mySession = (mp && mp.player) ? mp.player.sessionId : "local";
    if (sessionId === mySession) {
      px = store.get("bb_local_x") || 0;
      pz = store.get("bb_local_z") || 0;
      ax = store.get("bb_local_ax") || 0;
      ay = store.get("bb_local_ay") || 0;
      jt = store.get("bb_local_jump_timer") || 0;
      jwb = store.get("bb_local_jump_with_ball") || false;
    } else if (mp) {
      let players = mp.getPlayers();
      let player = players ? players.get(sessionId) : null;
      if (player) {
        let posRaw = player.data.get("bb_pos");
        if (posRaw) {
          try { let p = JSON.parse(posRaw); px = p.x || 0; pz = p.z || 0; } catch (e) {}
        }
        ax = parseFloat(player.data.get("bb_ax")) || 0;
        ay = parseFloat(player.data.get("bb_ay")) || 0;
        let jumpRaw = player.data.get("bb_jump");
        if (jumpRaw) {
          try { let j = JSON.parse(jumpRaw); jt = j.timer || 0; jwb = j.withBall || false; } catch (e) {}
        }
      }
    }

    let arm = getArmPos(px, pz, 0, ax, ay, jt, jwb);
    bx = arm.x;
    by = arm.y;
    bz = arm.z;
    bvx = Math.cos(ay) * (1 + Math.cos(ax)) * THROW_POWER;
    bvz = Math.sin(ay) * (1 + Math.cos(ax)) * THROW_POWER;
    bvy = Math.sin(ax) * THROW_POWER;
    ballOwner = "";
    store.set("bb_ball_owner", "");
    store.set("bb_audio", "throw:0.5:" + performance.now());
  }

  function getBallHolderArmPos() {
    let mySession = (mp && mp.player) ? mp.player.sessionId : "local";
    if (ballOwner === mySession) {
      let px = store.get("bb_local_x") || 0;
      let pz = store.get("bb_local_z") || 0;
      let ax = store.get("bb_local_ax") || 0;
      let ay = store.get("bb_local_ay") || 0;
      let jt = store.get("bb_local_jump_timer") || 0;
      let jwb = store.get("bb_local_jump_with_ball") || false;
      return getArmPos(px, pz, 0, ax, ay, jt, jwb);
    }
    if (mp) {
      let players = mp.getPlayers();
      let player = players ? players.get(ballOwner) : null;
      if (player) {
        let posRaw = player.data.get("bb_pos");
        let pos = { x: 0, z: 0 };
        if (posRaw) { try { pos = JSON.parse(posRaw); } catch (e) {} }
        let ax = parseFloat(player.data.get("bb_ax")) || 0;
        let ay = parseFloat(player.data.get("bb_ay")) || 0;
        let jumpRaw = player.data.get("bb_jump");
        let jt = 0;
        let jwb = false;
        if (jumpRaw) { try { let j = JSON.parse(jumpRaw); jt = j.timer || 0; jwb = j.withBall || false; } catch (e) {} }
        return getArmPos(pos.x || 0, pos.z || 0, 0, ax, ay, jt, jwb);
      }
    }
    return { x: bx, y: by, z: bz };
  }

  function syncBallState() {
    if (!mp) return;
    mp.setBehaviorData(this.gameObject, this.id, "ball", JSON.stringify({
      x: bx, y: by, z: bz, vx: bvx, vy: bvy, vz: bvz, owner: ballOwner
    }));
  }

  // --- Editor mode ---
  this.onEditorAdded = function(editor) {
    buildBall(this.gameObject._internal.three);
  };

  this.onEditorDispose = function() {
    cleanupBall();
  };

  // --- Play mode ---
  this.init = function(_game) {
    game = _game;
    store = this.erth.store;
    mp = game.multiplayerState;
    buildBall(this.gameObject._internal.three);
    loadMarkerTexture();

    // Initialize ball state
    resetBall();
    store.set("bb_ball_owner", "");
  };

  this.update = function(deltaTime) {
    let isHost = !mp || mp.isHost();

    if (isHost) {
      // Tick physics at 20Hz
      accumulator += deltaTime;
      while (accumulator >= TICK_RATE) {
        accumulator -= TICK_RATE;

        let scoreTimer = store.get("bb_score_timer") || 0;
        let matchState = store.get("bb_match_state") || "waiting";

        if (matchState === "playing" && ballOwner === "") {
          let result = tickBallPhysics();

          // Bounce audio
          if (result.bounce > 0.05) {
            let vol = Math.min(0.5, result.bounce * result.bounce * 0.5);
            store.set("bb_audio", "bounce:" + vol + ":" + performance.now());
          }

          // Scoring
          if (result.hitBasketTeam >= 0 && scoreTimer === 0) {
            store.set("bb_scoring_team", result.hitBasketTeam);
            store.set("bb_last_scorer", lastBallPlayerId);
            store.set("bb_score_timer", RESET_BALL_DURATION);
            store.set("bb_audio", "score:0.5:" + performance.now());
          }
        }

        // Check catches and throws
        if (matchState === "playing") {
          checkCatches();
          checkThrows();
        }

        // Reset ball after score freeze
        scoreTimer = store.get("bb_score_timer") || 0;
        if (scoreTimer === 1) {
          resetBall();
          store.set("bb_ball_owner", "");
        }
      }

      // Sync at 20Hz
      syncTimer += deltaTime;
      if (syncTimer >= SYNC_INTERVAL) {
        syncTimer = 0;
        syncBallState.call(this);
      }
    }

    // Update visual position
    ballOwner = store.get("bb_ball_owner") || "";
    if (ballOwner !== "") {
      // Ball follows holder's arm
      let arm = getBallHolderArmPos();
      this.gameObject.position.set(arm.x, arm.y, arm.z);
      if (markerMesh) markerMesh.visible = false;
      if (ballMat) { ballMat.transparent = false; ballMat.opacity = 1; }
    } else {
      this.gameObject.position.set(bx, by, bz);
      if (markerMesh) {
        markerMesh.visible = true;
        // Marker is child of target, need to offset from ball position
        markerMesh.position.set(0, 0.01 - by, 0);
      }

      // Score freeze visual: make ball semi-transparent
      let scoreTimer = store.get("bb_score_timer") || 0;
      if (scoreTimer > 0 && ballMat) {
        ballMat.transparent = true;
        ballMat.opacity = 0.5;
      } else if (ballMat && ballMat.transparent) {
        ballMat.transparent = false;
        ballMat.opacity = 1;
      }
    }
  };

  this.onStateUpdated = function(key, value) {
    if (!mp || mp.isHost()) return;
    if (key === "ball" && value) {
      try {
        let state = JSON.parse(value);
        bx = state.x || 0;
        by = state.y || 0;
        bz = state.z || 0;
        bvx = state.vx || 0;
        bvy = state.vy || 0;
        bvz = state.vz || 0;
        ballOwner = state.owner || "";
        store.set("bb_ball_owner", ballOwner);
      } catch (e) {}
    }
  };

  this.dispose = function() {
    cleanupBall();
    if (ballMesh && ballMesh.parent) ballMesh.parent.remove(ballMesh);
    if (markerMesh && markerMesh.parent) markerMesh.parent.remove(markerMesh);
    game = null;
    store = null;
    mp = null;
    lastThrowIntents = {};
  };
