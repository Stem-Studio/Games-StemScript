meta:
  tool: StemStudio
  type: behavior
  exportVersion: 1

config:
  name: "BB Camera"
  id: "bball.camera"
  author: "script-wizard"
  isScript: true
  main: "script.js"
  version: "1.0.0"
  priority: 0
  description: "Fixed isometric camera for BBall court — orbits slowly when
    waiting for players"
  tags:
    - gameplay
  attributes:
    fov:
      name: "FOV"
      type: "number"
      default: 50
    cameraHeight:
      name: "Camera Height"
      type: "number"
      default: 8.5
    cameraDistance:
      name: "Camera Distance"
      type: "number"
      default: 16
  documentation: Fixed isometric camera for BBall court — orbits slowly when waiting for
    players Configure attributes in the editor to tune gameplay behavior.

code: |
  let game = null;
  let store = null;
  let cam = null;
  let idleAngle = 0;
  let h = 8.5;
  let dist = 16;

  this.init = function(_game) {
    game = _game;
    store = this.erth.store;
    cam = game.camera;
    if (!cam) return;
    h = this.getAttribute("cameraHeight") || 8.5;
    dist = this.getAttribute("cameraDistance") || 16;
    cam.fov = this.getAttribute("fov") || 50;
    cam.near = 0.1;
    cam.far = 100;
    cam.position.set(0, h, dist);
    cam.rotation.order = "YXZ";
    cam.rotation.set(-Math.PI / 8, 0, 0);
    cam.updateProjectionMatrix();
  };

  this.update = function(deltaTime) {
    const dt = Math.min(deltaTime, 0.1);
    if (!cam) return;
    let matchState = store.get("bb_match_state") || "waiting";
    if (matchState === "waiting") {
      idleAngle += deltaTime * 0.3;
      cam.position.set(
        Math.sin(idleAngle) * dist,
        h,
        Math.cos(idleAngle) * dist
      );
      cam.lookAt(0, 1, 0);
    } else {
      if (idleAngle !== 0) {
        idleAngle = 0;
        cam.position.set(0, h, dist);
        cam.rotation.order = "YXZ";
        cam.rotation.set(-Math.PI / 8, 0, 0);
      }
    }
  };

  this.dispose = function() {
    game = null;
    store = null;
    cam = null;
  };
