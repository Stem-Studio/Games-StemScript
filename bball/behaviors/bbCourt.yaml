# Generated by Script Wizard — bball conversion
meta:
  tool: StemStudio
  type: behavior
  exportVersion: 1

config:
  name: "BB Court"
  id: "bball.court"
  author: "script-wizard"
  isScript: true
  main: "script.js"
  version: "1.0.0"
  priority: 0
  description: "Builds the BBall court — floor, walls, baskets, and point lights"
  tags:
    - gameplay
  attributes:
    floorTexture:
      name: "Floor Texture"
      type: "imageAsset"
      description: "Tileable court floor texture"
    wallTexture:
      name: "Wall Texture"
      type: "imageAsset"
      description: "Tileable court wall texture"
    redBasketTexture:
      name: "Red Basket Texture"
      type: "imageAsset"
      description: "Red team basket artwork"
    blueBasketTexture:
      name: "Blue Basket Texture"
      type: "imageAsset"
      description: "Blue team basket artwork"
  documentation: Builds the BBall court — floor, walls, baskets, and point lights Configure
    attributes in the editor to tune gameplay behavior.

code: |
  // Court dimensions from source: width=12, depth=8, border=1
  // Play area: x [-6,6], z [-4,4]. Total: 14 x 10
  // Basket: y=3.75, width=3, height=1.5

  let meshes = [];
  let geos = [];
  let mats = [];
  let lightObjs = [];
  let loadedTextures = [];
  let floorMesh = null;
  let wallMeshes = [];
  let redBasketMesh = null;
  let blueBasketMesh = null;
  const erth = this.erth;
  const attributes = this.attributes;

  function addMesh(geo, mat, parent) {
    let m = new THREE.Mesh(geo, mat);
    m.userData.isRuntimeOnly = true;
    m.castShadow = true;
    m.receiveShadow = true;
    parent.add(m);
    meshes.push(m);
    geos.push(geo);
    return m;
  }

  function cleanup() {
    for (let i = 0; i < meshes.length; i++) {
      if (meshes[i].parent) meshes[i].parent.remove(meshes[i]);
    }
    for (let i = 0; i < geos.length; i++) geos[i].dispose();
    for (let i = 0; i < mats.length; i++) mats[i].dispose();
    for (let i = 0; i < lightObjs.length; i++) {
      if (lightObjs[i].parent) lightObjs[i].parent.remove(lightObjs[i]);
      if (lightObjs[i].dispose) lightObjs[i].dispose();
    }
    for (let i = 0; i < loadedTextures.length; i++) loadedTextures[i].dispose();
    meshes = [];
    geos = [];
    mats = [];
    lightObjs = [];
    loadedTextures = [];
    wallMeshes = [];
    floorMesh = null;
    redBasketMesh = null;
    blueBasketMesh = null;
  }

  function buildCourt(parent) {
    // Materials
    let floorMat = new THREE.MeshStandardNodeMaterial({ color: 0xaaaaaa, roughness: 0.8, metalness: 0.3 });
    let wallMat = new THREE.MeshStandardNodeMaterial({ color: 0x888888, roughness: 0.8, metalness: 0.3 });
    let redBasketMat = new THREE.MeshStandardNodeMaterial({ color: 0xff4444, roughness: 0.8, metalness: 0.2 });
    let blueBasketMat = new THREE.MeshStandardNodeMaterial({ color: 0x4444ff, roughness: 0.8, metalness: 0.2 });
    mats.push(floorMat, wallMat, redBasketMat, blueBasketMat);

    // Floor: 14 x 10 plane, rotated flat
    let floorGeo = new THREE.PlaneGeometry(14, 10);
    floorMesh = addMesh(floorGeo, floorMat, parent);
    floorMesh.rotation.x = -Math.PI / 2;

    // Walls — PlaneGeometry facing inward
    let largerGeo = new THREE.PlaneGeometry(14, 5);
    let smallerGeo = new THREE.PlaneGeometry(10, 5);

    // Back wall (z = -5, facing +z)
    let backWall = addMesh(largerGeo.clone(), wallMat, parent);
    backWall.position.set(0, 2.5, -5);
    geos.push(backWall.geometry);
    wallMeshes.push(backWall);

    // Front wall (z = 5, facing -z)
    let frontWall = addMesh(largerGeo.clone(), wallMat, parent);
    frontWall.rotation.y = Math.PI;
    frontWall.position.set(0, 2.5, 5);
    geos.push(frontWall.geometry);
    wallMeshes.push(frontWall);

    // Left wall (x = -7, facing +x)
    let leftWall = addMesh(smallerGeo.clone(), wallMat, parent);
    leftWall.rotation.y = Math.PI / 2;
    leftWall.position.set(-7, 2.5, 0);
    geos.push(leftWall.geometry);
    wallMeshes.push(leftWall);

    // Right wall (x = 7, facing -x)
    let rightWall = addMesh(smallerGeo.clone(), wallMat, parent);
    rightWall.rotation.y = -Math.PI / 2;
    rightWall.position.set(7, 2.5, 0);
    geos.push(rightWall.geometry);
    wallMeshes.push(rightWall);

    // Clean up template geometries
    largerGeo.dispose();
    smallerGeo.dispose();

    // Baskets (plane sprites on walls)
    let basketGeo = new THREE.PlaneGeometry(3, 1.5);

    // Red basket on left wall (team 0 scores here -> team 1 gets points)
    redBasketMesh = addMesh(basketGeo.clone(), redBasketMat, parent);
    redBasketMesh.rotation.y = Math.PI / 2;
    redBasketMesh.position.set(-6.99, 3.75, 0);
    geos.push(redBasketMesh.geometry);

    // Blue basket on right wall
    blueBasketMesh = addMesh(basketGeo.clone(), blueBasketMat, parent);
    blueBasketMesh.rotation.y = -Math.PI / 2;
    blueBasketMesh.position.set(6.99, 3.75, 0);
    geos.push(blueBasketMesh.geometry);

    basketGeo.dispose();

    // Point lights (source: 3 lights for court illumination)
    let pl1 = new THREE.PointLight(0xffffff, 0.5);
    pl1.position.set(4, 6, -2);
    pl1.userData.isRuntimeOnly = true;
    parent.add(pl1);
    lightObjs.push(pl1);

    let pl2 = new THREE.PointLight(0xffffff, 0.5);
    pl2.position.set(-4, 6, -2);
    pl2.userData.isRuntimeOnly = true;
    parent.add(pl2);
    lightObjs.push(pl2);

    let pl3 = new THREE.PointLight(0xffffff, 0.2);
    pl3.position.set(0, 6, 2);
    pl3.castShadow = true;
    pl3.shadow.mapSize.set(1024, 1024);
    pl3.userData.isRuntimeOnly = true;
    parent.add(pl3);
    lightObjs.push(pl3);
  }

  function applyTexture(attrName, assetName, onLoad) {
    let ref = attributes[attrName];
    if (ref) {
      erth.asset.image.createTexture(ref).then(onLoad).catch(function() {});
    } else {
      erth.asset.image.findByName(assetName).then(function(r) { // @check-ok fallback asset names
        if (r) erth.asset.image.createTexture(r).then(onLoad).catch(function() {});
      }).catch(function() {});
    }
  }

  function loadTextures() {
    // Floor texture — tiled 7x5, nearest filter for pixel art
    applyTexture("floorTexture", "BBFloor", function(tex) {
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(7, 5);
      tex.minFilter = THREE.NearestFilter;
      tex.magFilter = THREE.NearestFilter;
      loadedTextures.push(tex);
      if (floorMesh) {
        floorMesh.material.map = tex;
        floorMesh.material.color.setHex(0xffffff);
        floorMesh.material.needsUpdate = true;
      }
    });

    // Wall texture
    applyTexture("wallTexture", "BBWall", function(tex) {
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.minFilter = THREE.NearestFilter;
      tex.magFilter = THREE.NearestFilter;
      loadedTextures.push(tex);
      for (let i = 0; i < wallMeshes.length; i++) {
        wallMeshes[i].material.map = tex;
        wallMeshes[i].material.color.setHex(0xffffff);
        wallMeshes[i].material.needsUpdate = true;
      }
    });

    // Red basket texture
    applyTexture("redBasketTexture", "BBRedBasket", function(tex) {
      tex.minFilter = THREE.NearestFilter;
      tex.magFilter = THREE.NearestFilter;
      loadedTextures.push(tex);
      if (redBasketMesh) {
        redBasketMesh.material.map = tex;
        redBasketMesh.material.color.setHex(0xffffff);
        redBasketMesh.material.needsUpdate = true;
      }
    });

    // Blue basket texture
    applyTexture("blueBasketTexture", "BBBlueBasket", function(tex) {
      tex.minFilter = THREE.NearestFilter;
      tex.magFilter = THREE.NearestFilter;
      loadedTextures.push(tex);
      if (blueBasketMesh) {
        blueBasketMesh.material.map = tex;
        blueBasketMesh.material.color.setHex(0xffffff);
        blueBasketMesh.material.needsUpdate = true;
      }
    });
  }

  // --- Editor mode ---
  this.onEditorAdded = function(editor) {
    buildCourt(this.gameObject._internal.three);
    loadTextures();
  };

  this.onEditorDispose = function() {
    cleanup();
  };

  // --- Play mode ---
  this.init = function(_game) {
    buildCourt(this.gameObject._internal.three);
    loadTextures();
  };

  this.dispose = function() {
    cleanup();
    for (let i = 0; i < meshes.length; i++) {
      if (meshes[i].parent) meshes[i].parent.remove(meshes[i]);
    }
    for (let i = 0; i < lightObjs.length; i++) {
      if (lightObjs[i].parent) lightObjs[i].parent.remove(lightObjs[i]);
    }
  };
