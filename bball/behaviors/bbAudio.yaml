meta:
  tool: StemStudio
  type: behavior
  exportVersion: 1

config:
  name: "BB Audio"
  id: "bball.audio"
  author: "script-wizard"
  isScript: true
  main: "script.js"
  version: "1.0.0"
  priority: 0
  description: "Sound effects for BBall — bounce, catch, throw, score"
  tags:
    - gameplay
  attributes:
    bounceSound:
      name: "Bounce Sound"
      type: "audioAsset"
      description: "Ball bounce sound effect"
    catchSound:
      name: "Catch Sound"
      type: "audioAsset"
      description: "Ball catch sound effect"
    throwSound:
      name: "Throw Sound"
      type: "audioAsset"
      description: "Ball throw sound effect"
    scoreSound:
      name: "Score Sound"
      type: "audioAsset"
      description: "Team score sound effect"
  documentation: Sound effects for BBall — bounce, catch, throw, score Configure attributes
    in the editor to tune gameplay behavior.

code: |
  let game = null;
  let store = null;
  let audioCtx = null;
  let buffers = {};
  let lastAudioEvent = "";
  const erth = this.erth;
  const attributes = this.attributes;

  function loadSoundFromRef(ref, key) {
    if (!ref) return;
    erth.asset.audio.getUrl(ref).then(function(url) {
      if (!url || !audioCtx) return;
      fetch(url).then(function(res) {
        return res.arrayBuffer();
      }).then(function(data) {
        return audioCtx.decodeAudioData(data);
      }).then(function(buffer) {
        buffers[key] = buffer;
      }).catch(function() {});
    }).catch(function() {});
  }

  function loadSound(attrName, assetName, key) {
    let ref = attributes[attrName];
    if (ref) {
      loadSoundFromRef(ref, key);
    } else {
      erth.asset.audio.findByName(assetName).then(function(foundRef) {
        loadSoundFromRef(foundRef, key);
      }).catch(function() {});
    }
  }

  function playSound(key, volume) {
    if (!audioCtx || !buffers[key]) return;
    let source = audioCtx.createBufferSource();
    source.buffer = buffers[key];
    let gain = audioCtx.createGain();
    gain.gain.value = volume || 0.5;
    source.connect(gain);
    gain.connect(audioCtx.destination);
    source.start(0);
  }

  this.init = function(_game) {
    game = _game;
    store = this.erth.store;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      audioCtx = null;
    }
    loadSound("bounceSound", "BBBounce", "bounce");
    loadSound("catchSound", "BBCatch", "catch");
    loadSound("throwSound", "BBThrow", "throw");
    loadSound("scoreSound", "BBScore", "score");
  };

  this.update = function(deltaTime) {
    if (!store) return;
    let evt = store.get("bb_audio") || "";
    if (evt && evt !== lastAudioEvent) {
      lastAudioEvent = evt;
      let sep = evt.indexOf(":");
      let sep2 = evt.indexOf(":", sep + 1);
      let name = evt.substring(0, sep);
      let vol = parseFloat(evt.substring(sep + 1, sep2)) || 0.5;
      playSound(name, vol);
    }
  };

  this.dispose = function() {
    if (audioCtx) {
      audioCtx.close().catch(function() {});
      audioCtx = null;
    }
    buffers = {};
    game = null;
    store = null;
  };
