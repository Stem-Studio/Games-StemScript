  this.update = function(dt) {
    if (this.progress >= 1) return;

    this.progress += dt / this.duration;
    if (this.progress > 1) this.progress = 1;

    const pt = this.curve.getPointAt(this.progress);
    const tan = this.curve.getTangentAt(this.progress);
    const obj = this.gameObject._internal.three;

    // Compute target orientation (camera-style: -Z = forward)
    this._tmpV3.copy(pt).add(tan);
    this._tmpM4.lookAt(pt, this._tmpV3, this._up);
    this._tmpQ.setFromRotationMatrix(this._tmpM4);

    // Smooth follow matching source lerp(8) / slerp(12) rates
    obj.position.lerp(pt, 8 * dt);
    obj.quaternion.slerp(this._tmpQ, Math.min(12 * dt, 1));

    if (this.progress >= 1) {
      obj.position.copy(pt);
      obj.quaternion.copy(this._tmpQ);
    }
  };

  this.dispose = function() {
    this.curve = null;
  };
