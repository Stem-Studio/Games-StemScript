    const startTan = this.curve.getTangentAt(0);
    const obj = this.gameObject._internal.three;
    obj.position.copy(startPt);

    // Camera-style lookAt: -Z faces forward along path, +Z faces backward
    // This matches the source's Object3D.lookAt + meshRef π-flip combination
    const lookTarget = startPt.clone().add(startTan);
    this._tmpM4.lookAt(startPt, lookTarget, this._up);
    obj.quaternion.setFromRotationMatrix(this._tmpM4);
