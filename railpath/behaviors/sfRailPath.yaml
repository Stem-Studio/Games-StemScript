  name: "SF Rail Path"
  id: "sf.railPath"
  author: "starfox"
  isScript: true
  main: "script.js"
  version: "1.0.0"
  description: "Advances an object along a predefined CatmullRomCurve3 rail path
    over time. Based on Starfox Railpath 2.0 curve data."
  tags:
    - gameplay
  priority: -1
  attributes:
    duration:
      name: "Duration"
      type: "number"
      default: 60
      min: 1
      max: 300
      description: "Total time in seconds to traverse the full rail path"
  documentation: Advances an object along a predefined CatmullRomCurve3 rail path over time.
    Based on Starfox Railpath 2.0 curve data. Configure attributes in the editor
    to tune gameplay behavior.

