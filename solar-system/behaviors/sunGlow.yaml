meta:
  tool: StemStudio
  type: behavior
  exportVersion: 1

config:
  name: "Sun Glow"
  id: "sw.sunGlow"
  author: "scriptwizard"
  isScript: true
  main: "script.js"
  version: "1.0.0"
  description: "Adds point light and emissive texture to the Sun"
  tags:
    - gameplay
  priority: 0
  attributes:
    textureName:
      name: "Sun Texture Name"
      type: "string"
      default: "SunTex"
    lightIntensity:
      name: "Light Intensity"
      type: "number"
      default: 2
    lightDistance:
      name: "Light Distance"
      type: "number"
      default: 100
  documentation: Adds point light and emissive texture to the Sun Configure
    attributes in the editor to tune gameplay behavior.

code: |
  // Solar System — Sun Glow Behavior
  // Ported from Sun.tsx: point light + emissive material

  let g;

  let erth;
  let target;
  let game;
  let pointLight = null;
  let loadedTexture = null;

  const buildLight = () => {
    let intensity = this.getAttribute("lightIntensity") || 2;
    let distance = this.getAttribute("lightDistance") || 100;
    if (pointLight && pointLight.parent) {
      pointLight.parent.remove(pointLight);
    }
    pointLight = new THREE.PointLight(0xffffff, intensity, distance, 0.1);
    pointLight.userData.isRuntimeOnly = true;
    this.gameObject._internal.three.add(pointLight);
  }

  const applyTexture = () => {
    // Load sun texture and apply as both map and emissiveMap
    let texName = this.getAttribute("textureName") || "SunTex";
    erth.asset.image.findByName(texName).then(function(ref) {
      if (ref) {
        erth.asset.image.createTexture(ref).then(function(tex) {
          let mat = target.material;
          if ("colorSpace" in tex && THREE.SRGBColorSpace) tex.colorSpace = THREE.SRGBColorSpace;
          if ("encoding" in tex && THREE.sRGBEncoding) tex.encoding = THREE.sRGBEncoding;
          mat.map = tex;
          mat.emissiveMap = tex;
          mat.emissive = new THREE.Color(0xff6600);
          mat.emissiveIntensity = 0.8;
          mat.needsUpdate = true;
          loadedTexture = tex;
        });
      }
    });
  }

  this.onEditorAdded = function(editor) {
    erth = this.erth;
    target = this.gameObject._internal.three;
    buildLight();
    applyTexture();
  };

  this.onEditorAttributesUpdated = function() {
    erth = this.erth;
    if (loadedTexture) {
      loadedTexture.dispose();
      loadedTexture = null;
    }
    buildLight();
    applyTexture();
  };

  this.onEditorDispose = function() {
    if (pointLight && this.gameObject) {
      this.gameObject._internal.three.remove(pointLight);
      pointLight = null;
    }
    if (loadedTexture) {
      loadedTexture.dispose();
      loadedTexture = null;
    }
  };

  this.init = function(_game) {
    game = _game;
    erth = this.erth;
    target = this.gameObject._internal.three;
    g = game;
    buildLight();
    applyTexture();
  };

  this.dispose = function() {
    if (pointLight && this.gameObject) {
      this.gameObject._internal.three.remove(pointLight);
      pointLight = null;
    }
    if (loadedTexture) {
      loadedTexture.dispose();
      loadedTexture = null;
    }
    game = null;
  };
