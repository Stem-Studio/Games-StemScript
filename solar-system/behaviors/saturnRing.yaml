code: |
  // Solar System — Saturn Ring Behavior
  // Ported from Planet.tsx SaturnRing component
  // Source: RingGeometry(1.2, 2.0, 64), rotation=[PI/2.5, 0, 0], transparent, opacity=0.8, doubleSide

  let g;

  let erth;
  let target;
  let game;
  let ringMesh = null;
  let ringGeom = null;
  let ringMat = null;
  let ringTex = null;
  let ringHost = null;

  const remapRingUvForAlpha = (geom, innerR, outerR) => {
    const pos = geom.getAttribute("position");
    const uv = geom.getAttribute("uv");
    if (!pos || !uv) return;
    const mid = (innerR + outerR) * 0.5;

    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i);
      const y = pos.getY(i);
      const r = Math.sqrt(x * x + y * y);
      // Ring alpha textures are usually encoded as a 2x1 strip.
      uv.setX(i, r < mid ? 0 : 1);
    }
    uv.needsUpdate = true;
  };

  const buildRing = () => {
    // Size ring from Saturn's real rendered radius.
    let planetRadius = 1;
    if (target && target.geometry) {
      if (target.geometry.parameters && target.geometry.parameters.radius) {
        const s = target.scale || { x: 1, y: 1, z: 1 };
        const maxScale = Math.max(Math.abs(s.x || 1), Math.abs(s.y || 1), Math.abs(s.z || 1));
        planetRadius = target.geometry.parameters.radius * maxScale;
      } else {
        if (!target.geometry.boundingSphere) target.geometry.computeBoundingSphere();
        if (target.geometry.boundingSphere) {
          const s = target.scale || { x: 1, y: 1, z: 1 };
          const maxScale = Math.max(Math.abs(s.x || 1), Math.abs(s.y || 1), Math.abs(s.z || 1));
          planetRadius = target.geometry.boundingSphere.radius * maxScale;
        }
      }
    }
    // Balanced ring profile: larger than previous, still not over-expanded.
    const innerR = planetRadius * 1.12;
    const outerR = planetRadius * 1.88;
    ringGeom = new THREE.RingGeometry(innerR, outerR, 64);
    remapRingUvForAlpha(ringGeom, innerR, outerR);
    ringMat = new THREE.MeshBasicNodeMaterial({
      color: 0x7a766d,
      transparent: true,
      opacity: 0.48,
      side: THREE.DoubleSide,
      depthWrite: false,
      alphaTest: 0.05
    });

    ringMesh = new THREE.Mesh(ringGeom, ringMat);
    ringMesh.rotation.x = Math.PI / 2.5;
    // Parent to Saturn orbit group to avoid inheriting fast axial spin.
    ringHost = target && target.parent ? target.parent : target;
    if (ringHost !== target) {
      ringMesh.position.copy(target.position);
    }
    ringMesh.userData.isRuntimeOnly = true;
    ringHost.add(ringMesh);
  }

  const loadRingTexture = () => {
    // Load ring texture
    let texName = this.getAttribute("ringTextureName") || "SaturnRingTex";
    erth.asset.image.findByName(texName).then(function(ref) {
      if (ref) {
        erth.asset.image.createTexture(ref).then(function(tex) {
        tex.wrapS = THREE.ClampToEdgeWrapping;
        tex.wrapT = THREE.ClampToEdgeWrapping;
        // Stabilize alpha texture to reduce shimmering/wiggle artifacts.
        tex.generateMipmaps = false;
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        if (game && game.renderer && game.renderer.capabilities) {
          tex.anisotropy = 1;
        }
        ringMat.alphaMap = tex;
          ringMat.needsUpdate = true;
          ringTex = tex;
        });
      }
    });
  }

  function cleanupRing() {
    if (ringMesh) {
      if (ringMesh.parent) ringMesh.parent.remove(ringMesh);
      ringMesh = null;
    }
    if (ringGeom) { ringGeom.dispose(); ringGeom = null; }
    if (ringMat) { ringMat.dispose(); ringMat = null; }
    if (ringTex) { ringTex.dispose(); ringTex = null; }
  }

  this.onEditorAdded = function(editor) {
    erth = this.erth;
    target = this.gameObject._internal.three;
    buildRing();
    loadRingTexture();
  };

  this.onEditorAttributesUpdated = function() {
    erth = this.erth;
    cleanupRing();
    buildRing();
    loadRingTexture();
  };

  this.onEditorDispose = function() {
    cleanupRing();
  };

  this.update = function() {
    if (!ringMesh || !target) return;
    // Keep exact orbital position match each frame.
    if (ringHost && ringHost !== target) {
      ringMesh.position.copy(target.position);
    }
  };

  this.init = function(_game) {
    game = _game;
    erth = this.erth;
    target = this.gameObject._internal.three;
    g = game;
    buildRing();
    loadRingTexture();
  };

  this.dispose = function() {
    cleanupRing();
    game = null;
    ringHost = null;
  };
