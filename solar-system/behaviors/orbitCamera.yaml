code: |
  // Solar System — Orbit Camera Behavior
  // Ported from SolarScene.tsx OrbitControls + CameraController
  // Spherical orbit with pointer drag and scroll zoom

  let g;

  let game;
  let cam = null;
  let canvas = null;
  let store = null;

  // Spherical coordinates
  const INITIAL_THETA = Math.PI * 0.25;
  const INITIAL_PHI = Math.PI * 0.35;
  let theta = INITIAL_THETA;
  let phi = INITIAL_PHI;
  let radius = 30;
  let targetTheta = Math.PI * 0.25;
  let targetPhi = Math.PI * 0.35;
  let targetRadius = 30;

  // Orbit center
  let centerX = 0;
  let centerY = 0;
  let centerZ = 0;
  let targetCenterX = 0;
  let targetCenterY = 0;
  let targetCenterZ = 0;

  // Drag state
  let isDragging = false;
  let prevX = 0;
  let prevY = 0;

  // Config
  let minDist = 5;
  let maxDist = 60;
  let rotSpeed = 0.005;
  let zoomSpd = 0.1;
  let easingVal = 0.08;

  // Bound event handlers
  let onDown = null;
  let onMove = null;
  let onUp = null;
  let onScroll = null;
  let onCtx = null;
  let onTouchStart = null;
  let onTouchMove = null;
  let onTouchEnd = null;
  let lastTouchDist = 0;
  let focusedName = "";
  let focusObject = null;
  let defaultRadius = 30;
  let focusBaseRadius = null;
  let focusZoomOffset = 0;
  const FOCUS_ZOOM_RANGE = 0.35;
  const tempWorldPos = new THREE.Vector3();
  const tempBox = new THREE.Box3();
  const tempBoxSize = new THREE.Vector3();
  const tempScale = new THREE.Vector3();

  function isFocusActive() {
    return !!(store && store.get("solarFocusTarget"));
  }

  function getFocusZoomBounds(baseRadius) {
    let minR = baseRadius * (1 - FOCUS_ZOOM_RANGE);
    let maxR = baseRadius * (1 + FOCUS_ZOOM_RANGE);
    return { min: Math.max(0.55, minR), max: Math.min(maxDist, maxR) };
  }

  function resetToInitialView() {
    focusObject = null;
    focusedName = "";
    focusBaseRadius = null;
    focusZoomOffset = 0;
    // Keep current pose and lerp back to initial values for smooth reset.
    targetTheta = INITIAL_THETA;
    targetPhi = INITIAL_PHI;
    targetRadius = defaultRadius;
    targetCenterX = 0;
    targetCenterY = 0;
    targetCenterZ = 0;
  }

  this.init = function(_game) {
      game = _game;
    g = game;
    cam = game.camera;
    canvas = (game.renderer && game.renderer.domElement) || null;
    store = this.erth ? this.erth.store : null;
    if (!canvas) return;

    radius = this.getAttribute("distance") || 30;
    defaultRadius = radius;
    targetRadius = radius;
    minDist = this.getAttribute("minDistance") || 5;
    maxDist = this.getAttribute("maxDistance") || 60;
    rotSpeed = this.getAttribute("rotateSpeed") || 0.005;
    zoomSpd = this.getAttribute("zoomSpeed") || 0.1;
    easingVal = this.getAttribute("easing") || 0.08;

    // Pointer events
    onDown = function(e) {
      if (e.target !== canvas) return;
      isDragging = true;
      prevX = e.clientX;
      prevY = e.clientY;
    };

    onMove = function(e) {
      if (!isDragging) return;
      let dx = e.clientX - prevX;
      let dy = e.clientY - prevY;
      prevX = e.clientX;
      prevY = e.clientY;
      targetTheta -= dx * rotSpeed;
      targetPhi -= dy * rotSpeed;
      targetPhi = Math.max(0.1, Math.min(Math.PI - 0.1, targetPhi));
    };

    onUp = function() {
      isDragging = false;
    };

    onScroll = function(e) {
      e.preventDefault();
      if (isFocusActive() && focusBaseRadius !== null) {
        focusZoomOffset += e.deltaY * zoomSpd;
        let b = getFocusZoomBounds(focusBaseRadius);
        focusZoomOffset = Math.max(b.min - focusBaseRadius, Math.min(b.max - focusBaseRadius, focusZoomOffset));
        targetRadius = focusBaseRadius + focusZoomOffset;
      } else {
        targetRadius += e.deltaY * zoomSpd;
        targetRadius = Math.max(minDist, Math.min(maxDist, targetRadius));
      }
    };

    onCtx = function(e) { e.preventDefault(); };

    // Touch pinch-to-zoom
    onTouchStart = function(e) {
      if (e.touches.length === 2) {
        let dx = e.touches[0].clientX - e.touches[1].clientX;
        let dy = e.touches[0].clientY - e.touches[1].clientY;
        lastTouchDist = Math.sqrt(dx * dx + dy * dy);
      } else if (e.touches.length === 1) {
        isDragging = true;
        prevX = e.touches[0].clientX;
        prevY = e.touches[0].clientY;
      }
    };

    onTouchMove = function(e) {
      e.preventDefault();
      if (e.touches.length === 2) {
        let dx = e.touches[0].clientX - e.touches[1].clientX;
        let dy = e.touches[0].clientY - e.touches[1].clientY;
        let dist = Math.sqrt(dx * dx + dy * dy);
        let delta = lastTouchDist - dist;
        if (isFocusActive() && focusBaseRadius !== null) {
          focusZoomOffset += delta * zoomSpd * 0.5;
          let b = getFocusZoomBounds(focusBaseRadius);
          focusZoomOffset = Math.max(b.min - focusBaseRadius, Math.min(b.max - focusBaseRadius, focusZoomOffset));
          targetRadius = focusBaseRadius + focusZoomOffset;
        } else {
          targetRadius += delta * zoomSpd * 0.5;
          targetRadius = Math.max(minDist, Math.min(maxDist, targetRadius));
        }
        lastTouchDist = dist;
      } else if (e.touches.length === 1 && isDragging) {
        let dx = e.touches[0].clientX - prevX;
        let dy = e.touches[0].clientY - prevY;
        prevX = e.touches[0].clientX;
        prevY = e.touches[0].clientY;
        targetTheta -= dx * rotSpeed;
        targetPhi -= dy * rotSpeed;
        targetPhi = Math.max(0.1, Math.min(Math.PI - 0.1, targetPhi));
      }
    };

    onTouchEnd = function() {
      isDragging = false;
      lastTouchDist = 0;
    };

    canvas.addEventListener("pointerdown", onDown) // @check-ok
    canvas.addEventListener("pointermove", onMove); // @check-ok
    canvas.addEventListener("pointerup", onUp) // @check-ok
    canvas.addEventListener("pointerleave", onUp) // @check-ok
    canvas.addEventListener("wheel", onScroll, { passive: false }); // @check-ok
    canvas.addEventListener("contextmenu", onCtx); // @check-ok
    canvas.addEventListener("touchstart", onTouchStart, { passive: false }); // @check-ok
    canvas.addEventListener("touchmove", onTouchMove, { passive: false }); // @check-ok
    canvas.addEventListener("touchend", onTouchEnd); // @check-ok

    // Apply initial position
    applyCameraPosition();
  };

  function resolveFocusObject(name) {
    if (!name || !game || !game.scene || !game.scene.getObjectByName) return null;
    return game.scene.getObjectByName(name) || null;
  }

  function computeFramingRadius(obj) {
    if (!obj || !cam) return defaultRadius;
    // Prefer mesh geometry radius (more stable than raw box fallback).
    let objectRadius = 0;
    obj.traverse(function(child) {
      if (!child || !child.isMesh || !child.geometry) return;
      if (!child.geometry.boundingSphere && child.geometry.computeBoundingSphere) {
        child.geometry.computeBoundingSphere();
      }
      if (!child.geometry.boundingSphere) return;
      child.getWorldScale(tempScale);
      let scaleMax = Math.max(Math.abs(tempScale.x), Math.abs(tempScale.y), Math.abs(tempScale.z), 1e-3);
      objectRadius = Math.max(objectRadius, child.geometry.boundingSphere.radius * scaleMax);
    });
    if (objectRadius <= 0) {
      tempBox.setFromObject(obj);
      tempBox.getSize(tempBoxSize);
      objectRadius = Math.max(tempBoxSize.x, tempBoxSize.y, tempBoxSize.z, 0.1) * 0.5;
    }
    let maxSize = objectRadius * 2;
    let fov = (cam.fov || 60) * Math.PI / 180;
    let fitByHeight = (maxSize * 0.7) / Math.tan(fov * 0.5);
    let fitByWidth = fitByHeight / (cam.aspect || 1.6);
    let name = obj.name || "";
    let framingMul = 1.08; // slightly closer by default
    if (name === "Moon") framingMul = 1.7;
    else if (name === "Venus" || name === "Mars") framingMul = 1.24;
    let desired = Math.max(fitByHeight, fitByWidth) * framingMul;
    // Clip-safe distance (keeps camera outside planet shell).
    let safeMinDist = objectRadius + (cam.near || 0.1) * 6.0;
    // Hard planet-specific floors to prevent inside-view artifacts.
    if (name === "Earth") safeMinDist = Math.max(safeMinDist, 1.45);
    else if (name === "Venus") safeMinDist = Math.max(safeMinDist, 1.35);
    else if (name === "Mars") safeMinDist = Math.max(safeMinDist, 1.2);
    else if (name === "Moon") safeMinDist = Math.max(safeMinDist, 0.95);
    return Math.max(safeMinDist, Math.min(maxDist, desired));
  }

  function syncFocusTarget() {
    if (!store) return;
    if (store.get("solarResetView")) {
      resetToInitialView();
      store.set("solarResetView", false);
    }
    let nextFocused = store.get("solarFocusTarget") || "";
    if (nextFocused === focusedName && (!nextFocused || focusObject)) return;

    focusedName = nextFocused;
    focusObject = resolveFocusObject(focusedName);
    if (!focusedName || !focusObject) {
      focusBaseRadius = null;
      focusZoomOffset = 0;
      targetCenterX = 0;
      targetCenterY = 0;
      targetCenterZ = 0;
      targetRadius = defaultRadius;
      return;
    }

    focusObject.getWorldPosition(tempWorldPos);
    targetCenterX = tempWorldPos.x;
    targetCenterY = tempWorldPos.y;
    targetCenterZ = tempWorldPos.z;
    focusBaseRadius = computeFramingRadius(focusObject);
    focusZoomOffset = 0;
    targetRadius = focusBaseRadius;
  }

  function applyCameraPosition() {
    if (!cam) return;
    let x = centerX + radius * Math.sin(phi) * Math.cos(theta);
    let y = centerY + radius * Math.cos(phi);
    let z = centerZ + radius * Math.sin(phi) * Math.sin(theta);
    cam.position.set(x, y, z);
    cam.lookAt(centerX, centerY, centerZ);
  }

  this.update = function(deltaTime) {
    cam = game.camera;
    syncFocusTarget();

    if (focusObject) {
      focusObject.getWorldPosition(tempWorldPos);
      targetCenterX = tempWorldPos.x;
      targetCenterY = tempWorldPos.y;
      targetCenterZ = tempWorldPos.z;
    }

    // Smooth interpolation
    theta += (targetTheta - theta) * easingVal;
    phi += (targetPhi - phi) * easingVal;
    radius += (targetRadius - radius) * easingVal;
    centerX += (targetCenterX - centerX) * easingVal;
    centerY += (targetCenterY - centerY) * easingVal;
    centerZ += (targetCenterZ - centerZ) * easingVal;

    applyCameraPosition();
  };

  this.dispose = function() {
    if (canvas) {
      canvas.removeEventListener("pointerdown", onDown) // @check-ok complex input
      canvas.removeEventListener("pointermove", onMove);
      canvas.removeEventListener("pointerup", onUp) // @check-ok complex input
      canvas.removeEventListener("pointerleave", onUp);
      canvas.removeEventListener("wheel", onScroll);
      canvas.removeEventListener("contextmenu", onCtx);
      canvas.removeEventListener("touchstart", onTouchStart);
      canvas.removeEventListener("touchmove", onTouchMove);
      canvas.removeEventListener("touchend", onTouchEnd);
    }
    game = null;
    cam = null;
    canvas = null;
    store = null;
    focusObject = null;
  };
