code: |
  // World-space billboard nameplate: fixed screen size, doesn't grow near camera.
  var SHIP_NAMES = {
    'ship-pirate-large.glb': 'Black Pearl',
    'ship-pirate-medium.glb': 'Red Corsair',
    'ship-ghost.glb': 'Ghost Ship',
    'ship-small.glb': 'Sea Raider',
    'ship-pirate-medium.glb 3': 'Iron Brigand',
    'ship-ghost.glb 3': 'Dark Specter',
    'ship-small.glb 3': 'Devil\'s Tide',
    'ship-pirate-medium.glb 4': 'Storm Galleon',
    'ship-ghost.glb 4': 'Bone Crusher',
    'ship-small.glb 4': 'Crimson Fury'
  };
  var PLATE_W  = 512;
  var PLATE_H  = 140;
  var FLOAT_Y  = 12;   // world units above ship

  this.init = function(game) {
    this.game     = game;
    this.sprite   = null;
    this.canvas   = null;
    this.ctx      = null;
    this.tex      = null;
    this.lastHp   = -1;
    this.lastCd   = -1;
  };

  this.onStart = function() {
    var name   = SHIP_NAMES[this.target.name] || this.target.name.replace('.glb','');
    var canvas = document.createElement('canvas');
    canvas.width  = PLATE_W;
    canvas.height = PLATE_H;
    this.canvas   = canvas;
    this.ctx      = canvas.getContext('2d');
    this.shipName = name;

    var tex = new THREE.CanvasTexture(canvas);
    this.tex = tex;

    // sizeAttenuation: false → fixed pixel size, won't grow as camera approaches
    var mat = new THREE.SpriteMaterial({
      map:             tex,
      depthTest:       false,
      transparent:     true,
      sizeAttenuation: false
    });
    var sprite = new THREE.Sprite(mat);
    // Adaptive scale: larger on small/mobile screens, normal on desktop
    var screenFactor = Math.max(1.0, Math.min(2.8, 900 / (window.innerWidth || 900)));
    sprite.scale.set(0.12 * screenFactor, 0.038 * screenFactor, 1);
    sprite.renderOrder = 999;
    sprite.position.set(
      this.target.position.x,
      this.target.position.y + FLOAT_Y,
      this.target.position.z
    );
    this.sprite = sprite;
    this.game.scene.add(sprite);
    this._draw(100, 100, 0, 3.0);
  };

  this._draw = function(hp, maxHp, cd, cdMax) {
    var ctx = this.ctx;
    var w = PLATE_W, h = PLATE_H;
    ctx.clearRect(0, 0, w, h);

    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    this._roundRect(ctx, 3, 3, w-6, h-6, 14); ctx.fill();

    ctx.fillStyle = '#ffffff';
    ctx.font      = 'bold 34px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(this.shipName, w/2, 8);

    // Health bar
    var bx = 20, by = 52, bw = w-40, bh = 24;
    ctx.fillStyle = '#333';
    this._roundRect(ctx, bx, by, bw, bh, 3); ctx.fill();
    var hRatio = Math.max(0, Math.min(1, hp / maxHp));
    var r = Math.round(255*(1-hRatio)), g = Math.round(200*hRatio);
    ctx.fillStyle = 'rgb('+r+','+g+',40)';
    if (hRatio > 0) { this._roundRect(ctx, bx, by, bw*hRatio, bh, 3); ctx.fill(); }
    ctx.fillStyle = '#ddd'; ctx.font = 'bold 14px Arial';
    ctx.fillText(Math.ceil(hp)+'/'+maxHp, w/2, by+4);

    // Cannon cooldown bar
    var cx = 20, cy = 96, cw = w-40, ch = 24;
    ctx.fillStyle = '#222';
    this._roundRect(ctx, cx, cy, cw, ch, 3); ctx.fill();
    var ready  = (cd <= 0 || cdMax <= 0);
    var cRatio = ready ? 1 : Math.max(0, 1 - cd / cdMax);
    var t = cRatio;
    ctx.fillStyle = ready ? '#22ccaa' : 'rgb('+Math.round(80+120*t)+','+Math.round(80+100*t)+',200)';
    if (cRatio > 0) { this._roundRect(ctx, cx, cy, cw*cRatio, ch, 3); ctx.fill(); }
    ctx.fillStyle = '#ddd'; ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(ready ? 'READY' : 'RELOAD '+Math.ceil(cd)+'s', w/2, cy+4);

    this.tex.needsUpdate = true;
  };

  this._roundRect = function(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
  };

  this.update = function(dt) {
    if (!this.sprite || !this.target) return;
    var p = this.target.position;
    // Track ship position
    this.sprite.position.set(p.x, p.y + FLOAT_Y, p.z);

    var health = this.target.userData._shipHealth;
    var dead   = health && health.isDead;
    this.sprite.visible = (this.target.visible !== false) && !dead;

    var hp    = health ? Math.round(health.hp) : 100;
    var maxHp = health ? (health.maxHp || 100) : 100;
    var cd    = this.target.userData._cannonCd    || 0;
    var cdMax = this.target.userData._cannonCdMax || 3;

    var cdRound = Math.round(cd * 4) / 4;
    if (hp !== this.lastHp || cdRound !== this.lastCd) {
      this.lastHp = hp; this.lastCd = cdRound;
      this._draw(hp, maxHp, cd, cdMax);
    }
  };

  this.dispose = function() {
    if (this.sprite) {
      this.game.scene.remove(this.sprite);
      this.sprite.material.dispose();
      this.tex.dispose();
      this.sprite = null;
    }
  };
