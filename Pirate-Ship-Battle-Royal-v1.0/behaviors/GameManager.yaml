  type: behavior
  exportVersion: 1
  exportedAt: 2026-05-11T20:26:56.475Z
config:
  id: exported.gamemanager
  name: GameManager
  description: Tracks ship_destroyed events, counts alive ships, shows winner/loser overlay.
  version: 1.0.0
  author: ""
  isScript: true
  main: ""
  attributes: {}
  tags:
    - pirate
    - game
    - manager
    - ui
code: |-
  var ALL_SHIPS = [
    'ship-pirate-large.glb',
    'ship-pirate-medium.glb',
    'ship-ghost.glb',
    'ship-small.glb',
    'ship-pirate-medium.glb 3',
    'ship-ghost.glb 3',
    'ship-small.glb 3',
    'ship-pirate-medium.glb 4',
    'ship-ghost.glb 4',
    'ship-small.glb 4'
  ];
  var PLAYER_SHIP = 'ship-pirate-large.glb';
  var TOTAL = ALL_SHIPS.length;

  var SHIP_STARTS = {
    'ship-pirate-large.glb':     { x:   0, y: -1.25, z:  80, ry: Math.PI },
    'ship-pirate-medium.glb':    { x: -75, y: -1.25, z: -40, ry: 0.8 },
    'ship-ghost.glb':            { x:  75, y: -1.25, z: -40, ry: -0.8 },
    'ship-small.glb':            { x:   0, y: -1.25, z: -80, ry: 0 },
    'ship-pirate-medium.glb 3':  { x: -80, y: -1.25, z:  45, ry: 0.5 },
    'ship-ghost.glb 3':          { x:  50, y: -1.25, z: -75, ry: 2.5 },
    'ship-small.glb 3':          { x:  80, y: -1.25, z: -25, ry: -1.2 },
    'ship-pirate-medium.glb 4':  { x: -40, y: -1.25, z:  78, ry: 1.8 },
    'ship-ghost.glb 4':          { x:  60, y: -1.25, z:  70, ry: -2.2 },
    'ship-small.glb 4':          { x: -70, y: -1.25, z: -55, ry: -0.4 }
  };

  this.init = function(game) {
    this.game          = game;
    this.gameOver      = false;
    this._restartTimer = 0;
    this._prevCount    = -1;
    this._gracePeriod  = 0;
    var _self = this;
    this.game.scene.userData._skipToNextMatch = function() { _self._doRestart(); };
  };

  this.onStart = function() {
    this._shipRefs = null; this._shipRefCd = 1.0;
    this._gracePeriod = 3.0;
    this._lastCountNum = -1;
    this.game.scene.userData._matchStarted = false;
    this._createUI();
    this._showCountdown(3);
  };

  this._ensureShipRefs = function() {
    if (this._shipRefs) return;
    var refs = [];
    for (var i = 0; i < ALL_SHIPS.length; i++) {
      var s = this.game.scene.getObjectByName(ALL_SHIPS[i]);
      if (s) refs.push(s);
    }
    // ALL_SHIPS lists every possible ship name (incl. duplicate-instance
    // variants this scene may not have). Requiring an exact count left
    // _shipRefs null, breaking win/lose tracking. Cache whatever ships exist.
    if (refs.length >= 2) this._shipRefs = refs;
  };

  this.onReset = function() {
    this._doRestart();
  };

  this._createUI = function() {
    window._stemScene = this.game.scene;
    var old = document.getElementById('pirate-overlay');
    if (old) old.remove();
    var div = document.createElement('div');
    div.id = 'pirate-overlay';
    div.style.cssText = [
      'position:fixed', 'top:0', 'left:0', 'width:100%', 'height:100%',
      'display:flex', 'flex-direction:column', 'align-items:center',
      'justify-content:flex-start',
      'padding-top:max(16px, env(safe-area-inset-top, 16px))',
      'pointer-events:none', 'z-index:9999', 'font-family:serif'
    ].join(';');

    div.innerHTML =
      '<div id="ships-remaining" style="background:rgba(0,0,0,0.55);color:#f5d76e;' +
      'font-size:clamp(14px,2.5vw,20px);padding:6px 14px;border-radius:8px;' +
      'border:2px solid #8b6914;max-width:90vw;text-align:center;">' +
      '\u2875 Ships Afloat: ' + TOTAL + '</div>' +
      '<div id="pirate-winner" style="display:none;margin-top:clamp(4px,2vh,20px);' +
      'background:rgba(0,0,0,0.82);color:#f5d76e;' +
      'font-size:clamp(24px,5vw,48px);' +
      'padding:clamp(14px,3vw,30px) clamp(20px,5vw,60px);' +
      'border-radius:16px;border:3px solid #f5d76e;text-align:center;' +
      'text-shadow:2px 2px 4px #000;pointer-events:auto;' +
      'max-width:90vw;word-break:break-word;">' +
      '</div>';
    document.body.appendChild(div);
  };

  this._doRestart = function() {
    var skipEl = document.getElementById('pirate-skip-btn');
    if (skipEl) skipEl.remove();
    var scene = this.game.scene;
    for (var i = 0; i < ALL_SHIPS.length; i++) {
      var name = ALL_SHIPS[i];
      var ship = scene.getObjectByName(name);
      if (!ship) continue;
      var sp = SHIP_STARTS[name];
      ship.position.set(sp.x, sp.y, sp.z);
      ship.rotation.set(0, sp.ry, 0);
      ship.visible = true;
      var h = ship.userData._shipHealth;
      if (h) {
        if (h._dieTimeout) { clearTimeout(h._dieTimeout); h._dieTimeout = null; }
        h.hp = h.maxHp || 100; h.isDead = false;
        h._flashTimer  = -99;
        h._damageLevel = 0;
        h._dmgTimer    = 0;
        if (h._originalColors) h._originalColors.forEach(function(e) {
          if (e.m && e.m.color && e.c) e.m.color.copy(e.c);
        });
      }
      ship.userData._cannonCd = 0; ship.userData._cannonCdMax = 3;
    }
    ['_cannonballs','_cannonVFX','_wake'].forEach(function(key) {
      var arr = scene.userData[key];
      if (!arr) return;
      arr.forEach(function(item) {
        if (!item) return;
        // Cannonballs are direct meshes
        if (item.parent) {
          scene.remove(item);
          if (item.geometry) item.geometry.dispose();
          if (item.material) item.material.dispose();
          return;
        }
        // Wake entries have a .mesh
        if (item.mesh && item.mesh.parent) {
          scene.remove(item.mesh);
          if (item.mesh.geometry) item.mesh.geometry.dispose();
          if (item.mesh.material) item.mesh.material.dispose();
        }
        // VFX entries have .parts array
        if (item.parts) item.parts.forEach(function(p) {
          if (p.mesh && p.mesh.parent) {
            scene.remove(p.mesh);
            if (p.mesh.geometry) p.mesh.geometry.dispose();
            if (p.mesh.material) p.mesh.material.dispose();
          }
        });
      });
      scene.userData[key] = [];
    });
    this.gameOver = false; this._restartTimer = 0; this._prevCount = -1; this._gracePeriod = 3.0; this._lastCountNum = -1; this._matchElapsed = 0; this.game.scene.userData._matchStarted = false; this._showCountdown(3);
    var winEl = document.getElementById('pirate-winner');
    if (winEl) winEl.style.display = 'none';
    var sbEl = document.getElementById('pirate-scoreboard');
    if (sbEl) sbEl.remove();
    var stats = this.game.scene.userData._pirateStats;
    if (stats) {
      for (var uuid in stats) {
        if (stats.hasOwnProperty(uuid)) {
          stats[uuid].damageDealt = 0;
          stats[uuid].kills = 0;
        }
      }
    }
    var remEl = document.getElementById('ships-remaining');
    if (remEl) remEl.textContent = '\u2875 Ships Afloat: ' + TOTAL;
  };

  this._countAlive = function() {
    var refs = this._shipRefs;
    if (!refs) return { count: 10, playerAlive: true }; // fallback before refs ready
    var count = 0; var playerAlive = false;
    var playerName = PLAYER_SHIP;
    for (var i = 0; i < refs.length; i++) {
      var ship = refs[i];
      if (!ship.visible) continue;
      var h = ship.userData._shipHealth;
      if (h && h.isDead) continue;
      count++;
      if (ship.name === playerName) playerAlive = true;
    }
    return { count: count, playerAlive: playerAlive };
  };

  this.update = function(dt) {
    if (!this._shipRefs) { this._shipRefCd -= dt; if (this._shipRefCd <= 0) this._ensureShipRefs(); }
    if (this._gracePeriod > 0) {
      this._gracePeriod -= dt;
      var cNum = Math.ceil(this._gracePeriod);
      if (cNum !== this._lastCountNum && cNum >= 1) {
        this._lastCountNum = cNum;
        this._showCountdown(cNum);
      }
      if (this._gracePeriod <= 0) {
        this.game.scene.userData._matchStarted = true;
        this._showCountdown(0); // GO!
      }
      return;
    }
    if (this.gameOver) {
      if (this._restartTimer > 0) {
        this._restartTimer -= dt;
        var winEl = document.getElementById('pirate-winner');
        if (winEl) {
          var secs = Math.ceil(Math.max(0, this._restartTimer));
          var prev = winEl.getAttribute('data-secs');
          if (String(secs) !== prev) {
            winEl.setAttribute('data-secs', String(secs));
            var msg = winEl.getAttribute('data-msg') || '';
            winEl.innerHTML = this._buildResultsHTML(msg, secs);
          }
        }
        if (this._restartTimer <= 0) this._doRestart();
      }
      return;
    }
    this._matchElapsed = (this._matchElapsed || 0) + dt;
    if (this._matchElapsed < 1.5) return; // buffer: wait 1.5s before allowing game-over
    var result = this._countAlive();
    var remEl = document.getElementById('ships-remaining');
    if (remEl && result.count !== this._prevCount) {
      this._prevCount = result.count;
      remEl.textContent = '\u2875 Ships Afloat: ' + result.count;
    }
    if (result.count <= 1 || !result.playerAlive) {
      this.gameOver = true; this._restartTimer = 10;
      var winEl2 = document.getElementById('pirate-winner');
      if (winEl2) {
        var msg2 = result.playerAlive
          ? '\u2875 VICTORY! \u2875<br><span style="font-size:clamp(14px,3vw,24px)">Last ship standing!</span>'
          : '\u2620 DEFEATED \u2620<br><span style="font-size:clamp(14px,3vw,24px)">Your ship has sunk\u2026</span>';
        winEl2.setAttribute('data-msg', msg2);
        winEl2.innerHTML = msg2 + '<br><span style="font-size:clamp(12px,2.5vw,18px);color:#aaa;">Restarting in 10s\u2026</span>';
        winEl2.style.display = 'block';

        if (this.game.eventBus) {
          this.game.eventBus.send('game_over', { stats: this.game.scene.userData._pirateStats || {} });
        }
      }
    }
  };


  this._buildResultsHTML = function(msg, secs) {
    var isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    var stats = this.game.scene.userData._pirateStats || {};
    var ALL_NAMES = ['ship-pirate-large.glb','ship-pirate-medium.glb','ship-ghost.glb','ship-small.glb',
      'ship-pirate-medium.glb 3','ship-ghost.glb 3','ship-small.glb 3',
      'ship-pirate-medium.glb 4','ship-ghost.glb 4','ship-small.glb 4'];
    var shipByUUID = {};
    for (var si = 0; si < ALL_NAMES.length; si++) {
      var so = this.game.scene.getObjectByName(ALL_NAMES[si]);
      if (so) shipByUUID[so.uuid] = so;
    }
    var rows = [];
    for (var uuid in stats) {
      if (!stats.hasOwnProperty(uuid)) continue;
      var s = stats[uuid];
      var shipObj = shipByUUID[uuid];
      var h = shipObj && shipObj.userData && shipObj.userData._shipHealth;
      var alive = shipObj && shipObj.visible && h && !h.isDead;
      rows.push({ name: s.name, dmg: Math.round(s.damageDealt || 0), kills: s.kills || 0, alive: !!alive });
    }
    rows.sort(function(a, b) {
      if (a.alive !== b.alive) return a.alive ? -1 : 1;
      return b.kills !== a.kills ? b.kills - a.kills : b.dmg - a.dmg;
    });
    var fs  = isMobile ? '11px' : '13px';
    var hfs = isMobile ? '13px' : '15px';
    var medals = ['\uD83E\uDD47','\uD83E\uDD48','\uD83E\uDD49'];
    var tableRows = '';
    for (var ri = 0; ri < rows.length; ri++) {
      var row = rows[ri];
      var isPlayer = row.name === 'Black Pearl';
      var rank = row.alive ? '\uD83D\uDC51' : (medals[ri] || (ri+1)+'.');
      var bg = isPlayer ? 'background:rgba(245,215,110,0.1);' : '';
      var nc = isPlayer ? '#f5d76e' : '#ccc';
      var kc = row.kills > 0 ? '#ff8866' : '#555';
      tableRows += '<tr style="'+bg+'">' +
        '<td style="padding:5px 10px;text-align:center;font-size:15px">'+rank+'</td>' +
        '<td style="padding:5px 10px;color:'+nc+';font-size:'+fs+'">'+row.name+(isPlayer?' \u2605':'')+'</td>' +
        '<td style="padding:5px 10px;text-align:center;color:'+kc+';font-size:'+fs+'">'+row.kills+'</td>' +
        '<td style="padding:5px 10px;text-align:center;color:#88aaff;font-size:'+fs+'">'+row.dmg+'</td>' +
      '</tr>';
    }
    var skipBtn = '<button onclick="window._stemScene&&window._stemScene.userData._skipToNextMatch&&window._stemScene.userData._skipToNextMatch()" style="margin-top:14px;padding:9px 28px;font-size:'+hfs+';background:#f5d76e;color:#1a0a00;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-family:Georgia,serif">\u25B6 Play Now</button>';
    return '<div style="background:rgba(5,5,15,0.94);border:2px solid rgba(139,105,20,0.75);border-radius:14px;padding:clamp(10px,2vw,24px) clamp(12px,3vw,32px);max-width:min(90vw,520px);max-height:calc(100vh - 110px);overflow-y:auto;text-align:center;font-family:Georgia,serif;pointer-events:all;">' +
      '<div style="font-size:clamp(20px,6vw,40px);color:#f5d76e;font-weight:bold;margin-bottom:6px">'+msg+'</div>' +
      '<div style="margin:10px 0;color:#f5d76e;font-size:11px;letter-spacing:2px">\u2620 BATTLE RESULTS \u2620</div>' +
      '<table style="border-collapse:collapse;width:100%">' +
        '<thead><tr>' +
          '<th style="padding:6px 10px;color:#f5d76e;font-size:11px;border-bottom:1px solid rgba(139,105,20,0.4)">#</th>' +
          '<th style="padding:6px 10px;color:#f5d76e;font-size:11px;border-bottom:1px solid rgba(139,105,20,0.4);text-align:left">Ship</th>' +
          '<th style="padding:6px 10px;color:#f5d76e;font-size:11px;border-bottom:1px solid rgba(139,105,20,0.4)">Kills</th>' +
          '<th style="padding:6px 10px;color:#f5d76e;font-size:11px;border-bottom:1px solid rgba(139,105,20,0.4)">Dmg</th>' +
        '</tr></thead>' +
        '<tbody>'+tableRows+'</tbody>' +
      '</table>' +
      '<div style="margin-top:14px;font-size:clamp(11px,2vw,15px);color:#999">Restarting in '+secs+'s…</div>' +
      skipBtn +
    '</div>';
  };

  this._showCountdown = function(n) {
    var el = document.getElementById('pirate-countdown');
    if (!el) {
      el = document.createElement('div');
      el.id = 'pirate-countdown';
      el.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);' +
        'font-family:Georgia,serif;font-size:clamp(60px,15vw,120px);font-weight:bold;' +
        'color:#f5d76e;text-shadow:0 0 30px rgba(245,215,110,0.8);pointer-events:none;' +
        'z-index:99999;text-align:center;transition:opacity 0.3s;';
      document.body.appendChild(el);
    }
    el.style.opacity = '1';
    el.textContent = n > 0 ? n : 'GO!';
    if (n === 0) {
      var _el = el;
      setTimeout(function() { _el.style.opacity = '0'; setTimeout(function(){ _el.remove(); }, 400); }, 600);
    }
  };
  this.dispose = function() {
    var skipEl2 = document.getElementById('pirate-skip-btn');
    if (skipEl2) skipEl2.remove();
    var el = document.getElementById('pirate-overlay');
    if (el) el.remove();
  };
