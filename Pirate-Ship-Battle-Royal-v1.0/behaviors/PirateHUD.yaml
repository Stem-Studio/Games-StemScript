code: |+
  // Minimal HUD: controls reference + end-game scoreboard.
  this.init = function(game) {
    this.game = game;
  };

  this.onStart = function() {
    this._tmpV = new THREE.Vector3();
    this._createHUD();
  };

  this.onReset = function() {
    // Rebuild HUD (also rebuilds sprint bar)
    this._createHUD();
  };

  this._createHUD = function() {
    var isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

    var old = document.getElementById('pirate-hud');
    if (old) old.remove();
    if (!isMobile) {
      // Desktop keyboard hint bar
      var hud = document.createElement('div');
      hud.id = 'pirate-hud';
      hud.style.cssText = [
        'position:fixed','bottom:18px','left:50%','transform:translateX(-50%)',
        'background:rgba(0,0,0,0.50)','border:1px solid rgba(139,105,20,0.6)',
        'border-radius:8px','padding:6px 16px','z-index:9999','font-family:serif',
        'color:rgba(245,215,110,0.85)','pointer-events:none','white-space:nowrap',
        'font-size:12px','letter-spacing:0.5px'
      ].join(';');
      hud.innerHTML = 'W · Sail &#124; A/D · Turn &#124; SPACE · Fire &#124; SHIFT · Burst';
      document.body.appendChild(hud);
    }

    // Sprint bar — top-center on mobile, above controls on desktop
    var old2 = document.getElementById('pirate-sprint-wrap');
    if (old2) old2.remove();
    var wrap = document.createElement('div');
    wrap.id = 'pirate-sprint-wrap';
    wrap.style.cssText = isMobile ? [
      'position:fixed','bottom:234px','right:20px',
      'width:72px','z-index:9999','pointer-events:none','text-align:center',
      'background:rgba(0,0,0,0.60)','border:1px solid rgba(139,105,20,0.6)',
      'border-radius:8px','padding:5px 8px'
    ].join(';') : [
      'position:fixed','bottom:50px','left:50%','transform:translateX(-50%)',
      'width:180px','z-index:9999','pointer-events:none','text-align:center',
      'background:rgba(0,0,0,0.50)','border:1px solid rgba(139,105,20,0.6)',
      'border-radius:8px','padding:6px 12px'
    ].join(';');

    var lbl = document.createElement('div');
    lbl.id = 'sprint-label';
    lbl.style.cssText = 'font-family:serif;font-size:10px;color:rgba(245,215,110,0.75);letter-spacing:0.5px;margin-bottom:3px;';
    lbl.textContent = 'BURST READY';

    var track = document.createElement('div');
    track.style.cssText = 'background:rgba(0,0,0,0.5);border:1px solid rgba(139,105,20,0.5);border-radius:4px;height:6px;width:100%;overflow:hidden;';

    var bar = document.createElement('div');
    bar.id = 'sprint-bar';
    bar.style.cssText = 'height:100%;width:100%;background:#44cc44;border-radius:4px;transition:width 0.1s;';

    track.appendChild(bar);
    wrap.appendChild(lbl);
    wrap.appendChild(track);
    document.body.appendChild(wrap);
  };

  this.update = function(dt) {
    // Sprint fuel gauge
    var sp = this.game.scene.userData._playerSprint;
    var bar = document.getElementById('sprint-bar');
    var lbl = document.getElementById('sprint-label');
    if (bar && sp) {
      var pct = Math.round(sp.fuel * 100);
      bar.style.width = pct + '%';
      if (sp.active) {
        bar.style.background = '#ff9933';           // orange while sprinting
        if (lbl) lbl.textContent = 'BURST';
      } else if (sp.locked) {
        bar.style.background = '#cc3333';           // red — locked, must reach 25%
        if (lbl) lbl.textContent = 'RECHARGING...';
      } else if (sp.fuel < 1.0) {
        bar.style.background = '#f5d76e';           // yellow — refilling but usable
        if (lbl) lbl.textContent = 'BURST READY';
      } else {
        bar.style.background = '#44cc44';           // green — full
        if (lbl) lbl.textContent = 'BURST READY';
      }
    }
    // AI burst gauges (world-space DOM)
    var camera = this.game.camera;
    var scene  = this.game.scene;
    var aiShips = scene.userData._allShips || [];
    var playerUUID = scene.userData._playerShipUUID;
    var THREE = window.THREE;
    if (camera && THREE && aiShips.length) {
      var w = window.innerWidth, h = window.innerHeight;
      var tmpV = this._tmpV;
      aiShips.forEach(function(ship) {
        if (!ship || ship.uuid === playerUUID) return;
        var bData = ship.userData._aiBurst;
        var health = ship.userData._shipHealth;
        if (!bData || (health && health.isDead)) {
          var old = document.getElementById('ai-burst-' + ship.uuid);
          if (old) old.remove();
          return;
        }
        var el = document.getElementById('ai-burst-' + ship.uuid);
        if (!el) {
          el = document.createElement('div');
          el.id = 'ai-burst-' + ship.uuid;
          el.style.cssText = 'position:fixed;pointer-events:none;z-index:9998;width:60px;transform:translateX(-50%);';
          el.innerHTML = '<div style="background:rgba(0,0,0,0.5);border:1px solid rgba(139,105,20,0.5);border-radius:4px;padding:2px 4px;">'
            + '<div style="font-family:serif;font-size:8px;color:rgba(245,215,110,0.75);text-align:center;margin-bottom:2px;">BURST</div>'
            + '<div style="background:rgba(0,0,0,0.4);border-radius:3px;height:4px;overflow:hidden;">'
            + '<div class="ai-burst-fill" style="height:100%;background:#44cc44;border-radius:3px;transition:width 0.1s;"></div>'
            + '</div></div>';
          document.body.appendChild(el);
        }
        // Project ship position to screen
        tmpV.copy(ship.position);
        tmpV.y += 8;
        tmpV.project(camera);
        var sx = (tmpV.x * 0.5 + 0.5) * w;
        var sy = (-tmpV.y * 0.5 + 0.5) * h;
        if (tmpV.z > 1) { el.style.display = 'none'; return; }
        el.style.display = 'block';
        el.style.left = sx + 'px';
        el.style.top  = sy + 'px';
        // Update fill
        if (!el._fill) el._fill = el.querySelector('.ai-burst-fill');
        var fill = el._fill;
        if (fill) {
          fill.style.width = Math.round(bData.fuel * 100) + '%';
          fill.style.background = bData.active ? '#ff9933' : (bData.locked ? '#cc3333' : '#44cc44');
        }
      });
    }

  };

  this.dispose = function() {
    var el = document.getElementById('pirate-hud');
    if (el) el.remove();
    var sw = document.getElementById('pirate-sprint-wrap');
    if (sw) sw.remove();
    var sl = document.getElementById('sprint-label');
    if (sl) sl.remove();
    document.querySelectorAll('[id^="ai-burst-"]').forEach(function(e){ e.remove(); });
  };



