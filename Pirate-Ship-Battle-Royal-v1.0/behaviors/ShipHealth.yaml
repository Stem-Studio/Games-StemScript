config:
  id: exported.shiphealth
  name: ShipHealth
  description: Manages ship HP, hit flash effect, death, and broadcasts ship_destroyed events.
  version: 1.0.0
  author: ""
  isScript: true
  main: ""
  attributes: {}
  tags:
    - pirate
    - ship
    - health
    - combat
code: |+
  var SHIP_NAMES = {
    'ship-pirate-large.glb':    'Black Pearl',
    'ship-pirate-medium.glb':   'Red Corsair',
    'ship-ghost.glb':           'Ghost Ship',
    'ship-small.glb':           'Sea Raider',
    'ship-pirate-medium.glb 3': 'Iron Brigand',
    'ship-ghost.glb 3':         'Dark Specter',
    'ship-small.glb 3':         "Devil's Tide",
    'ship-pirate-medium.glb 4': 'Storm Galleon',
    'ship-ghost.glb 4':         'Bone Crusher',
    'ship-small.glb 4':         'Crimson Fury'
  };

  this.init = function(game) {
    this.game            = game;
    this.maxHp           = 100;
    this.hp              = 100;
    this.isDead          = false;
    this._flashTimer     = 0;
    this._originalColors = [];
    this._dieTimeout     = null;
    this._damageLevel    = 0;
    this._dmgTimer       = 0;
  };

  this.onStart = function() {
    this.target.userData._shipHealth = this;
    this._storeColors();
    // Register stats entry
    var scene = this.game.scene;
    if (!scene.userData._pirateStats) scene.userData._pirateStats = {};
    var displayName = SHIP_NAMES[this.target.name] || this.target.name.replace('.glb','');
    scene.userData._pirateStats[this.target.uuid] = {
      name: displayName,
      damageDealt: 0,
      kills: 0
    };
  };

  this.onReset = function() {
    if (this._dieTimeout) { clearTimeout(this._dieTimeout); this._dieTimeout = null; }
    this.hp           = this.maxHp;
    this.isDead       = false;
    this._flashTimer  = 0;
    this._damageLevel = 0;
    this._dmgTimer    = 0;
    this.target.visible = true;
    var stored = this._originalColors;
    stored.forEach(function(entry) {
      if (entry.m && entry.m.color && entry.c) entry.m.color.copy(entry.c);
    });
    // Re-register stats (handles both reset and cases where _pirateStats was cleared)
    var scene = this.game.scene;
    if (!scene.userData._pirateStats) scene.userData._pirateStats = {};
    var displayName = SHIP_NAMES[this.target.name] || this.target.name.replace('.glb','');
    scene.userData._pirateStats[this.target.uuid] = { name: displayName, damageDealt: 0, kills: 0 };
  };

  this._storeColors = function() {
    this._originalColors = [];
    var self = this;
    this.target.traverse(function(child) {
      if (child.isMesh && child.material) {
        var mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach(function(m) {
          self._originalColors.push({ m: m, c: m.color ? m.color.clone() : null });
        });
      }
    });
  };

  this.takeDamage = function(amount, attackerUUID) {
    if (this.isDead) return;
    // Credit attacker stats
    if (attackerUUID) {
      var stats = this.game.scene.userData._pirateStats;
      if (stats && stats[attackerUUID]) {
        stats[attackerUUID].damageDealt += amount;
      }
    }
    this.hp -= amount;
    this._flashTimer = 0.3;
    if (this.hp <= 0) {
      this.hp = 0;
      this._die(attackerUUID);
    }
  };

  this._die = function(attackerUUID) {
    this.isDead = true;
    // Credit kill to attacker
    if (attackerUUID) {
      var stats = this.game.scene.userData._pirateStats;
      if (stats && stats[attackerUUID]) {
        stats[attackerUUID].kills += 1;
      }
    }
    var self = this;
    this._emitDamagePuffs(6, true);
    this.target.traverse(function(child) {
      if (child.isMesh && child.material) {
        var mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach(function(m) { if (m.color) m.color.set(0xffffff); });
      }
    });
    this._dieTimeout = setTimeout(function() {
      self._dieTimeout = null;
      if (self.isDead) {
        self.target.visible = false;
        if (self.game.physics) self.game.physics.remove(self.target.uuid);
      }
    }, 500);
  };

  this._emitDamagePuffs = function(level, isFinal) {
    var scene = this.game.scene;
    if (!scene.userData._cannonVFX) scene.userData._cannonVFX = [];
    var parts = [];
    var pos   = this.target.position;

    var smokeCount = isFinal ? 8 : level;
    for (var i = 0; i < smokeCount; i++) {
      var m = new THREE.Mesh(
        new THREE.SphereGeometry(0.5 + Math.random() * 0.5, 4, 4),
        new THREE.MeshBasicMaterial({ color: isFinal ? 0x222222 : 0x888888, transparent: true, opacity: 0.75 })
      );
      m.position.set(
        pos.x + (Math.random()-0.5) * 4,
        pos.y + 1.0 + Math.random() * 2,
        pos.z + (Math.random()-0.5) * 4
      );
      scene.add(m);
      parts.push({ mesh: m, type: 'smoke',
        vel: new THREE.Vector3((Math.random()-0.5)*2, 2+Math.random()*3, (Math.random()-0.5)*2) });
    }

    var fireCount = isFinal ? 5 : Math.max(0, level - 1);
    for (var j = 0; j < fireCount; j++) {
      var sz  = isFinal ? 0.8 + Math.random() * 0.6 : 0.3 + Math.random() * 0.3;
      var col = level === 3 ? 0xff2200 : 0xff6600;
      var f = new THREE.Mesh(
        new THREE.SphereGeometry(sz, 4, 4),
        new THREE.MeshBasicMaterial({ color: isFinal ? 0xff3300 : col, transparent: true, opacity: 1.0 })
      );
      f.position.set(
        pos.x + (Math.random()-0.5) * 3,
        pos.y + 0.5 + Math.random(),
        pos.z + (Math.random()-0.5) * 3
      );
      scene.add(f);
      parts.push({ mesh: f, type: 'flash',
        vel: new THREE.Vector3((Math.random()-0.5)*3, 4+Math.random()*5, (Math.random()-0.5)*3) });
    }

    var life = isFinal ? 2.5 : [1.4, 2.0, 2.8][level - 1] || 1.4;
    if (parts.length > 0) {
      scene.userData._cannonVFX.push({ parts: parts, life: life, maxLife: life });
    }
  };

  this.update = function(dt) {
    if (this._flashTimer > 0) {
      this._flashTimer -= dt;
      var isRed = Math.floor(this._flashTimer * 10) % 2 === 0;
      this.target.traverse(function(child) {
        if (child.isMesh && child.material) {
          var mats = Array.isArray(child.material) ? child.material : [child.material];
          mats.forEach(function(m) { if (m.color) m.color.set(isRed ? 0xff2222 : 0xffffff); });
        }
      });
    } else if (this._flashTimer <= 0 && this._flashTimer > -1) {
      this._flashTimer = -99;
      var stored = this._originalColors;
      stored.forEach(function(entry) {
        if (entry.m && entry.m.color && entry.c) entry.m.color.copy(entry.c);
      });
    }

    if (this.isDead) return;

    var ratio    = this.hp / this.maxHp;
    var newLevel = ratio > 0.75 ? 0 : ratio > 0.50 ? 1 : ratio > 0.25 ? 2 : 3;

    if (newLevel !== this._damageLevel) {
      this._damageLevel = newLevel;
      this._dmgTimer    = 0;
    }

    if (this._damageLevel > 0) {
      this._dmgTimer -= dt;
      if (this._dmgTimer <= 0) {
        this._emitDamagePuffs(this._damageLevel, false);
        this._dmgTimer = [2.5, 1.2, 0.5][this._damageLevel - 1];
      }
    }
  };

  this.dispose = function() {
    if (this._dieTimeout) { clearTimeout(this._dieTimeout); this._dieTimeout = null; }
    this.target.userData._shipHealth = null;
  };

