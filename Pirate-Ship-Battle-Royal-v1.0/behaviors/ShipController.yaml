        ["ArrowLeft",   { name: "turn",    scale:  1 }],
        ["KeyD",        { name: "turn",    scale: -1 }],
        ["ArrowRight",  { name: "turn",    scale: -1 }],
      ])
    );
  };

  this.onStart = function() {
    this.game.setPlayer(this.target);
    this.target.position.set(0, WATER_Y, 55);
    this.target.rotation.set(0, Math.PI, 0);
    this._createTouchUI();
    // Cache shared geometry+material for wake, cannonball, and VFX particles
    this._wakeGeoNorm  = new THREE.CylinderGeometry(0.275, 0.275 * 0.36, 0.02, 8);
    this._wakeGeoBurst = new THREE.CylinderGeometry(0.5, 0.5 * 0.36, 0.02, 8);
    this._wakeMatNorm  = new THREE.MeshBasicMaterial({ color: 0xd0f0ff, transparent: true, opacity: 0.6 });
    this._wakeMatBurst = new THREE.MeshBasicMaterial({ color: 0xeef8ff, transparent: true, opacity: 0.85 });
    this._glowGeo = new THREE.SphereGeometry(0.35, 8, 6);
    this._glowMat = new THREE.MeshBasicMaterial({ color: 0x80d8ff, transparent: true, opacity: 0.45 });
    this._ballGeo = new THREE.SphereGeometry(0.35, 8, 8);
    this._ballMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
    this._flashGeo = new THREE.SphereGeometry(0.22, 4, 4);
    this._smokeGeo = new THREE.SphereGeometry(0.55, 4, 4);
    this._splashGeo = new THREE.SphereGeometry(0.28, 4, 4);
    this._debrisGeo = new THREE.SphereGeometry(0.3, 4, 4);
    this._splinterGeo = new THREE.SphereGeometry(0.22, 3, 3);
    // Pre-allocated vectors for camera — reused every frame
    this._camBack  = new THREE.Vector3();
    this._camRight = new THREE.Vector3();
    this._camPos   = new THREE.Vector3();
    this._camLookTarget = new THREE.Vector3();
    // Cache AI ship refs — avoids getObjectByName per frame
    this._aiShipRefs = null;
    this._shipRefCd  = 0.5;
  };

  this._ensureAiRefs = function() {
    if (this._aiShipRefs) return;
    var AI_NAMES = ['ship-pirate-medium.glb','ship-ghost.glb','ship-small.glb',
      'ship-pirate-medium.glb 3','ship-ghost.glb 3','ship-small.glb 3',
      'ship-pirate-medium.glb 4','ship-ghost.glb 4','ship-small.glb 4'];
    var refs = [];
    for (var i = 0; i < AI_NAMES.length; i++) {
      var s = this.game.scene.getObjectByName(AI_NAMES[i]);
      if (s) refs.push(s);
    }
    if (refs.length === AI_NAMES.length) this._aiShipRefs = refs;
  };

  this._createTouchUI = function() {
    this._removeTouchUI();
    // Also clear any orphaned touch UI from previous sessions
    ['pirate-joystick','pirate-fire-btn','pirate-sprint-btn'].forEach(function(id) {
      var el = document.getElementById(id); if (el) el.remove();
    });
    if (!('ontouchstart' in window) && navigator.maxTouchPoints === 0) return;
    var self = this;

    // Joystick base — larger for mobile
    var base = document.createElement('div');
    base.id = 'pirate-joystick';
    base.style.cssText = 'position:fixed;bottom:32px;left:20px;width:130px;height:130px;' +
      'border-radius:65px;background:rgba(255,255,255,0.13);border:2px solid rgba(255,255,255,0.4);' +
      'touch-action:none;z-index:100001;user-select:none;-webkit-user-select:none;';
    var stick = document.createElement('div');
    stick.style.cssText = 'position:absolute;width:54px;height:54px;border-radius:27px;' +
      'background:rgba(255,255,255,0.50);left:38px;top:38px;pointer-events:none;';
    base.appendChild(stick);

    // Fire button (bottom-right)
    var fireBtn = document.createElement('div');
    fireBtn.id = 'pirate-fire-btn';
    fireBtn.textContent = 'FIRE';
    fireBtn.style.cssText = 'position:fixed;bottom:48px;right:20px;width:90px;height:90px;' +
      'border-radius:45px;background:rgba(210,50,0,0.80);border:2px solid rgba(255,140,0,0.85);' +
      'color:#fff;font-size:18px;font-weight:bold;font-family:serif;' +
      'display:flex;align-items:center;justify-content:center;' +
      'touch-action:none;z-index:100001;text-shadow:1px 1px 3px #000;' +
      'user-select:none;-webkit-user-select:none;';

    // Sprint/Burst button (above Fire)
    var sprintBtn = document.createElement('div');
    sprintBtn.id = 'pirate-sprint-btn';
    sprintBtn.textContent = 'BURST';
    sprintBtn.style.cssText = 'position:fixed;bottom:152px;right:20px;width:72px;height:72px;' +
      'border-radius:36px;background:rgba(20,100,200,0.78);border:2px solid rgba(80,160,255,0.85);' +
      'color:#fff;font-size:13px;font-weight:bold;font-family:serif;' +
      'display:flex;align-items:center;justify-content:center;' +
      'touch-action:none;z-index:100001;text-shadow:1px 1px 2px #000;' +
      'user-select:none;-webkit-user-select:none;';

    document.body.appendChild(base);
    document.body.appendChild(fireBtn);
    document.body.appendChild(sprintBtn);
    this._touchUI = [base, fireBtn, sprintBtn];

    var MAX = 46; var startX = 0; var startY = 0; var active = false;
    base.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      base.setPointerCapture(e.pointerId);
      var r = base.getBoundingClientRect();
      startX = r.left + 65; startY = r.top + 65; active = true;
    }, { passive: false });
    base.addEventListener('pointermove', function(e) {
      e.preventDefault();
      if (!active) return;
      var dx = e.clientX - startX, dy = e.clientY - startY;
      var d = Math.sqrt(dx*dx+dy*dy);
      if (d > MAX) { dx=dx/d*MAX; dy=dy/d*MAX; }
      stick.style.left = (38+dx)+'px'; stick.style.top = (38+dy)+'px';
      self._touchTurn = -dx / MAX;
      self._touchFwd  = -dy / MAX;
    }, { passive: false });
    var resetStick = function(e) {
      e.preventDefault();
      active = false; stick.style.left='38px'; stick.style.top='38px';
      self._touchTurn=0; self._touchFwd=0;
    };
    base.addEventListener('pointerup', resetStick, { passive: false });
    base.addEventListener('pointercancel', resetStick, { passive: false });

    fireBtn.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      fireBtn.setPointerCapture(e.pointerId);
      self._touchFire=true;
      fireBtn.style.background='rgba(255,80,0,0.95)';
    }, { passive: false });
    var releaseFire = function(e) {
      e.preventDefault();
      self._touchFire=false;
      fireBtn.style.background='rgba(210,50,0,0.80)';
    };
    fireBtn.addEventListener('pointerup', releaseFire, { passive: false });
    fireBtn.addEventListener('pointercancel', releaseFire, { passive: false });

    sprintBtn.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      sprintBtn.setPointerCapture(e.pointerId);
      self._touchSprint=true;
      sprintBtn.style.background='rgba(40,140,255,0.95)';
    }, { passive: false });
    var releaseSprint = function(e) {
      e.preventDefault();
      self._touchSprint=false;
      sprintBtn.style.background='rgba(20,100,200,0.78)';
    };
    sprintBtn.addEventListener('pointerup', releaseSprint, { passive: false });
    sprintBtn.addEventListener('pointercancel', releaseSprint, { passive: false });
  };

  this._removeTouchUI = function() {
    ['pirate-joystick','pirate-fire-btn','pirate-sprint-btn'].forEach(function(id) {
      var el = document.getElementById(id); if (el) el.remove();
    });
    if (this._touchUI) {
      this._touchUI.forEach(function(el) { if (el && el.parentNode) el.parentNode.removeChild(el); });
      this._touchUI = null;
    }
    this._touchFwd=0; this._touchTurn=0; this._touchFire=false; this._touchSprint=false;
  };

  this.update = function(dt) {
    if (!this.target) return;
    var health = this.target.userData._shipHealth;
    if (health && health.isDead) return;

    var im     = this.game.inputManager;
    var fwdIn  = Math.max(0, im.getMotion("forward") + (this._touchFwd  || 0));
    var turnIn = im.getMotion("turn")    + (this._touchTurn || 0);
    // Auto-sprint on full joystick push
    this._playWakeSound(this._sprintActive);
    // Sprint logic (3s burst, 15s cooldown)
    // Fuel gauge sprint: hold Shift to consume, release to refill
    var sprintHeld = im.getAction("sprint") || this._touchSprint;
    if (sprintHeld && !this._sprintLocked && this._sprintFuel > 0) {
      this._sprintActive = true;
      this._sprintFuel -= dt / 5.0;       // depletes in 5s
      if (this._sprintFuel <= 0) {
        this._sprintFuel   = 0;
        this._sprintActive = false;
        this._sprintLocked = true;         // lock until 25% refilled
      }
    } else {
      this._sprintActive = false;
      this._sprintFuel = Math.min(1.0, this._sprintFuel + dt / 12.0); // refills in 12s
      if (this._sprintLocked && this._sprintFuel >= 0.25) {
        this._sprintLocked = false;        // unlock at 25%
      }
    }
    var spd = (this._sprintActive ? this.sprintSpd : this.speed) * (this._colDamp || 1.0);
    // Expose sprint state for HUD
    this.game.scene.userData._playerSprint = {
      active: this._sprintActive,
      locked: this._sprintLocked,
      fuel: this._sprintFuel
    };
    // Expose all AI ship objects for HUD world-space gauges (built once)
    var _sc = this.game.scene;
    if (!_sc.userData._allShips) {
      var AI_SHIP_NAMES = ['ship-pirate-medium.glb','ship-ghost.glb','ship-small.glb',
        'ship-pirate-medium.glb 3','ship-ghost.glb 3','ship-small.glb 3',
        'ship-pirate-medium.glb 4','ship-ghost.glb 4','ship-small.glb 4'];
      var ships = [];
      for (var _si = 0; _si < AI_SHIP_NAMES.length; _si++) {
        var _s = _sc.getObjectByName(AI_SHIP_NAMES[_si]);
        if (_s) ships.push(_s);
      }
      _sc.userData._allShips = ships;
      _sc.userData._playerShipUUID = this.target.uuid;
    }

    var matchStarted = this.game.scene.userData._matchStarted;
    if (matchStarted && !this._prevMatchStarted) {
      // Match just started — reset burst meter to full
      this._sprintFuel = 1.0; this._sprintLocked = false; this._sprintActive = false;
    }
    this._prevMatchStarted = matchStarted;
    if (matchStarted) {
      if (turnIn !== 0) this.target.rotation.y += turnIn * this.turnSpd * dt;
      if (fwdIn !== 0) {
        this._wakeCd -= dt;
        if (this._wakeCd <= 0) { this._wakeCd = this._sprintActive ? 0.08 : 0.18; this._spawnWake(); }
        var fwd = new THREE.Vector3(0, 0, 1).applyEuler(this.target.rotation);
        fwd.y = 0; fwd.normalize();
        this.target.position.x += fwd.x * spd * fwdIn * dt;
        this.target.position.z += fwd.z * spd * fwdIn * dt;
      }
    }

    this.target.position.y = WATER_Y;
    var p = this.target.position;
    p.x = Math.max(-ARENA_BOUND, Math.min(ARENA_BOUND, p.x));
    p.z = Math.max(-ARENA_BOUND, Math.min(ARENA_BOUND, p.z));

    if (!this._aiShipRefs) { this._shipRefCd -= dt; if (this._shipRefCd <= 0) this._ensureAiRefs(); }
    // Ship-to-ship collision: damage + slow when ships touch
    this._checkShipCollisions(p, dt);


    // Camera follow — frame-rate-independent exponential smoothing
    var cam = this.game.camera;
    if (cam) {
      var camAlpha = 1 - Math.exp(-3.0 * dt);
      this._camBack.set(0, 0, -1).applyEuler(this.target.rotation);
      this._camBack.y = 0; this._camBack.normalize();
      this._camRight.set(1, 0, 0).applyEuler(this.target.rotation);
      this._camRight.y = 0; this._camRight.normalize();
      this._camPos.set(
        p.x + this._camBack.x * CAM_BACK + this._camRight.x * CAM_RIGHT,
        p.y + CAM_HEIGHT,
        p.z + this._camBack.z * CAM_BACK + this._camRight.z * CAM_RIGHT
      );
      cam.position.lerp(this._camPos, camAlpha);
      // Smoothly interpolate the look target to avoid snap rotation jitter
      this._camBack.set(0, 0, 1).applyEuler(this.target.rotation);
      this._camBack.y = 0; this._camBack.normalize();
      this._camPos.set(p.x + this._camBack.x * 20, p.y + 3, p.z + this._camBack.z * 20);
      this._camLookTarget.lerp(this._camPos, camAlpha);
      cam.lookAt(this._camLookTarget);
    }

    // Cannon cooldown + HUD events
    this.fireCd -= dt;
    var ready = this.fireCd <= 0;
    this.target.userData._cannonCd    = Math.max(0, this.fireCd);
    this.target.userData._cannonCdMax = FIRE_COOLDOWN;
    if (this.game.eventBus) {
      if (ready !== this._lastReady || (!ready && Math.abs(this.fireCd - Math.round(this.fireCd)) < dt * 1.2)) {
        this._lastReady = ready;
        this.game.eventBus.emit('cannon_status', { ready: ready, timeLeft: Math.max(0, this.fireCd) });
      }
    }

    if ((im.getAction("fire") || this._touchFire) && ready && matchStarted) {
      this.fireCd = FIRE_COOLDOWN;
      this._fire(-1);
      this._fire(1);
      if (this.game.eventBus) this.game.eventBus.emit('cannon_status', { ready: false, timeLeft: FIRE_COOLDOWN });
    }

    // Hazard push — every frame so ships can't move through
    for (var h = 0; h < HAZARD_OBJECTS.length; h++) {
      var hz = HAZARD_OBJECTS[h];
      var hdx = p.x - hz.x, hdz = p.z - hz.z;
      var hd  = Math.sqrt(hdx*hdx + hdz*hdz);
      if (hd < hz.r) {
        var hpd = hd < 0.01 ? 0.01 : hd;
        p.x = hz.x + (hdx/hpd) * (hz.r + 0.5);
        p.z = hz.z + (hdz/hpd) * (hz.r + 0.5);
        this.target.position.x = p.x;
        this.target.position.z = p.z;
        break;
      }
    }
    // Island/hazard damage — throttled to 0.5s
    this.islandCd -= dt;
    if (this.islandCd <= 0) {
      this.islandCd = 0.5;
      for (var h2 = 0; h2 < HAZARD_OBJECTS.length; h2++) {
        var hz2 = HAZARD_OBJECTS[h2];
        var hd2 = Math.sqrt(Math.pow(p.x-hz2.x,2)+Math.pow(p.z-hz2.z,2));
        if (hd2 < hz2.r && health) { health.takeDamage(hz2.dmg); break; }
      }
    }

    this._tickBalls(dt);
    this._tickVFX(dt);
    this._tickWake(dt);


  };

  this._fire = function(side) {
    this._playCannonBoom();
    var right  = new THREE.Vector3(1, 0, 0).applyEuler(this.target.rotation);
    var origin = this.target.position.clone().addScaledVector(right, side * 3.5);
    origin.y = 0;
    this._spawnMuzzleFlash(origin.clone(), right.clone().multiplyScalar(side));
    var vel = right.clone().multiplyScalar(side * 22);
    vel.y = 5;

    var ball = new THREE.Mesh(this._ballGeo, this._ballMat.clone());
    ball.position.copy(origin);
    ball.userData = { _vel: vel, _life: 7.0, _owner: this.target.uuid, _smokeCd: 0 };
    this.game.scene.add(ball);
    if (!this.game.scene.userData._cannonballs) this.game.scene.userData._cannonballs = [];
    this.game.scene.userData._cannonballs.push(ball);
  };

  // ─── MUZZLE FLASH ────────────────────────────────────────────────────────────
  this._spawnMuzzleFlash = function(origin, fireDir) {
    var scene = this.game.scene;
    if (!scene.userData._cannonVFX) scene.userData._cannonVFX = [];
    var parts = [];

    // Normalise fire direction, add slight upward bias
    var dir = fireDir ? fireDir.clone().normalize() : new THREE.Vector3(0, 1, 0);
    dir.y += 0.3; dir.normalize();

    // Build orthonormal basis for cone
    var up = new THREE.Vector3(0, 1, 0);
    var u = new THREE.Vector3().crossVectors(up, dir);
    if (u.lengthSq() < 0.001) u.set(1, 0, 0);
    u.normalize();
    var v = new THREE.Vector3().crossVectors(dir, u).normalize();

    // Flash cone: 16 small orange spheres
    for (var i = 0; i < 16; i++) {
      var theta = Math.random() * Math.PI / 5;   // cone half-angle ~36°
      var phi   = Math.random() * Math.PI * 2;
      var cx = Math.sin(theta) * Math.cos(phi);
      var cy = Math.sin(theta) * Math.sin(phi);
      var cz = Math.cos(theta);
      var coneDir = u.clone().multiplyScalar(cx)
                     .addScaledVector(v, cy)
                     .addScaledVector(dir, cz)
                     .normalize();
      var speed = 10 + Math.random() * 14;

      var m = new THREE.Mesh(this._flashGeo, new THREE.MeshBasicMaterial({ color: 0xffcc00, transparent: true, opacity: 1 }));
      m.position.copy(origin);
      scene.add(m);
      parts.push({ mesh: m, type: 'flash', vel: coneDir.multiplyScalar(speed) });
    }

    // Smoke puffs: 6 slightly larger gray spheres, same cone but slower
    for (var j = 0; j < 6; j++) {
      var t2   = Math.random() * Math.PI / 6;
      var p2   = Math.random() * Math.PI * 2;
      var sx = Math.sin(t2) * Math.cos(p2);
      var sy = Math.sin(t2) * Math.sin(p2);
      var sz = Math.cos(t2);
      var smokeDir = u.clone().multiplyScalar(sx)
                      .addScaledVector(v, sy)
                      .addScaledVector(dir, sz)
                      .normalize();

      var s = new THREE.Mesh(this._smokeGeo, new THREE.MeshBasicMaterial({ color: 0x999999, transparent: true, opacity: 0.75 }));
      s.position.set(
        origin.x + (Math.random()-0.5)*0.8,
        origin.y,
        origin.z + (Math.random()-0.5)*0.8
      );
      scene.add(s);
      parts.push({ mesh: s, type: 'smoke', vel: smokeDir.multiplyScalar(3 + Math.random()*3) });
    }

    scene.userData._cannonVFX.push({ parts: parts, life: 1.4, maxLife: 1.4 });
  };

  // ─── SMOKE TRAIL PUFF ────────────────────────────────────────────────────────
  this._spawnSmokePuff = function(pos) {
    var scene = this.game.scene;
    if (!scene.userData._cannonVFX) scene.userData._cannonVFX = [];
    var parts = [];
    for (var i = 0; i < 4; i++) {
      var m = new THREE.Mesh(this._smokeGeo, new THREE.MeshBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.55 }));
      m.position.set(pos.x+(Math.random()-0.5)*0.6, pos.y, pos.z+(Math.random()-0.5)*0.6);
      scene.add(m);
      parts.push({ mesh: m, type: 'trail',
        vel: new THREE.Vector3((Math.random()-0.5)*1.2, Math.random()*2+0.4, (Math.random()-0.5)*1.2) });
    }
    scene.userData._cannonVFX.push({ parts: parts, life: 0.9, maxLife: 0.9 });
  };

  // ─── VFX TICK ────────────────────────────────────────────────────────────────
  this._tickVFX = function(dt) {
    var list = this.game.scene.userData._cannonVFX;
    if (!list || !list.length) return;
    var alive = [];
    for (var i = 0; i < list.length; i++) {
      var v = list[i];
      v.life -= dt;
      if (v.life <= 0) {
        for (var k = 0; k < v.parts.length; k++) {
          this.game.scene.remove(v.parts[k].mesh);
          v.parts[k].mesh.geometry.dispose();
          v.parts[k].mesh.material.dispose();
        }
        continue;
      }
      var t = v.life / v.maxLife;
      for (var j = 0; j < v.parts.length; j++) {
        var p = v.parts[j];
        p.mesh.position.addScaledVector(p.vel, dt);
        if (p.type === 'flash') {
          p.mesh.material.opacity = t;
          p.mesh.material.color.setRGB(1, Math.max(0, t * 0.75), 0);
        } else if (p.type === 'smoke') {
          p.mesh.material.opacity = t * 0.75;
          p.vel.y *= Math.max(0, 1 - 1.8 * dt);
        } else if (p.type === 'splash') {
          p.mesh.material.opacity = t;
          p.vel.y -= 22 * dt;
        } else if (p.type === 'debris') {
          p.mesh.material.opacity = t;
          p.vel.y -= 16 * dt;
          p.mesh.material.color.setRGB(1, Math.max(0, t * 0.6), 0);
        } else {
          p.mesh.material.opacity = t * 0.55;
          p.vel.y *= Math.max(0, 1 - 2.0 * dt);
        }
      }
      alive.push(v);
    }
    this.game.scene.userData._cannonVFX = alive;
  };

  // ─── WATER SPLASH ────────────────────────────────────────────────────────────
  this._spawnWaterSplash = function(pos) {
    var scene = this.game.scene;
    if (!scene.userData._cannonVFX) scene.userData._cannonVFX = [];
    var parts = [];
    for (var i = 0; i < 14; i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = 4 + Math.random() * 10;
      var m = new THREE.Mesh(this._splashGeo, new THREE.MeshBasicMaterial({ color: 0xaaddff, transparent: true, opacity: 1 }));
      m.position.set(pos.x + (Math.random()-0.5)*1.5, -0.3, pos.z + (Math.random()-0.5)*1.5);
      scene.add(m);
      parts.push({ mesh: m, type: 'splash',
        vel: new THREE.Vector3(Math.cos(angle)*speed*0.6, 8 + Math.random()*8, Math.sin(angle)*speed*0.6) });
    }
    scene.userData._cannonVFX.push({ parts: parts, life: 1.2, maxLife: 1.2 });
  };

  // ─── SHIP HIT EXPLOSION ──────────────────────────────────────────────────────
  this._spawnShipHit = function(pos) {
    var scene = this.game.scene;
    if (!scene.userData._cannonVFX) scene.userData._cannonVFX = [];
    var parts = [];
    // Fiery debris: 12 orange/red spheres
    for (var i = 0; i < 12; i++) {
      var m = new THREE.Mesh(this._debrisGeo, new THREE.MeshBasicMaterial({ color: 0xff5500, transparent: true, opacity: 1 }));
      m.position.copy(pos);
      scene.add(m);
      parts.push({ mesh: m, type: 'debris',
        vel: new THREE.Vector3((Math.random()-0.5)*18, Math.random()*12+4, (Math.random()-0.5)*18) });
    }
    // Wood splinters: 6 dark brown pieces
    for (var j = 0; j < 6; j++) {
      var s = new THREE.Mesh(this._splinterGeo, new THREE.MeshBasicMaterial({ color: 0x5c3010, transparent: true, opacity: 1 }));
      s.position.copy(pos);
      scene.add(s);
      parts.push({ mesh: s, type: 'debris',
        vel: new THREE.Vector3((Math.random()-0.5)*14, Math.random()*10+2, (Math.random()-0.5)*14) });
    }
    scene.userData._cannonVFX.push({ parts: parts, life: 1.6, maxLife: 1.6 });
  };

  // ─── CANNONBALL TICK ─────────────────────────────────────────────────────────
  this._tickBalls = function(dt) {
    var balls = this.game.scene.userData._cannonballs;
    if (!balls || !balls.length) return;
    var shipNames = ['ship-pirate-large.glb','ship-pirate-medium.glb','ship-ghost.glb','ship-small.glb','ship-pirate-medium.glb 3','ship-ghost.glb 3','ship-small.glb 3','ship-pirate-medium.glb 4','ship-ghost.glb 4','ship-small.glb 4'];
    var alive = [];
    for (var i = 0; i < balls.length; i++) {
      var b = balls[i];
      if (!b.parent) continue;
      b.userData._life -= dt;
      if (b.userData._life <= 0) { this.game.scene.remove(b); b.material.dispose(); continue; }

      b.userData._vel.y -= 3.5 * dt;
      b.position.addScaledVector(b.userData._vel, dt);
      if (b.position.y < -0.5 && b.userData._vel.y < 0) {
        this._spawnWaterSplash(b.position.clone());
        this.game.scene.remove(b); b.material.dispose(); continue;
      }

      // Smoke trail: emit puff every 0.07s
      b.userData._smokeCd -= dt;
      if (b.userData._smokeCd <= 0) {
        b.userData._smokeCd = 0.07;
        this._spawnSmokePuff(b.position);
      }

      var hit = false;
      for (var s = 0; s < shipNames.length; s++) {
        var ship = this.game.scene.getObjectByName(shipNames[s]);
        if (!ship || !ship.visible || ship.uuid === b.userData._owner) continue;
        var ex = b.position.x - ship.position.x;
        var ez = b.position.z - ship.position.z;
        if (Math.sqrt(ex*ex+ez*ez) < 5) {
          var h = ship.userData._shipHealth;
          if (h) h.takeDamage(20, b.userData._owner);
          this._spawnShipHit(b.position.clone());
          this._playWoodHit();
          this.game.scene.remove(b); b.material.dispose(); hit = true; break;
        }
      }
      if (!hit) alive.push(b);
    }
    this.game.scene.userData._cannonballs = alive;
  };

  this._getAudioCtx = function() {
    if (!window._pirateAudioCtx) {
      try { window._pirateAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    return window._pirateAudioCtx;
  };

  this._playWakeSound = function(moving) {
    var ctx = this._getAudioCtx(); if (!ctx) return;
    if (ctx.state === 'suspended') { if (moving) ctx.resume(); return; }

    if (moving && !this._wakeNodes) {
      try {
        var sr = ctx.sampleRate;
        // 2-second looping white noise buffer
        var bufSec = 2;
        var buf = ctx.createBuffer(1, sr * bufSec, sr);
        var d = buf.getChannelData(0);
        for (var i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;

        // Layer 1: deep water rush — lowpass ~180Hz
        var src1 = ctx.createBufferSource();
        src1.buffer = buf; src1.loop = true;
        var lp = ctx.createBiquadFilter();
        lp.type = 'lowpass'; lp.frequency.value = 180; lp.Q.value = 0.8;
        var g1 = ctx.createGain(); g1.gain.setValueAtTime(0, ctx.currentTime);
        g1.gain.linearRampToValueAtTime(0.07, ctx.currentTime + 0.6);
        src1.connect(lp); lp.connect(g1); g1.connect(ctx.destination);
        src1.start();

        // Layer 2: wind/spray hiss — bandpass ~900Hz
        var src2 = ctx.createBufferSource();
        src2.buffer = buf; src2.loop = true; src2.loopStart = 0.5;
        var bp = ctx.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = 900; bp.Q.value = 0.5;
        var g2 = ctx.createGain(); g2.gain.setValueAtTime(0, ctx.currentTime);
        g2.gain.linearRampToValueAtTime(0.03, ctx.currentTime + 1.0);
        src2.connect(bp); bp.connect(g2); g2.connect(ctx.destination);
        src2.start();

        this._wakeNodes = { src1: src1, src2: src2, g1: g1, g2: g2 };
      } catch(e) {}
    } else if (!moving && this._wakeNodes) {
      try {
        var now = ctx.currentTime;
        this._wakeNodes.g1.gain.linearRampToValueAtTime(0, now + 0.5);
        this._wakeNodes.g2.gain.linearRampToValueAtTime(0, now + 0.5);
        var nodes = this._wakeNodes;
        this._wakeNodes = null;
        setTimeout(function() {
          try { nodes.src1.stop(); nodes.src2.stop(); } catch(e2) {}
        }, 600);
      } catch(e) {}
    }
  };

  // Fade out and tear down any active wake-sound nodes. Called from onReset
  // and dispose; previously undefined, which threw "this._stopWakeSound is not
  // a function" during behavior dispose and aborted the rest of this ship's
  // teardown. Mirrors the inline stop branch in _playWakeSound and the
  // matching helper in AIShipController.
  this._stopWakeSound = function() {
    if (!this._wakeNodes) return;
    var ctx = window._pirateAudioCtx;
    if (!ctx) { this._wakeNodes = null; return; }
    try {
      var now = ctx.currentTime;
      this._wakeNodes.g1.gain.linearRampToValueAtTime(0, now + 0.5);
      this._wakeNodes.g2.gain.linearRampToValueAtTime(0, now + 0.5);
      var nodes = this._wakeNodes;
      this._wakeNodes = null;
      setTimeout(function() {
        try { nodes.src1.stop(); nodes.src2.stop(); } catch(e2) {}
      }, 600);
    } catch(e) { this._wakeNodes = null; }
  };

  this._playCannonBoom = function() {
    try {
      var ctx = this._getAudioCtx();
      if (!ctx) return;
      if (ctx.state === 'suspended') ctx.resume();
      var now = ctx.currentTime;

      // Low thump oscillator
      var osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(80, now);
      osc.frequency.exponentialRampToValueAtTime(20, now + 0.4);
      var oscGain = ctx.createGain();
      oscGain.gain.setValueAtTime(0.3, now);
      oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      osc.connect(oscGain); oscGain.connect(ctx.destination);
      osc.start(now); osc.stop(now + 0.5);

      // Noise crack
      var sr = ctx.sampleRate;
      var buf = ctx.createBuffer(1, Math.floor(sr * 0.3), sr);
      var d   = buf.getChannelData(0);
      for (var i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      var noise = ctx.createBufferSource();
      noise.buffer = buf;
      var lp = ctx.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.setValueAtTime(600, now);
      lp.frequency.exponentialRampToValueAtTime(80, now + 0.25);
      var noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0.2, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      noise.connect(lp); lp.connect(noiseGain); noiseGain.connect(ctx.destination);
      noise.start(now);
    } catch(e) {}
  };

  this._playWoodHit = function() {
    var ctx = this._getAudioCtx();
    if (!ctx) return;
    var now = ctx.currentTime;
    // Deep body thud — long decay, very low freq
    var buf = ctx.createBuffer(1, ctx.sampleRate * 0.5, ctx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < d.length; i++) {
      var t = i / ctx.sampleRate;
      d[i] = (Math.random() * 2 - 1) * Math.exp(-t * 10) * 1.0;
    }
    var src = ctx.createBufferSource();
    src.buffer = buf;
    var lp = ctx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 220; lp.Q.value = 2.5;
    var gain = ctx.createGain();
    gain.gain.setValueAtTime(0.0, now);
    gain.gain.linearRampToValueAtTime(0.9, now + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    src.connect(lp); lp.connect(gain); gain.connect(ctx.destination);
    src.start(now);
    // Mid crunch layer
    var buf2 = ctx.createBuffer(1, ctx.sampleRate * 0.18, ctx.sampleRate);
    var d2 = buf2.getChannelData(0);
    for (var j = 0; j < d2.length; j++) {
      var t2 = j / ctx.sampleRate;
      d2[j] = (Math.random() * 2 - 1) * Math.exp(-t2 * 30) * 0.9;
    }
    var src2 = ctx.createBufferSource();
    src2.buffer = buf2;
    var bp = ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 700; bp.Q.value = 0.8;
    var gain2 = ctx.createGain();
    gain2.gain.setValueAtTime(0.7, now + 0.008);
    src2.connect(bp); bp.connect(gain2); gain2.connect(ctx.destination);
    src2.start(now + 0.008);
    // Sub boom via oscillator
    var osc = ctx.createOscillator();
    osc.type = 'sine'; osc.frequency.setValueAtTime(80, now);
    osc.frequency.exponentialRampToValueAtTime(30, now + 0.3);
    var oscGain = ctx.createGain();
    oscGain.gain.setValueAtTime(0.5, now);
    oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    osc.connect(oscGain); oscGain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.35);
  };


  this._spawnWake = function() {
    var scene = this.game.scene;
    if (!scene.userData._wake) scene.userData._wake = [];
    var fwd   = new THREE.Vector3(0, 0, 1).applyEuler(this.target.rotation);
    fwd.y = 0; fwd.normalize();
    var stern = this.target.position.clone().addScaledVector(fwd, -5);
    var drift = fwd.clone().multiplyScalar(-1.0);
    var burst = this._sprintActive;
    var life = burst ? 2.8 : 2.0;
    var geo  = burst ? this._wakeGeoBurst : this._wakeGeoNorm;
    var mat  = (burst ? this._wakeMatBurst : this._wakeMatNorm).clone();
    var m = new THREE.Mesh(geo, mat);
    m.position.set(stern.x, -0.22, stern.z);
    scene.add(m);
    scene.userData._wake.push({ mesh: m, life: life, maxLife: life, drift: drift });
    if (burst) {
      var gm = new THREE.Mesh(this._glowGeo, this._glowMat.clone());
      gm.position.set(stern.x, 0.2, stern.z);
      scene.add(gm);
      scene.userData._wake.push({ mesh: gm, life: 0.18, maxLife: 0.18, drift: new THREE.Vector3(0,0,0) });
    }
  };

  this._tickWake = function(dt) {
    var wake = this.game.scene.userData._wake;
    if (!wake || !wake.length) return;
    var alive = [];
    for (var i = 0; i < wake.length; i++) {
      var w = wake[i];
      w.life -= dt;
      if (w.life <= 0) { this.game.scene.remove(w.mesh); w.mesh.material.dispose(); continue; }
      var t = w.life / w.maxLife;
      w.mesh.material.opacity = t * 0.55;
      w.mesh.position.addScaledVector(w.drift, dt * 0.6);
      var s = 1 + (1 - t) * 0.875;
      w.mesh.scale.set(s, 1, s);
      alive.push(w);
    }
    this.game.scene.userData._wake = alive;
  };


  this._checkShipCollisions = function(pos, dt) {
    var COLLISION_R  = 4;
    var MIN_SEP      = 3;
    var now          = Date.now();
    var ships = this._aiShipRefs || [];
    this._colDamp = Math.min(1.0, this._colDamp + dt * 1.5);
    for (var s = 0; s < ships.length; s++) {
      var ship = ships[s];
      if (!ship.visible) continue;
      var dx = pos.x - ship.position.x;
      var dz = pos.z - ship.position.z;
      var d  = Math.sqrt(dx*dx + dz*dz);
      if (d < COLLISION_R) {
        this._colDamp = 0.15;
        var key = ship.uuid;
        var last = this._colCd[key] || 0;
        if (now - last > 1200) {
          this._colCd[key] = now;
          var myH = this.target.userData._shipHealth;
          var otH = ship.userData._shipHealth;
          if (myH && !myH.isDead) myH.takeDamage(5, ship.uuid);
          if (otH && !otH.isDead) otH.takeDamage(5, this.target.uuid);
          this._playCollisionSound();
        }
      }
      if (d < MIN_SEP && d > 0.01) {
        pos.x += (dx / d) * (MIN_SEP - d) * 0.15;
        pos.z += (dz / d) * (MIN_SEP - d) * 0.15;
      }
    }
  };


  this._playCollisionSound = function() {
    try {
      var ctx = this._getAudioCtx(); if (!ctx || ctx.state === 'suspended') return;
      var now = ctx.currentTime;
      var osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(55, now);
      osc.frequency.exponentialRampToValueAtTime(22, now + 0.25);
      var og = ctx.createGain();
      og.gain.setValueAtTime(0, now);
      og.gain.linearRampToValueAtTime(0.35, now + 0.008);
      og.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc.connect(og); og.connect(ctx.destination);
      osc.start(now); osc.stop(now + 0.3);
      var sr = ctx.sampleRate;
      var buf = ctx.createBuffer(1, Math.floor(sr * 0.18), sr);
      var d = buf.getChannelData(0);
      for (var i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      var ns = ctx.createBufferSource(); ns.buffer = buf;
      var bp = ctx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 450; bp.Q.value = 0.7;
      var ng = ctx.createGain();
      ng.gain.setValueAtTime(0, now);
      ng.gain.linearRampToValueAtTime(0.18, now + 0.005);
      ng.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
      ns.connect(bp); bp.connect(ng); ng.connect(ctx.destination);
      ns.start(now);
      var osc2 = ctx.createOscillator();
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(120, now + 0.02);
      osc2.frequency.exponentialRampToValueAtTime(60, now + 0.2);
      var og2 = ctx.createGain();
      og2.gain.setValueAtTime(0, now + 0.02);
      og2.gain.linearRampToValueAtTime(0.15, now + 0.03);
      og2.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
      osc2.connect(og2); og2.connect(ctx.destination);
      osc2.start(now + 0.02); osc2.stop(now + 0.25);
    } catch(e) {}
  };


  this.onReset = function() {
    this.fireCd    = 0;
    this.islandCd  = 0;
    this._colDamp  = 1.0;
    this._colCd    = {};
    this._wakeCd   = 0;
    this._prevMatchStarted = false;
    this._touchFwd   = 0;
    this._touchTurn  = 0;
    this._touchFire  = false;
    this._touchSprint = false;
    this._stopWakeSound();
  };

  this.dispose = function() {
    this._removeTouchUI();
    this._stopWakeSound();
    var sw = document.getElementById('pirate-sprint-wrap');
    if (sw) sw.remove();
    if (this.game && this.game.scene) { this.game.scene.userData._allShips = null; this.game.scene.userData._playerShipUUID = null; }
    // Dispose pre-allocated shared geometries and materials
    var geos = ['_wakeGeoNorm','_wakeGeoBurst','_glowGeo','_ballGeo','_flashGeo','_smokeGeo','_splashGeo','_debrisGeo','_splinterGeo'];
    var mats = ['_wakeMatNorm','_wakeMatBurst','_glowMat','_ballMat'];
    for (var i = 0; i < geos.length; i++) { if (this[geos[i]]) { this[geos[i]].dispose(); this[geos[i]] = null; } }
    for (var j = 0; j < mats.length; j++) { if (this[mats[j]]) { this[mats[j]].dispose(); this[mats[j]] = null; } }
  };












