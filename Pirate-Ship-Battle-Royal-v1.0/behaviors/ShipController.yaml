    this._prevMatchStarted = false;
    this._touchFire   = false;
    this._touchSprint = false;
    this._touchUI   = null;
    this._wakeCd   = 0;

    game.inputManager.setBindingFromMaps(
      new Map([
        ["Space",      { name: "fire" }],
