config:
  id: exported.cannonturret
  name: CannonTurret
  description: Rotates 360 degrees and fires cannonballs at the nearest ship in range
  version: 1.0.0
  author: ""
  isScript: true
  main: ""
  attributes: {}
  category: combat
code: |
  var ALL_SHIPS = [
    'ship-pirate-large.glb','ship-pirate-medium.glb','ship-ghost.glb','ship-small.glb',
    'ship-pirate-medium.glb 3','ship-ghost.glb 3','ship-small.glb 3',
    'ship-pirate-medium.glb 4','ship-ghost.glb 4','ship-small.glb 4'
  ];
  var TURRET_RANGE  = 65;
  var FIRE_COOLDOWN = 4.0;
  var TURN_SPEED    = 1.2;

  this.init = function(game) {
    this.game    = game;
    this.fireCd  = Math.random() * FIRE_COOLDOWN;
    this._target = null;
  };

  this.onStart = function() {
    this._ballGeo  = new THREE.SphereGeometry(0.35, 8, 8);
    this._ballMat  = new THREE.MeshBasicMaterial({ color: 0x222222 });
    this._flashGeo = new THREE.SphereGeometry(0.22, 4, 4);
    this._smokeGeo = new THREE.SphereGeometry(0.55, 4, 4);
    this._shipRefs = null;
    this._shipRefCd = 0.5;
  };

  this._ensureShipRefs = function() {
    if (this._shipRefs) return;
    var refs = [];
    for (var i = 0; i < ALL_SHIPS.length; i++) {
      var s = this.game.scene.getObjectByName(ALL_SHIPS[i]);
      if (s) refs.push(s);
    }
    if (refs.length === ALL_SHIPS.length) this._shipRefs = refs;
  };

  this._findTarget = function() {
    var refs = this._shipRefs;
    if (!refs) return null;
    var pos = this.target.position;
    var best = null; var bestDist = Infinity;
    for (var i = 0; i < refs.length; i++) {
      var ship = refs[i];
      if (!ship.visible) continue;
      var h = ship.userData._shipHealth;
      if (h && h.isDead) continue;
      var dx = ship.position.x - pos.x;
      var dz = ship.position.z - pos.z;
      var d  = Math.sqrt(dx*dx + dz*dz);
      if (d < TURRET_RANGE && d < bestDist) { bestDist = d; best = ship; }
    }
    return best;
  };

  this.update = function(dt) {
    if (!this._shipRefs) { this._shipRefCd -= dt; if (this._shipRefCd <= 0) this._ensureShipRefs(); }
    this._target = this._findTarget();
    if (!this._target) return;

    var pos = this.target.position;
    var dx  = this._target.position.x - pos.x;
    var dz  = this._target.position.z - pos.z;

    // Rotate Y toward target (full 360)
    var targetAngle = Math.atan2(dx, dz);
    var currAngle   = this.target.rotation.y;
    var diff = targetAngle - currAngle;
    while (diff >  Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    this.target.rotation.y += Math.sign(diff) * Math.min(Math.abs(diff), TURN_SPEED * dt);

    // Fire when cooldown expires and roughly aimed
    this.fireCd -= dt;
    if (this.fireCd <= 0 && Math.abs(diff) < 0.3) {
      this.fireCd = FIRE_COOLDOWN;
      this._fire(dx, dz);
    }
  };

  this._fire = function(dx, dz) {
    var dist = Math.sqrt(dx*dx + dz*dz);
    var dir  = new THREE.Vector3(dx / (dist+0.001), 0, dz / (dist+0.001));
    var origin = this.target.position.clone().addScaledVector(dir, 2.0);
    origin.y = this.target.position.y + 0.8;
    this._spawnMuzzleFlash(origin.clone(), dir.clone());
    this._playCannonBoom();

    var vel = dir.clone().multiplyScalar(20);
    vel.y = 10;
    var ball = new THREE.Mesh(this._ballGeo, this._ballMat.clone());
    ball.position.copy(origin);
    ball.userData = { _vel: vel, _life: 7.0, _owner: this.target.uuid, _smokeCd: 0 };
    this.game.scene.add(ball);
    if (!this.game.scene.userData._cannonballs) this.game.scene.userData._cannonballs = [];
    this.game.scene.userData._cannonballs.push(ball);
  };

  this._spawnMuzzleFlash = function(origin, fireDir) {
    var scene = this.game.scene;
    if (!scene.userData._cannonVFX) scene.userData._cannonVFX = [];
    var parts = [];
    var dir = fireDir.clone().normalize(); dir.y += 0.3; dir.normalize();
    var up = new THREE.Vector3(0,1,0);
    var u  = new THREE.Vector3().crossVectors(up, dir);
    if (u.lengthSq() < 0.001) u.set(1,0,0); u.normalize();
    var v = new THREE.Vector3().crossVectors(dir, u).normalize();
    for (var i = 0; i < 12; i++) {
      var theta = Math.random() * Math.PI / 5;
      var phi   = Math.random() * Math.PI * 2;
      var cDir  = u.clone().multiplyScalar(Math.sin(theta)*Math.cos(phi))
                    .addScaledVector(v, Math.sin(theta)*Math.sin(phi))
                    .addScaledVector(dir, Math.cos(theta)).normalize();
      var m = new THREE.Mesh(this._flashGeo,
        new THREE.MeshBasicMaterial({ color:0xffcc00, transparent:true, opacity:1 }));
      m.position.copy(origin); scene.add(m);
      parts.push({ mesh:m, type:'flash', vel:cDir.multiplyScalar(10+Math.random()*12) });
    }
    scene.userData._cannonVFX.push({ parts:parts, life:1.2, maxLife:1.2 });
  };

  this._playCannonBoom = function() {
    try {
      if (!window._pirateAudioCtx) return;
      var ctx = window._pirateAudioCtx;
      if (ctx.state === 'suspended') return;
      var now = ctx.currentTime;
      var osc = ctx.createOscillator();
      osc.frequency.setValueAtTime(70, now);
      osc.frequency.exponentialRampToValueAtTime(20, now + 0.35);
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.22, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(now); osc.stop(now + 0.4);
    } catch(e) {}
  };

  this.dispose = function() {
    var geos = ['_ballGeo','_flashGeo','_smokeGeo'];
    var mats = ['_ballMat'];
    for (var i = 0; i < geos.length; i++) { if (this[geos[i]]) { this[geos[i]].dispose(); this[geos[i]] = null; } }
    for (var j = 0; j < mats.length; j++) { if (this[mats[j]]) { this[mats[j]].dispose(); this[mats[j]] = null; } }
  };
