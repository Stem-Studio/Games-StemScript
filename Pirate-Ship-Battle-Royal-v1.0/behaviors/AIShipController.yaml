    - ship
    - ai
    - enemy
code: |+
  var ISLAND_CENTERS = [];
  var ISLAND_AVOID_R  = 14;
  var ISLAND_DAMAGE_R = 12;
  var HAZARD_OBJECTS = [
    { x:   6.3,   z:  1.1,   r: 4,  dmg: 8 },  // ship-wreck.glb 2 (scale~1)
    { x:  44.295, z:  2.0,   r: 18, dmg: 5 },  // patch-sand-foliage.glb (scale 5.4)
    { x:   3.2,   z: -3.927, r: 4,  dmg: 5 },  // rocks-sand-c.glb 1 (scale 1.28)
    { x:  -4.9,   z:  2.5,   r: 5,  dmg: 5 },  // rocks-sand-c.glb 2 (scale 1.92)
    { x: -28.466, z: -8.138, r: 4,  dmg: 5 },  // rocks-sand-a.glb 1 (scale 1)
    { x: -23.681, z: -3.927, r: 4,  dmg: 5 },  // rocks-sand-c.glb (scale 1)
    { x: -26.745, z:-10.337, r: 5,  dmg: 8 },  // ship-wreck.glb (scale~1)
    { x: -87.738, z: -3.25,  r: 13, dmg: 5 }   // patch-sand-foliage.glb 2 (scale 3.46)
  ];
  var HAZARD_AVOID_R = 18;
  var ARENA_BOUND     = 150;
  var WATER_Y         = -0.55;
  var ALL_SHIPS = [
    'ship-pirate-large.glb','ship-pirate-medium.glb','ship-ghost.glb','ship-small.glb',
    'ship-pirate-medium.glb 3','ship-ghost.glb 3','ship-small.glb 3',
    'ship-pirate-medium.glb 4','ship-ghost.glb 4','ship-small.glb 4'
  ];

  this.init = function(game) {
    this.game      = game;
    this.speed     = 6;
    this.sprintSpd = 12;
    this.turnSpd   = 0.5;
    this.fireCd    = Math.random() * 3.0;
    this.fireCdMax = 3.0;
    this.islandCd  = 0;
    this._wakeCd   = 0;
    this._wakeNodes = null;
    this._sprintFuel   = 1.0;
    this._prevMatchStarted = false;
    this._sprintActive = false;
    this._sprintLocked = false;
    this._sprintDecide = Math.random() * 3.0; // random timer to decide when to burst
    this._wantSprint   = false;
    this._orbitSign = Math.random() < 0.5 ? 1 : -1;
  };

  this.onStart = function() {
    this._wakeGeoNorm  = new THREE.CylinderGeometry(0.275, 0.275 * 0.36, 0.02, 8);
    this._wakeGeoBurst = new THREE.CylinderGeometry(0.5, 0.5 * 0.36, 0.02, 8);
    this._glowGeo = new THREE.SphereGeometry(0.35, 8, 6);
    this._ballGeo = new THREE.SphereGeometry(0.35, 8, 8);
    this._flashGeo = new THREE.SphereGeometry(0.22, 4, 4);
    this._smokeGeo = new THREE.SphereGeometry(0.55, 4, 4);
    // Cache ship references once — avoids getObjectByName every frame
    this._shipRefs = null;
    this._shipRefCd = 0.5; // delay to let all ships spawn
  };

  this._ensureShipRefs = function() {
    if (this._shipRefs) return;
    var refs = [];
    for (var i = 0; i < ALL_SHIPS.length; i++) {
      var s = this.game.scene.getObjectByName(ALL_SHIPS[i]);
      if (s) refs.push(s);
    }
    // ALL_SHIPS lists every *possible* ship name (incl. duplicate-instance
    // variants like "...glb 3"/"...glb 4"). A given scene may have fewer ships
    // than that — requiring an exact count meant _shipRefs never populated, so
    // _findTarget always returned null and the AI ships sat frozen. Cache
    // whatever ships actually exist; we only need at least two (self + a target).
    if (refs.length >= 2) this._shipRefs = refs;
  };

  // Find nearest live enemy ship
  this._findTarget = function() {
    var refs = this._shipRefs;
    if (!refs) return null;
    var pos = this.target.position;
    var best = null; var bestScore = Infinity;
    for (var i = 0; i < refs.length; i++) {
      var ship = refs[i];
      if (!ship.visible || ship === this.target) continue;
      var h = ship.userData._shipHealth;
      if (h && h.isDead) continue;
      var dx = ship.position.x - pos.x;
      var dz = ship.position.z - pos.z;
      var dist = Math.sqrt(dx*dx + dz*dz);
      var hp   = (h && h.hp != null) ? h.hp : 100;
      var score = dist * 0.6 + hp * 0.4;
      if (score < bestScore) { bestScore = score; best = ship; }
    }
    return best;
  };

  this.update = function(dt) {
    if (!this.target) return;
    var health = this.target.userData._shipHealth;
    if (health && health.isDead) return;
    var _ms = this.game.scene.userData._matchStarted;
    if (!_ms) { this._prevMatchStarted = false; return; }
    if (!this._prevMatchStarted) {
      // Match just started — reset burst meter to full
      this._sprintFuel = 1.0; this._sprintLocked = false; this._sprintActive = false; this._wantSprint = false;
    }
    this._prevMatchStarted = true;

    this._tickWakeSound(this._sprintActive);
    if (!this._shipRefs) { this._shipRefCd -= dt; if (this._shipRefCd <= 0) this._ensureShipRefs(); }
    var target = this._findTarget();
    if (!target) return;

    var pos = this.target.position;
    var dx  = target.position.x - pos.x;
    var dz  = target.position.z - pos.z;
    var dist = Math.sqrt(dx*dx + dz*dz);

    // Steer toward target, avoid islands, ships, and arena edge
    var steerX = dx / (dist + 0.001);
    var steerZ = dz / (dist + 0.001);

    // Broadside orbiting: strafe perpendicular when in firing range
    if (dist < 45 && dist > 12) {
      var perpX = (-dz / (dist + 0.001)) * this._orbitSign;
      var perpZ = ( dx / (dist + 0.001)) * this._orbitSign;
      var orbitW = (1.0 - (dist - 12) / 33.0) * 1.8;
      steerX += perpX * orbitW;
      steerZ += perpZ * orbitW;
    }

    // Island avoidance
    for (var i = 0; i < ISLAND_CENTERS.length; i++) {
      var c  = ISLAND_CENTERS[i];
      var ix = pos.x - c.x, iz = pos.z - c.z;
      var id = Math.sqrt(ix*ix + iz*iz);
      if (id < ISLAND_AVOID_R) {
        var w = (ISLAND_AVOID_R - id) / ISLAND_AVOID_R * 3;
        steerX += (ix / (id + 0.001)) * w;
        steerZ += (iz / (id + 0.001)) * w;
      }
    }

    // Hazard avoidance (rocks, sand, wreck)
    for (var hi2 = 0; hi2 < HAZARD_OBJECTS.length; hi2++) {
      var hzo2 = HAZARD_OBJECTS[hi2];
      var hx2 = pos.x - hzo2.x, hz2 = pos.z - hzo2.z;
      var hd2 = Math.sqrt(hx2*hx2 + hz2*hz2);
      if (hd2 < HAZARD_AVOID_R && hd2 > 0.01) {
        var hw2 = (HAZARD_AVOID_R - hd2) / HAZARD_AVOID_R * 2.5;
        steerX += (hx2 / hd2) * hw2;
        steerZ += (hz2 / hd2) * hw2;
      }
    }

    // Ship collision avoidance
    var SHIP_AVOID_R = 14;
    var _refs = this._shipRefs || [];
    for (var sa = 0; sa < _refs.length; sa++) {
      var otherSh = _refs[sa];
      if (!otherSh.visible || otherSh === this.target) continue;
      var shx = pos.x - otherSh.position.x;
      var shz = pos.z - otherSh.position.z;
      var shd = Math.sqrt(shx*shx + shz*shz);
      if (shd < SHIP_AVOID_R && shd > 0.01) {
        var sw = (SHIP_AVOID_R - shd) / SHIP_AVOID_R * 3.0;
        steerX += (shx / shd) * sw;
        steerZ += (shz / shd) * sw;
      }
    }

    var margin = 25;
    if (pos.x >  ARENA_BOUND - margin) steerX -= 2;
    if (pos.x < -ARENA_BOUND + margin) steerX += 2;
    if (pos.z >  ARENA_BOUND - margin) steerZ -= 2;
    if (pos.z < -ARENA_BOUND + margin) steerZ += 2;

    // Ship models face +Z
    var targetAngle = Math.atan2(steerX, steerZ);
    var currAngle   = this.target.rotation.y;
    var diff = targetAngle - currAngle;
    while (diff >  Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    this.target.rotation.y += Math.sign(diff) * Math.min(Math.abs(diff), this.turnSpd * dt);

    // Move forward
    var fwd = new THREE.Vector3(0, 0, 1).applyEuler(this.target.rotation);
    fwd.y = 0; fwd.normalize();
    // AI burst logic
    this._sprintDecide -= dt;
    if (this._sprintDecide <= 0) {
      this._sprintDecide = 2.0 + Math.random() * 3.0; // decide every 2-5s
      this._wantSprint   = (!this._sprintLocked && this._sprintFuel > 0.3 && Math.random() < 0.7);
    }
    if (this._wantSprint && !this._sprintLocked && this._sprintFuel > 0) {
      this._sprintActive = true;
      this._sprintFuel  -= dt / 5.0;
      if (this._sprintFuel <= 0) { this._sprintFuel = 0; this._sprintActive = false; this._sprintLocked = true; this._wantSprint = false; }
    } else {
      this._sprintActive = false;
      this._sprintFuel   = Math.min(1.0, this._sprintFuel + dt / 12.0);
      if (this._sprintLocked && this._sprintFuel >= 0.25) this._sprintLocked = false;
    }
    // Expose for HUD
    this.target.userData._aiBurst = { fuel: this._sprintFuel, active: this._sprintActive, locked: this._sprintLocked };
    var curSpd = (this._sprintActive ? this.sprintSpd : this.speed) * (this._colDamp || 1.0);
    pos.x += fwd.x * curSpd * dt;
    pos.z += fwd.z * curSpd * dt;
    pos.y = WATER_Y;
    if (!this._colDamp) this._colDamp = 1.0;
    this._colDamp = Math.min(1.0, this._colDamp + dt * 1.5);
    pos.x  = Math.max(-ARENA_BOUND, Math.min(ARENA_BOUND, pos.x));
    pos.z  = Math.max(-ARENA_BOUND, Math.min(ARENA_BOUND, pos.z));

    // Wake trail
    this._wakeCd -= dt;
    if (this._wakeCd <= 0) {
      this._wakeCd = this._sprintActive ? 0.08 : 0.2;
      this._spawnWake();
    }

    this.target.userData._cannonCd    = Math.max(0, this.fireCd);
    this.target.userData._cannonCdMax = this.fireCdMax;

    this._resolveCollisions(pos, dt);

    // Fire when cooldown expires — always reset so firing never stalls
    this.fireCd -= dt;
    if (this.fireCd <= 0 && this.game.scene.userData._matchStarted) {
      this.fireCd = this.fireCdMax;
      var right    = new THREE.Vector3(1, 0, 0).applyEuler(this.target.rotation);
      var toTarget = new THREE.Vector3(dx, 0, dz).normalize();
      var dot      = toTarget.dot(right);
      // Fire broadside if aligned, else fire toward nearest side
      var side = Math.abs(dot) > 0.15 ? (dot >= 0 ? 1 : -1) : (Math.random() < 0.5 ? 1 : -1);
      this._fire(side);
      this._fire(-side);
    }

    // Hazard push — every frame so ships can't pass through
    for (var hj = 0; hj < HAZARD_OBJECTS.length; hj++) {
      var hzo = HAZARD_OBJECTS[hj];
      var hpx = pos.x - hzo.x, hpz = pos.z - hzo.z;
      var hpd = Math.sqrt(hpx*hpx + hpz*hpz);
      if (hpd < hzo.r) {
        var hdd = hpd < 0.01 ? 0.01 : hpd;
        pos.x = hzo.x + (hpx/hdd) * (hzo.r + 0.5);
        pos.z = hzo.z + (hpz/hdd) * (hzo.r + 0.5);
        break;
      }
    }
    // Hazard damage — throttled to 0.5s
    this.islandCd -= dt;
    if (this.islandCd <= 0) {
      this.islandCd = 0.5;
      for (var hj2 = 0; hj2 < HAZARD_OBJECTS.length; hj2++) {
        var hz2 = HAZARD_OBJECTS[hj2];
        var hd2 = Math.sqrt(Math.pow(pos.x-hz2.x,2)+Math.pow(pos.z-hz2.z,2));
        if (hd2 < hz2.r && health) { health.takeDamage(hz2.dmg); break; }
      }
    }
  };

  this._spawnWake = function() {
    var scene = this.game.scene;
    if (!scene.userData._wake) scene.userData._wake = [];
    var fwd   = new THREE.Vector3(0, 0, 1).applyEuler(this.target.rotation);
    fwd.y = 0; fwd.normalize();
    var stern = this.target.position.clone().addScaledVector(fwd, -5);
    var drift = fwd.clone().multiplyScalar(-0.8);
    var burst = this._sprintActive;
    var r    = burst ? 2.0  : 1.1;
    var col  = burst ? 0xeef8ff : 0xd0f0ff;
    var opa  = burst ? 0.85 : 0.55;
    var life = burst ? 2.8  : 2.0;
    var geo = burst ? this._wakeGeoBurst : this._wakeGeoNorm;
    var m = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: opa }));
    m.position.set(stern.x, -0.22, stern.z);
    scene.add(m);
    scene.userData._wake.push({ mesh: m, life: life, maxLife: life, drift: drift });
    if (burst) {
      var gm = new THREE.Mesh(this._glowGeo, new THREE.MeshBasicMaterial({ color: 0x80d8ff, transparent: true, opacity: 0.45 }));
      gm.position.set(stern.x, 0.2, stern.z);
      scene.add(gm);
      scene.userData._wake.push({ mesh: gm, life: 0.18, maxLife: 0.18, drift: new THREE.Vector3(0,0,0) });
    }
  };


  this._resolveCollisions = function(pos, dt) {
    var COLLISION_R    = 4;   // damage + slow zone
    var MIN_SHIP_SEP   = 3;   // tight hard-stop (no big push)
    var MIN_ISLAND_SEP = ISLAND_DAMAGE_R + 4;
    var now            = Date.now();
    if (!this.target.userData._colCd) this.target.userData._colCd = {};

    var _rr = this._shipRefs || [];
    for (var s = 0; s < _rr.length; s++) {
      var other = _rr[s];
      if (!other.visible || other === this.target) continue;
      var ox = pos.x - other.position.x;
      var oz = pos.z - other.position.z;
      var d  = Math.sqrt(ox*ox + oz*oz);

      if (d < COLLISION_R) {
        // Slow this ship
        this._colDamp = 0.15;
        // Damage both ships once per second per pair
        var key    = other.uuid;
        var lastHit = this.target.userData._colCd[key] || 0;
        if (now - lastHit > 1200) {
          this.target.userData._colCd[key] = now;
          var myH = this.target.userData._shipHealth;
          var otH = other.userData._shipHealth;
          if (myH && !myH.isDead) myH.takeDamage(5, other.uuid);
          if (otH && !otH.isDead) otH.takeDamage(5, this.target.uuid);
          this._playCollisionSound();
        }
      }
      // Minimal hard stop — prevents full overlap but no big push
      if (d < MIN_SHIP_SEP && d > 0.01) {
        pos.x += (ox / d) * (MIN_SHIP_SEP - d) * 0.15;
        pos.z += (oz / d) * (MIN_SHIP_SEP - d) * 0.15;
      }
    }
    for (var i = 0; i < ISLAND_CENTERS.length; i++) {
      var c  = ISLAND_CENTERS[i];
      var ix = pos.x - c.x, iz = pos.z - c.z;
      var id = Math.sqrt(ix*ix + iz*iz);
      if (id < MIN_ISLAND_SEP && id > 0.01) {
        pos.x += (ix / id) * (MIN_ISLAND_SEP - id);
        pos.z += (iz / id) * (MIN_ISLAND_SEP - id);
      }
    }
    pos.x = Math.max(-ARENA_BOUND, Math.min(ARENA_BOUND, pos.x));
    pos.z = Math.max(-ARENA_BOUND, Math.min(ARENA_BOUND, pos.z));
  };

  this._playCannonBoom = function() {
    try {
      if (!window._pirateAudioCtx) return;
      var ctx = window._pirateAudioCtx;
      if (ctx.state === 'suspended') return;
      var now = ctx.currentTime;
      var osc = ctx.createOscillator();
      osc.frequency.setValueAtTime(70, now);
      osc.frequency.exponentialRampToValueAtTime(20, now + 0.35);
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.25, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(now); osc.stop(now + 0.4);
    } catch(e) {}
  };


  this._fire = function(side) {
    this._playCannonBoom();
    var right  = new THREE.Vector3(1, 0, 0).applyEuler(this.target.rotation);
    var origin = this.target.position.clone().addScaledVector(right, side * 3.5);
    origin.y   = 0;
    this._spawnMuzzleFlash(origin.clone(), right.clone().multiplyScalar(side));
    var vel = right.clone().multiplyScalar(side * 22);
    vel.y = 5;

    var ball = new THREE.Mesh(this._ballGeo, new THREE.MeshBasicMaterial({ color: 0x222222 }));
    ball.position.copy(origin);
    vel.y = 5;
    ball.userData = { _vel: vel, _life: 7.0, _owner: this.target.uuid, _smokeCd: 0 };
    this.game.scene.add(ball);
    if (!this.game.scene.userData._cannonballs) this.game.scene.userData._cannonballs = [];
    this.game.scene.userData._cannonballs.push(ball);
  };

  this._spawnMuzzleFlash = function(origin, fireDir) {
    var scene = this.game.scene;
    if (!scene.userData._cannonVFX) scene.userData._cannonVFX = [];
    var parts = [];
    var dir = fireDir ? fireDir.clone().normalize() : new THREE.Vector3(0,1,0);
    dir.y += 0.3; dir.normalize();
    var up = new THREE.Vector3(0,1,0);
    var u  = new THREE.Vector3().crossVectors(up, dir);
    if (u.lengthSq() < 0.001) u.set(1,0,0);
    u.normalize();
    var v = new THREE.Vector3().crossVectors(dir, u).normalize();
    for (var i = 0; i < 14; i++) {
      var theta = Math.random() * Math.PI / 5;
      var phi   = Math.random() * Math.PI * 2;
      var cDir  = u.clone().multiplyScalar(Math.sin(theta)*Math.cos(phi))
                    .addScaledVector(v, Math.sin(theta)*Math.sin(phi))
                    .addScaledVector(dir, Math.cos(theta)).normalize();
      var m = new THREE.Mesh(this._flashGeo,
        new THREE.MeshBasicMaterial({ color:0xffcc00, transparent:true, opacity:1 }));
      m.position.copy(origin); scene.add(m);
      parts.push({ mesh:m, type:'flash', vel:cDir.multiplyScalar(10+Math.random()*14) });
    }
    for (var j = 0; j < 6; j++) {
      var t2 = Math.random()*Math.PI/6, p2 = Math.random()*Math.PI*2;
      var sDir = u.clone().multiplyScalar(Math.sin(t2)*Math.cos(p2))
                   .addScaledVector(v, Math.sin(t2)*Math.sin(p2))
                   .addScaledVector(dir, Math.cos(t2)).normalize();
      var s = new THREE.Mesh(this._smokeGeo,
        new THREE.MeshBasicMaterial({ color:0x999999, transparent:true, opacity:0.75 }));
      s.position.set(origin.x+(Math.random()-0.5)*0.8, origin.y, origin.z+(Math.random()-0.5)*0.8);
      scene.add(s);
      parts.push({ mesh:s, type:'smoke', vel:sDir.multiplyScalar(3+Math.random()*3) });
    }
    scene.userData._cannonVFX.push({ parts:parts, life:1.4, maxLife:1.4 });
  };

  this._tickWakeSound = function(isActive) {
    if (!window._pirateAudioCtx) return;
    var ctx = window._pirateAudioCtx;
    var health = this.target.userData._shipHealth;
    var dead = health && health.isDead;
    if (dead || !isActive) { this._stopWakeSound(); return; }
    if (ctx.state === 'suspended') return;
    if (this._wakeNodes) return;
    try {
      var sr = ctx.sampleRate;
      var buf = ctx.createBuffer(1, sr * 2, sr);
      var d = buf.getChannelData(0);
      for (var i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      var fadeLen = Math.floor(sr * 0.02);
      for (var j = 0; j < fadeLen; j++) { d[j] *= j / fadeLen; d[d.length - 1 - j] *= j / fadeLen; }
      var src = ctx.createBufferSource();
      src.buffer = buf; src.loop = true;
      var lp = ctx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 200; lp.Q.value = 0.7;
      var g = ctx.createGain(); g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.04, ctx.currentTime + 1.2);
      src.connect(lp); lp.connect(g); g.connect(ctx.destination);
      src.start();
      this._wakeNodes = { src: src, g: g };
    } catch(e) {}
  };

  this._stopWakeSound = function() {
    if (!this._wakeNodes) return;
    var ctx = window._pirateAudioCtx;
    if (!ctx) { this._wakeNodes = null; return; }
    try {
      var now = ctx.currentTime;
      this._wakeNodes.g.gain.linearRampToValueAtTime(0, now + 0.5);
      var nodes = this._wakeNodes;
      this._wakeNodes = null;
      setTimeout(function() { try { nodes.src.stop(); } catch(e) {} }, 600);
    } catch(e) { this._wakeNodes = null; }
  };

  this._playCollisionSound = function() {
    try {
      if (!window._pirateAudioCtx) return;
      var ctx = window._pirateAudioCtx;
      if (ctx.state === 'suspended') return;
      var now = ctx.currentTime;
      var osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(55, now);
      osc.frequency.exponentialRampToValueAtTime(22, now + 0.25);
      var og = ctx.createGain();
      og.gain.setValueAtTime(0, now);
      og.gain.linearRampToValueAtTime(0.35, now + 0.008);
      og.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc.connect(og); og.connect(ctx.destination);
      osc.start(now); osc.stop(now + 0.3);
      var sr = ctx.sampleRate;
      var buf = ctx.createBuffer(1, Math.floor(sr * 0.18), sr);
      var d = buf.getChannelData(0);
      for (var i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      var ns = ctx.createBufferSource(); ns.buffer = buf;
      var bp = ctx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 450; bp.Q.value = 0.7;
      var ng = ctx.createGain();
      ng.gain.setValueAtTime(0, now);
      ng.gain.linearRampToValueAtTime(0.18, now + 0.005);
      ng.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
      ns.connect(bp); bp.connect(ng); ng.connect(ctx.destination);
      ns.start(now);
      var osc2 = ctx.createOscillator();
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(120, now + 0.02);
      osc2.frequency.exponentialRampToValueAtTime(60, now + 0.2);
      var og2 = ctx.createGain();
      og2.gain.setValueAtTime(0, now + 0.02);
      og2.gain.linearRampToValueAtTime(0.15, now + 0.03);
      og2.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
      osc2.connect(og2); og2.connect(ctx.destination);
      osc2.start(now + 0.02); osc2.stop(now + 0.25);
    } catch(e) {}
  };


  this.onReset = function() {
    this.fireCd        = Math.random() * 3.0;
    this.islandCd      = 0;
    this._colDamp      = 1.0;
    this._wakeCd       = 0;
    this._sprintFuel   = 1.0;
    this._sprintActive = false;
    this._sprintLocked = false;
    this._wantSprint   = false;
    this._sprintDecide = Math.random() * 3.0;
    this._prevMatchStarted = false;
    this._stopWakeSound();
  };

  this.dispose = function() {
    this._stopWakeSound();
    // Dispose pre-allocated shared geometries
    var geos = ['_wakeGeoNorm','_wakeGeoBurst','_glowGeo','_ballGeo','_flashGeo','_smokeGeo'];
    for (var i = 0; i < geos.length; i++) { if (this[geos[i]]) { this[geos[i]].dispose(); this[geos[i]] = null; } }
  };








