config:
  id: exported.aishipcontroller
  name: AIShipController
  description: "Enemy ship AI: pursues player, fires cannons broadside, avoids islands."
  version: 1.0.0
  author: ""
  isScript: true
  main: ""
  attributes: {}
  tags:
