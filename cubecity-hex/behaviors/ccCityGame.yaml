      if (t && t.building === "road") return true;
    }
    return false;
  }

  function canPlaceBuilding(x, z, buildingType) {
    let tile = getTile(x, z);
    if (!tile || tile.building) return false;
    if (FREE_BUILDING_TYPES.indexOf(buildingType) !== -1) return true;
    return hasRoadNeighbor(x, z);
  }

  function hasInteractionConfig(type, valueType) {
    let rules = BUILDING_INTERACTIONS[type];
    return !!(rules && rules.modifiers && rules.modifiers[valueType] && rules.modifiers[valueType].length);
  }

  function getEffectiveBuildingValue(x, z, valueType) {
    let tile = getTile(x, z);
    if (!tile || !tile.building || !tile.detail) return 0;
    let base = tile.detail[valueType];
    if (base === undefined) return 0;
    if (!hasInteractionConfig(tile.building, valueType)) return base;
    let rules = BUILDING_INTERACTIONS[tile.building].modifiers[valueType];
    let totalEffect = 0;
    for (let i = 0; i < rules.length; i += 1) {
      let rule = rules[i];
      if (rule.requireAll === false) {
        if (checkTargets(x, z, rule.targets, rule.range, false)) {
          totalEffect += rule.effect;
        }
      } else {
        let count = countTargetsInRange(x, z, rule.targets, rule.range);
        if (count > 0) {
          let effect = rule.effect;
          if (rule.stackable) {
            effect *= Math.min(count, rule.maxStacks || count);
          }
          totalEffect += effect;
        }
      }
    }
    let result = base * (1 + totalEffect);
    return Math.max(0, result);
  }

  function recomputeMetrics() {
    let metrics = {
      dailyIncome: 0,
      maxPopulation: 0,
      totalJobs: 0,
      population: 0,
      maxPower: 0,
      power: 0,
      buildingCount: 0,
      pollution: 0,
      hospitalCount: 0,
      policeCount: 0,
      fireStationCount: 0
    };
    for (let x = 0; x < GRID_SIZE; x += 1) {
      for (let z = 0; z < GRID_SIZE; z += 1) {
        let tile = state.metadata[x][z];
        if (!tile.building || !tile.detail) continue;
        if (tile.building !== "road") metrics.buildingCount += 1;
        metrics.dailyIncome += getEffectiveBuildingValue(x, z, "coinOutput");
        if (tile.detail.category === "residential" || tile.building === "house" || tile.building === "house2") {
          metrics.maxPopulation += getEffectiveBuildingValue(x, z, "maxPopulation");
        }
        metrics.totalJobs += tile.detail.population || 0;
        metrics.maxPower += getEffectiveBuildingValue(x, z, "powerOutput");
        metrics.power += tile.detail.powerUsage || 0;
        metrics.pollution += getEffectiveBuildingValue(x, z, "pollution");
        if (tile.building === "hospital") metrics.hospitalCount += 1;
        if (tile.building === "police") metrics.policeCount += 1;
        if (tile.building === "fire_station") metrics.fireStationCount += 1;
      }
    }
    metrics.population = Math.min(metrics.maxPopulation * 1.5, metrics.totalJobs);
    state.metrics = metrics;
    state.dirtyTop = true;
    state.dirtyFooter = true;
    state.dirtyDetails = true;
    state.dirtyMap = true;
  }

  function adjustedStabilityRate(base) {
    return base * STABILITY_CONFIG.UPDATE_INTERVAL;
  }

  function applyDayTick() {
    state.credits += state.metrics.dailyIncome;
    state.gameDay += 1;
    let changeRate = STABILITY_CONFIG.DEFAULT_STABILITY_CHANGE_RATE;
    let servicesCount = state.metrics.hospitalCount + state.metrics.policeCount + state.metrics.fireStationCount;
    changeRate += servicesCount * adjustedStabilityRate(STABILITY_CONFIG.SERVICE_STABILITY_PER_SECOND);

    let jobDeficit = state.metrics.totalJobs - state.metrics.maxPopulation;
    if (jobDeficit > 0 && state.metrics.maxPopulation > 0) {
      let unemploymentRatio = Number((jobDeficit / state.metrics.maxPopulation).toFixed(2));
      changeRate -= unemploymentRatio * adjustedStabilityRate(STABILITY_CONFIG.UNEMPLOYMENT_STABILITY_PENALTY);
    }

    if (state.metrics.pollution > STABILITY_CONFIG.POLLUTION_THRESHOLD) {
      let pollutionFactor = Math.pow(state.metrics.pollution / STABILITY_CONFIG.POLLUTION_THRESHOLD, 2);
      changeRate -= Number((pollutionFactor * adjustedStabilityRate(STABILITY_CONFIG.POLLUTION_STABILITY_PENALTY)).toFixed(2));
    }

    let powerDeficit = state.metrics.power - state.metrics.maxPower;
    if (powerDeficit > 0 && state.metrics.maxPower > 0) {
      let powerDeficitRatio = Number((powerDeficit / state.metrics.maxPower).toFixed(2));
      changeRate -= powerDeficitRatio * adjustedStabilityRate(STABILITY_CONFIG.POWER_DEFICIT_STABILITY_PENALTY);
    }

    if (!Number.isFinite(changeRate)) changeRate = 0;
    state.stabilityChangeRate = changeRate;
    state.stability = clamp(state.stability + state.stabilityChangeRate, 0, 100);
    state.dirtyTop = true;
    state.dirtyFooter = true;
    state.dirtyDetails = true;
  }

  function nextLevelFor(type, level) {
    let info = BUILDINGS[type];
    if (!info) return null;
    return info.levels[level + 1] ? level + 1 : null;
  }

  function selectedTile() {
    if (!state.selectedTileKey) return null;
    let parts = state.selectedTileKey.split(":");
    return {
      x: Number(parts[0]),
      z: Number(parts[1]),
      tile: getTile(Number(parts[0]), Number(parts[1]))
    };
  }

  function buildingStatusEffects(x, z) {
    let tile = getTile(x, z);
    if (!tile || !tile.building) return [];
    let effects = [];

    effects.push({
      active: !hasRoadNeighbor(x, z),
      effectType: "missRoad"
    });

    let rules = BUILDING_INTERACTIONS[tile.building];
    if (rules && rules.statusEffects) {
      for (let i = 0; i < rules.statusEffects.length; i += 1) {
        let status = rules.statusEffects[i];
        let hasTargets = checkTargets(x, z, status.targets, status.range, false);
        let active = status.inverse ? !hasTargets : hasTargets;
        if (active) effects.push({ active: true, effectType: status.effect.type });
      }
    }

    if (POWER_DEPENDENT_TYPES.indexOf(tile.building) !== -1 && state.metrics.power > state.metrics.maxPower) {
      effects.push({ active: true, effectType: "missPower" });
    }

    if ((tile.building === "house" || tile.building === "house2") && state.metrics.population > state.metrics.maxPopulation) {
      effects.push({ active: true, effectType: "overPopulation" });
    }

    if (tile.building === "sun_power") {
      effects.push({ active: true, effectType: "powerup" });
    }

    if (tile.building === "nuke_factory" && countTargetsInRange(x, z, ["house", "house2"], 3) > 2) {
      effects.push({ active: true, effectType: "overPopulation" });
    }

    if (state.currentMode === "select" && state.selectedTileKey === tileKey(x, z)) {
      if (nextLevelFor(tile.building, tile.level)) {
        effects.push({ active: true, effectType: "upgrade" });
      }
    }

    let seen = {};
    let unique = [];
    for (let j = 0; j < effects.length; j += 1) {
      let effectType = effects[j].effectType;
      if (!seen[effectType] && STATUS_EFFECT_TEXTURE[effectType]) {
        seen[effectType] = true;
        unique.push(effectType);
      }
    }
    return unique;
  }

  function resolveModelAssetName(type, level, roadVariant) {
    if (type === "road") {
      return BUILDING_ASSETS["road_" + roadVariant];
    }
    return BUILDING_ASSETS[type + "_" + level] || null;
  }

  function roadVariantFor(x, z) {
    let top = getTile(x, z - 1) && getTile(x, z - 1).building === "road";
    let bottom = getTile(x, z + 1) && getTile(x, z + 1).building === "road";
    let left = getTile(x - 1, z) && getTile(x - 1, z).building === "road";
    let right = getTile(x + 1, z) && getTile(x + 1, z).building === "road";
    if (top && bottom && left && right) return { variant: "cross", rotationY: 0 };
    if (!top && bottom && left && right) return { variant: "t", rotationY: 0 };
    if (top && !bottom && left && right) return { variant: "t", rotationY: Math.PI };
    if (top && bottom && !left && right) return { variant: "t", rotationY: Math.PI * 0.5 };
    if (top && bottom && left && !right) return { variant: "t", rotationY: Math.PI * 1.5 };
    if (top && !bottom && left && !right) return { variant: "bend", rotationY: Math.PI };
    if (top && !bottom && !left && right) return { variant: "bend", rotationY: Math.PI * 0.5 };
    if (!top && bottom && left && !right) return { variant: "bend", rotationY: Math.PI * 1.5 };
    if (!top && bottom && !left && right) return { variant: "bend", rotationY: 0 };
    if (!top && !bottom && left && right) return { variant: "straight", rotationY: Math.PI * 0.5 };
    return { variant: "straight", rotationY: 0 };
  }

  function placeholderColor(type) {
    let info = BUILDINGS[type];
    if (!info) return 0x94a3b8;
    if (info.category === "residential") return 0x7dd3fc;
    if (info.category === "commercial") return 0xfacc15;
    if (info.category === "industrial") return 0xfb7185;
    if (info.category === "infrastructure") return 0xc084fc;
    if (info.category === "social") return 0x4ade80;
    return 0xe5e7eb;
  }

  function createPlaceholderMesh(type) {
    let geo = type === "road"
      ? new THREE.BoxGeometry(0.96, 0.04, 0.96)
      : new THREE.BoxGeometry(0.72, 0.6, 0.72);
    let mat = new THREE.MeshStandardNodeMaterial({
      color: placeholderColor(type),
      roughness: 0.75,
      metalness: 0.05
    });
    let mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = type === "road" ? 0.03 : 0.3;
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    return markRuntimeOnly(mesh);
  }

  async function findModelRef(assetName) {
    if (!assetName) return null;
    if (assetRefCache[assetName]) return assetRefCache[assetName];
    let promise = erth.asset.model.findByName(assetName).then(function(ref) {
      return ref || null;
    });
    assetRefCache[assetName] = promise;
    return promise;
  }

  async function findIconTexture(assetName) {
    if (!assetName) return null;
    if (imageTextureCache[assetName]) return imageTextureCache[assetName];
    let promise = erth.asset.image.findByName(assetName).then(function(ref) {
      if (!ref) return null;
      return erth.asset.image.createTexture(ref).then(function(texture) {
        texture.colorSpace = THREE.SRGBColorSpace;
        return texture;
      });
    });
    imageTextureCache[assetName] = promise;
    return promise;
  }

  function unwrapModelInstance(instance) {
    if (!instance) return null;
    // erth.asset.model.createInstance() resolves to a GameObject wrapper whose
    // raw THREE.Object3D lives at _internal.three. We need the real Object3D so
    // we can add() it to a group and traverse()/transform it; the wrapper itself
    // is not a THREE.Object3D (its .rotation is a Quaternion, it has no .add).
    if (instance._internal && instance._internal.three) return instance._internal.three;
    if (instance.target) return instance.target; // legacy this.target shape
    if (instance.isObject3D) return instance;     // already a raw Object3D
    return instance;
  }

  function disposeObject3D(obj) {
    if (!obj) return;
    obj.traverse(function(child) {
      if (child.geometry && child.geometry.dispose) child.geometry.dispose();
      if (Array.isArray(child.material)) {
        for (let i = 0; i < child.material.length; i += 1) {
          if (child.material[i] && child.material[i].dispose) child.material[i].dispose();
        }
      } else if (child.material && child.material.dispose) {
        child.material.dispose();
      }
    });
    if (obj.parent) obj.parent.remove(obj);
  }

  function createTileVisual(x, z) {
    let group = markRuntimeOnly(new THREE.Group());
    let pos = tileWorldPosition(x, z);
    group.position.copy(pos);
    group.name = "Tile-" + x + "-" + z;

    let grassMat = new THREE.MeshStandardNodeMaterial({
      color: COLORS.grass,
      roughness: 0.92,
      metalness: 0.02
    });
    let grassGeo = new THREE.BoxGeometry(0.98, 0.18, 0.98);
    let grass = new THREE.Mesh(grassGeo, grassMat);
    grass.position.y = 0.09;
    grass.userData.tileKey = tileKey(x, z);
    grass.receiveShadow = true;
    grass.castShadow = true;
    markRuntimeOnly(grass);

    let groundMat = new THREE.MeshStandardNodeMaterial({
      color: COLORS.ground,
      roughness: 0.9,
      metalness: 0.02
    });
    let groundGeo = new THREE.BoxGeometry(0.96, 0.04, 0.96);
    let ground = new THREE.Mesh(groundGeo, groundMat);
    ground.position.y = 0.2;
    ground.visible = false; // @check-ok three mesh
    ground.userData.tileKey = tileKey(x, z);
    ground.receiveShadow = true;
    ground.castShadow = true;
    markRuntimeOnly(ground);

    let buildingRootLocal = markRuntimeOnly(new THREE.Group());
    let statusRootLocal = markRuntimeOnly(new THREE.Group());
    group.add(grass);
    group.add(ground);
    group.add(buildingRootLocal);
    group.add(statusRootLocal);

    gridRoot.add(group);

    let visual = {
      x: x,
      z: z,
      key: tileKey(x, z),
      group: group,
      grass: grass,
      ground: ground,
      buildingRoot: buildingRootLocal,
      statusRoot: statusRootLocal,
      buildingObject: null,
      placeholder: null,
      statusPlane: null,
      signature: "",
      pendingToken: 0,
      statusList: [],
      statusIndex: 0,
      statusTimer: 0
    };
    tileVisualMap[visual.key] = visual;
    tileVisuals.push(visual);
    return visual;
  }

  function buildGridVisuals(parentTarget) {
    tileVisuals = [];
    tileVisualMap = {};
    worldRoot = markRuntimeOnly(new THREE.Group());
    worldRoot.name = "CubeCityRuntime";
    gridRoot = markRuntimeOnly(new THREE.Group());
    tileLineRoot = markRuntimeOnly(new THREE.Group());
    worldRoot.add(gridRoot);
    worldRoot.add(tileLineRoot);
    parentTarget.add(worldRoot);

    for (let x = 0; x < GRID_SIZE; x += 1) {
      for (let z = 0; z < GRID_SIZE; z += 1) {
        createTileVisual(x, z);
      }
    }
    buildTileLines();
    refreshAllTileVisuals(true);
  }

  function buildTileLines() {
    let mat = new THREE.LineBasicNodeMaterial({ color: COLORS.line, transparent: true, opacity: 0.35 });
    for (let i = 0; i <= GRID_SIZE; i += 1) {
      let offset = (i - HALF_GRID - 0.5) * TILE_SIZE;
      let pointsA = [
        new THREE.Vector3(-HALF_GRID - 0.5, 0.205, offset),
        new THREE.Vector3(HALF_GRID + 0.5, 0.205, offset)
      ];
      let pointsB = [
        new THREE.Vector3(offset, 0.205, -HALF_GRID - 0.5),
        new THREE.Vector3(offset, 0.205, HALF_GRID + 0.5)
      ];
      let geoA = new THREE.BufferGeometry().setFromPoints(pointsA);
      let geoB = new THREE.BufferGeometry().setFromPoints(pointsB);
      let lineA = markRuntimeOnly(new THREE.Line(geoA, mat.clone()));
      let lineB = markRuntimeOnly(new THREE.Line(geoB, mat.clone()));
      tileLineRoot.add(lineA);
      tileLineRoot.add(lineB);
    }
  }

  function visualSignature(x, z) {
    let tile = getTile(x, z);
    if (!tile) return "";
    if (!tile.building) return tile.type;
    if (tile.building === "road") {
      let road = roadVariantFor(x, z);
      return tile.building + ":" + road.variant + ":" + road.rotationY;
    }
    return tile.building + ":" + tile.level + ":" + tile.direction + ":" + tile.type;
  }

  function applyModelTransform(obj, type, level, direction, roadVariant) {
    if (!obj) return;
    obj.position.set(0, 0.01, 0);
    let rotY = 0;
    let scale = type === "road" ? 0.98 : 0.8;
    if (type === "road") {
      rotY = roadVariant.rotationY;
      obj.position.y = 0.02;
    } else {
      rotY = (direction % 4) * (Math.PI * 0.5);
    }
    obj.scale.setScalar(scale);
    obj.rotation.y = rotY;
    obj.traverse(function(child) {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
  }

  function clearTileBuildingVisual(visual) {
    if (visual.buildingObject) {
      disposeObject3D(visual.buildingObject);
      visual.buildingObject = null;
    }
    if (visual.placeholder) {
      disposeObject3D(visual.placeholder);
      visual.placeholder = null;
    }
  }

  function ensureTileBuildingVisual(visual) {
    let tile = getTile(visual.x, visual.z);
    let sig = visualSignature(visual.x, visual.z);
    if (sig === visual.signature) return;
    visual.signature = sig;
    clearTileBuildingVisual(visual);
    visual.statusList = [];
    visual.statusIndex = 0;
    visual.statusTimer = 0;
    updateStatusPlane(visual, true);

    if (!tile.building) {
      visual.ground.visible = tile.type === "ground"; // @check-ok three mesh
      return;
    }

    visual.ground.visible = true; // @check-ok three mesh
    let placeholder = createPlaceholderMesh(tile.building);
    visual.placeholder = placeholder;
    visual.buildingRoot.add(placeholder);

    let roadVariant = tile.building === "road" ? roadVariantFor(visual.x, visual.z) : null;
    applyModelTransform(placeholder, tile.building, tile.level, tile.direction, roadVariant || { rotationY: 0 });

    let assetName = resolveModelAssetName(tile.building, tile.level, roadVariant ? roadVariant.variant : null);
    let token = visual.pendingToken + 1;
    visual.pendingToken = token;

    findModelRef(assetName).then(function(ref) {
      if (!ref) return null;
      return erth.asset.model.createInstance(ref);
    }).then(function(instance) {
      if (!instance) return;
      if (visual.pendingToken !== token) return;
      let raw = unwrapModelInstance(instance);
      if (!raw) return;
      if (!getTile(visual.x, visual.z) || getTile(visual.x, visual.z).building !== tile.building || getTile(visual.x, visual.z).level !== tile.level) return;
      raw = markRuntimeOnly(raw);
      clearTileBuildingVisual(visual);
      visual.buildingObject = raw;
      visual.buildingRoot.add(raw);
      applyModelTransform(raw, tile.building, tile.level, tile.direction, roadVariant || { rotationY: 0 });
    });
  }

  function refreshAllTileVisuals(forceHighlight) {
    for (let i = 0; i < tileVisuals.length; i += 1) {
      ensureTileBuildingVisual(tileVisuals[i]);
    }
    if (forceHighlight) updateAllTileHighlights();
  }

  function highlightColorForVisual(visual) {
    if (state.selectedTileKey === visual.key) {
      if (state.currentMode === "relocate") return COLORS.relocate;
      if (state.currentMode === "demolish") return COLORS.demolish;
      return COLORS.select;
    }
    if (state.hoveredTileKey === visual.key) {
      if (state.currentMode === "build") {
        return canPlaceBuilding(visual.x, visual.z, state.selectedPalette) ? COLORS.build : COLORS.invalid;
      }
      if (state.currentMode === "relocate") return COLORS.relocate;
      if (state.currentMode === "demolish") return COLORS.demolish;
      return COLORS.select;
    }
    return 0;
  }

  function updateTileHighlight(visual) {
    let color = highlightColorForVisual(visual);
    let intensity = color ? 0.6 : 0;
    visual.grass.material.emissive.setHex(color || 0x000000);
    visual.grass.material.emissiveIntensity = intensity;
    visual.ground.material.emissive.setHex(color || 0x000000);
    visual.ground.material.emissiveIntensity = intensity;
  }

  function updateAllTileHighlights() {
    for (let i = 0; i < tileVisuals.length; i += 1) {
      updateTileHighlight(tileVisuals[i]);
    }
  }

  function updateStatusPlane(visual, immediate) {
    if (visual.statusPlane && visual.statusPlane.parent) {
      visual.statusPlane.parent.remove(visual.statusPlane);
      if (visual.statusPlane.geometry) visual.statusPlane.geometry.dispose();
      if (visual.statusPlane.material) visual.statusPlane.material.dispose();
      visual.statusPlane = null;
    }
    if (!visual.statusList.length) return;
    let effectType = visual.statusList[visual.statusIndex % visual.statusList.length];
    let assetName = STATUS_EFFECT_TEXTURE[effectType];
    let mat = new THREE.MeshBasicNodeMaterial({
      transparent: true,
      opacity: 0.95,
      side: THREE.DoubleSide
    });
    let geo = new THREE.PlaneGeometry(0.62, 0.62);
    let mesh = markRuntimeOnly(new THREE.Mesh(geo, mat));
    mesh.position.set(0, 1.05, 0);
    visual.statusRoot.add(mesh);
    visual.statusPlane = mesh;
    findIconTexture(assetName).then(function(texture) {
      if (!visual.statusPlane || visual.statusPlane !== mesh) return;
      mesh.material.map = texture;
      mesh.material.needsUpdate = true;
    });
  }

  function updateStatuses(deltaTime) {
    for (let i = 0; i < tileVisuals.length; i += 1) {
      let visual = tileVisuals[i];
      let tile = getTile(visual.x, visual.z);
      if (!tile || !tile.building) {
        if (visual.statusList.length) {
          visual.statusList = [];
          visual.statusIndex = 0;
          visual.statusTimer = 0;
          updateStatusPlane(visual, true);
        }
        continue;
      }
      let nextList = buildingStatusEffects(visual.x, visual.z);
      let changed = nextList.join("|") !== visual.statusList.join("|");
      if (changed) {
        visual.statusList = nextList;
        visual.statusIndex = 0;
        visual.statusTimer = 0;
        updateStatusPlane(visual, true);
      } else if (visual.statusList.length > 1) {
        visual.statusTimer += deltaTime;
        if (visual.statusTimer >= STATUS_ROTATE_SECONDS) {
          visual.statusTimer = 0;
          visual.statusIndex = (visual.statusIndex + 1) % visual.statusList.length;
          updateStatusPlane(visual, false);
        }
      }
      if (visual.statusPlane && game && game.camera) {
        visual.statusPlane.lookAt(game.camera.position);
      }
    }
  }

  function buildEditorPreview(parentTarget) {
    previewRoot = markRuntimeOnly(new THREE.Group());
    for (let x = 0; x < GRID_SIZE; x += 1) {
      for (let z = 0; z < GRID_SIZE; z += 1) {
        let pos = tileWorldPosition(x, z);
        let geo = new THREE.BoxGeometry(0.98, 0.1, 0.98);
        let mat = new THREE.MeshStandardNodeMaterial({
          color: (x + z) % 2 === 0 ? 0x7fb76a : 0x8bc57a,
          roughness: 0.95,
          metalness: 0
        });
        let mesh = markRuntimeOnly(new THREE.Mesh(geo, mat));
        mesh.position.copy(pos);
        mesh.position.y = 0.05;
        previewRoot.add(mesh);
      }
    }
    parentTarget.add(previewRoot);
  }

  function cleanupPreview() {
    if (previewRoot) {
      disposeObject3D(previewRoot);
      previewRoot = null;
    }
  }

  function createUIButton(text, width, onClick, accent) {
    let btn = new UIKit.Container(useNodeMaterialProps({
      width: width || 120,
      height: 34,
      backgroundColor: accent ? "rgba(255,209,102,0.18)" : "rgba(255,255,255,0.08)",
      borderRadius: 8,
      borderWidth: 1,
      borderColor: accent ? "rgba(255,209,102,0.65)" : "rgba(255,255,255,0.14)",
      justifyContent: "center",
      alignItems: "center",
      pointerEvents: "auto",
      cursor: "pointer",
      visibility: "visible",
      onClick: function() {
        consumeUIClick();
        if (onClick) onClick();
      }
    }));
    let label = new UIKit.Text(useNodeMaterialProps({
      text: text,
      fontSize: 13,
      color: accent ? COLORS.accent : COLORS.neutralText,
      fontWeight: "bold", visibility: "visible"
    }));
    btn.add(label);
    btn._label = label;
    return btn;
  }

  function clearUIChildren(node) {
    if (!node || !node.children) return;
    while (node.children.length) {
      node.remove(node.children[0]);
    }
  }

  function buildUI() {
    let renderer = game && game.renderer ? game.renderer : null;
    if (!renderer) return;
    ui.fullscreen = new UIKit.Fullscreen(renderer, useNodeMaterialProps({
      pointerEvents: "none",
      justifyContent: "flex-start",
      alignItems: "stretch", visibility: "visible"
    }));
    UIKitPointerEvents.initialize(game);

    ui.topBar = new UIKit.Container(useNodeMaterialProps({
      flexDirection: "row",
      justifyContent: "space-between",
      alignItems: "flex-start",
      padding: 14,
      pointerEvents: "none", visibility: "visible"
    }));

    let leftStats = new UIKit.Container(useNodeMaterialProps({
