  function rebuildPalettePanel() {
    if (!ui.leftPanel) return;
    clearUIChildren(ui.leftPanel);

    let title = new UIKit.Text(useNodeMaterialProps({
      text: "Build Palette",
      fontSize: 20,
      color: COLORS.accent,
      fontWeight: "bold", visibility: "visible"
    }));
    ui.leftPanel.add(title);

    let modeRow = new UIKit.Container(useNodeMaterialProps({
      flexDirection: "column",
      gap: 6,
      pointerEvents: "auto", visibility: "visible"
    }));
    for (let i = 0; i < MODES.length; i += 1) {
      let mode = MODES[i];
      let accent = state.currentMode === mode;
      let button = createUIButton(labelForMode(mode), 196, function() {
        state.currentMode = mode;
        if (mode !== "relocate") state.relocateFromKey = null;
        state.selectedTileKey = null;
        state.dirtyPalette = true;
        state.dirtyDetails = true;
        updateAllTileHighlights();
      }, accent);
      modeRow.add(button);
    }
    ui.leftPanel.add(modeRow);

    let rotateButton = createUIButton("Rotate +90", 196, function() {
      state.placementDirection = (state.placementDirection + 1) % 4;
      state.dirtyDetails = true;
    }, false);
    ui.leftPanel.add(rotateButton);

    for (let c = 0; c < CATEGORY_ORDER.length; c += 1) {
      let category = CATEGORY_ORDER[c];
      let sectionLabel = new UIKit.Text(useNodeMaterialProps({
        text: labelForCategory(category),
        fontSize: 14,
        color: COLORS.neutralText,
        fontWeight: "bold", visibility: "visible"
      }));
      ui.leftPanel.add(sectionLabel);
      let grid = new UIKit.Container(useNodeMaterialProps({
        flexDirection: "row",
        flexWrap: "wrap",
        gap: 6,
        pointerEvents: "auto", visibility: "visible"
      }));
      for (let key in BUILDINGS) {
        let info = BUILDINGS[key];
        if (!info.visible || info.category !== category) continue;
        let selected = state.selectedPalette === key;
        let btn = createUIButton(getBuildingName(key), 94, function() {
          state.selectedPalette = key;
          state.currentMode = "build";
          state.dirtyPalette = true;
          state.dirtyDetails = true;
          updateAllTileHighlights();
        }, selected);
        grid.add(btn);
      }
      ui.leftPanel.add(grid);
    }
    state.dirtyPalette = false;
  }

  function appendDetailLine(parent, text, accent) {
    parent.add(new UIKit.Text(useNodeMaterialProps({
      text: text,
      fontSize: 14,
      color: accent ? COLORS.accent : COLORS.neutralText, visibility: "visible"
    })));
  }

  function rebuildDetailsPanel() {
    if (!ui.rightPanel) return;
    clearUIChildren(ui.rightPanel);
    let title = new UIKit.Text(useNodeMaterialProps({
      text: "Details",
      fontSize: 20,
      color: COLORS.accent,
      fontWeight: "bold", visibility: "visible"
    }));
    ui.rightPanel.add(title);

    let selected = selectedTile();
    if (!selected || !selected.tile || !selected.tile.building) {
      appendDetailLine(ui.rightPanel, "Mode: " + labelForMode(state.currentMode), true);
      if (state.currentMode === "build") {
        let info = BUILDINGS[state.selectedPalette];
        let lvl = info.levels[1];
        appendDetailLine(ui.rightPanel, "Selected: " + getBuildingName(state.selectedPalette), false);
        appendDetailLine(ui.rightPanel, "Cost: " + formatNumber(lvl.cost || 0), false);
        appendDetailLine(ui.rightPanel, "Rotate: " + String(state.placementDirection * 90) + " deg", false);
        appendDetailLine(ui.rightPanel, "Road rule: " + (FREE_BUILDING_TYPES.indexOf(state.selectedPalette) !== -1 ? "free" : "adjacent road"), false);
      } else if (state.currentMode === "relocate" && state.relocateFromKey) {
        appendDetailLine(ui.rightPanel, "Select an empty destination tile.", false);
      } else {
        appendDetailLine(ui.rightPanel, "Select a building tile to inspect it.", false);
      }
      state.dirtyDetails = false;
      return;
    }

    let tile = selected.tile;
    let info = BUILDINGS[tile.building];
    let levelData = tile.detail || getBuildingData(tile.building, tile.level);
    appendDetailLine(ui.rightPanel, "Tile: " + selected.x + ", " + selected.z, false);
    appendDetailLine(ui.rightPanel, "Building: " + getBuildingName(tile.building), true);
    appendDetailLine(ui.rightPanel, "Level: " + String(tile.level), false);
    appendDetailLine(ui.rightPanel, "Rotation: " + String(tile.direction * 90) + " deg", false);
    appendDetailLine(ui.rightPanel, "Cost: " + formatNumber(levelData.cost || 0), false);
    appendDetailLine(ui.rightPanel, "Income: " + formatNumber(getEffectiveBuildingValue(selected.x, selected.z, "coinOutput")), false);
    appendDetailLine(ui.rightPanel, "Jobs: " + formatNumber(levelData.population || 0), false);
    appendDetailLine(ui.rightPanel, "Pop Cap: " + formatNumber(getEffectiveBuildingValue(selected.x, selected.z, "maxPopulation")), false);
    appendDetailLine(ui.rightPanel, "Power Use: " + formatNumber(levelData.powerUsage || 0), false);
    appendDetailLine(ui.rightPanel, "Power Out: " + formatNumber(getEffectiveBuildingValue(selected.x, selected.z, "powerOutput")), false);
    appendDetailLine(ui.rightPanel, "Pollution: " + formatNumber(getEffectiveBuildingValue(selected.x, selected.z, "pollution")), false);

    let buttonRow = new UIKit.Container(useNodeMaterialProps({
      flexDirection: "row",
      flexWrap: "wrap",
      gap: 6,
      pointerEvents: "auto", visibility: "visible"
    }));
    if (nextLevelFor(tile.building, tile.level)) {
      buttonRow.add(createUIButton("Upgrade", 90, function() {
        performUpgrade(selected.x, selected.z);
      }, true));
    }
    buttonRow.add(createUIButton("Demolish", 94, function() {
      performDemolish(selected.x, selected.z);
    }, false));
    if (tile.building !== "road") {
      buttonRow.add(createUIButton("Rotate", 86, function() {
        tile.direction = (tile.direction + 1) % 4;
        state.metadataVersion += 1;
        refreshAllTileVisuals(true);
        state.dirtyDetails = true;
      }, false));
    }
    ui.rightPanel.add(buttonRow);
    state.dirtyDetails = false;
  }

  function buildMapCell(tile) {
    let bg = "rgba(100,116,139,0.5)";
    let label = ".";
    if (tile.building) {
      label = BUILDINGS[tile.building] ? BUILDINGS[tile.building].shortLabel : "?";
      bg = "rgba(226,232,240,0.82)";
      if (tile.building === "road") bg = "rgba(245,158,11,0.92)";
    } else if (tile.type === "ground") {
      label = "_";
      bg = "rgba(196,181,153,0.82)";
    } else {
      bg = "rgba(132,204,22,0.78)";
    }
    let cell = new UIKit.Container(useNodeMaterialProps({
      width: 16,
      height: 16,
      backgroundColor: bg,
      justifyContent: "center",
      alignItems: "center",
      borderRadius: 2, visibility: "visible"
    }));
    cell.add(new UIKit.Text(useNodeMaterialProps({
      text: label,
      fontSize: 8,
      color: "#0f172a",
      fontWeight: "bold", visibility: "visible"
    })));
    return cell;
  }

  function rebuildMapOverlay() {
    if (!ui.mapOverlay) return;
    clearUIChildren(ui.mapOverlay);
    ui.mapOverlay.setProperties({ display: state.showMap ? 'flex' : 'none' });
    if (!state.showMap) {
      state.dirtyMap = false;
      return;
    }
    let card = new UIKit.Container(useNodeMaterialProps({
      width: 420,
      backgroundColor: COLORS.panel,
      borderRadius: 16,
      padding: 20,
      flexDirection: "column",
      gap: 10,
      pointerEvents: "auto", visibility: "visible"
    }));
    card.add(new UIKit.Text(useNodeMaterialProps({
      text: "Map Overview",
      fontSize: 24,
      color: COLORS.accent,
      fontWeight: "bold", visibility: "visible"
    })));
    let closeButton = createUIButton("Close Map", 120, function() {
      state.showMap = false;
      state.dirtyMap = true;
    }, false);
    card.add(closeButton);
    let gridWrap = new UIKit.Container(useNodeMaterialProps({
      flexDirection: "column",
      gap: 2, visibility: "visible"
    }));
    for (let z = 0; z < GRID_SIZE; z += 1) {
      let row = new UIKit.Container(useNodeMaterialProps({
        flexDirection: "row",
        gap: 2, visibility: "visible"
      }));
      for (let x = 0; x < GRID_SIZE; x += 1) {
        row.add(buildMapCell(getTile(x, z)));
      }
      gridWrap.add(row);
    }
    card.add(gridWrap);
    ui.mapOverlay.add(card);
    state.dirtyMap = false;
  }

  function rebuildToastLayer() {
    if (!ui.toastLayer) return;
    clearUIChildren(ui.toastLayer);
    for (let i = 0; i < state.toasts.length; i += 1) {
      let toast = state.toasts[i];
      let bg = "rgba(255,255,255,0.08)";
      if (toast.type === "error") bg = "rgba(239,68,68,0.22)";
      if (toast.type === "success") bg = "rgba(34,197,94,0.22)";
      let card = new UIKit.Container(useNodeMaterialProps({
        maxWidth: 300,
        backgroundColor: bg,
        borderRadius: 10,
        padding: 10, visibility: "visible"
      }));
      card.add(new UIKit.Text(useNodeMaterialProps({
        text: toast.text,
        fontSize: 13,
        color: COLORS.neutralText, visibility: "visible"
      })));
      ui.toastLayer.add(card);
    }
    state.dirtyToasts = false;
  }

  function refreshTopBar() {
    if (!ui.creditsText) return;
    let popWarn = state.metrics.totalJobs > state.metrics.maxPopulation;
    let powerWarn = state.metrics.power > state.metrics.maxPower;
    ui.creditsText.setProperties({ text: "Credits " + formatNumber(state.credits) });
    ui.populationText.setProperties({
      text: "Jobs " + formatNumber(state.metrics.totalJobs) + " / " + formatNumber(state.metrics.maxPopulation),
      color: popWarn ? "#fca5a5" : COLORS.neutralText
    });
    ui.territoryText.setProperties({ text: "Territory " + state.territory + "x" + state.citySize });
    ui.powerText.setProperties({
      text: "Power " + formatNumber(state.metrics.power) + " / " + formatNumber(state.metrics.maxPower),
      color: powerWarn ? "#fca5a5" : COLORS.neutralText
    });
    ui.cityTitle.setProperties({ text: state.cityName });
    ui.dayText.setProperties({ text: "Level " + state.cityLevel + "  Day " + state.gameDay });
    ui.langButton._label.setProperties({ text: state.language === "en" ? "EN" : "ZH" });
    ui.musicButton._label.setProperties({ text: state.musicEnabled ? "Music On" : "Music Off" });
    ui.mapButton._label.setProperties({ text: state.showMap ? "Hide Map" : "Map" });
    ui.guideButton._label.setProperties({ text: state.showGuide ? "Hide Guide" : "Guide" });
    // display (not visibility): a hidden full-screen overlay with
    // pointerEvents:"auto" still raycast-blocks the HUD buttons under
    // visibility:"hidden". refreshTopBar runs on every dirty-top frame, so this
    // is the path that was re-introducing the click-blocker after "Start City".
    ui.guideOverlay.setProperties({ display: state.showGuide ? 'flex' : 'none' });
    state.dirtyTop = false;
  }

  function refreshFooter() {
    if (!ui.footerBuildings) return;
    ui.footerBuildings.setProperties({ text: "Buildings " + formatNumber(state.metrics.buildingCount) });
    ui.footerIncome.setProperties({ text: "Income +" + formatNumber(state.metrics.dailyIncome) });
    ui.footerPollution.setProperties({
      text: "Pollution " + formatNumber(state.metrics.pollution),
      color: state.metrics.pollution > 100 ? "#fca5a5" : COLORS.neutralText
    });
    ui.footerStability.setProperties({
      text: "Stability " + formatNumber(state.stability) + "%",
      color: state.stability < 40 ? "#fca5a5" : COLORS.neutralText
    });
    state.dirtyFooter = false;
  }

  function updateUI(deltaTime) {
    if (state.dirtyPalette) rebuildPalettePanel();
    if (state.dirtyDetails) rebuildDetailsPanel();
    if (state.dirtyMap) rebuildMapOverlay();
    if (state.dirtyToasts) rebuildToastLayer();
    if (state.dirtyTop) refreshTopBar();
    if (state.dirtyFooter) refreshFooter();
    if (ui.fullscreen) UIKitPointerEvents.update(deltaTime);
    for (let i = state.toasts.length - 1; i >= 0; i -= 1) {
      state.toasts[i].ttl -= deltaTime;
      if (state.toasts[i].ttl <= 0) {
        state.toasts.splice(i, 1);
        state.dirtyToasts = true;
      }
    }
  }

  function selectedVisual() {
    return state.selectedTileKey ? tileVisualMap[state.selectedTileKey] : null;
  }

  function performBuild(x, z) {
    let buildingType = state.selectedPalette;
    let tile = getTile(x, z);
    let levelData = getBuildingData(buildingType, 1);
    if (!buildingType || !tile || tile.building) return;
    if (!canPlaceBuilding(x, z, buildingType)) {
      addToast("Build a road first or choose a free-placement building.", "error");
      return;
    }
    if (state.credits < (levelData.cost || 0)) {
      addToast("Insufficient funds.", "error");
      return;
    }
    tile.type = "ground";
    tile.building = buildingType;
    tile.level = 1;
    tile.direction = state.placementDirection;
    tile.detail = Object.assign({ category: BUILDINGS[buildingType].category }, levelData);
    state.credits -= levelData.cost || 0;
    state.metadataVersion += 1;
    recomputeMetrics();
    refreshAllTileVisuals(true);
    addToast(getBuildingName(buildingType) + " placed at " + x + ", " + z + ".", "success");
  }

  function performDemolish(x, z) {
    let tile = getTile(x, z);
    if (!tile) return;
    if (!tile.building) {
      tile.type = "grass";
      state.metadataVersion += 1;
      refreshAllTileVisuals(true);
      return;
    }
    let buildingName = getBuildingName(tile.building);
    tile.type = "ground";
    tile.building = null;
    tile.level = 0;
    tile.direction = 0;
    tile.detail = null;
    state.metadataVersion += 1;
    state.selectedTileKey = null;
    state.relocateFromKey = null;
    recomputeMetrics();
    refreshAllTileVisuals(true);
    addToast(buildingName + " removed.", "error");
  }

  function performUpgrade(x, z) {
    let tile = getTile(x, z);
    if (!tile || !tile.building) return;
    let nextLevel = nextLevelFor(tile.building, tile.level);
    if (!nextLevel) {
      addToast("This building is already at max level.", "error");
      return;
    }
    tile.level = nextLevel;
    tile.detail = Object.assign({ category: BUILDINGS[tile.building].category }, getBuildingData(tile.building, nextLevel));
    state.metadataVersion += 1;
    recomputeMetrics();
    refreshAllTileVisuals(true);
    state.dirtyDetails = true;
    addToast(getBuildingName(tile.building) + " upgraded to level " + nextLevel + ".", "success");
  }

  function performRelocate(srcKey, dstX, dstZ) {
    let parts = srcKey.split(":");
    let srcX = Number(parts[0]);
    let srcZ = Number(parts[1]);
    let srcTile = getTile(srcX, srcZ);
    let dstTile = getTile(dstX, dstZ);
    if (!srcTile || !srcTile.building || !dstTile || dstTile.building) return;
    if (!canPlaceBuilding(dstX, dstZ, srcTile.building)) {
      addToast("Cannot relocate to that tile.", "error");
      return;
    }
    dstTile.type = "ground";
    dstTile.building = srcTile.building;
    dstTile.level = srcTile.level;
    dstTile.direction = state.placementDirection;
    dstTile.detail = Object.assign({}, srcTile.detail);
    srcTile.type = "ground";
    srcTile.building = null;
    srcTile.level = 0;
    srcTile.direction = 0;
    srcTile.detail = null;
    state.selectedTileKey = tileKey(dstX, dstZ);
    state.relocateFromKey = null;
    state.metadataVersion += 1;
    recomputeMetrics();
    refreshAllTileVisuals(true);
    state.dirtyDetails = true;
    addToast("Building relocated.", "success");
  }

  function handleTileClick(visual) {
    let x = visual.x;
    let z = visual.z;
    let tile = getTile(x, z);
    if (!tile) return;

    if (state.currentMode === "select") {
      if (tile.building) {
        state.selectedTileKey = visual.key;
      } else {
        state.selectedTileKey = null;
      }
      state.dirtyDetails = true;
      updateAllTileHighlights();
      return;
    }

    if (state.currentMode === "build") {
      performBuild(x, z);
      state.dirtyDetails = true;
      return;
    }

    if (state.currentMode === "demolish") {
      performDemolish(x, z);
      state.dirtyDetails = true;
      return;
    }

    if (state.currentMode === "relocate") {
      if (!state.relocateFromKey) {
        if (!tile.building) {
          addToast("Select a built tile to relocate.", "error");
          return;
        }
        state.relocateFromKey = visual.key;
        state.selectedTileKey = visual.key;
        state.placementDirection = tile.direction || 0;
        state.dirtyDetails = true;
        addToast("Select an empty destination tile.", "info");
        updateAllTileHighlights();
        return;
      }
      if (state.relocateFromKey === visual.key) {
        state.relocateFromKey = null;
        addToast("Relocation cancelled.", "info");
        updateAllTileHighlights();
        return;
      }
      performRelocate(state.relocateFromKey, x, z);
      updateAllTileHighlights();
    }
  }

  function pointerFromEvent(event) {
    if (!pointerCanvas) return null;
    let rect = pointerCanvas.getBoundingClientRect();
    if (!rect.width || !rect.height) return null;
    pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    return pointer;
  }

  function pickTile(event) {
    if (!game || !game.camera) return null;
    if (!pointerFromEvent(event)) return null;
    raycaster.setFromCamera(pointer, game.camera);
    let objects = [];
    for (let i = 0; i < tileVisuals.length; i += 1) {
      objects.push(tileVisuals[i].grass);
      objects.push(tileVisuals[i].ground);
    }
    let hits = raycaster.intersectObjects(objects, false);
    if (!hits.length) return null;
    let key = hits[0].object.userData.tileKey;
    return tileVisualMap[key] || null;
  }

  const bindInput = () => {
    pointerCanvas = (game && game.renderer && game.renderer.domElement) || null;
    if (!pointerCanvas) return;

    this._onPointerMove = function(event) {
      let visual = pickTile(event);
      state.hoveredTileKey = visual ? visual.key : null;
      updateAllTileHighlights();
    };
    // Tile placement used to listen for the DOM "click" event on the canvas.
    // But the camera controls call setPointerCapture() on #scene-container on
    // pointerdown, which redirects pointerup (and the synthesized click) off the
    // canvas — so the canvas "click" listener never fired and tiles could not be
    // placed (a stray click during a tiny drag was the only thing that ever
    // worked). Track the press on the canvas and complete the tap on a
    // window-level pointerup (which always sees the captured event), then DEFER
    // the placement to update() so it runs AFTER UIKitPointerEvents has flushed
    // its batched click — consumeUIClick() sets ignoreWorldClickUntil when a HUD
    // button was pressed, which then suppresses placing a tile underneath it.
    // NOTE: these are DOM listeners, so inside them `this` is the element; use
    // the `state` closure for shared data, never `this`.
    this._onWorldPointerDown = function(event) {
      if (event.button !== 0) return;
      state.worldTapStart = { x: event.clientX, y: event.clientY };
    };
    this._onWorldPointerUp = function(event) {
      let start = state.worldTapStart;
      state.worldTapStart = null;
      if (!start || event.button !== 0) return;
      let dx = event.clientX - start.x;
      let dy = event.clientY - start.y;
      if ((dx * dx + dy * dy) > 49) return; // moved > ~7px => camera drag, not a tap
      state.pendingWorldTap = { clientX: event.clientX, clientY: event.clientY };
    };
    this._onContextMenu = function(event) {
      event.preventDefault();
      clearSelection();
    };
    this._onWheel = function(event) {
      event.preventDefault();
      state.cameraZoom = clamp(state.cameraZoom + (event.deltaY > 0 ? 0.08 : -0.08), 0.65, 1.6);
    };
    // Keyboard polled per-frame via InputManager (see config.inputs)
    this._ccKeyPrev = {};

    pointerCanvas.addEventListener("pointermove", this._onPointerMove); // @check-ok
    pointerCanvas.addEventListener("pointerdown", this._onWorldPointerDown); // @check-ok
    window.addEventListener("pointerup", this._onWorldPointerUp); // @check-ok
    pointerCanvas.addEventListener("contextmenu", this._onContextMenu); // @check-ok
    pointerCanvas.addEventListener("wheel", this._onWheel, { passive: false }); // @check-ok
  }

  const pollKeyboard = () => {
    if (!game || !game.inputManager) return;
    const im = game.inputManager;
    const codes = ["Escape","Digit1","Digit2","Digit3","Digit4","KeyR","KeyM","KeyG","ArrowLeft","ArrowRight"];
    if (!this._ccKeyPrev) this._ccKeyPrev = {};
    let modeChanged = false;
    for (let i = 0; i < codes.length; i++) {
      const code = codes[i];
      const cur = !!im.getAction("cc_" + code);
      if (cur && !this._ccKeyPrev[code]) {
        if (code === "Escape") {
          if (state.showMap) { state.showMap = false; state.dirtyMap = true; }
          else clearSelection();
        } else if (code === "Digit1") { state.currentMode = "select"; modeChanged = true; }
        else if (code === "Digit2") { state.currentMode = "build"; modeChanged = true; }
        else if (code === "Digit3") { state.currentMode = "relocate"; modeChanged = true; }
        else if (code === "Digit4") { state.currentMode = "demolish"; modeChanged = true; }
        else if (code === "KeyR") {
          state.placementDirection = (state.placementDirection + 1) % 4;
          state.dirtyDetails = true;
        }
        else if (code === "ArrowLeft") state.cameraIndex = (state.cameraIndex + 3) % 4;
        else if (code === "ArrowRight") state.cameraIndex = (state.cameraIndex + 1) % 4;
        else if (code === "KeyM") { state.showMap = !state.showMap; state.dirtyMap = true; }
        else if (code === "KeyG") state.showGuide = !state.showGuide;
      }
      this._ccKeyPrev[code] = cur;
    }
    if (modeChanged && MODES.indexOf(state.currentMode) !== -1) {
      state.dirtyPalette = true;
      state.dirtyDetails = true;
      updateAllTileHighlights();
    }
  };

  const unbindInput = async () => {
    if (pointerCanvas && this._onPointerMove) pointerCanvas.removeEventListener("pointermove", this._onPointerMove);
    if (pointerCanvas && this._onWorldPointerDown) pointerCanvas.removeEventListener("pointerdown", this._onWorldPointerDown);
    if (this._onWorldPointerUp) window.removeEventListener("pointerup", this._onWorldPointerUp);
    if (pointerCanvas && this._onContextMenu) pointerCanvas.removeEventListener("contextmenu", this._onContextMenu);
    if (pointerCanvas && this._onWheel) pointerCanvas.removeEventListener("wheel", this._onWheel);
    this._ccKeyPrev = {};
  }

  function updateCamera(deltaTime) {
    if (!game || !game.camera) return;
    let cam = game.camera;
    let base = CAMERA_OFFSETS[state.cameraIndex].clone().multiplyScalar(state.cameraZoom);
    cameraDesired.copy(cameraTarget).add(base);
    cameraCurrent.x = lerp(cam.position.x, cameraDesired.x, clamp(deltaTime * 4, 0, 1));
    cameraCurrent.y = lerp(cam.position.y, cameraDesired.y, clamp(deltaTime * 4, 0, 1));
    cameraCurrent.z = lerp(cam.position.z, cameraDesired.z, clamp(deltaTime * 4, 0, 1));
    cam.position.copy(cameraCurrent);
    cam.lookAt(cameraTarget);
  }

  const ensurePlaylistBuffers = async () => {
    if (!musicAudio) return;
    if (playlistBuffers) return;
    playlistBuffers = [];
    playlistIndex = 0;
    const loader = new THREE.AudioLoader();
    const refs = [];
    const r1 = this.getAttribute("track1");
    if (r1) refs.push(r1);
    const r2 = this.getAttribute("track2");
    if (r2) refs.push(r2);
    for (let i = 0; i < refs.length; i++) {
      const url = await erth.asset.audio.getUrl(refs[i]);
      if (!url) continue;
      const buf = await new Promise(function (resolve) {
        loader.load(url, resolve, undefined, function () { resolve(null); });
      });
      if (buf) playlistBuffers.push(buf);
    }
  }

  async function playMusic() {
    if (!musicAudio || !state.musicEnabled) return;
    await ensurePlaylistBuffers();
    if (!playlistBuffers || !playlistBuffers.length) return;
    musicAudio.setVolume(state.musicVolume);
    if (musicAudio.isPlaying) musicAudio.stop();
    musicAudio.setBuffer(playlistBuffers[playlistIndex]);
    musicAudio.setLoop(false);
    musicAudio.onEnded = function () {
      musicAudio.isPlaying = false;
      state.isPlayingMusic = false;
      state.dirtyTop = true;
      if (!playlistBuffers || !playlistBuffers.length) return;
      playlistIndex = (playlistIndex + 1) % playlistBuffers.length;
      if (state.musicEnabled) playMusic();
    };
    musicAudio.play();
    state.isPlayingMusic = true;
    state.dirtyTop = true;
  }

  function setMusicEnabled(enabled) {
    state.musicEnabled = enabled;
    if (!musicAudio) return;
    if (enabled) {
      playMusic();
    } else {
      if (musicAudio.isPlaying) musicAudio.pause();
      state.isPlayingMusic = false;
      state.dirtyTop = true;
    }
  }

  function setupMusic() {
    if (!game || !game.camera) return;
    if (!audioListener) {
      audioListener = new THREE.AudioListener();
      game.camera.add(audioListener);
    }
    musicAudio = new THREE.Audio(audioListener);
  }

  function cleanupMusic() {
    if (musicAudio) {
      if (musicAudio.isPlaying) musicAudio.stop();
      if (musicAudio.disconnect) musicAudio.disconnect();
      musicAudio = null;
    }
    if (audioListener) {
      if (audioListener.parent) audioListener.parent.remove(audioListener);
      audioListener = null;
    }
    playlistBuffers = null;
    playlistIndex = 0;
  }

  this.onEditorAdded = function(editor) {
    target = this.gameObject._internal.three;
    cleanupPreview();
    buildEditorPreview(target);
  };

  this.onEditorUpdate = function() {
    if (previewRoot) {
      previewRoot.rotation.y += 0.001;
    }
  };

  this.onEditorDispose = function() {
    cleanupPreview();
  };

  this.init = function(_game) {
      game = _game;
      erth = this.erth;
      target = this.gameObject._internal.three;
      // closure variable reset removed
    resetState();
    setupMusic();
    buildGridVisuals(target);
    buildUI();
    bindInput();
    cameraCurrent.copy(CAMERA_OFFSETS[state.cameraIndex]);
    if (game && game.camera) {
      game.camera.fov = 28;
      game.camera.near = 0.1;
      game.camera.far = 250;
      game.camera.updateProjectionMatrix();
      game.camera.position.copy(cameraCurrent);
      game.camera.lookAt(cameraTarget);
    }
    addToast("CubeCity ready. Open the guide or start building.", "info");
  };

  this.update = function(deltaTime) {
    pollKeyboard();
    state.dayAccumulator += deltaTime;
    if (state.dayAccumulator >= DAY_INTERVAL_SECONDS) {
      state.dayAccumulator -= DAY_INTERVAL_SECONDS;
      recomputeMetrics();
      applyDayTick();
      addToast("Day " + state.gameDay + " income +" + formatNumber(state.metrics.dailyIncome), "success");
    }
    updateCamera(deltaTime);
    updateStatuses(deltaTime);
    updateUI(deltaTime);
    // Process a deferred world tap AFTER updateUI() (which runs
    // UIKitPointerEvents.update and therefore any HUD button's consumeUIClick).
    // If a HUD button was just pressed, ignoreWorldClickUntil is now set and we
    // skip placing a tile underneath the panel.
    if (state.pendingWorldTap) {
      let tap = state.pendingWorldTap;
      state.pendingWorldTap = null;
      if (nowMs() >= state.ignoreWorldClickUntil && !state.showGuide && !state.showMap) {
        let visual = pickTile(tap);
        if (visual) handleTileClick(visual);
      }
    }
  };

  this.dispose = function() {
    unbindInput();
    cleanupMusic();
    if (ui.fullscreen) {
      if (ui.fullscreen.parent) ui.fullscreen.parent.remove(ui.fullscreen);
      UIKitPointerEvents.unregisterRoot(ui.fullscreen);
      UIKitPointerEvents.deinitialize();
      ui = {};
    }
    if (worldRoot) {
      disposeObject3D(worldRoot);
      worldRoot = null;
      gridRoot = null;
      tileLineRoot = null;
    }
  };
