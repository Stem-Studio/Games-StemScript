  attributes:
    hudBgAsset:
      name: "HUD Background"
      type: "imageAsset"
      description: "HUD background bar image (hud-bg.png)"
    hudSpeedAsset:
      name: "HUD Speed Bar"
      type: "imageAsset"
      description: "Speed bar foreground image (hud-speed.png)"
    hudShieldAsset:
      name: "HUD Shield Bar"
      type: "imageAsset"
      description: "Shield bar foreground image (hud-shield.png)"
    font:
      name: "Font"
      type: "string"
      default: "BebasNeueRegular, Impact, Arial, sans-serif"
  throttleConfig:
    throttlePriority: "CRITICAL"
    enableFrustumCulling: false
    enableDistanceThrottling: false
