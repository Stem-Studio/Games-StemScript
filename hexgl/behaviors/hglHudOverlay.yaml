config:
  name: "HGL HUD Overlay"
  id: "hgl.hudOverlay"
  author: "HexGL-Port"
  isScript: true
  main: "script.js"
  version: "1.0.0"
  priority: 0
  description: "CanvasTexture HUD overlay ported from HexGL HUD.js — speed bar,
