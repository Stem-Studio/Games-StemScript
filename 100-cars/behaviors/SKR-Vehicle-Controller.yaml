code: |
  let game;
  const erth = this.erth;
  this.init = function(_game) {
      game = _game;
    this.speedScale = this.getAttribute("speedScale");
    this.linearDamp = this.getAttribute("linearDamp");
    this.steeringMul = this.getAttribute("steeringMultiplier");
    this.gripMin = this.getAttribute("steeringGripMin");
    this.gripMax = this.getAttribute("steeringGripMax");
    this.collisionRadius = this.getAttribute("collisionRadius");
    this.groundOffset = this.getAttribute("groundOffset");
    this.resetY = this.getAttribute("resetY");

    this.linearSpeed = 0;
    this.angularSpeed = 0;
    this.acceleration = 0;
    this.driftIntensity = 0;
    this.inputX = 0;
    this.inputZ = 0;
    this.groundY = 0;

    this.spawnPos = new THREE.Vector3(3.745, 0.5, 3.745);
    this.spawnAngle = 0;
    this._spawnLoaded = false;

    this._forward = new THREE.Vector3();
    this._right = new THREE.Vector3();
    this._tmpVec = new THREE.Vector3();
    this._up = new THREE.Vector3(0, 1, 0);
    this._quat = new THREE.Quaternion();
    this._mat4 = new THREE.Matrix4();
    this._zAxis = new THREE.Vector3();
    this._newZ = new THREE.Vector3();
    this._candidatePos = new THREE.Vector3();
    this._localPos = new THREE.Vector3();
    this._closestPos = new THREE.Vector3();
    this._worldPos = new THREE.Vector3();

    this.spherePos = new THREE.Vector3(3.745, 0.5, 3.745);
    this.sphereVel = new THREE.Vector3();
    this.modelVelocity = new THREE.Vector3();
    this.prevModelPos = new THREE.Vector3(3.745, 0, 3.745);

    this._impactCooldown = 0;
    this.prevForwardSpeed = 0;
    this._wheelSpin = 0;
    this._bodyBaseY = 0.4;
    this._bodyBaseRotX = 0;
    this._bodyBaseRotZ = 0;

    this._bodyNode = null;
    this._wheelFL = null;
    this._wheelFR = null;
    this._wheelBL = null;
    this._wheelBR = null;
    this._wheels = [];
    this._smokeLeft = null;
    this._smokeRight = null;
    this._colliders = [];
    this._collisionCount = 0;
    this._ready = false;
  };

  this._markRuntimeOnly = function(obj) {
    if (!obj) return obj;
    obj.userData = obj.userData || {};
    obj.userData.isRuntimeOnly = true;
    if (obj.traverse) {
      obj.traverse(function(child) {
        child.userData = child.userData || {};
        child.userData.isRuntimeOnly = true;
      });
    }
    return obj;
  };

  this._loadSpawnFromStore = function() {
    let sx = erth.store.get("skr_spawnX");
    let sy = erth.store.get("skr_spawnY");
    let sz = erth.store.get("skr_spawnZ");
    let sa = erth.store.get("skr_spawnAngle");
    if (sx === undefined || sx === null) return false;

    this.spawnPos.set(sx, sy, sz);
    this.spawnAngle = sa !== undefined && sa !== null ? sa : 0;
    this._spawnLoaded = true;
    return true;
  };

  this._buildCollisionMap = function() {
    const CELL_RAW = 9.99;
    const GRID_SCALE = 0.75;
    const ORIENT_DEG = { 0: 0, 10: 180, 16: 90, 22: 270 };
    const TRACK_CELLS = [
      [-3, -3, "track-corner",   16],
      [-2, -3, "track-straight", 22],
      [-1, -3, "track-straight", 22],
      [ 0, -3, "track-corner",    0],
      [-3, -2, "track-straight",  0],
      [ 0, -2, "track-straight",  0],
      [-3, -1, "track-corner",   10],
      [-2, -1, "track-corner",    0],
      [ 0, -1, "track-straight",  0],
      [-2,  0, "track-straight", 10],
      [ 0,  0, "track-finish",    0],
      [-2,  1, "track-straight", 10],
      [ 0,  1, "track-straight",  0],
      [-2,  2, "track-corner",   10],
      [-1,  2, "track-straight", 16],
      [ 0,  2, "track-corner",   22]
    ];

    const CELL_HALF = CELL_RAW / 2;
    const WALL_HALF_THICK = 0.25;
    const WALL_X = 4.75;
    const S = GRID_SCALE;
    const hThick = WALL_HALF_THICK * S;
    const hLen = CELL_HALF * S;
    const ARC_CENTER_X = -CELL_HALF;
    const ARC_CENTER_Z = CELL_HALF;
    const OUTER_R = 2 * CELL_HALF - WALL_HALF_THICK;
    const OUTER_SEG = 8;
    const OUTER_SEG_HALF_LEN = (OUTER_R * (Math.PI / 2) / OUTER_SEG / 2) * S;
    const INNER_R = WALL_HALF_THICK;
    const INNER_SEG = 3;
    const INNER_SEG_HALF_LEN = (INNER_R * (Math.PI / 2) / INNER_SEG / 2) * S;
    const ARC_SPAN = -Math.PI / 2;

    this._colliders = [];

    const addCollider = (x, z, rotationY, halfX, halfZ) => {
      this._colliders.push({
        x: x,
        z: z,
        rotationY: rotationY,
        cos: Math.cos(rotationY),
        sin: Math.sin(rotationY),
        halfX: halfX,
        halfZ: halfZ
      });
    };

    const addArcWalls = (wcx, wcz, arcStart, radius, numSeg, segHalfLen) => {
      for (let i = 0; i < numSeg; i++) {
        let aMid = arcStart + ((i + 0.5) / numSeg) * ARC_SPAN;
        addCollider(
          wcx + radius * Math.cos(aMid) * S,
          wcz + radius * Math.sin(aMid) * S,
          -aMid,
          hThick,
          segHalfLen
        );
      }
    };

    for (let i = 0; i < TRACK_CELLS.length; i++) {
      let gx = TRACK_CELLS[i][0];
      let gz = TRACK_CELLS[i][1];
      let key = TRACK_CELLS[i][2];
      let orient = TRACK_CELLS[i][3];
      if (key === "track-bump") continue;

      let cx = (gx + 0.5) * CELL_RAW * S;
      let cz = (gz + 0.5) * CELL_RAW * S;
      let deg = ORIENT_DEG[orient] || 0;
      let rad = deg * Math.PI / 180;
      let cr = Math.cos(rad);
      let sr = Math.sin(rad);

      if (key === "track-straight" || key === "track-finish") {
        for (let sideIndex = 0; sideIndex < 2; sideIndex++) {
          let side = sideIndex === 0 ? -1 : 1;
          let lx = side * WALL_X;
          addCollider(
            cx + (lx * cr) * S,
            cz + (-lx * sr) * S,
            rad,
            hThick,
            hLen
          );
        }
      } else if (key === "track-corner") {
        let wcx = cx + (ARC_CENTER_X * cr + ARC_CENTER_Z * sr) * S;
        let wcz = cz + (-ARC_CENTER_X * sr + ARC_CENTER_Z * cr) * S;
        let arcStart = -rad;
        addArcWalls(wcx, wcz, arcStart, OUTER_R, OUTER_SEG, OUTER_SEG_HALF_LEN);
        addArcWalls(wcx, wcz, arcStart, INNER_R, INNER_SEG, INNER_SEG_HALF_LEN);
      }
    }
  };

  this._resetToSpawn = function() {
    this.spherePos.copy(this.spawnPos);
    this.sphereVel.set(0, 0, 0);
    this.modelVelocity.set(0, 0, 0);
    this.linearSpeed = 0;
    this.angularSpeed = 0;
    this.acceleration = 0;
    this.prevForwardSpeed = 0;

    this.gameObject.position.copy(this.spawnPos);
    this.gameObject.position.y = this.spawnPos.y - 0.5 + this.groundOffset;
    this.gameObject.rotation.set(0, 0, 0);
    this.gameObject.quaternion.identity();
    this.gameObject.rotateY(this.spawnAngle);
    this.prevModelPos.copy(this.gameObject.position);
  };

  this._pushOutOfCollider = function(position, collider) {
    let dx = position.x - collider.x;
    let dz = position.z - collider.z;
    let localX = dx * collider.cos + dz * collider.sin;
    let localZ = -dx * collider.sin + dz * collider.cos;
    let clampedX = THREE.MathUtils.clamp(localX, -collider.halfX, collider.halfX);
    let clampedZ = THREE.MathUtils.clamp(localZ, -collider.halfZ, collider.halfZ);
    let diffX = localX - clampedX;
    let diffZ = localZ - clampedZ;
    let radius = this.collisionRadius;
    let distSq = diffX * diffX + diffZ * diffZ;
    if (distSq >= radius * radius) return false;

    if (distSq > 1e-6) {
      let dist = Math.sqrt(distSq);
      let push = radius - dist;
      localX += (diffX / dist) * push;
      localZ += (diffZ / dist) * push;
    } else {
      let penX = collider.halfX + radius - Math.abs(localX);
      let penZ = collider.halfZ + radius - Math.abs(localZ);
      if (penX < penZ) {
        localX += (localX >= 0 ? 1 : -1) * penX;
      } else {
        localZ += (localZ >= 0 ? 1 : -1) * penZ;
      }
    }

    position.x = collider.x + localX * collider.cos - localZ * collider.sin;
    position.z = collider.z + localX * collider.sin + localZ * collider.cos;
    return true;
  };

  this._moveVehicle = function(dt) {
    this._forward.set(0, 0, 1).applyQuaternion(this.gameObject.quaternion);
    this._forward.y = 0;
    this._forward.normalize();

    let startX = this.spherePos.x;
    let startZ = this.spherePos.z;
    let intendedDistance = this.linearSpeed * this.speedScale * dt;

    this._candidatePos.copy(this.spherePos);
    this._candidatePos.addScaledVector(this._forward, intendedDistance);
    this._candidatePos.y = this.spawnPos.y;

    this._collisionCount = 0;
    for (let pass = 0; pass < 3; pass++) {
      let hit = false;
      for (let i = 0; i < this._colliders.length; i++) {
        if (this._pushOutOfCollider(this._candidatePos, this._colliders[i])) {
          hit = true;
          this._collisionCount++;
        }
      }
      if (!hit) break;
    }

    this.sphereVel.set(
      dt > 0 ? (this._candidatePos.x - startX) / dt : 0,
      0,
      dt > 0 ? (this._candidatePos.z - startZ) / dt : 0
    );
    this.spherePos.copy(this._candidatePos);

    if (dt > 0 && Math.abs(intendedDistance) > 1e-5) {
      let actualForwardSpeed = this.sphereVel.dot(this._forward);
      if (Math.sign(actualForwardSpeed) === Math.sign(this.linearSpeed) && Math.abs(actualForwardSpeed) < Math.abs(this.linearSpeed * this.speedScale)) {
        this.linearSpeed = THREE.MathUtils.lerp(this.linearSpeed, actualForwardSpeed / this.speedScale, 0.35);
      }
    }

    this.gameObject.position.set(
      this.spherePos.x,
      this.spherePos.y - 0.5 + this.groundOffset,
      this.spherePos.z
    );
  };

  this._readInput = function() {
    let im = game.inputManager;
    this.inputX = im.getMotion("lateral") || 0;
    this.inputZ = im.getMotion("forward") || 0;
    if (im.getAction("jump")) this.inputZ = Math.max(this.inputZ, 1);
    if (im.getAction("use")) this.inputZ = Math.min(this.inputZ, -1);
    if (Math.abs(this.inputX) < 0.05) this.inputX = 0;
    if (Math.abs(this.inputZ) < 0.05) this.inputZ = 0;
  };

  this._updateDriftSmoke = function(enabled) {
    if (this._smokeLeft) this._smokeLeft.visible = enabled;
    if (this._smokeRight) this._smokeRight.visible = enabled;
  };

  this.onStart = function() {
    let self = this; // @check-ok needed for traverse callback
    this._loadSpawnFromStore();

    let threeObj = this.gameObject._internal ? this.gameObject._internal.three : this.gameObject;
    threeObj.traverse(function(child) {
      let name = child.name.toLowerCase();
      if (name === "body") {
        child.rotation.order = "YXZ";
        self._bodyNode = child;
        self._bodyBaseY = child.position.y;
        self._bodyBaseRotX = child.rotation.x;
        self._bodyBaseRotZ = child.rotation.z;
      } else if (name.indexOf("wheel") !== -1) {
        child.rotation.order = "YXZ";
        child.userData = child.userData || {};
        child.userData.skrBaseRotX = child.rotation.x;
        child.userData.skrBaseRotY = child.rotation.y;
        child.userData.skrBaseRotZ = child.rotation.z;
        self._wheels.push(child);
        if (name.indexOf("front") !== -1 && name.indexOf("left") !== -1) self._wheelFL = child;
        if (name.indexOf("front") !== -1 && name.indexOf("right") !== -1) self._wheelFR = child;
        if (name.indexOf("back") !== -1 && name.indexOf("left") !== -1) self._wheelBL = child;
        if (name.indexOf("back") !== -1 && name.indexOf("right") !== -1) self._wheelBR = child;
      }
    });

    this._smokeLeft = game.scene.getObjectByName("DriftSmokeLeft");
    this._smokeRight = game.scene.getObjectByName("DriftSmokeRight");
    this._updateDriftSmoke(false);

    this._buildCollisionMap();
    this.groundY = this.spawnPos.y - 0.5 + this.groundOffset;
    this._resetToSpawn();
    this._ready = true;
  };

  this._lerpAngle = function(a, b, t) {
    let diff = b - a;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    return a + diff * t;
  };

  this._alignWithY = function(quaternion, newY) {
    this._zAxis.set(0, 0, 1).applyQuaternion(quaternion);
    let xAxis = this._tmpVec.crossVectors(this._zAxis, newY).negate().normalize();
    this._newZ.crossVectors(xAxis, newY).normalize();
    this._mat4.makeBasis(xAxis, newY, this._newZ);
    return this._quat.setFromRotationMatrix(this._mat4);
  };

  this._stepDrive = function(dt) {
    if (!this._ready) return;

    if (!this._spawnLoaded && this._loadSpawnFromStore()) {
      this._resetToSpawn();
    }

    this._readInput();

    let direction = Math.sign(this.linearSpeed);
    if (direction === 0) direction = Math.abs(this.inputZ) > 0.1 ? Math.sign(this.inputZ) : 1;

    let grip = THREE.MathUtils.clamp(Math.abs(this.linearSpeed), this.gripMin, this.gripMax);
    let targetAngular = -this.inputX * grip * this.steeringMul * direction;
    this.angularSpeed = THREE.MathUtils.lerp(this.angularSpeed, targetAngular, dt * 4);
    this.gameObject.rotateY(this.angularSpeed * dt);

    this._tmpVec.set(0, 1, 0).applyQuaternion(this.gameObject.quaternion);
    if (this._tmpVec.y > 0.5) {
      let targetQuat = this._alignWithY(this.gameObject.quaternion, this._up);
      this.gameObject.quaternion.slerp(targetQuat, 0.2);
    }

    let targetSpeed = this.inputZ;
    if (targetSpeed < 0 && this.linearSpeed > 0.01) {
      this.linearSpeed = THREE.MathUtils.lerp(this.linearSpeed, 0.0, dt * 8);
    } else if (targetSpeed < 0) {
      this.linearSpeed = THREE.MathUtils.lerp(this.linearSpeed, targetSpeed / 2, dt * 2);
    } else {
      this.linearSpeed = THREE.MathUtils.lerp(this.linearSpeed, targetSpeed, dt * 6);
    }
    this.linearSpeed *= Math.max(0, 1 - this.linearDamp * dt);

    this._moveVehicle(dt);
  };

  this.update = function(deltaTime) {
    if (!this._ready) return;
    let dt = Math.min(deltaTime, 1 / 30);

    this._stepDrive(dt);

    if (this._impactCooldown > 0) {
      this._impactCooldown = Math.max(0, this._impactCooldown - dt);
    }

    if (this.spherePos.y < this.resetY) {
      this._resetToSpawn();
    }

    this.acceleration = THREE.MathUtils.lerp(
      this.acceleration,
      this.linearSpeed + (0.25 * this.linearSpeed * Math.abs(this.linearSpeed)),
      dt
    );

    if (dt > 0) {
      this.modelVelocity.subVectors(this.gameObject.position, this.prevModelPos).divideScalar(dt);
      this.prevModelPos.copy(this.gameObject.position);
    }

    this._updateBody(dt);
    this._updateWheels(dt);

    this.driftIntensity = Math.abs(this.linearSpeed - this.acceleration)
      + (this._bodyNode ? Math.abs(this._bodyNode.rotation.z) * 2 : 0);
    this._updateDriftSmoke(this.driftIntensity > 0.25);

    this._forward.set(0, 0, 1).applyQuaternion(this.gameObject.quaternion);
    this._forward.y = 0;
    this._forward.normalize();

    let forwardSpeed = Math.abs(this.modelVelocity.dot(this._forward));
    let impactVelocity = Math.max(0, this.prevForwardSpeed - forwardSpeed);
    if (impactVelocity > 1.25 && this._impactCooldown === 0) {
      let threeTarget = this.gameObject._internal ? this.gameObject._internal.three : this.gameObject;
      game.behaviorManager.sendEventToObjectBehaviors(threeTarget, "skr_impact", { // @check-ok no erth equivalent
        velocity: impactVelocity
      });
      this._impactCooldown = 0.12;
    }
    this.prevForwardSpeed = forwardSpeed;

    erth.store.set("skr_speed", this.linearSpeed);
    erth.store.set("skr_acceleration", this.acceleration);
    erth.store.set("skr_driftIntensity", this.driftIntensity);
    erth.store.set("skr_inputX", this.inputX);
    erth.store.set("skr_inputZ", this.inputZ);
    erth.store.set("skr_collisionCount", this._collisionCount);
    erth.store.set("skr_playerWorldSpeed", this.modelVelocity.length());
  };

  this._updateBody = function(dt) {
    if (!this._bodyNode) return;
    this._bodyNode.rotation.x = this._lerpAngle(
      this._bodyNode.rotation.x,
      this._bodyBaseRotX - (this.linearSpeed - this.acceleration) / 6,
      dt * 10
    );
    this._bodyNode.rotation.z = this._lerpAngle(
      this._bodyNode.rotation.z,
      this._bodyBaseRotZ - (this.inputX / 5) * this.linearSpeed,
      dt * 5
    );
    this._bodyNode.position.y = THREE.MathUtils.lerp(this._bodyNode.position.y, this._bodyBaseY - 0.2, dt * 5);
  };

  this._updateWheels = function(dt) {
    this._wheelSpin += this.acceleration;
    for (let i = 0; i < this._wheels.length; i++) {
      let wheel = this._wheels[i];
      let baseRotX = wheel.userData && wheel.userData.skrBaseRotX !== undefined ? wheel.userData.skrBaseRotX : 0;
      let baseRotZ = wheel.userData && wheel.userData.skrBaseRotZ !== undefined ? wheel.userData.skrBaseRotZ : 0;
      wheel.rotation.x = baseRotX + this._wheelSpin;
      wheel.rotation.z = baseRotZ;
    }
    if (this._wheelFL) {
      let baseRotY = this._wheelFL.userData && this._wheelFL.userData.skrBaseRotY !== undefined ? this._wheelFL.userData.skrBaseRotY : 0;
      this._wheelFL.rotation.y = this._lerpAngle(this._wheelFL.rotation.y, baseRotY - this.inputX / 1.5, dt * 10);
    }
    if (this._wheelFR) {
      let baseRotY = this._wheelFR.userData && this._wheelFR.userData.skrBaseRotY !== undefined ? this._wheelFR.userData.skrBaseRotY : 0;
      this._wheelFR.rotation.y = this._lerpAngle(this._wheelFR.rotation.y, baseRotY - this.inputX / 1.5, dt * 10);
    }
  };

  this.onStop = function() {
    this._updateDriftSmoke(false);
    this._wheels = [];
    this._colliders = [];
  };
