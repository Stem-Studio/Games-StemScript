code: |
  let game;
  const erth = this.erth;
  this.init = function(_game) {
      game = _game;
    this._sceneRoot = game && game.scene ? game.scene : null;
    this._texture = null;
    this._loadToken = 0;
    this._targets = [
      "TrackStraight",
      "TrackCorner",
      "TrackBump",
      "TrackFinish",
      "DecoEmpty",
      "DecoForest",
      "DecoTents",
      "PlayerTruck",
      "NpcTruckGreen",
      "NpcTruckPurple",
      "NpcTruckRed"
    ];
  };

  this._applyTextureToObject = function(obj, texture) {
    if (!obj || !texture) return;

    let visited = new Set();
    obj.traverse(function(child) {
      if (!child.isMesh || !child.material) return;

      let materials = Array.isArray(child.material) ? child.material : [child.material];
      for (let i = 0; i < materials.length; i++) {
        let material = materials[i];
        if (!material || visited.has(material)) continue;
        visited.add(material);
        if ("map" in material) {
          material.map = texture;
          material.needsUpdate = true;
        }
      }
    });
  };

  this._applyTextureEverywhere = function(texture) {
    let scene = this._sceneRoot || (game && game.scene ? game.scene : null);
    if (!scene) return;

    for (let i = 0; i < this._targets.length; i++) {
      let obj = scene.getObjectByName(this._targets[i]);
      if (obj) {
        this._applyTextureToObject(obj, texture);
      }
    }
  };

  this._loadAndApply = async function() {
    if (this._loadToken === undefined) return; // guard: init() not yet called
    let token = ++this._loadToken;
    let textureName = this.getAttribute("textureName") || "VehicleColormap";
    let ref = await erth.asset.image.findByName(textureName);
    if (!ref || token !== this._loadToken) return;

    let texture = await erth.asset.image.createTexture(ref);
    if (token !== this._loadToken) {
      texture.dispose();
      return;
    }

    if (this._texture) {
      this._texture.dispose();
    }

    texture.flipY = false;
    texture.colorSpace = THREE.SRGBColorSpace;
    texture.needsUpdate = true;

    this._texture = texture;
    this._applyTextureEverywhere(texture);
  };

  this.onStart = function() {
    this._sceneRoot = game && game.scene ? game.scene : this._sceneRoot;
    void this._loadAndApply();
  };

  this.onEditorAdded = function(editor) { // @check-ok _loadAndApply has internal init guard
    if (this._loadToken === undefined) this._loadToken = 0;
    if (this._texture === undefined) this._texture = null;
    this._sceneRoot = editor && editor.scene ? editor.scene : this._sceneRoot;
    void this._loadAndApply();
  };

  this.onEditorAttributesUpdated = function() { // @check-ok _loadAndApply has internal init guard
    if (this._loadToken === undefined) this._loadToken = 0;
    if (this._texture === undefined) this._texture = null;
    void this._loadAndApply();
  };

  this.onStop = function() {
    if (this._texture) {
      this._texture.dispose();
      this._texture = null;
    }
  };

  this.onEditorRemoved = function() {
    this._sceneRoot = null;
    if (this._texture) {
      this._texture.dispose();
      this._texture = null;
    }
  };

  this.onEditorDispose = function() {
    this._sceneRoot = null;
    if (this._texture) {
      this._texture.dispose();
      this._texture = null;
    }
  };
