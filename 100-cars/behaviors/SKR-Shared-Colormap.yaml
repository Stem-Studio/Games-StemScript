config:
  name: SKR Shared Colormap
  id: skr.sharedColormap
  author: conversion
  isScript: true
  main: script.js
  version: 1.0.0
  priority: 0
  description: Loads the imported shared color map image asset and applies it to
    the racing kit models so script-tool imports match the original textured
    GLBs.
  tags:
    - gameplay
  attributes:
    textureName:
      name: Texture Name
      type: string
      default: VehicleColormap
  throttleConfig:
    throttlePriority: LOW
    enableFrustumCulling: false
    enableDistanceThrottling: false
