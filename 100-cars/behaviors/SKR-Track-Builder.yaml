      mesh.position.set(x, y, z);
      mesh.rotation.y = rotationY;
      mesh.visible = false;
      mesh.userData.physics = {
        enabled: true,
        type: "rigidBody",
        shape: "box",
        mass: 0,
        friction: friction,
        restitution: restitution,
        ctype: "static"
      };
      mesh.userData._ownsGeometry = true;
      mesh.userData._ownsMaterial = true;
      return markRuntimeOnly(mesh);
    }

    function computeTrackBounds(cells) {
      if (!cells || cells.length === 0) {
        return { centerX: 0, centerZ: 0, halfWidth: 30, halfDepth: 30 };
      }

      let minX = Infinity;
      let maxX = -Infinity;
      let minZ = Infinity;
      let maxZ = -Infinity;
      for (let i = 0; i < cells.length; i++) {
        minX = Math.min(minX, cells[i][0]);
        maxX = Math.max(maxX, cells[i][0]);
        minZ = Math.min(minZ, cells[i][1]);
        maxZ = Math.max(maxZ, cells[i][1]);
      }

      const S = CELL_RAW * GRID_SCALE;
      return {
        centerX: (minX + maxX + 1) / 2 * S,
        centerZ: (minZ + maxZ + 1) / 2 * S,
        halfWidth: (maxX - minX + 1) / 2 * S + S,
        halfDepth: (maxZ - minZ + 1) / 2 * S + S
      };
    }

    function placePiece(templates, key, gx, gz, orient) {
      let src = templates[key];
      if (!src) return null;

      let piece = src.clone();
      piece.position.set((gx + 0.5) * CELL_RAW, 0.5, (gz + 0.5) * CELL_RAW);
      let deg = ORIENT_DEG[orient] || 0;
      piece.rotation.y = deg * Math.PI / 180;
      return piece;
    }

    function hash(gx, gz) {
      let h = gx * 374761393 + gz * 668265263;
      h = (h ^ (h >> 13)) * 1274126177;
      return (h ^ (h >> 16)) >>> 0;
    }

    function addArcWalls(group, prefix, wcx, wcz, arcStart, radius, numSeg, segHalfLen, wallY, hThick, hHeight) {
      const ARC_SPAN = -Math.PI / 2;
      for (let i = 0; i < numSeg; i++) {
        let aMid = arcStart + ((i + 0.5) / numSeg) * ARC_SPAN;
        let x = wcx + radius * Math.cos(aMid) * GRID_SCALE;
        let z = wcz + radius * Math.sin(aMid) * GRID_SCALE;
        group.add(createOwnedInvisibleBox(
          prefix + "_" + i,
          hThick * 2,
          hHeight * 2,
          segHalfLen * 2,
          x,
          wallY,
          z,
          -aMid,
          0.0,
          0.1
        ));
      }
    }

    let templates = {};
    let templateNames = [
      "TrackStraight", "TrackCorner", "TrackBump", "TrackFinish",
      "DecoEmpty", "DecoForest", "DecoTents",
      "NpcTruckGreen", "NpcTruckPurple", "NpcTruckRed"
    ];
    let templateKeyMap = {
      "TrackStraight": "track-straight",
      "TrackCorner": "track-corner",
      "TrackBump": "track-bump",
      "TrackFinish": "track-finish",
      "DecoEmpty": "decoration-empty",
      "DecoForest": "decoration-forest",
      "DecoTents": "decoration-tents",
      "NpcTruckGreen": "npc-green",
      "NpcTruckPurple": "npc-purple",
      "NpcTruckRed": "npc-red"
    };

    for (let i = 0; i < templateNames.length; i++) {
      let obj = scene.getObjectByName(templateNames[i]);
      if (obj) {
        templates[templateKeyMap[templateNames[i]]] = obj;
        obj.visible = false;
      }
    }
    this._npcTemplates = {
      "npc-green": templates["npc-green"] || null,
      "npc-purple": templates["npc-purple"] || null,
      "npc-red": templates["npc-red"] || null
    };

    let runtimeRoot = new THREE.Group();
    runtimeRoot.name = "TrackRuntimeRoot";

    let trackGroup = new THREE.Group();
    trackGroup.name = "TrackGroup";
    trackGroup.position.y = -0.5;
    trackGroup.scale.setScalar(GRID_SCALE);
    runtimeRoot.add(trackGroup);

    if (!isPreview) {
      this._npcRuntimeRoot = new THREE.Group();
      this._npcRuntimeRoot.name = "NpcTrafficRuntimeRoot";
      runtimeRoot.add(this._npcRuntimeRoot);
    } else {
      this._npcRuntimeRoot = null;
    }

    for (let c = 0; c < TRACK_CELLS.length; c++) {
      let cell = TRACK_CELLS[c];
      let piece = placePiece(templates, cell[2], cell[0], cell[1], cell[3]);
      if (!piece) continue;
      piece.visible = true;
      piece.userData.isTrackPiece = true;
      piece.traverse(function(ch) {
        if (ch.isMesh) {
          ch.castShadow = true;
          ch.receiveShadow = true;
        }
      });
      trackGroup.add(piece);
    }

    for (let d = 0; d < DECO_CELLS.length; d++) {
      let cell = DECO_CELLS[d];
      let piece = placePiece(templates, cell[2], cell[0], cell[1], cell[3]);
      if (!piece) continue;
      piece.visible = true;
      piece.traverse(function(ch) {
        if (ch.isMesh) {
          ch.castShadow = true;
          ch.receiveShadow = true;
        }
      });
      trackGroup.add(piece);
    }

    {
      let occupied = new Set();
      let minX = Infinity;
      let maxX = -Infinity;
      let minZ = Infinity;
      let maxZ = -Infinity;

      for (let c = 0; c < TRACK_CELLS.length; c++) {
        occupied.add(TRACK_CELLS[c][0] + "," + TRACK_CELLS[c][1]);
        minX = Math.min(minX, TRACK_CELLS[c][0]);
        maxX = Math.max(maxX, TRACK_CELLS[c][0]);
        minZ = Math.min(minZ, TRACK_CELLS[c][1]);
        maxZ = Math.max(maxZ, TRACK_CELLS[c][1]);
      }

      for (let d = 0; d < DECO_CELLS.length; d++) {
        occupied.add(DECO_CELLS[d][0] + "," + DECO_CELLS[d][1]);
        minX = Math.min(minX, DECO_CELLS[d][0]);
        maxX = Math.max(maxX, DECO_CELLS[d][0]);
        minZ = Math.min(minZ, DECO_CELLS[d][1]);
        maxZ = Math.max(maxZ, DECO_CELLS[d][1]);
      }

      let pad = 3;
      let emptyPositions = [];
      let forestPositions = [];
      let tentPositions = [];

      for (let gz = minZ - pad; gz <= maxZ + pad; gz++) {
        for (let gx = minX - pad; gx <= maxX + pad; gx++) {
          if (occupied.has(gx + "," + gz)) continue;

          let distX = gx < minX ? minX - gx : gx > maxX ? gx - maxX : 0;
          let distZ = gz < minZ ? minZ - gz : gz > maxZ ? gz - maxZ : 0;
          let dist = Math.max(distX, distZ);
          let x = (gx + 0.5) * CELL_RAW;
          let z = (gz + 0.5) * CELL_RAW;

          if (dist <= 1) {
            if (hash(gx, gz) % 7 === 0) {
              tentPositions.push(x, z, hash(gx, gz) % 4);
            } else {
              emptyPositions.push(x, z);
            }
          } else {
            forestPositions.push(x, z);
          }
        }
      }

      function createInstances(src, positions) {
        if (!src || positions.length === 0) return;
        let count = positions.length / 2;

        src.traverse(function(child) {
          if (!child.isMesh) return;
          let inst = new THREE.InstancedMesh(child.geometry, child.material, count);
          inst.castShadow = true;
          inst.receiveShadow = true;
          for (let i = 0; i < count; i++) {
            self._dummy.position.set(positions[i * 2], 0.5, positions[i * 2 + 1]);
            self._dummy.rotation.y = 0;
            self._dummy.updateMatrix();
            inst.setMatrixAt(i, self._dummy.matrix);
          }
          trackGroup.add(inst);
        });
      }

      createInstances(templates["decoration-empty"], emptyPositions);
      createInstances(templates["decoration-forest"], forestPositions);

      let tentSrc = templates["decoration-tents"];
      if (tentSrc && tentPositions.length > 0) {
        let tentCount = tentPositions.length / 3;
        tentSrc.traverse(function(child) {
          if (!child.isMesh) return;
          let inst = new THREE.InstancedMesh(child.geometry, child.material, tentCount);
          inst.castShadow = true;
          inst.receiveShadow = true;
          for (let i = 0; i < tentCount; i++) {
            self._dummy.position.set(tentPositions[i * 3], 0.5, tentPositions[i * 3 + 1]);
            self._dummy.rotation.y = tentPositions[i * 3 + 2] * Math.PI / 2;
            self._dummy.updateMatrix();
            inst.setMatrixAt(i, self._dummy.matrix);
          }
          trackGroup.add(inst);
        });
      }
    }

    if (!isPreview) {
      let colliderGroup = new THREE.Group();
      colliderGroup.name = "TrackColliderGroup";
      runtimeRoot.add(colliderGroup);

      {
        let bounds = computeTrackBounds(TRACK_CELLS);
        let groundSize = Math.max(bounds.halfWidth, bounds.halfDepth) * 2 + 20;
        colliderGroup.add(createOwnedInvisibleBox(
          "TrackGroundCollider",
          groundSize,
          0.02,
          groundSize,
          bounds.centerX,
          -0.125,
          bounds.centerZ,
          0,
          5.0,
          0.0
        ));
      }

      {
        const S = GRID_SCALE;
        const CELL_HALF = CELL_RAW / 2;
        const WALL_HALF_THICK = 0.25;
        const WALL_X = 4.75;
        const WALL_HALF_H = 1.5;
        const wallY = (0.5 + WALL_HALF_H) * S - 0.5;
        const hThick = WALL_HALF_THICK * S;
        const hHeight = WALL_HALF_H * S;
        const hLen = CELL_HALF * S;
        const ARC_CENTER_X = -CELL_HALF;
        const ARC_CENTER_Z = CELL_HALF;
        const OUTER_R = 2 * CELL_HALF - WALL_HALF_THICK;
        const OUTER_SEG = 8;
        const OUTER_SEG_HALF_LEN = (OUTER_R * (Math.PI / 2) / OUTER_SEG / 2) * S;
        const INNER_R = WALL_HALF_THICK;
        const INNER_SEG = 3;
        const INNER_SEG_HALF_LEN = (INNER_R * (Math.PI / 2) / INNER_SEG / 2) * S;

        for (let i = 0; i < TRACK_CELLS.length; i++) {
          let gx = TRACK_CELLS[i][0];
          let gz = TRACK_CELLS[i][1];
          let key = TRACK_CELLS[i][2];
          let orient = TRACK_CELLS[i][3];

          if (key === "track-bump") continue;

          let cx = (gx + 0.5) * CELL_RAW * S;
          let cz = (gz + 0.5) * CELL_RAW * S;
          let deg = ORIENT_DEG[orient] || 0;
          let rad = deg * Math.PI / 180;
          let cr = Math.cos(rad);
          let sr = Math.sin(rad);

          if (key === "track-straight" || key === "track-finish") {
            for (let sideIndex = 0; sideIndex < 2; sideIndex++) {
              let side = sideIndex === 0 ? -1 : 1;
              let lx = side * WALL_X;
              let wx = cx + (lx * cr) * S;
              let wz = cz + (-lx * sr) * S;
              colliderGroup.add(createOwnedInvisibleBox(
                "TrackWallStraight_" + i + "_" + sideIndex,
                hThick * 2,
                hHeight * 2,
                hLen * 2,
                wx,
                wallY,
                wz,
                rad,
                0.0,
                0.1
              ));
            }
          } else if (key === "track-corner") {
            let wcx = cx + (ARC_CENTER_X * cr + ARC_CENTER_Z * sr) * S;
            let wcz = cz + (-ARC_CENTER_X * sr + ARC_CENTER_Z * cr) * S;
            let arcStart = -rad;
            addArcWalls(colliderGroup, "TrackWallOuter_" + i, wcx, wcz, arcStart, OUTER_R, OUTER_SEG, OUTER_SEG_HALF_LEN, wallY, hThick, hHeight);
            addArcWalls(colliderGroup, "TrackWallInner_" + i, wcx, wcz, arcStart, INNER_R, INNER_SEG, INNER_SEG_HALF_LEN, wallY, hThick, hHeight);
          }
        }
      }
    }

    trackGroup.updateMatrixWorld(true);
    trackGroup.traverse(function(child) {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    markRuntimeOnly(runtimeRoot);
    if (isPreview) {
      this._editorPreviewRoot = runtimeRoot;
      if (previewParent && typeof previewParent.add === "function") {
        previewParent.add(runtimeRoot);
      } else {
        scene.add(runtimeRoot);
      }
    } else {
      this._runtimeRoot = runtimeRoot;
      let runtimeGO = erth.object.createFromThreeObject(runtimeRoot);
      await erth.scene.addObject(runtimeGO);
      this._spawnNpcBatch(100);
      this._createNpcUi();
    }

    let finishCell = null;
    for (let c = 0; c < TRACK_CELLS.length; c++) {
      if (TRACK_CELLS[c][2] === "track-finish") {
        finishCell = TRACK_CELLS[c];
        break;
      }
    }

    if (!isPreview && finishCell) {
      let sx = (finishCell[0] + 0.5) * CELL_RAW * GRID_SCALE;
      let sz = (finishCell[1] + 0.5) * CELL_RAW * GRID_SCALE;
      let sAngle = (ORIENT_DEG[finishCell[3]] || 0) * Math.PI / 180;
      erth.store.set("skr_spawnX", sx);
      erth.store.set("skr_spawnY", 0.5);
      erth.store.set("skr_spawnZ", sz);
      erth.store.set("skr_spawnAngle", sAngle);
    } else if (!isPreview) {
      erth.store.set("skr_spawnX", 3.5);
      erth.store.set("skr_spawnY", 0.5);
      erth.store.set("skr_spawnZ", 5);
      erth.store.set("skr_spawnAngle", 0);
    }

    if (!isPreview) {
      erth.store.set("skr_trackReady", true);
    }
  };

  this.onEditorAdded = function(editor) { // @check-ok lazy init guards handle pre-init state
    // Lazy init guards — editor callbacks run BEFORE init()
    if (this._editorPreviewRoot === undefined) this._editorPreviewRoot = null;
    if (this._npcRunners === undefined) this._npcRunners = [];
    if (this._npcClickCount === undefined) this._npcClickCount = 0;
    if (this._npcWaypoints === undefined) this._npcWaypoints = [];
    if (this._npcCurve === undefined) this._npcCurve = null;
    if (this._dummy === undefined) this._dummy = new THREE.Object3D();
    if (this._npcUp === undefined) this._npcUp = new THREE.Vector3(0, 1, 0);
    if (this._npcTempPos === undefined) this._npcTempPos = new THREE.Vector3();
    if (this._npcTempTangent === undefined) this._npcTempTangent = new THREE.Vector3(0, 0, 1);
    if (this._npcTempAhead === undefined) this._npcTempAhead = new THREE.Vector3(0, 0, 1);
    if (this._npcTempRight === undefined) this._npcTempRight = new THREE.Vector3(1, 0, 0);
    if (this._editorPreviewRoot) {
      this._disposeOwnedRoot(this._editorPreviewRoot, false); // @check-ok guarded above
      this._editorPreviewRoot = null;
    }
    this._buildTrack({ // @check-ok lazy init guards above
      preview: true,
      scene: editor.scene,
      parent: this.gameObject
    });
  };

  this.onEditorRemoved = function() { // @check-ok null-guarded
    if (!this._editorPreviewRoot) return;
    this._disposeOwnedRoot(this._editorPreviewRoot, false);
    this._editorPreviewRoot = null;
  };

  this.onEditorDispose = function() { // @check-ok null-guarded
    if (!this._editorPreviewRoot) return;
    this._disposeOwnedRoot(this._editorPreviewRoot, false);
    this._editorPreviewRoot = null;
  };

  this.update = function(deltaTime) {
    if (typeof UIKitPointerEvents !== "undefined") UIKitPointerEvents.update(deltaTime);
    this._advanceNpcTraffic(deltaTime);
  };

  this.onStop = function() {
    this._disposeNpcUi();
    if (this._runtimeRoot) {
      this._disposeOwnedRoot(this._runtimeRoot, true);
      this._runtimeRoot = null;
    }
    this._npcRuntimeRoot = null;
    erth.store.set("skr_trackReady", false);
    this._npcRunners = [];
    this._npcTemplates = {};
    this._npcCurve = null;
    this._built = false;
  };

  this.dispose = function() {
    this._disposeNpcUi();
    if (this._runtimeRoot) {
      this._disposeOwnedRoot(this._runtimeRoot, true);
      this._runtimeRoot = null;
    }
    if (this._editorPreviewRoot) {
      this._disposeOwnedRoot(this._editorPreviewRoot, false);
      this._editorPreviewRoot = null;
    }
    this._npcRuntimeRoot = null;
    this._npcRunners = [];
    this._npcTemplates = {};
    this._npcCurve = null;
    this._npcWaypoints = [];
    this._built = false;
  };
