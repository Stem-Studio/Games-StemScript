# Generated by Script Wizard — Voxel Valley conversion
meta:
  tool: StemStudio
  type: behavior
  exportVersion: 1
config:
  name: "VV Audio"
  id: "vv.audio"
  author: "conversion"
  isScript: true
  main: "script.js"
  version: "1.0.0"
  priority: 0
  description: "Ambient audio manager for background nature sounds"
  tags:
    - audio
  documentation: "Plays looping ambient audio that starts on first user interaction."
  attributes:
    ambienceSound:
      name: "Ambience Sound"
      type: "audioAsset"
    volume:
      name: "Volume"
      type: "number"
      default: 0.5
      min: 0
      max: 1
    loop:
      name: "Loop"
      type: "boolean"
      default: true
  throttleConfig:
    throttlePriority: "LOW"
    enableFrustumCulling: false
    enableDistanceThrottling: false
    requiresConsistentUpdates: false
code: |
  let game;
  let audioElement = null;
  let audioStarted = false;

  function startAudio() {
    if (audioStarted || !audioElement) return;
    audioElement.play().catch(function() {});
    audioStarted = true;
  }

  function onInteraction() { // @check-ok
    startAudio();
  }

  this.init = async function(_game) {
    game = _game;

    let url = await this.erth.asset.audio.getUrl(this.getAttribute("ambienceSound"));
    if (!url) return;

    audioElement = new Audio(url);
    audioElement.loop = this.getAttribute("loop");
    audioElement.volume = this.getAttribute("volume");

    // Audio unlock polled per-frame in update() via InputManager.
    this._primaryPrev = 0;
  };

  this.update = function() {
    if (audioStarted || !game || !game.inputManager) return;
    const im = game.inputManager;
    const primary = im.getMotion ? (im.getMotion('primary') || 0) : 0;
    const fwd = im.getMotion ? (im.getMotion('forward') || 0) : 0;
    const lat = im.getMotion ? (im.getMotion('lateral') || 0) : 0;
    const jump = !!im.getAction('jump');
    if ((this._primaryPrev <= 0.5 && primary > 0.5) || jump || Math.abs(fwd) > 0.1 || Math.abs(lat) > 0.1) {
      onInteraction();
    }
    this._primaryPrev = primary;
  };

  this.onAttributeChanged = function(key, newValue) {
    if (key === "volume" && audioElement) {
      audioElement.volume = newValue;
    }
    if (key === "loop" && audioElement) {
      audioElement.loop = newValue;
    }
  };

  this.dispose = function() {
    if (audioElement) {
      audioElement.pause();
      audioElement.src = "";
      audioElement = null;
    }
    this._primaryPrev = 0;
  };
