# Generated by Script Wizard — Voxel Valley conversion
meta:
  tool: StemStudio
  type: behavior
  exportVersion: 1
config:
  name: "VV Player Controller"
  id: "vv.player"
  author: "conversion"
  isScript: true
  main: "script.js"
  version: "1.0.0"
  priority: 0
  description: "First-person voxel player with movement, gravity, jumping, and block place/break"
  tags:
    - gameplay
    - player
  documentation: "Pointer-lock FPS controller with WASD movement, jump, gravity, and block interaction via voxel ray marching."
  attributes:
    moveSpeed:
      name: "Move Speed"
      type: "number"
      default: 5
      min: 1
      max: 20
    jumpForce:
      name: "Jump Force"
      type: "number"
      default: 8
      min: 1
      max: 30
    gravity:
      name: "Gravity"
      type: "number"
      default: -20
      min: -50
      max: 0
    playerHeight:
      name: "Player Height"
      type: "number"
      default: 2
      min: 0.5
      max: 4
    reachDistance:
      name: "Reach Distance"
      type: "number"
      default: 8
      min: 2
      max: 20
    mouseSensitivity:
      name: "Mouse Sensitivity"
      type: "number"
      default: 0.002
      min: 0.0005
      max: 0.01
  inputs:
    vv_Slot1: { action: true, bindings: [{ keyboard: Digit1 }] }
    vv_Slot2: { action: true, bindings: [{ keyboard: Digit2 }] }
    vv_Slot3: { action: true, bindings: [{ keyboard: Digit3 }] }
    vv_Slot4: { action: true, bindings: [{ keyboard: Digit4 }] }
    vv_Slot5: { action: true, bindings: [{ keyboard: Digit5 }] }
    vv_PrevSlot: { action: true, bindings: [{ keyboard: KeyQ }] }
    vv_NextSlot: { action: true, bindings: [{ keyboard: KeyE }] }
  throttleConfig:
    throttlePriority: "CRITICAL"
    enableFrustumCulling: false
    enableDistanceThrottling: false
    requiresConsistentUpdates: true
code: |
  let game;
  let im;
  let erth;
  let cam;

  let BLOCK_TYPES, BLOCK_COLORS, PLACEABLE;
  let W, H, D, BS;

  let velocity = new THREE.Vector3();
  // Pre-allocated scratch vectors — reused each update() frame
  const _scratchForward = new THREE.Vector3();
  const _scratchRight = new THREE.Vector3();
  const _scratchUp = new THREE.Vector3(0, 1, 0);
  const _scratchDir = new THREE.Vector3();
  const _scratchPos = new THREE.Vector3();
  let onGround = false;
  let selected = 0;
  let prevPrimary = false;
  let prevSecondary = false;
  let prevJump = false;

  let isLocked = false;
  let euler = new THREE.Euler(0, 0, 0, "YXZ");

  // FPS view-look uses a raw pointermove listener: InputManager
  // `getMotion("view_x"/"view_y")` returns the ACCUMULATED delta and is
  // never auto-reset, which produces continuous spin after one mouse
  // motion. Canonical: docs/examples/canonical/fps_view_delta.js.
  let viewDx = 0;
  let viewDy = 0;
  let onPointerMove = null;

  let highlightBreak = null;
  let highlightPlace = null;

  let numberKeys = {};

  function getBlock(x, y, z) {
    game.behaviorManager.sendEventToObjectBehaviors(game.scene, "vv_getBlock", { x: x, y: y, z: z });
    return erth.store.get("vv_blockResult") || 0;
  }

  function setBlock(x, y, z, type) {
    game.behaviorManager.sendEventToObjectBehaviors(game.scene, "vv_setBlock", { x: x, y: y, z: z, type: type });
  }

  function getVoxelCoords(wx, wy, wz) {
    return {
      x: Math.floor(wx / BS + W / 2),
      y: Math.floor(wy / BS),
      z: Math.floor(wz / BS + D / 2)
    };
  }

  function getTerrainHeight(wx, wz) {
    game.behaviorManager.sendEventToObjectBehaviors(game.scene, "vv_getTerrainHeight", { wx: wx, wz: wz });
    return erth.store.get("vv_terrainHeightResult") || 0;
  }

  function makeOutline(size, color) {
    let edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(size, size, size));
    let mat = new THREE.LineBasicNodeMaterial({ color: color });
    let line = new THREE.LineSegments(edges, mat);
    line.userData.isRuntimeOnly = true;
    line.visible = false;
    return line;
  }

  function makeGhost(size, color, opacity) {
    let geo = new THREE.BoxGeometry(size, size, size);
    let mat = new THREE.MeshBasicNodeMaterial({ color: color, transparent: true, opacity: opacity });
    let mesh = new THREE.Mesh(geo, mat);
    mesh.userData.isRuntimeOnly = true;
    mesh.visible = false;
    return mesh;
  }

  const findBlockHit = (origin, direction) => {
    let step = BS * 0.25;
    let maxSteps = Math.ceil(this.getAttribute("reachDistance") * BS / step);
    let pos = origin.clone();
    let prevVoxel = null;

    for (let i = 0; i < maxSteps; i++) {
      pos.addScaledVector(direction, step);
      let vc = getVoxelCoords(pos.x, pos.y, pos.z);

      if (vc.x < 0 || vc.x >= W || vc.y < 0 || vc.y >= H || vc.z < 0 || vc.z >= D) {
        prevVoxel = vc;
        continue;
      }

      let blockType = getBlock(vc.x, vc.y, vc.z);
      if (blockType !== 0) {
        return { hit: true, voxel: vc, prevVoxel: prevVoxel, blockType: blockType };
      }
      prevVoxel = { x: vc.x, y: vc.y, z: vc.z };
    }
    return { hit: false };
  }

  // Inputs are polled per-frame in update() via InputManager.
  // Wheel-based slot scrolling is unsupported (no engine wheel API).
  let _qPrev = false;
  let _ePrev = false;

  function onCanvasClick() {
    if (!isLocked && game.renderer && game.renderer.domElement && game.renderer.domElement.requestPointerLock) {
      game.renderer.domElement.requestPointerLock();
    }
  }

  this.onEditorAdded = function() {
    // No editor preview needed for player controller
  };

  this.onEditorDispose = function() {};

  this.init = function(_game) {
    game = _game;
    erth = this.erth;
    im = game.inputManager;
    cam = game.camera;

    try {
      BLOCK_TYPES = JSON.parse(this.erth.store.get("vv_BLOCK_TYPES") || "{}");
      BLOCK_COLORS = JSON.parse(this.erth.store.get("vv_BLOCK_COLORS") || "{}");
      PLACEABLE = JSON.parse(this.erth.store.get("vv_PLACEABLE") || "[1,2,3,4,5]");
    } catch (e) {
      BLOCK_TYPES = { AIR: 0, GRASS: 1, DIRT: 2, WOOD: 3, ROOF: 4, WATER: 5 };
      BLOCK_COLORS = { 1: 0x55a630, 2: 0x964b00, 3: 0x654321, 4: 0xdc143c, 5: 0x4682b4 };
      PLACEABLE = [1, 2, 3, 4, 5];
    }
    W = this.erth.store.get("vv_W") || 48;
    H = this.erth.store.get("vv_H") || 24;
    D = this.erth.store.get("vv_D") || 48;
    BS = this.erth.store.get("vv_BS") || 1;

    highlightBreak = makeOutline(BS, 0xffd24d);
    highlightPlace = makeGhost(BS, 0xffffff, 0.28);
    highlightBreak.userData.isRuntimeOnly = true;
    highlightPlace.userData.isRuntimeOnly = true;
    game.addObject(highlightBreak); // @check-ok - legacy pattern; proper fix uses erth.scene.addObject
    game.addObject(highlightPlace); // @check-ok - legacy pattern; proper fix uses erth.scene.addObject

    let spawnHeight = getTerrainHeight(0, 0);
    cam.position.set(0, spawnHeight + this.getAttribute("playerHeight") / 2, 0);
    this.gameObject.position.copy(cam.position);

    if (game.renderer && game.renderer.domElement) {
      const canvas = game.renderer.domElement;
      canvas.addEventListener("click", onCanvasClick); // @check-ok pointer lock request
      onPointerMove = function(e) {
        if (typeof document === "undefined" || document.pointerLockElement !== canvas) return;
        viewDx += e.movementX || 0;
        viewDy += e.movementY || 0;
      };
      canvas.addEventListener("pointermove", onPointerMove, { passive: true });
    }

    game.behaviorManager.sendEventToObjectBehaviors(game.scene, "vv_selectBlock", { index: 0 });
  };

  this.update = function(deltaTime) {
    const dt = Math.min(deltaTime, 0.1);
    if (!cam) return;

    // Poll pointer lock + view + slot keys via InputManager
    isLocked = (typeof document !== "undefined") && document.pointerLockElement === (game.renderer && game.renderer.domElement);
    if (im) {
      if (isLocked) {
        const sens = this.getAttribute("mouseSensitivity");
        euler.setFromQuaternion(cam.quaternion);
        euler.y -= viewDx * sens;
        euler.x -= viewDy * sens;
        euler.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, euler.x));
        cam.quaternion.setFromEuler(euler);
        viewDx = 0;
        viewDy = 0;
      } else {
        // Drop motion accumulated before lock engaged so the first
        // post-lock frame doesn't snap by the cursor's pre-lock path.
        viewDx = 0;
        viewDy = 0;
      }
      // Slot 1-5
      for (let i = 1; i <= 5; i++) {
        numberKeys["Digit" + i] = !!im.getAction("vv_Slot" + i);
      }
      // Q / E cycle
      const qNow = !!im.getAction('vv_PrevSlot');
      const eNow = !!im.getAction('vv_NextSlot');
      if (isLocked && qNow && !_qPrev) {
        selected = (selected - 1 + PLACEABLE.length) % PLACEABLE.length;
        game.behaviorManager.sendEventToObjectBehaviors(game.scene, "vv_selectBlock", { index: selected });
      }
      if (isLocked && eNow && !_ePrev) {
        selected = (selected + 1) % PLACEABLE.length;
        game.behaviorManager.sendEventToObjectBehaviors(game.scene, "vv_selectBlock", { index: selected });
      }
      _qPrev = qNow;
      _ePrev = eNow;
    }

    for (let i = 1; i <= 5; i++) {
      if (numberKeys["Digit" + i]) {
        selected = i - 1;
        game.behaviorManager.sendEventToObjectBehaviors(game.scene, "vv_selectBlock", { index: selected });
        numberKeys["Digit" + i] = false;
      }
    }

    if (isLocked) {
      let speed = this.getAttribute("moveSpeed");
      let fwd = im ? im.getMotion("forward") : 0;
      let lat = im ? im.getMotion("lateral") : 0;

      const forward = _scratchForward;
      cam.getWorldDirection(forward);
      forward.y = 0;
      forward.normalize();

      const right = _scratchRight;
      right.crossVectors(forward, _scratchUp).normalize();

      cam.position.addScaledVector(forward, fwd * speed * deltaTime);
      cam.position.addScaledVector(right, lat * speed * deltaTime);

      let jumpAction = im ? im.getAction("jump") : false;
      if (jumpAction && !prevJump && onGround) {
        velocity.y = this.getAttribute("jumpForce");
        onGround = false;
      }
      prevJump = jumpAction;

      if (!onGround) {
        velocity.y += this.getAttribute("gravity") * deltaTime;
      }
      cam.position.y += velocity.y * deltaTime;

      // Ground check
      let footY = cam.position.y - this.getAttribute("playerHeight") / 2;
      let vc = getVoxelCoords(cam.position.x, footY, cam.position.z);
      if (vc.x >= 0 && vc.x < W && vc.z >= 0 && vc.z < D && vc.y >= 0 && vc.y < H) {
        if (getBlock(vc.x, vc.y, vc.z) !== 0) {
          onGround = true;
          velocity.y = 0;
          cam.position.y = (vc.y + 1) * BS + this.getAttribute("playerHeight") / 2;
        } else {
          onGround = false;
        }
      } else if (vc.y < 0) {
        let spawnH = getTerrainHeight(0, 0);
        cam.position.set(0, spawnH + this.getAttribute("playerHeight") / 2, 0);
        velocity.y = 0;
        onGround = true;
      } else {
        onGround = false;
      }

      // Head collision
      let headY = cam.position.y + this.getAttribute("playerHeight") / 2;
      let hc = getVoxelCoords(cam.position.x, headY, cam.position.z);
      if (hc.x >= 0 && hc.x < W && hc.z >= 0 && hc.z < D && hc.y >= 0 && hc.y < H) {
        if (getBlock(hc.x, hc.y, hc.z) !== 0 && velocity.y > 0) {
          velocity.y = 0;
        }
      }

      this.gameObject.position.copy(cam.position);

      // Block highlights — reuse scratch vectors
      const origin = _scratchPos.copy(cam.position);
      const dir = _scratchDir;
      cam.getWorldDirection(dir);
      let hitResult = findBlockHit(origin, dir);

      if (hitResult.hit) {
        highlightBreak.position.set(
          (hitResult.voxel.x + 0.5 - W / 2) * BS,
          (hitResult.voxel.y + 0.5) * BS,
          (hitResult.voxel.z + 0.5 - D / 2) * BS
        );
        highlightBreak.visible = true;

        if (hitResult.prevVoxel) {
          highlightPlace.position.set(
            (hitResult.prevVoxel.x + 0.5 - W / 2) * BS,
            (hitResult.prevVoxel.y + 0.5) * BS,
            (hitResult.prevVoxel.z + 0.5 - D / 2) * BS
          );
          highlightPlace.visible = true;
        } else {
          highlightPlace.visible = false;
        }
      } else {
        highlightBreak.visible = false;
        highlightPlace.visible = false;
      }

      // Break block (LMB)
      let primaryAction = im ? im.getAction("primary") : false;
      if (primaryAction && !prevPrimary && hitResult.hit) {
        setBlock(hitResult.voxel.x, hitResult.voxel.y, hitResult.voxel.z, 0);
      }
      prevPrimary = primaryAction;

      // Place block (RMB)
      let secondaryAction = im ? im.getAction("secondary") : false;
      if (secondaryAction && !prevSecondary && hitResult.hit && hitResult.prevVoxel) {
        let pv = hitResult.prevVoxel;
        if (pv.x >= 0 && pv.x < W && pv.y >= 0 && pv.y < H && pv.z >= 0 && pv.z < D) {
          if (getBlock(pv.x, pv.y, pv.z) === 0) {
            setBlock(pv.x, pv.y, pv.z, PLACEABLE[selected]);
          }
        }
      }
      prevSecondary = secondaryAction;
    } else {
      highlightBreak.visible = false;
      highlightPlace.visible = false;
    }
  };

  this.dispose = function() {
    if (game && game.renderer && game.renderer.domElement) {
      const canvas = game.renderer.domElement;
      canvas.removeEventListener("click", onCanvasClick);
      if (onPointerMove) {
        canvas.removeEventListener("pointermove", onPointerMove);
        onPointerMove = null;
      }
    }
    _qPrev = false;
    _ePrev = false;
    if (highlightBreak) { highlightBreak.removeFromParent(); highlightBreak.geometry.dispose(); highlightBreak.material.dispose(); }
    if (highlightPlace) { highlightPlace.removeFromParent(); highlightPlace.geometry.dispose(); highlightPlace.material.dispose(); }
  };
