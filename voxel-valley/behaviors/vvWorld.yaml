meta:
  tool: StemStudio
  type: behavior
  exportVersion: 1
config:
  name: "VV World"
  id: "vv.world"
  author: "conversion"
  isScript: true
  main: "script.js"
  version: "1.0.0"
  priority: 0
  description: "Voxel world generation and block management with InstancedMesh rendering"
  tags:
    - gameplay
    - world
  documentation: "Generates a seeded voxel terrain and renders blocks using InstancedMesh. Exposes block get/set via events."
  attributes:
    worldWidth:
      name: "World Width"
      type: "number"
      default: 48
      min: 8
      max: 128
    worldHeight:
      name: "World Height"
      type: "number"
      default: 24
      min: 8
      max: 64
    worldDepth:
      name: "World Depth"
      type: "number"
      default: 48
      min: 8
      max: 128
    blockSize:
      name: "Block Size"
      type: "number"
      default: 1
      min: 0.25
      max: 4
    terrainSeed:
      name: "Terrain Seed"
      type: "number"
      default: 42
    grassColorTex:
      name: "Grass Color Texture"
      type: "imageAsset"
    grassRoughnessTex:
      name: "Grass Roughness Texture"
      type: "imageAsset"
    grassAOTex:
      name: "Grass AO Texture"
      type: "imageAsset"
    grassNormalTex:
      name: "Grass Normal Texture"
      type: "imageAsset"
  throttleConfig:
    throttlePriority: "CRITICAL"
    enableFrustumCulling: false
    enableDistanceThrottling: false
    requiresConsistentUpdates: true
code: |
  let game;
  const BLOCK_TYPES = { AIR: 0, GRASS: 1, DIRT: 2, WOOD: 3, ROOF: 4, WATER: 5 };
  const BLOCK_COLORS = { 1: 0x55a630, 2: 0x964b00, 3: 0x654321, 4: 0xdc143c, 5: 0x4682b4 };
  const BLOCK_NAMES = { 1: "Grass", 2: "Dirt", 3: "Wood", 4: "Roof", 5: "Water" };
  const PLACEABLE = [1, 2, 3, 4, 5];

  let W, H, D, BS;
  let data;
  let meshes = {};
  let materials = {};
  let grassTextures = null;
  let _matrix = new THREE.Matrix4();
  let _color = new THREE.Color();
  let meshUpdateNeeded = false;

  function SeededRandom(seed) {
    let s = seed;
    return {
      next() { s = (s * 9301 + 49297) % 233280; return s / 233280; },
      nextFloat(min, max) { return min + this.next() * (max - min); },
      nextInt(min, max) { return Math.floor(this.nextFloat(min, max + 1)); }
    };
  }

  function idx(x, y, z) { return y * W * D + z * W + x; }

  function getBlock(x, y, z) {
    if (x < 0 || x >= W || y < 0 || y >= H || z < 0 || z >= D) return BLOCK_TYPES.AIR;
    return data[idx(x, y, z)];
  }

  function setBlock(x, y, z, type) {
    if (x < 0 || x >= W || y < 0 || y >= H || z < 0 || z >= D) return;
    data[idx(x, y, z)] = type;
    meshUpdateNeeded = true;
  }

  function getVoxelCoords(wx, wy, wz) {
    return {
      x: Math.floor(wx / BS + W / 2),
      y: Math.floor(wy / BS),
      z: Math.floor(wz / BS + D / 2)
    };
  }

  function getTerrainHeight(wx, wz) {
    let c = getVoxelCoords(wx, 0, wz);
    for (let y = H - 1; y >= 0; y--) {
      if (getBlock(c.x, y, c.z) !== BLOCK_TYPES.AIR) return (y + 1) * BS;
    }
    return 0;
  }

  async function loadGrassTextures(ctx) {
    let colorUrl = await ctx.erth.asset.image.getUrl(ctx.attributes.grassColorTex);
    let roughUrl = await ctx.erth.asset.image.getUrl(ctx.attributes.grassRoughnessTex);
    let aoUrl = await ctx.erth.asset.image.getUrl(ctx.attributes.grassAOTex);
    let normalUrl = await ctx.erth.asset.image.getUrl(ctx.attributes.grassNormalTex);
    if (!colorUrl) return;

    let loader = new THREE.TextureLoader();
    let configTex = function(tex) {
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(1, 1);
      tex.magFilter = THREE.LinearFilter;
      tex.minFilter = THREE.LinearMipmapLinearFilter;
      tex.anisotropy = 16;
    };

    let promises = [colorUrl, roughUrl, aoUrl, normalUrl].map(function(url) {
      if (!url) return Promise.resolve(null);
      return new Promise(function(resolve) {
        loader.load(url, function(tex) { configTex(tex); resolve(tex); }, undefined, function() { resolve(null); });
      });
    });

    Promise.all(promises).then(function(texArr) {
      grassTextures = { color: texArr[0], roughness: texArr[1], ao: texArr[2], normal: texArr[3] };
      makeMaterials();
      makeInstancedMeshes(ctx);
      updateMeshes();
    });
  }

  function makeMaterials() {
    if (grassTextures && grassTextures.color) {
      materials[BLOCK_TYPES.GRASS] = new THREE.MeshStandardNodeMaterial({
        map: grassTextures.color,
        roughnessMap: grassTextures.roughness,
        aoMap: grassTextures.ao,
        normalMap: grassTextures.normal,
        roughness: 0.85,
        metalness: 0.0
      });
    } else {
      materials[BLOCK_TYPES.GRASS] = new THREE.MeshStandardNodeMaterial({ color: BLOCK_COLORS[1], roughness: 0.85, metalness: 0 });
    }
    materials[BLOCK_TYPES.DIRT] = new THREE.MeshStandardNodeMaterial({ color: BLOCK_COLORS[2], roughness: 0.9, metalness: 0 });
    materials[BLOCK_TYPES.WOOD] = new THREE.MeshStandardNodeMaterial({ color: BLOCK_COLORS[3], roughness: 0.8, metalness: 0 });
    materials[BLOCK_TYPES.ROOF] = new THREE.MeshStandardNodeMaterial({ color: BLOCK_COLORS[4], roughness: 0.6, metalness: 0.1 });
    materials[BLOCK_TYPES.WATER] = new THREE.MeshStandardNodeMaterial({ color: BLOCK_COLORS[5], roughness: 0.2, metalness: 0.1, transparent: true, opacity: 0.7 });
  }

  function makeInstancedMeshes(ctx) {
    Object.values(meshes).forEach(function(m) {
      m.removeFromParent();
      m.geometry.dispose();
      m.dispose();
    });
    meshes = {};

    let maxBlocks = W * H * D;
    let geom = new THREE.BoxGeometry(BS, BS, BS);

    for (let typeId = 1; typeId <= 5; typeId++) {
      let mat = materials[typeId];
      if (!mat) continue;
      let mesh = new THREE.InstancedMesh(geom, mat, maxBlocks);
      mesh.count = 0;
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData.isRuntimeOnly = true;
      mesh.userData.vvBlockType = typeId;
      meshes[typeId] = mesh;
      ctx.gameObject._internal.three.add(mesh);
    }
  }

  function generateTerrain(seed) {
    data = new Uint8Array(W * H * D);
    for (let x = 0; x < W; x++) {
      for (let z = 0; z < D; z++) {
        let h = Math.floor(H * 0.3 + Math.sin(x / 8) * 2 + Math.cos(z / 7) * 1.5);
        for (let y = 0; y < h; y++) {
          data[idx(x, y, z)] = y < h - 1 ? BLOCK_TYPES.DIRT : BLOCK_TYPES.GRASS;
        }
      }
    }
  }

  function updateMeshes() {
    let blockCounts = {};
    for (let t = 1; t <= 5; t++) blockCounts[t] = 0;

    for (let x = 0; x < W; x++) {
      for (let y = 0; y < H; y++) {
        for (let z = 0; z < D; z++) {
          let id = data[idx(x, y, z)];
          if (id === BLOCK_TYPES.AIR) continue;
          let mesh = meshes[id];
          if (!mesh) continue;
          let ci = blockCounts[id];
          _matrix.makeTranslation(
            (x + 0.5 - W / 2) * BS,
            (y + 0.5) * BS,
            (z + 0.5 - D / 2) * BS
          );
          mesh.setMatrixAt(ci, _matrix);
          if (id !== BLOCK_TYPES.GRASS || !grassTextures) {
            mesh.setColorAt(ci, _color.setHex(BLOCK_COLORS[id]));
          }
          blockCounts[id]++;
        }
      }
    }

    for (let t = 1; t <= 5; t++) {
      let mesh = meshes[t];
      if (!mesh) continue;
      mesh.count = blockCounts[t];
      mesh.instanceMatrix.needsUpdate = true;
      if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
    }
    meshUpdateNeeded = false;
  }

  this.onEditorAdded = function() {
    // Simplified preview: show a small wireframe bounding box for the world
    let boxGeo = new THREE.BoxGeometry(48, 24, 48);
    let edges = new THREE.EdgesGeometry(boxGeo);
    let lineMat = new THREE.LineBasicNodeMaterial({ color: 0x55a630 });
    let preview = new THREE.LineSegments(edges, lineMat);
    preview.position.set(0, 12, 0);
    preview.userData.isRuntimeOnly = true;
    this._editorPreview = preview;
    this.gameObject._internal.three.add(preview);
  };

  this.onEditorDispose = function() {
    if (this._editorPreview) {
      this._editorPreview.removeFromParent();
      this._editorPreview.geometry.dispose();
      this._editorPreview.material.dispose();
      this._editorPreview = null;
    }
  };

  this.init = async function(_game) {
    game = _game;

    W = this.getAttribute("worldWidth");
    H = this.getAttribute("worldHeight");
    D = this.getAttribute("worldDepth");
    BS = this.getAttribute("blockSize");

    this.erth.store.set("vv_BLOCK_TYPES", JSON.stringify(BLOCK_TYPES));
    this.erth.store.set("vv_BLOCK_COLORS", JSON.stringify(BLOCK_COLORS));
    this.erth.store.set("vv_BLOCK_NAMES", JSON.stringify(BLOCK_NAMES));
    this.erth.store.set("vv_PLACEABLE", JSON.stringify(PLACEABLE));
    this.erth.store.set("vv_W", W);
    this.erth.store.set("vv_H", H);
    this.erth.store.set("vv_D", D);
    this.erth.store.set("vv_BS", BS);

    makeMaterials();
    makeInstancedMeshes(this);
    generateTerrain(this.getAttribute("terrainSeed"));
    updateMeshes();
    await loadGrassTextures(this);
  };

  this.onEvent = function(msg, eventData) {
    if (msg === "vv_setBlock") {
      setBlock(eventData.x, eventData.y, eventData.z, eventData.type);
    } else if (msg === "vv_getBlock") {
      this.erth.store.set("vv_blockResult", getBlock(eventData.x, eventData.y, eventData.z));
    } else if (msg === "vv_getTerrainHeight") {
      this.erth.store.set("vv_terrainHeightResult", getTerrainHeight(eventData.wx, eventData.wz));
    } else if (msg === "vv_getVoxelCoords") {
      let result = getVoxelCoords(eventData.wx, eventData.wy, eventData.wz);
      this.erth.store.set("vv_voxelCoordsResult", JSON.stringify(result));
    }
  };

  this.update = function(deltaTime) {
    if (meshUpdateNeeded) {
      updateMeshes();
    }
  };

  this.dispose = function() {
    Object.values(meshes).forEach(function(m) {
      m.removeFromParent();
      m.geometry.dispose();
      m.dispose();
    });
    Object.values(materials).forEach(function(m) { m.dispose(); });
    if (grassTextures) {
      Object.values(grassTextures).forEach(function(t) { if (t) t.dispose(); });
    }
    meshes = {};
    materials = {};
  };
