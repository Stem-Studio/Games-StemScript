# Generated by Script Wizard — Voxel Valley conversion
meta:
  tool: StemStudio
  type: behavior
  exportVersion: 1
config:
  name: "VV HUD"
  id: "vv.hud"
  author: "conversion"
  isScript: true
  main: "script.js"
  version: "1.0.0"
  priority: 0
  description: "UIKit-based HUD with crosshair, hotbar, and block selection display"
  tags:
    - ui
    - hud
  documentation: "Renders a crosshair and 5-slot block hotbar using UIKit. Listens for vv_selectBlock events."
  attributes:
    crosshairSize:
      name: "Crosshair Size"
      type: "number"
      default: 24
      min: 8
      max: 64
    hotbarSlotSize:
      name: "Hotbar Slot Size"
      type: "number"
      default: 48
      min: 24
      max: 96
  throttleConfig:
    throttlePriority: "HIGH"
    enableFrustumCulling: false
    enableDistanceThrottling: false
    requiresConsistentUpdates: true
code: |
  let game;
  let root = null;
  let slots = [];
  let selectedIndex = 0;

  const BLOCK_COLORS_HEX = { 1: "#55a630", 2: "#964b00", 3: "#654321", 4: "#dc143c", 5: "#4682b4" };
  const BLOCK_NAMES = { 1: "Grass", 2: "Dirt", 3: "Wood", 4: "Roof", 5: "Water" };
  const PLACEABLE = [1, 2, 3, 4, 5];

  function buildHUD(ctx) {
    let uiCam = game.uiCamera;
    if (!uiCam) return;

    let slotSize = ctx.attributes.hotbarSlotSize;
    let crossSize = ctx.attributes.crosshairSize;

    root = new UIKit.Container({
      width: "100%",
      height: "100%",
      justifyContent: "center",
      alignItems: "center",
      pointerEvents: "none", visibility: "visible"
    });
    root.userData.isRuntimeOnly = true;
    uiCam.add(root);

    // Crosshair
    let crosshair = new UIKit.Container({
      width: crossSize,
      height: crossSize,
      justifyContent: "center",
      alignItems: "center",
      pointerEvents: "none", visibility: "visible"
    });
    let hLine = new UIKit.Container({
      width: crossSize,
      height: 2,
      backgroundColor: "rgba(255,255,255,0.8)",
      pointerEvents: "none", visibility: "visible"
    });
    let vLine = new UIKit.Container({
      width: 2,
      height: crossSize,
      backgroundColor: "rgba(255,255,255,0.8)",
      pointerEvents: "none",
      position: "absolute", visibility: "visible"
    });
    crosshair.add(hLine);
    crosshair.add(vLine);
    root.add(crosshair);

    // Hotbar
    let hotbar = new UIKit.Container({
      flexDirection: "row",
      gap: 4,
      padding: 6,
      backgroundColor: "rgba(0,0,0,0.5)",
      borderRadius: 8,
      position: "absolute",
      bottom: 20,
      justifyContent: "center",
      alignItems: "center",
      pointerEvents: "none", visibility: "visible"
    });
    root.add(hotbar);

    for (let i = 0; i < PLACEABLE.length; i++) {
      let blockType = PLACEABLE[i];
      let isSelected = i === selectedIndex;

      let slot = new UIKit.Container({
        width: slotSize,
        height: slotSize,
        backgroundColor: BLOCK_COLORS_HEX[blockType],
        borderRadius: 4,
        borderWidth: isSelected ? 3 : 1,
        borderColor: isSelected ? "#ffd24d" : "rgba(255,255,255,0.3)",
        justifyContent: "center",
        alignItems: "center",
        pointerEvents: "none", visibility: "visible"
      });

      let label = new UIKit.Text({
        text: BLOCK_NAMES[blockType],
        fontSize: 8,
        color: "white",
        fontWeight: "bold",
        pointerEvents: "none", visibility: "visible"
      });
      slot.add(label);

      let numLabel = new UIKit.Text({
        text: String(i + 1),
        fontSize: 6,
        color: "rgba(255,255,255,0.6)",
        position: "absolute",
        top: 2,
        left: 4,
        pointerEvents: "none", visibility: "visible"
      });
      slot.add(numLabel);

      hotbar.add(slot);
      slots.push(slot);
    }
  }

  function updateSelection(index) {
    selectedIndex = index;
    for (let i = 0; i < slots.length; i++) {
      let isSelected = i === selectedIndex;
      slots[i].setProperties({
        borderWidth: isSelected ? 3 : 1,
        borderColor: isSelected ? "#ffd24d" : "rgba(255,255,255,0.3)"
      });
    }
  }

  this.init = function(_game) {
    game = _game;
    buildHUD(this);
  };

  this.onEvent = function(msg, eventData) {
    if (msg === "vv_selectBlock" && eventData && eventData.index !== undefined) {
      updateSelection(eventData.index);
    }
  };

  this.dispose = function() {
    if (root) {
      root.removeFromParent();
    }
    slots = [];
  };
