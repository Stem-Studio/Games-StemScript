code: |-
  @import "uikit-dual-mode" as uikit;

  // Island Defense — Phase 1 MVP
  // Single-behavior UIKit port matching the math-meteors / 2048 pattern.
  // Audio imports declared in stemscript but playback wiring is Phase 2.
  // Dual-mode UIKit helper lives in `imports/uikit-dual-mode.yaml`.

  let game;

  // ─── Layout / colors ────────────────────────────────────────────────────
  const PANEL_W = 260; // right-side test panel width
  const HUD_H = 56; // top HUD strip height
  const GROUND_H_FRAC = 0.34; // ground band as fraction of (screen height - HUD)
  const CASTLE_W = 110;
  const CASTLE_H = 130;
  const CASTLE_MARGIN_X = 90; // distance from screen edge to castle left
  const HP_BAR_H = 8;
  const UNIT_W = 22;
  const UNIT_H = 28;
  const UNIT_HP_BAR_H = 4;
  const UNIT_SPAWN_MARGIN = 70; // distance from castle to spawn point
  const ATTACK_RANGE = 26; // melee engagement distance (px)
  const ATTACK_COOLDOWN_MS = 700;
  const BANNER_FADE_MS = 1800;

  const COLOR_BG = "#1e6091"; // ocean blue
  const COLOR_GROUND = "#c19a6b"; // sandy beige
  const COLOR_BLUE = "#3498db";
  const COLOR_BLUE_DARK = "#1f5f8b";
  const COLOR_RED = "#e74c3c";
  const COLOR_RED_DARK = "#922b21";
  const COLOR_HP_BG = "#2c2c2c";
  const COLOR_HP_GOOD = "#2ecc71";
  const COLOR_HP_WARN = "#f39c12";
  const COLOR_HP_BAD = "#e74c3c";
  const COLOR_PANEL = "#0a1929";
  const COLOR_PANEL_HEADER = "#5dade2";
  const COLOR_BTN = "#34495e";
  const COLOR_BTN_ACTIVE = "#27ae60";
  const COLOR_BTN_HOVER = "#5dade2";
  const COLOR_TEXT_LIGHT = "#ecf0f1";
  const COLOR_TEXT_MUTED = "#95a5a6";

  // ─── Helpers ────────────────────────────────────────────────────────────
  function hpColor(frac) {
      if (frac > 0.6) return COLOR_HP_GOOD;
      if (frac > 0.3) return COLOR_HP_WARN;
      return COLOR_HP_BAD;
  }

  // ─── Behavior lifecycle ─────────────────────────────────────────────────

  this._initState = function () {
      this._castleHPMax = this.getAttribute("castleHP") || 100;
      this._warriorHPBase = this.getAttribute("warriorHP") || 30;
      this._warriorAttack = this.getAttribute("warriorAttack") || 5;
      this._warriorSpeed = this.getAttribute("warriorSpeedPxPerSec") || 30;
      this._aiSpawnEasy = this.getAttribute("aiSpawnEasyMs") || 4000;
      this._aiSpawnMedium = this.getAttribute("aiSpawnMediumMs") || 2500;
      this._aiSpawnHard = this.getAttribute("aiSpawnHardMs") || 1500;
      this._aiHardHpMul = this.getAttribute("aiHardHpMul") || 1.5;
      this._totalRounds = this.getAttribute("totalRounds") || 3;

      this._difficulty = "medium";
      this._round = 0;
      this._battleActive = false;
      this._blueCastleHP = this._castleHPMax;
      this._redCastleHP = this._castleHPMax;
      this._units = [];
      this._aiSpawnTimer = 0;
      this._gameTime = 0;
      this._bannerExpireMs = 0;
      this._bannerActive = false;
      this._gameResult = null;
      this._screenW = 0;
      this._screenH = 0;
      this._battlefieldW = 0;
      this._diffButtons = {};
  };

  // Build the entire UIKit tree (called in both play and editor mode).
  this._buildUIKitContent = function () {
      this._battlefield = new UIKit.Container({
          positionType: "absolute",
          positionTop: 0,
          positionLeft: 0,
          positionBottom: 0,
          positionRight: PANEL_W,
          backgroundColor: COLOR_BG,
          pointerEvents: "none",
          visibility: "visible",
      });
      this._uiRoot.add(this._battlefield);

      this._groundBand = new UIKit.Container({
          positionType: "absolute",
          positionLeft: 0,
          positionRight: 0,
          backgroundColor: COLOR_GROUND,
          pointerEvents: "none",
          visibility: "visible",
      });
      this._battlefield.add(this._groundBand);

      this._buildCastle("blue");
      this._buildCastle("red");
      this._buildHud();
      this._buildTestPanel();
      this._buildBanner();
  };

  this.init = function (_game) {
      game = _game;
      this._initState();
      this._uikitCtx = uikit.createPlayContext(game);
      this._uiRoot = uikit.buildRoot(this._uikitCtx);
      this._buildUIKitContent();
      uikit.attach(this, this._uikitCtx);
  };

  // ─── UI construction: Castle ────────────────────────────────────────────

  this._buildCastle = function (team) {
      const isBlue = team === "blue";
      const main = isBlue ? COLOR_BLUE_DARK : COLOR_RED_DARK;
      const rim = isBlue ? COLOR_BLUE : COLOR_RED;

      const root = new UIKit.Container({
          positionType: "absolute",
          width: CASTLE_W,
          height: CASTLE_H,
          backgroundColor: main,
          borderRadius: 6,
          borderColor: rim,
          borderWidth: 3,
          flexDirection: "column",
          justifyContent: "flex-end",
          alignItems: "center",
          paddingBottom: 8,
          pointerEvents: "none",
          visibility: "visible",
      });
      // Roof crenellations row (3 colored squares on top)
      const roof = new UIKit.Container({
          positionType: "absolute",
          positionTop: -10,
          positionLeft: 0,
          positionRight: 0,
          flexDirection: "row",
          justifyContent: "space-around",
          visibility: "visible",
      });
      for (let i = 0; i < 3; i++) {
          roof.add(
              new UIKit.Container({
                  width: 18,
                  height: 14,
                  backgroundColor: rim,
                  borderRadius: 2,
                  visibility: "visible",
              }),
          );
      }
      root.add(roof);

      // Door
      root.add(
          new UIKit.Container({
              width: 32,
              height: 38,
              backgroundColor: "#2c1810",
              borderRadius: 4,
              borderColor: rim,
              borderWidth: 2,
              visibility: "visible",
          }),
      );

      // HP bar above castle
      const hpRoot = new UIKit.Container({
          positionType: "absolute",
          positionTop: -34,
          positionLeft: -10,
          positionRight: -10,
          height: HP_BAR_H + 12,
          flexDirection: "column",
          visibility: "visible",
      });
      const hpLabel = new UIKit.Text({
          text: (isBlue ? "BLUE" : "RED") + " " + this._castleHPMax + " / " + this._castleHPMax,
          fontSize: 11,
          fontWeight: "bold",
          color: isBlue ? COLOR_BLUE : COLOR_RED,
          textAlign: "center",
          visibility: "visible",
      });
      hpRoot.add(hpLabel);
      const hpTrack = new UIKit.Container({
          width: "100%",
          height: HP_BAR_H,
          backgroundColor: COLOR_HP_BG,
          borderRadius: HP_BAR_H / 2,
          visibility: "visible",
      });
      const hpFill = new UIKit.Container({
          width: "100%",
          height: HP_BAR_H,
          backgroundColor: COLOR_HP_GOOD,
          borderRadius: HP_BAR_H / 2,
          visibility: "visible",
      });
      hpTrack.add(hpFill);
      hpRoot.add(hpTrack);
      root.add(hpRoot);

      this._battlefield.add(root);
      if (isBlue) {
          this._blueCastle = {root: root, hpFill: hpFill, hpLabel: hpLabel};
      } else {
          this._redCastle = {root: root, hpFill: hpFill, hpLabel: hpLabel};
      }
  };

  // ─── UI construction: HUD ───────────────────────────────────────────────

  this._buildHud = function () {
      this._hud = new UIKit.Container({
          positionType: "absolute",
          positionTop: 0,
          positionLeft: 0,
          positionRight: 0,
          height: HUD_H,
          paddingTop: 12,
          paddingLeft: 24,
          paddingRight: 24,
          flexDirection: "row",
          justifyContent: "space-between",
          alignItems: "center",
          pointerEvents: "none",
          visibility: "visible",
      });
      this._battlefield.add(this._hud);

      this._hudBlue = new UIKit.Text({
          text: "BLUE: " + this._castleHPMax,
          fontSize: 22,
          fontWeight: "bold",
          color: COLOR_BLUE,
          visibility: "visible",
      });
      this._hud.add(this._hudBlue);

      this._hudRound = new UIKit.Text({
          text: "Press Start Battle",
          fontSize: 18,
          fontWeight: "bold",
          color: COLOR_TEXT_LIGHT,
          visibility: "visible",
      });
      this._hud.add(this._hudRound);

      this._hudRed = new UIKit.Text({
          text: "RED: " + this._castleHPMax,
          fontSize: 22,
          fontWeight: "bold",
          color: COLOR_RED,
          visibility: "visible",
      });
      this._hud.add(this._hudRed);
  };

  // ─── UI construction: Test Panel ────────────────────────────────────────

  this._buildTestPanel = function () {
      const self = this; // @check-ok
      this._panel = new UIKit.Container({
          positionType: "absolute",
          positionTop: 0,
          positionRight: 0,
          positionBottom: 0,
          width: PANEL_W,
          backgroundColor: COLOR_PANEL,
          paddingTop: 16,
          paddingBottom: 16,
          paddingLeft: 14,
          paddingRight: 14,
          flexDirection: "column",
          gap: 12,
          pointerEvents: "auto",
          visibility: "visible",
      });
      this._uiRoot.add(this._panel);

      // Title
      this._panel.add(
          new UIKit.Text({
              text: "ISLAND DEFENSE",
              fontSize: 18,
              fontWeight: "bold",
              color: COLOR_PANEL_HEADER,
              textAlign: "center",
              visibility: "visible",
          }),
      );
      this._panel.add(
          new UIKit.Text({
              text: "Test Panel",
              fontSize: 11,
              color: COLOR_TEXT_MUTED,
              textAlign: "center",
              visibility: "visible",
          }),
      );

      // Difficulty section
      this._panelSection("Difficulty");
      const diffRow = new UIKit.Container({
          flexDirection: "row",
          gap: 6,
          justifyContent: "space-between",
          visibility: "visible",
      });
      this._panel.add(diffRow);
      this._diffButtons.easy = this._panelButton(diffRow, "Easy", () => self._setDifficulty("easy"), {
          width: 70,
          isSmall: true,
      });
      this._diffButtons.medium = this._panelButton(diffRow, "Medium", () => self._setDifficulty("medium"), {
          width: 70,
          isSmall: true,
      });
      this._diffButtons.hard = this._panelButton(diffRow, "Hard", () => self._setDifficulty("hard"), {
          width: 70,
          isSmall: true,
      });
      this._refreshDifficultyButtons();

      // Battle section
      this._panelSection("Battle");
      this._panelButton(this._panel, "Start Battle", () => self._startBattle(), {color: COLOR_BTN_ACTIVE});

      // Spawn section
      this._panelSection("Spawn Blue Warriors");
      const spawnRow = new UIKit.Container({
          flexDirection: "row",
          gap: 6,
          justifyContent: "space-between",
          visibility: "visible",
      });
      this._panel.add(spawnRow);
      this._panelButton(spawnRow, "+1", () => self._spawnBlueWarriors(1), {width: 70, isSmall: true});
      this._panelButton(spawnRow, "+3", () => self._spawnBlueWarriors(3), {width: 70, isSmall: true});
      this._panelButton(spawnRow, "+5", () => self._spawnBlueWarriors(5), {width: 70, isSmall: true});

      // Banner preview
      this._panelSection("Banner Preview");
      const bannerRow = new UIKit.Container({
          flexDirection: "row",
          gap: 6,
          justifyContent: "space-between",
          visibility: "visible",
      });
      this._panel.add(bannerRow);
      this._panelButton(bannerRow, "R1", () => self._showBanner("Round 1 — Fight!", "#ecf0f1"), {
          width: 70,
          isSmall: true,
      });
      this._panelButton(bannerRow, "R2", () => self._showBanner("Round 2 — Fight!", "#f39c12"), {
          width: 70,
          isSmall: true,
      });
      this._panelButton(bannerRow, "R3", () => self._showBanner("Round 3 — Final!", "#e67e22"), {
          width: 70,
          isSmall: true,
      });

      // End-game
      this._panelSection("End Game");
      const endRow = new UIKit.Container({
          flexDirection: "row",
          gap: 6,
          justifyContent: "space-between",
          visibility: "visible",
      });
      this._panel.add(endRow);
      this._panelButton(endRow, "Victory", () => self._showBanner("VICTORY!", COLOR_HP_GOOD, true), {
          width: 110,
          isSmall: true,
      });
      this._panelButton(endRow, "Defeat", () => self._showBanner("DEFEAT", COLOR_HP_BAD, true), {
          width: 110,
          isSmall: true,
      });

      // Reset
      this._panelSection(" ");
      this._panelButton(this._panel, "Reset Battle", () => self._resetBattle(), {color: "#7f8c8d"});

      // Footer note
      this._panel.add(
          new UIKit.Text({
              text: "Phase 1 MVP: pixel-art sprites,\nanimations, audio playback,\ncamera pan/zoom — see\nisland-defense-todo.md.",
              fontSize: 10,
              color: COLOR_TEXT_MUTED,
              textAlign: "center",
              marginTop: 8,
              visibility: "visible",
          }),
      );
  };

  this._panelSection = function (label) {
      this._panel.add(
          new UIKit.Text({
              text: label,
              fontSize: 12,
              fontWeight: "bold",
              color: COLOR_PANEL_HEADER,
              marginTop: 8,
              visibility: "visible",
          }),
      );
  };

  this._panelButton = function (parent, label, onClick, opts) {
      opts = opts || {};
      const width = opts.width || 224;
      const height = opts.isSmall ? 32 : 40;
      const fontSize = opts.isSmall ? 12 : 14;
      const color = opts.color || COLOR_BTN;

      const btn = new UIKit.Container({
          width: width,
          height: height,
          backgroundColor: color,
          borderRadius: 6,
          justifyContent: "center",
          alignItems: "center",
          pointerEvents: "auto",
          cursor: "pointer",
          hover: {backgroundOpacity: 0.85},
          onClick: onClick,
          visibility: "visible",
      });
      const txt = new UIKit.Text({
          text: label,
          fontSize: fontSize,
          fontWeight: "bold",
          color: COLOR_TEXT_LIGHT,
          visibility: "visible",
      });
      btn.add(txt);
      parent.add(btn);
      return btn;
  };

  this._refreshDifficultyButtons = function () {
      const map = {easy: COLOR_HP_GOOD, medium: COLOR_HP_WARN, hard: COLOR_HP_BAD};
      for (const k of ["easy", "medium", "hard"]) {
          if (this._diffButtons[k]) {
              this._diffButtons[k].setProperties({
                  backgroundColor: this._difficulty === k ? map[k] : COLOR_BTN,
              });
          }
      }
  };

  // ─── UI construction: Banner ────────────────────────────────────────────

  this._buildBanner = function () {
      this._bannerRoot = new UIKit.Container({
          positionType: "absolute",
          positionLeft: 0,
          positionRight: PANEL_W,
          positionTop: "30%",
          height: 120,
          flexDirection: "column",
          justifyContent: "center",
          alignItems: "center",
          pointerEvents: "none",
          visibility: "hidden",
      });
      this._battlefield.add(this._bannerRoot);

      this._bannerBg = new UIKit.Container({
          width: 460,
          height: 100,
          backgroundColor: "#000000",
          backgroundOpacity: 0.78,
          borderRadius: 12,
          borderColor: "#ffffff",
          borderWidth: 2,
          justifyContent: "center",
          alignItems: "center",
          visibility: "visible",
      });
      this._bannerRoot.add(this._bannerBg);

      this._bannerText = new UIKit.Text({
          text: "Round 1",
          fontSize: 44,
          fontWeight: "bold",
          color: "#ecf0f1",
          textAlign: "center",
          visibility: "visible",
      });
      this._bannerBg.add(this._bannerText);
  };

  // ─── State transitions ─────────────────────────────────────────────────

  this._setDifficulty = function (d) {
      if (this._battleActive) return; // can only change before battle
      this._difficulty = d;
      this._refreshDifficultyButtons();
  };

  this._aiSpawnInterval = function () {
      if (this._difficulty === "easy") return this._aiSpawnEasy;
      if (this._difficulty === "hard") return this._aiSpawnHard;
      return this._aiSpawnMedium;
  };

  this._startBattle = function () {
      if (this._battleActive) return;
      if (this._gameResult !== null) {
          this._resetBattle(); // implicit reset if a previous game ended
      }
      this._battleActive = true;
      this._round = 1;
      this._gameTime = 0;
      this._aiSpawnTimer = 0;
      this._gameResult = null;
      this._showBanner("Round 1 — Fight!", "#ecf0f1");
      this._updateHud();
  };

  this._endBattle = function (result) {
      this._battleActive = false;
      this._gameResult = result;
      this._showBanner(
          result === "victory" ? "VICTORY!" : "DEFEAT",
          result === "victory" ? COLOR_HP_GOOD : COLOR_HP_BAD,
          true,
      );
  };

  this._resetBattle = function () {
      this._battleActive = false;
      this._round = 0;
      this._gameTime = 0;
      this._aiSpawnTimer = 0;
      this._blueCastleHP = this._castleHPMax;
      this._redCastleHP = this._castleHPMax;
      this._clearAllUnits();
      this._gameResult = null;
      this._bannerActive = false;
      this._bannerRoot.setProperties({visibility: "hidden"});
      this._updateHud();
      this._refreshCastleHPVisuals();
  };

  this._clearAllUnits = function () {
      for (let i = this._units.length - 1; i >= 0; i--) {
          const u = this._units[i];
          if (u.container && u.container.parent) u.container.parent.remove(u.container);
          if (u.container && u.container.dispose) u.container.dispose();
      }
      this._units = [];
  };

  // ─── Unit spawn ─────────────────────────────────────────────────────────

  this._spawnBlueWarriors = function (count) {
      if (!this._battleActive) return;
      for (let i = 0; i < count; i++) {
          this._spawnUnit("blue", "warrior");
      }
  };

  this._spawnUnit = function (team, type) {
      const groundY = this._groundCenterY();
      const baseX =
          team === "blue"
              ? CASTLE_MARGIN_X + CASTLE_W / 2 + UNIT_SPAWN_MARGIN
              : this._battlefieldW - CASTLE_MARGIN_X - CASTLE_W / 2 - UNIT_SPAWN_MARGIN;
      const yJitter = (Math.random() - 0.5) * 50;
      const x = baseX;
      const y = groundY + yJitter;
      const hpMul = team === "red" && this._difficulty === "hard" ? this._aiHardHpMul : 1;
      const hp = Math.floor(this._warriorHPBase * hpMul);

      const unit = {
          team: team,
          type: type,
          x: x,
          y: y,
          hp: hp,
          maxHp: hp,
          attack: this._warriorAttack,
          speed: this._warriorSpeed,
          target: null,
          lastAttackMs: -Infinity,
          container: null,
          hpFill: null,
      };
      this._buildUnitVisual(unit);
      this._units.push(unit);
  };

  this._buildUnitVisual = function (unit) {
      const isBlue = unit.team === "blue";
      const color = isBlue ? COLOR_BLUE : COLOR_RED;
      const dark = isBlue ? COLOR_BLUE_DARK : COLOR_RED_DARK;

      const c = new UIKit.Container({
          positionType: "absolute",
          width: UNIT_W,
          height: UNIT_H + 12,
          flexDirection: "column",
          alignItems: "center",
          pointerEvents: "none",
          visibility: "visible",
      });
      // HP bar (above the body)
      const hpTrack = new UIKit.Container({
          width: UNIT_W,
          height: UNIT_HP_BAR_H,
          backgroundColor: COLOR_HP_BG,
          borderRadius: UNIT_HP_BAR_H / 2,
          visibility: "visible",
      });
      const hpFill = new UIKit.Container({
          width: "100%",
          height: UNIT_HP_BAR_H,
          backgroundColor: COLOR_HP_GOOD,
          borderRadius: UNIT_HP_BAR_H / 2,
          visibility: "visible",
      });
      hpTrack.add(hpFill);
      c.add(hpTrack);
      // Body
      const body = new UIKit.Container({
          width: UNIT_W,
          height: UNIT_H,
          backgroundColor: color,
          borderColor: dark,
          borderWidth: 2,
          borderRadius: 4,
          marginTop: 2,
          visibility: "visible",
      });
      c.add(body);

      this._battlefield.add(c);
      unit.container = c;
      unit.hpFill = hpFill;
      this._positionUnit(unit);
  };

  this._positionUnit = function (unit) {
      if (!unit.container) return;
      unit.container.setProperties({
          positionLeft: unit.x - UNIT_W / 2,
          positionTop: unit.y - UNIT_H / 2 - UNIT_HP_BAR_H - 4,
      });
  };

  // ─── Banner ─────────────────────────────────────────────────────────────

  this._showBanner = function (text, color, persistent) {
      this._bannerText.setProperties({text: text, color: color || "#ecf0f1"});
      this._bannerRoot.setProperties({visibility: "visible"});
      this._bannerActive = true;
      this._bannerExpireMs = persistent ? Infinity : this._gameTime + BANNER_FADE_MS;
  };

  // ─── Per-frame update ─────────────────────────────────────────────────

  this.update = function (deltaTime) {
      uikit.tick(this, deltaTime);

      // Track viewport size + reposition fixed elements
      if (game && game.renderer && game.renderer.domElement) {
          const dom = game.renderer.domElement;
          const w = dom.clientWidth || dom.width;
          const h = dom.clientHeight || dom.height;
          if (w !== this._screenW || h !== this._screenH) {
              this._screenW = w;
              this._screenH = h;
              this._battlefieldW = Math.max(0, w - PANEL_W);
              this._layoutFixed();
          }
      }

      // Banner timer
      if (this._bannerActive && this._gameTime >= this._bannerExpireMs && this._gameResult === null) {
          this._bannerActive = false;
          this._bannerRoot.setProperties({visibility: "hidden"});
      }

      if (!this._battleActive) return;

      this._gameTime += deltaTime;

      // AI spawn
      this._aiSpawnTimer += deltaTime;
      const interval = this._aiSpawnInterval();
      if (this._aiSpawnTimer >= interval) {
          this._aiSpawnTimer = 0;
          this._spawnUnit("red", "warrior");
      }

      // Update each unit (motion + combat)
      this._updateUnits(deltaTime);

      // Win/loss
      if (this._redCastleHP <= 0) this._endBattle("victory");
      else if (this._blueCastleHP <= 0) this._endBattle("defeat");
  };

  this._updateUnits = function (dt) {
      const dtSec = dt / 1000;
      for (let i = this._units.length - 1; i >= 0; i--) {
          const u = this._units[i];
          if (u.hp <= 0) {
              this._removeUnit(i);
              continue;
          }
          // Acquire target if none
          if (!u.target || (u.target.kind === "unit" && u.target.ref.hp <= 0)) {
              u.target = this._acquireTarget(u);
          }

          // Determine target position
          const tgt = u.target;
          let tx = 0,
              ty = u.y;
          if (tgt) {
              if (tgt.kind === "castle") {
                  const c = tgt.ref;
                  tx = c.castleX;
                  ty = c.castleY;
              } else {
                  tx = tgt.ref.x;
                  ty = tgt.ref.y;
              }
          } else {
              tx = u.team === "blue" ? this._battlefieldW - CASTLE_MARGIN_X : CASTLE_MARGIN_X;
          }

          const dx = tx - u.x;
          const dy = ty - u.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist > ATTACK_RANGE) {
              // Move toward target
              const step = u.speed * dtSec;
              if (step >= dist) {
                  u.x = tx;
                  u.y = ty;
              } else {
                  u.x += (dx / dist) * step;
                  u.y += (dy / dist) * step;
              }
          } else if (tgt) {
              // In range — attack
              if (this._gameTime - u.lastAttackMs >= ATTACK_COOLDOWN_MS) {
                  u.lastAttackMs = this._gameTime;
                  if (tgt.kind === "castle") {
                      if (tgt.ref.team === "blue") this._blueCastleHP = Math.max(0, this._blueCastleHP - u.attack);
                      else this._redCastleHP = Math.max(0, this._redCastleHP - u.attack);
                      this._refreshCastleHPVisuals();
                  } else {
                      tgt.ref.hp = Math.max(0, tgt.ref.hp - u.attack);
                      this._refreshUnitHP(tgt.ref);
                  }
              }
          }

          this._positionUnit(u);
      }
      this._updateHud();
  };

  this._removeUnit = function (idx) {
      const u = this._units[idx];
      if (u.container && u.container.parent) u.container.parent.remove(u.container);
      if (u.container && u.container.dispose) u.container.dispose();
      this._units.splice(idx, 1);
  };

  this._acquireTarget = function (unit) {
      // Nearest enemy unit; if none, the enemy castle
      let best = null;
      let bestDist = Infinity;
      for (let j = 0; j < this._units.length; j++) {
          const other = this._units[j];
          if (other === unit) continue;
          if (other.team === unit.team) continue;
          if (other.hp <= 0) continue;
          const dx = other.x - unit.x;
          const dy = other.y - unit.y;
          const d = dx * dx + dy * dy;
          if (d < bestDist) {
              bestDist = d;
              best = other;
          }
      }
      if (best) return {kind: "unit", ref: best};
      // Else target enemy castle
      if (unit.team === "blue") {
          return {
              kind: "castle",
              ref: {team: "red", castleX: this._redCastleCenter().x, castleY: this._redCastleCenter().y},
          };
      } else {
          return {
              kind: "castle",
              ref: {team: "blue", castleX: this._blueCastleCenter().x, castleY: this._blueCastleCenter().y},
          };
      }
  };

  this._refreshUnitHP = function (unit) {
      if (!unit.hpFill) return;
      const frac = Math.max(0, unit.hp / unit.maxHp);
      unit.hpFill.setProperties({
          width: frac * 100 + "%",
          backgroundColor: hpColor(frac),
      });
  };

  this._refreshCastleHPVisuals = function () {
      const blueFrac = Math.max(0, this._blueCastleHP / this._castleHPMax);
      if (this._blueCastle) {
          this._blueCastle.hpFill.setProperties({
              width: blueFrac * 100 + "%",
              backgroundColor: hpColor(blueFrac),
          });
          this._blueCastle.hpLabel.setProperties({
              text: "BLUE " + this._blueCastleHP + " / " + this._castleHPMax,
          });
      }
      const redFrac = Math.max(0, this._redCastleHP / this._castleHPMax);
      if (this._redCastle) {
          this._redCastle.hpFill.setProperties({
              width: redFrac * 100 + "%",
              backgroundColor: hpColor(redFrac),
          });
          this._redCastle.hpLabel.setProperties({
              text: "RED " + this._redCastleHP + " / " + this._castleHPMax,
          });
      }
  };

  this._updateHud = function () {
      if (this._hudBlue) this._hudBlue.setProperties({text: "BLUE: " + this._blueCastleHP});
      if (this._hudRed) this._hudRed.setProperties({text: "RED: " + this._redCastleHP});
      let label;
      if (this._gameResult === "victory") label = "Victory!";
      else if (this._gameResult === "defeat") label = "Defeat";
      else if (this._battleActive) label = "Round " + this._round + " — " + this._difficulty.toUpperCase();
      else label = "Press Start Battle";
      if (this._hudRound) this._hudRound.setProperties({text: label});
  };

  // ─── Layout helpers (positions depend on screen size) ───────────────────

  this._groundCenterY = function () {
      const useableH = Math.max(100, this._screenH - HUD_H);
      const groundH = useableH * GROUND_H_FRAC;
      const top = HUD_H + (useableH - groundH) / 2;
      return top + groundH / 2;
  };

  this._blueCastleCenter = function () {
      return {
          x: CASTLE_MARGIN_X + CASTLE_W / 2,
          y: this._groundCenterY(),
      };
  };
  this._redCastleCenter = function () {
      return {
          x: this._battlefieldW - CASTLE_MARGIN_X - CASTLE_W / 2,
          y: this._groundCenterY(),
      };
  };

  this._layoutFixed = function () {
      if (this._battlefieldW <= 0) return;
      const useableH = Math.max(100, this._screenH - HUD_H);
      const groundH = useableH * GROUND_H_FRAC;
      const groundTop = HUD_H + (useableH - groundH) / 2;

      if (this._groundBand) {
          this._groundBand.setProperties({
              positionTop: groundTop,
              height: groundH,
          });
      }
      if (this._blueCastle) {
          const c = this._blueCastleCenter();
          this._blueCastle.root.setProperties({
              positionLeft: c.x - CASTLE_W / 2,
              positionTop: c.y - CASTLE_H / 2,
          });
      }
      if (this._redCastle) {
          const c = this._redCastleCenter();
          this._redCastle.root.setProperties({
              positionLeft: c.x - CASTLE_W / 2,
              positionTop: c.y - CASTLE_H / 2,
          });
      }
  };

  // ─── Cleanup ────────────────────────────────────────────────────────────

  this.dispose = function () {
      this._clearAllUnits();
      uikit.teardown(this);
  };

  // ─── Editor lifecycle (renders the same UIKit tree as play mode) ───────

  this.onEditorAdded = async function (editor) {
      if (!this._uiRoot) {
          this._initState();
          this._uikitCtx = await uikit.createEditorContext(editor);
          this._uiRoot = uikit.buildRoot(this._uikitCtx);
          this._buildUIKitContent();
      } else if (!this._uiAttached) {
          this._uikitCtx = await uikit.createEditorContext(editor);
      }
      uikit.attach(this, this._uikitCtx);
  };

  this.onEditorAttributesUpdated = function () {
      uikit.teardown(this);
  };

  this.onEditorDispose = function () {
      uikit.teardown(this);
  };
