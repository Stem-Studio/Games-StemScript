code: |
  // ============================================================
  // PTG Camera Controller
  // Camera parented to Player group. Positioned behind the player
  // with side-offset driven by cursor X. Zoom animation on start.
  // Source: procedural-terrain-generation (main.js camera, plane.js
  //         camera.position.x lerp)
  // ============================================================

  let game;
  let store = null;
  let camera = null;

  // Source: camera.position.x lerped to -cursor.x * 5
  const CAMERA_SIDE_RANGE = 5;
  const CAMERA_LERP_SPEED = 1.0;

  // Source camera Y offset: camera.position.set(0, 7, -1)
  const CAMERA_Y = 7;

  // Start zoom animation (source: gsap z from -1 to -18, expo3.out)
  let animating = true;
  let animTime = 0;
  const ANIM_DURATION = 1.0;
  const Z_FROM = -1;
  const Z_TO = -18;

  // Source: const cameraTarget = new THREE.Vector3(0, 6.9, 0)
  const _lookTarget = new THREE.Vector3();

  this.init = function(_game) {
      game = _game;
    store = this.erth.store;
    camera = game.camera;

    if (camera) {
      // Source: camera.position.set(0, 7, -1)
      camera.position.set(0, CAMERA_Y, Z_FROM);

      // Source: camera.lookAt(cameraTarget) where cameraTarget = (0, 6.9, 0)
      // Camera at (0, 7, -1) looking at (0, 6.9, 0) = forward and slightly down
      _lookTarget.set(0, 6.9, 0);
      camera.lookAt(_lookTarget);

      // Parent camera to Player group (source: plane.add(camera))
      this.gameObject._internal.three.add(camera);
    }
  };

  this.update = function(deltaTime) {
    if (!store || !camera) return;
    let dt = Math.min(deltaTime, 0.05); // @check-ok universal dt-cap constant

    // Zoom animation (source: gsap expo3.out from -1 to -18)
    if (animating) {
      animTime += dt;
      let t = Math.min(animTime / ANIM_DURATION, 1);
      // Approximate expo3.out easing: 1 - (1-t)^3
      let eased = 1 - Math.pow(1 - t, 3);
      camera.position.z = Z_FROM + (Z_TO - Z_FROM) * eased;
      if (t >= 1) animating = false;
    }

    // Side offset from cursor X (source: plane.js camera.position.x lerp)
    let cursorX = store.get("ptg_cursor_x") || 0;
    let targetX = -cursorX * CAMERA_SIDE_RANGE;
    camera.position.x += (targetX - camera.position.x) * dt * CAMERA_LERP_SPEED;
  };

  // Editor preview callbacks
  this.onEditorAdded = function() {
    // Rendering-only preview code would go here
  };

  this.onEditorDispose = function() {
    // Cleanup preview objects here
  };

  this.dispose = function() {
    if (camera && this.gameObject) {
      this.gameObject._internal.three.remove(camera);
    }
    store = null;
    camera = null;
    animating = true;
    animTime = 0;
  };
