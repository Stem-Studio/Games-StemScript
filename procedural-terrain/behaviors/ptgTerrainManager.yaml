  attributes:
    normalTexture:
      name: "Normal Map"
      type: "imageAsset"
      description: "Normal map texture for terrain, trees, and clouds (normal.jpg)"

  throttleConfig:
    throttlePriority: "HIGH"
    enableFrustumCulling: false
    enableDistanceThrottling: false
