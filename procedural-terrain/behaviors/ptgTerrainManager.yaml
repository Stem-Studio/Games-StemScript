meta:
  tool: StemStudio
  type: behavior
  exportVersion: 1

config:
  name: "PTG Terrain Manager"
  id: "ptg.terrainManager"
  author: "procedural-terrain"
  isScript: true
  main: "script.js"
  version: "1.0.0"
  priority: 0
  description: "Infinite procedural terrain with LOD chunks, biome vertex
    coloring, instanced trees, and instanced clouds"
  tags:
