meta:
  tool: StemStudio
  type: behavior
  exportVersion: 1

config:
  name: "MA Machine Arena"
  id: "ma.machineArena"
  author: "script-wizard"
  isScript: true
  main: "script.js"
  version: "1.0.0"
  description: "StemStudio port of Machine Arena: FPS arena roguelite with waves,
    bosses, upgrades, tactical abilities, fragments, shop, HUD, and procedural
    machine arena."
  documentation: "Attach to GameRoot. The behavior builds runtime-only procedural
    geometry under the host, drives DefaultCamera as a first-person camera,
    mirrors the position to the tagged Player object, and owns the full
    single-player wave loop. Use attributes to tune camera, movement, wave
    scaling, difficulty multipliers, and audio levels."
  tags:
    - gameplay
    - fps
    - roguelite
  priority: 0
  throttleConfig:
    throttlePriority: "CRITICAL"
    enableFrustumCulling: false
    enableDistanceThrottling: false
    requiresConsistentUpdates: true
  attributes:
    debugLogs:
      name: "Debug Logs"
      type: "boolean"
      default: false
    totalWaves:
      name: "Total Waves"
      type: "number"
      default: 15
      min: 1
      max: 30
    arenaSize:
      name: "Arena Half Size"
      type: "number"
      default: 40
      min: 18
      max: 80
    baseFov:
      name: "Base FOV"
      type: "number"
      default: 75
      min: 55
      max: 110
    mouseSensitivity:
      name: "Mouse Sensitivity"
      type: "number"
      default: 0.002
      min: 0.0005
      max: 0.01
    playerEyeHeight:
      name: "Player Eye Height"
      type: "number"
      default: 1.6
      min: 1
      max: 2.4
    gravity:
      name: "Gravity"
      type: "number"
      default: 22
      min: 5
      max: 60
    jumpForce:
      name: "Jump Force"
      type: "number"
      default: 9
      min: 3
      max: 25
    waveBaseCount:
      name: "Wave Base Count"
      type: "number"
      default: 3
      min: 1
      max: 20
    waveCountStep:
      name: "Wave Count Step"
      type: "number"
      default: 2
      min: 0
      max: 8
    enemyHealthMultiplier:
      name: "Enemy Health Multiplier"
      type: "number"
      default: 1
      min: 0.2
      max: 5
    enemyDamageMultiplier:
      name: "Enemy Damage Multiplier"
      type: "number"
      default: 1
      min: 0.1
      max: 5
    gearDropMultiplier:
      name: "Gear Drop Multiplier"
      type: "number"
      default: 1
      min: 0
      max: 10
    damageMultiplier:
      name: "Player Damage Multiplier"
      type: "number"
      default: 1
      min: 0.1
      max: 8
    musicVolume:
      name: "Music Volume"
      type: "number"
      default: 0.35
      min: 0
      max: 1
    sfxVolume:
      name: "SFX Volume"
      type: "number"
      default: 0.45
      min: 0
      max: 1
    menuMusic:
      name: "Menu Music"
      type: "audioAsset"
      description: "Source menu music."
    combatMusic:
      name: "Combat Music"
      type: "audioAsset"
      description: "Source combat music."
    bossMusic:
      name: "Boss Music"
      type: "audioAsset"
      description: "Source boss music."
    tygerSound:
      name: "Tyger Sound"
      type: "audioAsset"
      description: "Source special ending audio."
  inputs:
    ma_Digit1: { action: true, bindings: [ { keyboard: Digit1 } ] }
    ma_Digit2: { action: true, bindings: [ { keyboard: Digit2 } ] }
    ma_Digit3: { action: true, bindings: [ { keyboard: Digit3 } ] }
    ma_Digit4: { action: true, bindings: [ { keyboard: Digit4 } ] }
    ma_Digit5: { action: true, bindings: [ { keyboard: Digit5 } ] }
    ma_Digit6: { action: true, bindings: [ { keyboard: Digit6 } ] }
    ma_Digit7: { action: true, bindings: [ { keyboard: Digit7 } ] }
    ma_Digit8: { action: true, bindings: [ { keyboard: Digit8 } ] }
    ma_Digit9: { action: true, bindings: [ { keyboard: Digit9 } ] }
    ma_Tab: { action: true, bindings: [ { keyboard: Tab } ] }
    ma_Enter: { action: true, bindings: [ { keyboard: Enter } ] }
    ma_Escape: { action: true, bindings: [ { keyboard: Escape } ] }
    ma_KeyG: { action: true, bindings: [ { keyboard: KeyG } ] }

