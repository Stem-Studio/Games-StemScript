# Black Hole shader behavior
meta:
  tool: StemStudio
  type: behavior
  exportVersion: 1
config:
  name: "BH Black Hole"
  id: "bh.blackHole"
  author: "conversion"
  isScript: true
  main: "script.js"
  version: "2.0.0"
  priority: 0
  description: "WebGPU/TSL port of the webgl-black-hole demo: accretion disc +
    50k spiraling disc particles + 50k star sphere, authored as TSL node
    materials (PointsNodeMaterial / MeshBasicNodeMaterial) so they compile on
    the WebGPU renderer. The original 7 GLSL3 RawShaderMaterials and the 2-pass
    gravitational-lensing composite are NOT supported by the WebGPU/TSL
    renderer; the lensing distortion pass is omitted (see notes). Renders
    directly into the scene instead of an offscreen 2-pass composite."
  tags: [vfx, shader, demo]
  attributes:
    innerColor:
      name: "Inner Color"
      type: "color"
      default: "#ff8080"
    outerColor:
      name: "Outer Color"
      type: "color"
      default: "#3633ff"
    blackHoleParticleSize:
      name: "BH Particle Size"
      type: "number"
      default: 0.015
    starParticleSize:
      name: "Star Particle Size"
      type: "number"
      default: 0.001
    rgbShiftRadius:
      name: "Final RGB-Shift Radius"
      type: "number"
      default: 0.00001
    discRadiusOuter:
      name: "Disc Outer Radius"
      type: "number"
      default: 5
    discRadiusInner:
      name: "Disc Inner Radius"
      type: "number"
      default: 1
    starSphereRadius:
      name: "Star Sphere Radius"
      type: "number"
      default: 400
    debugLogs:
      name: "Debug Logs"
      type: "boolean"
      default: false
  throttleConfig:
    throttlePriority: "HIGH"
    enableFrustumCulling: false
    enableDistanceThrottling: false
    requiresConsistentUpdates: true
  documentation: Black hole — TSL node-material port (disc + particles + stars). Lensing composite omitted (WebGPU/TSL has no RawShaderMaterial support).
code: |
  // WebGPU/TSL port of the black-hole demo.
  //
  // The upstream demo used 7 GLSL3 RawShaderMaterials and a 2-pass
  // render-to-target gravitational-lensing composite. The StemStudio runtime
  // renders with the WebGPU/TSL renderer, which cannot compile
  // RawShaderMaterial (it threw "Material RawShaderMaterial is not compatible"
  // every frame) and a raw GLSL multi-pass composite. This port:
  //   * rebuilds the accretion disc, the 50k spiraling disc particles, and the
  //     50k-star celestial sphere as TSL node materials (the same pattern the
  //     working tinyskies.starfield / hexgl effects use);
  //   * renders them directly into the scene (no offscreen 2-pass composite);
  //   * OMITS the gravitational-lensing + RGB-shift distortion pass — that was
  //     a screen-space multi-pass effect with no TSL equivalent here. The black
  //     hole still reads as a glowing accretion disc + particle swirl + stars;
  //     the light-bending halo is the documented fidelity loss.
  let game;
  const LOG_TAG = "[bh.blackHole]";
  const BH_COUNT = 50000;
  const STAR_COUNT = 50000;

  // Soft round sprite so points render as discs (replaces the GLSL
  // gl_PointCoord circular discard).
  function makeRoundSprite() {
    const size = 64;
    const canvas = document.createElement("canvas");
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext("2d");
    const g = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
    g.addColorStop(0.0, "rgba(255,255,255,1)");
    g.addColorStop(0.5, "rgba(255,255,255,0.6)");
    g.addColorStop(1.0, "rgba(255,255,255,0)");
    ctx.fillStyle = g; ctx.fillRect(0, 0, size, size);
    const t = new THREE.CanvasTexture(canvas);
    t.colorSpace = THREE.SRGBColorSpace;
    return t;
  }

  // Low-res smooth-ish noise (linear-filtered) sampled by the disc. Replaces
  // the GLSL perlin noise-generation render pass.
  function makeNoiseTexture() {
    const size = 64;
    const canvas = document.createElement("canvas");
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext("2d");
    const img = ctx.createImageData(size, size);
    for (let i = 0; i < size * size; i++) {
      img.data[i * 4 + 0] = Math.random() * 255;
      img.data[i * 4 + 1] = Math.random() * 255;
      img.data[i * 4 + 2] = Math.random() * 255;
      img.data[i * 4 + 3] = 255;
    }
    ctx.putImageData(img, 0, 0);
    const t = new THREE.CanvasTexture(canvas);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    t.minFilter = THREE.LinearFilter;
    t.magFilter = THREE.LinearFilter;
    return t;
  }

  this.init = function (_game) {
    game = _game;
    this._log = (...a) => { if (this.getAttribute("debugLogs")) console.log(LOG_TAG, ...a); };
    this._buildVisuals();
    this._log("init (play)");
  };

  // Play-only (like the original). Building the 100k-particle clouds during
  // an editor hook also runs them at stemscript-IMPORT time, which is heavy
  // enough to stall the import — so the editor preview is intentionally a
  // no-op and the visuals are built in init() (play) only.
  this.onEditorAdded = function () { /* play-only */ };
  this.onEditorAttributesUpdated = function () { /* play-only */ };
  this.onEditorDispose = function () { /* nothing built in editor */ };

  this.update = function (deltaTime) {
    if (!this._uTime) return;
    this._uTime.value += Math.min(deltaTime || 0.016, 0.1);
  };

  this.dispose = function () { this._teardown(); };

  this._buildVisuals = function () {
    if (this._root) return; // already built
    const TSL = THREE.TSL;
    const parent = this.gameObject && this.gameObject._internal && this.gameObject._internal.three;
    if (!parent || !TSL) { this._log("no parent/TSL"); return; }

    const innerHex = this.getAttribute("innerColor") || "#ff8080";
    const outerHex = this.getAttribute("outerColor") || "#3633ff";
    const discOuter = this.getAttribute("discRadiusOuter") || 5;
    const discInner = this.getAttribute("discRadiusInner") || 1;
    const starRadius = this.getAttribute("starSphereRadius") || 400;
    const bhSizeAttr = this.getAttribute("blackHoleParticleSize") || 0.015;
    const starSizeAttr = this.getAttribute("starParticleSize") || 0.001;

    const inner = new THREE.Color(innerHex);
    const outer = new THREE.Color(outerHex);
    const innerN = TSL.vec3(inner.r, inner.g, inner.b);
    const outerN = TSL.vec3(outer.r, outer.g, outer.b);

    this._uTime = TSL.uniform(0);
    this._sprite = makeRoundSprite();
    this._noiseTex = makeNoiseTexture();
    this._disposables = [];

    const root = new THREE.Group();
    root.name = "bhBlackHoleRoot";
    root.userData.isRuntimeOnly = true;

    root.add(this._buildDisc(TSL, innerN, outerN, discOuter, discInner));
    root.add(this._buildParticles(TSL, innerN, outerN, bhSizeAttr));
    root.add(this._buildStars(TSL, starRadius, starSizeAttr));

    parent.add(root);
    this._root = root;
    this._log("built visuals");
  };

  this._buildDisc = function (TSL, innerN, outerN, outerR, innerR) {
    // Thin open cylinder = accretion-disc band.
    const geo = new THREE.CylinderGeometry(outerR, innerR, 0, 64, 1, true);
    const uvN = TSL.uv();
    // Scroll noise around the ring + over time for a churning look.
    const nUv = TSL.vec2(uvN.x.add(this._uTime.mul(0.05)), uvN.y.mul(2.0));
    const noise = TSL.texture(this._noiseTex, nUv).r;
    const ring = TSL.mix(innerN, outerN, uvN.y);
    // Bright across the band, attenuated at the inner lip and the outer half.
    const edge = TSL.smoothstep(0.0, 0.05, uvN.y).mul(TSL.smoothstep(1.0, 0.4, uvN.y));
    const rgb = ring.mul(noise).mul(edge).mul(2.0);
    const mat = new THREE.MeshBasicNodeMaterial({
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      transparent: true,
    });
    mat.colorNode = TSL.vec4(rgb, TSL.float(1.0));
    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData.isRuntimeOnly = true;
    this._disposables.push(geo, mat);
    return mesh;
  };

  this._buildParticles = function (TSL, innerN, outerN, sizeAttr) {
    const dist = new Float32Array(BH_COUNT);
    const size = new Float32Array(BH_COUNT);
    const rnd = new Float32Array(BH_COUNT);
    // 3-component position kept zeroed (defines vertex count + a finite
    // bounding sphere); the real position is computed in positionNode. The
    // original set "position" itemSize=1 which produced NaN bounds.
    const pos0 = new Float32Array(BH_COUNT * 3);
    for (let i = 0; i < BH_COUNT; i++) {
      dist[i] = Math.random();
      size[i] = Math.random();
      rnd[i] = Math.random();
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.BufferAttribute(pos0, 3));
    geo.setAttribute("aDist", new THREE.BufferAttribute(dist, 1));
    geo.setAttribute("aSize", new THREE.BufferAttribute(size, 1));
    geo.setAttribute("aRandom", new THREE.BufferAttribute(rnd, 1));

    const aDist = TSL.attribute("aDist");
    const aRandom = TSL.attribute("aRandom");
    const aSize = TSL.attribute("aSize");
    const conc = TSL.float(0.05);
    const op = TSL.mix(conc, TSL.smoothstep(0.0, 1.0, aDist), aRandom.pow(1.7));
    const radius = op.mul(5.0).add(1.0);
    const angle = op.sub(this._uTime.mul(TSL.float(1.0).sub(op)).mul(3.0));
    const newPos = TSL.vec3(angle.sin().mul(radius), TSL.float(0.0), angle.cos().mul(radius));

    const mat = new THREE.PointsNodeMaterial({
      map: this._sprite,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      transparent: true,
    });
    mat.positionNode = newPos;
    // Perspective point scaling (1/-z) isn't reliably available to a
    // PointsNodeMaterial.sizeNode, so use a constant-factor pixel size like
    // tinyskies.starfield does.
    mat.sizeNode = aSize.mul(sizeAttr * 800.0).add(1.0);
    mat.colorNode = TSL.vec4(TSL.mix(innerN, outerN, op), TSL.float(0.6));

    const pts = new THREE.Points(geo, mat);
    pts.frustumCulled = false;
    pts.userData.isRuntimeOnly = true;
    this._disposables.push(geo, mat);
    return pts;
  };

  this._buildStars = function (TSL, radius, sizeAttr) {
    const positions = new Float32Array(STAR_COUNT * 3);
    const size = new Float32Array(STAR_COUNT);
    const colors = new Float32Array(STAR_COUNT * 3);
    const c = new THREE.Color();
    for (let i = 0; i < STAR_COUNT; i++) {
      const i3 = i * 3;
      const theta = 2 * Math.PI * Math.random();
      const phi = Math.acos(2 * Math.random() - 1);
      positions[i3 + 0] = Math.cos(theta) * Math.sin(phi) * radius;
      positions[i3 + 1] = Math.sin(theta) * Math.sin(phi) * radius;
      positions[i3 + 2] = Math.cos(phi) * radius;
      size[i] = Math.random();
      c.setHSL(Math.random(), 1, 0.8);
      colors[i3 + 0] = c.r; colors[i3 + 1] = c.g; colors[i3 + 2] = c.b;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    geo.setAttribute("aSize", new THREE.BufferAttribute(size, 1));
    geo.setAttribute("aColor", new THREE.BufferAttribute(colors, 3));

    const mat = new THREE.PointsNodeMaterial({
      map: this._sprite,
      transparent: true,
      depthWrite: false,
    });
    // Bump star pixel size for visibility (original ~sub-pixel at this size).
    mat.sizeNode = TSL.attribute("aSize").mul(Math.max(2.0, sizeAttr * 800.0 * 2.0)).add(1.0);
    mat.colorNode = TSL.vec4(TSL.attribute("aColor"), TSL.float(1.0));

    const pts = new THREE.Points(geo, mat);
    pts.frustumCulled = false;
    pts.userData.isRuntimeOnly = true;
    this._disposables.push(geo, mat);
    return pts;
  };

  this._teardown = function () {
    if (this._root && this._root.parent) this._root.parent.remove(this._root);
    for (const d of this._disposables || []) { if (d && d.dispose) d.dispose(); }
    if (this._sprite && this._sprite.dispose) this._sprite.dispose();
    if (this._noiseTex && this._noiseTex.dispose) this._noiseTex.dispose();
    this._disposables = [];
    this._root = null;
    this._uTime = null;
  };
