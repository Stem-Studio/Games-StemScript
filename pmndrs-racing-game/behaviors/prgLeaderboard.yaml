config:
  id: 69eaecd45b53803168c0889a
  name: PRG Leaderboard
  description: "Persistent racing leaderboard UI for the pmndrs racing port."
  version: 1.0.0
  isScript: true
  attributes: {}
  author: "conversion"
  main: "script.js"
  priority: 0
  documentation: "UIKit leaderboard panel that reads racing lap records from GameProgress when a logged-in runtime transport is available. It opens, closes, and receives notices through the prg_leaderboardCommand store key."
  tags:
    - ui
    - leaderboard
  dependencies: {}
  objectSettings: {}
code: |
  /* Racing leaderboard UI (top 20, persistent GameProgress).
     Open/close via erth.store key: prg_leaderboardCommand.
  */

  const EVENTS = {
    OPEN: "racing:leaderboardOpen",
    CLOSE: "racing:leaderboardClose",
    NOTICE: "racing:leaderboardNotice"
  };

  const COLORS = {
    overlay: 0x0f0c18,
    card: "rgba(2, 2, 3, 0.975)",
    cardBorder: 0x1d1d2a,
    row: 0x0b0b11,
    rowBorder: 0x151522,
    text: 0xffffff,
    textDim: 0xa0a0b0,
    textMuted: 0x7a7a92,
    green: 0x33d17a
  };

  let SVG_TROPHY = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3V2H7v1H3v3a4 4 0 004 4h.06A5.002 5.002 0 0011 13.9V17H8v2h8v-2h-3v-3.1A5.002 5.002 0 0016.94 10H17a4 4 0 004-4V3h-4zm-10 5a2 2 0 01-2-2V5h2v3zm12-2a2 2 0 01-2 2V5h2v1z"/></svg>';
  let SVG_CLOSE = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>';
  let SVG_REFRESH = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>';

  let overlayEl = null;
  let modalEl = null;
  let listEl = null;
  let rows = [];
  let openToken = null;
  let closeToken = null;
  let noticeToken = null;
  let gameManager = null;
  let rootRef = null;
  let noticeWrapEl = null;
  let noticeTextEl = null;
  let noticeHideTimer = null;
  let noticeBlinkTimer = null;
  let noticePanelEl = null;
  let lastViewportW = -1;
  let erth = null;
  let lastCommandSeq = 0;

  function isMobile() {
    if (typeof window === "undefined") return false;
    let touchCapable = "ontouchstart" in window;
    let coarsePointer = !!(window.matchMedia && window.matchMedia("(pointer: coarse)").matches);
    return window.innerWidth <= 768 || (touchCapable && coarsePointer);
  }

  function contentScale() {
    return isMobile() ? 0.55 : 1;
  }

  function s(n) {
    return Math.max(1, Math.round((n || 0) * contentScale()));
  }

  function stopNoticeEffects() {
    if (noticeHideTimer) {
      clearTimeout(noticeHideTimer);
      noticeHideTimer = null;
    }
    if (noticeBlinkTimer) {
      clearInterval(noticeBlinkTimer);
      noticeBlinkTimer = null;
    }
    if (noticeWrapEl) noticeWrapEl.setProperties({ visibility: "hidden" });
  }

  function showRankNotice(data) {
    let msg = data && data.message ? String(data.message) : "";
    let durationMs = data && data.durationMs ? Math.max(10000, parseInt(data.durationMs, 10) || 10000) : 10000;
    if (!msg || !noticeWrapEl || !noticeTextEl) return;
    stopNoticeEffects();
    let blinkOn = true;
    noticeTextEl.setProperties({ text: msg, color: "#ffe600" });
    if (noticePanelEl) {
      noticePanelEl.setProperties({
        backgroundColor: "rgba(38, 32, 0, 0.95)",
        borderColor: "#ffd400",
        backgroundOpacity: 1
      });
    }
    noticeWrapEl.setProperties({ visibility: "visible" });
    noticeBlinkTimer = setInterval(function() {
      blinkOn = !blinkOn;
      if (noticeTextEl) noticeTextEl.setProperties({ color: blinkOn ? "#ffe600" : "#fff6a3" });
      if (noticePanelEl) noticePanelEl.setProperties({ borderColor: blinkOn ? "#ffd400" : "#fff176" });
    }, 220);
    noticeHideTimer = setTimeout(function() {
      stopNoticeEffects();
    }, durationMs);
  }

  function applyResponsiveLayout() {
    if (!modalEl || !rootRef) return;
    if (isMobile()) {
      rootRef.setProperties({ alignItems: "center", justifyContent: "center" });
      modalEl.setProperties({
        positionType: "relative",
        positionLeft: undefined,
        positionBottom: undefined,
        width: 404, 
        maxHeight: 344
      });
      modalEl.scale.set(0.252, 0.252, 0.252); 
      modalEl.position.set(0, 0, 0.01); 
    } else {
      rootRef.setProperties({ alignItems: "flex-start", justifyContent: "flex-start" });
      modalEl.setProperties({
        positionType: "absolute",
        positionLeft: 18,
        positionBottom: 18,
        width: 506,
        maxHeight: 430
      });
      modalEl.scale.set(1, 1, 1);
      modalEl.position.set(0, 0, 0.01);
    }
  }

  function toCssHexColor(c) {
    if (c == null) return undefined;
    if (typeof c === "string") return c;
    if (typeof c === "number" && isFinite(c)) {
      let hex = (c >>> 0).toString(16).padStart(6, "0").slice(-6);
      return "#" + hex;
    }
    return undefined;
  }

  function formatLap(ms) {
    let n = Math.max(0, parseInt(ms, 10) || 0);
    return (n / 1000).toFixed(2) + "s";
  }

  function sanitizeUsername(raw) {
    let value = String(raw == null ? "" : raw).trim();
    if (!value) return "Player";
    let atIndex = value.indexOf("@");
    if (atIndex > 0) value = value.slice(0, atIndex).trim();
    return value || "Player";
  }

  this.init = function init(_game) {
    gameManager = _game;
    erth = this.erth;
    UIKitPointerEvents.initialize(_game);
    _game.renderer.localClippingEnabled = true;

    this.root = new UIKit.Fullscreen(_game.renderer, {
      visibility: "visible",
      flexDirection: "column",
      padding: 0,
      alignItems: "flex-start",
      justifyContent: "flex-start",
      pointerEvents: "none",
      renderOrder: 1,
      "*": { renderOrder: 1 }
    });
    _game.uiCamera.add(this.root);
    UIKitPointerEvents.registerRoot(this.root);
    rootRef = this.root;
  };

  this.onStart = function onStart() {
    if (!this.root || typeof UIKit === "undefined") return;

    modalEl = new UIKit.Container({
      flexDirection: "column",
      alignItems: "stretch",
      padding: 18,
      backgroundColor: COLORS.card,
      backgroundOpacity: 0.975,
      borderRadius: 14,
      borderWidth: 1,
      borderColor: COLORS.cardBorder,
      width: 506,
      maxHeight: 430,
      positionType: "absolute",
      positionLeft: 18,
      positionBottom: 18,
      pointerEvents: "auto",
      visibility: "hidden",
      renderOrder: 1,
      onClick: function(e) { e && e.stopPropagation && e.stopPropagation(); }
    });

    let header = new UIKit.Container({
      visibility: "visible",
      flexDirection: "row",
      justifyContent: "space-between",
      alignItems: "center",
      width: "100%",
      positionType: "relative",
      marginBottom: 14
    });
    let left = new UIKit.Container({ visibility: "visible", flexDirection: "row", alignItems: "center", gap: 10, paddingRight: 60 });
    left.add(new UIKit.Svg({ visibility: "visible", content: SVG_TROPHY, width: 20, height: 20, color: "#f0c050", renderOrder: 1, pointerEvents: "none" }));
    left.add(new UIKit.Text({ visibility: "visible", text: "Racing Leaderboard", fontSize: s(20), fontWeight: "bold", color: COLORS.text }));
    header.add(left);

    let right = new UIKit.Container({
      visibility: "visible",
      flexDirection: "row",
      alignItems: "center",
      justifyContent: "center",
      gap: 10,
      positionType: "absolute",
      positionRight: 0,
      positionTop: 0,
      positionBottom: 0
    });
    right.add(iconButton(function() { fetchLeaderboard(); }, SVG_REFRESH, COLORS.green));
    right.add(iconButton(function() { hide(); }, SVG_CLOSE, 0xff3501));
    header.add(right);
    modalEl.add(header);

    let tableHeader = new UIKit.Container({
      visibility: "visible",
      flexDirection: "row",
      padding: 10,
      backgroundColor: COLORS.row,
      borderRadius: 10,
      marginTop: 14,
      gap: 10
    });
    tableHeader.add(makeCell(40, "#", COLORS.textMuted, true, "center"));
    tableHeader.add(makeCell(114, "Player", COLORS.textMuted, true, "left"));
    tableHeader.add(makeCell(110, "Best Lap", COLORS.textMuted, true, "center"));
    tableHeader.add(makeCell(110, "Last Lap", COLORS.textMuted, true, "center"));
    tableHeader.add(makeCell(106, "Date", COLORS.textMuted, true, "center"));
    modalEl.add(tableHeader);

    listEl = new UIKit.Container({
      visibility: "visible",
      flexDirection: "column",
      gap: 6,
      marginTop: 10,
      width: "100%",
      height: 290,
      overflow: "scroll"
    });
    modalEl.add(listEl);

    noticeWrapEl = new UIKit.Container({
      positionType: "absolute",
      positionLeft: 0,
      positionRight: 0,
      positionTop: 0,
      positionBottom: 0,
      alignItems: "center",
      justifyContent: "center",
      pointerEvents: "none",
      visibility: "hidden",
    });
    noticePanelEl = new UIKit.Container({
      visibility: "visible",
      paddingLeft: 14,
      paddingRight: 14,
      paddingTop: 8,
      paddingBottom: 8,
      borderRadius: 10,
      borderWidth: 2,
      borderColor: "#ffd400",
      backgroundColor: "rgba(38, 32, 0, 0.95)",
      pointerEvents: "none",
    });
    noticeTextEl = new UIKit.Text({
      visibility: "visible",
      text: "",
      fontSize: 16,
      color: "#22c55e",
      fontWeight: "bold",
      textAlign: "center",
    });
    noticePanelEl.add(noticeTextEl);
    noticeWrapEl.add(noticePanelEl);
    modalEl.add(noticeWrapEl);

    this.root.add(modalEl);
    lastViewportW = -1;
    applyResponsiveLayout();
  };

  this.update = function update(deltaTime) {
    pollLeaderboardCommands();
    if (typeof window !== "undefined" && window.innerWidth !== lastViewportW) {
      lastViewportW = window.innerWidth;
      applyResponsiveLayout();
    }
    UIKitPointerEvents.update(deltaTime);
  };

  this.dispose = function dispose() {
    openToken = null;
    closeToken = null;
    noticeToken = null;
    if (noticeHideTimer) {
      clearTimeout(noticeHideTimer);
      noticeHideTimer = null;
    }
    if (noticeBlinkTimer) {
      clearInterval(noticeBlinkTimer);
      noticeBlinkTimer = null;
    }
    if (this.root) {
      UIKitPointerEvents.unregisterRoot(this.root);
      if (this.root.parent) this.root.parent.remove(this.root);
      this.root.dispose();
      this.root = null;
    }
    overlayEl = null;
    modalEl = null;
    listEl = null;
    noticeWrapEl = null;
    noticeTextEl = null;
    noticePanelEl = null;
    UIKitPointerEvents.deinitialize();
  };

  function iconButton(onClick, svgSrc, svgColor) {
    let b = new UIKit.Container({
      visibility: "visible",
      width: 18,
      height: 18,
      padding: 0,
      backgroundOpacity: 0,
      borderWidth: 0,
      alignItems: "center",
      justifyContent: "center",
      cursor: "pointer",
      overflow: "visible",
      onClick: onClick
    });
    try {
      b.add(new UIKit.Svg({
        visibility: "visible",
        content: svgSrc,
        width: 18,
        height: 18,
        color: toCssHexColor(svgColor != null ? svgColor : COLORS.textDim),
        renderOrder: 1,
        pointerEvents: "none"
      }));
    } catch (e) {}
    return b;
  }

  function makeCell(width, text, textColor, isHeader, align) {
    align = align || "center";
    let c = new UIKit.Container({
      visibility: "visible",
      width: width || 60,
      padding: 2,
      flexDirection: "row",
      alignItems: "center",
      justifyContent: align === "left" ? "flex-start" : "center"
    });
    c.add(new UIKit.Text({
      visibility: "visible",
      text: text != null ? String(text) : "",
      fontSize: s(isHeader ? 14 : 15),
      color: textColor != null ? textColor : COLORS.text,
      textAlign: align === "left" ? "left" : "center"
    }));
    return c;
  }

  function clearList() {
    if (!listEl) return;
    while (listEl.children && listEl.children.length > 0) {
      let child = listEl.children[0];
      listEl.remove(child);
      if (child && child.dispose) child.dispose();
    }
  }

  function showLoading() {
    if (!listEl) return;
    clearList();
    let loader = new UIKit.Container({
      visibility: "visible",
      flexDirection: "column",
      alignItems: "center",
      justifyContent: "center",
      width: "100%",
      height: 200
    });
    loader.add(new UIKit.Text({ visibility: "visible", text: "Loading...", fontSize: s(18), color: COLORS.textDim }));
    listEl.add(loader);
  }

  function getSendWs() {
    if (gameManager && gameManager.player && gameManager.player.userData && gameManager.player.userData.sendWsMessage) {
      return gameManager.player.userData.sendWsMessage;
    }
    return null;
  }

  function isLoggedIn() {
    if (gameManager && gameManager.player && gameManager.player.userData && gameManager.player.userData.sessionUser) {
      return !!gameManager.player.userData.sessionUser._id;
    }
    return !!(gameManager && typeof gameManager.getUserId === "function" && gameManager.getUserId());
  }

  function pollLeaderboardCommands() {
    const store = erth && erth.store ? erth.store : null;
    if (!store || typeof store.get !== "function") return;
    const command = store.get("prg_leaderboardCommand");
    if (!command || command.seq === lastCommandSeq) return;
    lastCommandSeq = command.seq;
    if (command.type === EVENTS.OPEN) show();
    else if (command.type === EVENTS.CLOSE) hide();
    else if (command.type === EVENTS.NOTICE) showRankNotice(command.data);
  }

  function fetchLeaderboard() {
    showLoading();
    let sendWs = getSendWs();
    if (!sendWs) {
      rows = [];
      renderRows();
      return;
    }
    sendWs("api:gameProgress:getLeaderboard", { limit: 20, sortBy: "ranking" }, function(resp) {
      if (!resp || !resp.success || !Array.isArray(resp.data)) {
        rows = [];
        renderRows();
        return;
      }
      rows = resp.data.map(function(p) {
        let meta = (p && p.metadata) ? p.metadata : {};
        let username = sanitizeUsername(meta.username || meta.playerName || meta.name || (p.userId ? String(p.userId).slice(0, 6) : "Player"));
        let bestLap = meta.bestLapTimeMs != null ? parseInt(meta.bestLapTimeMs, 10) : 0;
        let lastLap = meta.lastLapTimeMs != null ? parseInt(meta.lastLapTimeMs, 10) : bestLap;
        let date = meta.date || meta.lastFinishedAt || "";
        return {
          userId: p.userId,
          username: username,
          ranking: p.ranking || 0,
          bestLapTimeMs: isNaN(bestLap) ? 0 : bestLap,
          lastLapTimeMs: isNaN(lastLap) ? 0 : lastLap,
          date: date
        };
      });
      renderRows();
    });
  }

  function renderRows() {
    if (!listEl) return;
    clearList();
    if (!rows || rows.length === 0) {
      let empty = new UIKit.Container({ visibility: "visible", padding: 16, width: "100%" });
      empty.add(new UIKit.Text({ visibility: "visible", text: "No records yet", fontSize: s(15), color: COLORS.textDim }));
      listEl.add(empty);
      return;
    }
    for (let i = 0; i < rows.length; i++) {
      let r = rows[i];
      let rank = i + 1;
      let dateText = r.date ? String(r.date).slice(0, 10) : "--";
      let row = new UIKit.Container({
        visibility: "visible",
        flexDirection: "row",
        padding: 10,
        backgroundColor: COLORS.row,
        backgroundOpacity: 0.92,
        borderRadius: 10,
        borderWidth: 1,
        borderColor: COLORS.rowBorder,
        gap: 10,
        alignItems: "center"
      });
      row.add(makeCell(40, rank, COLORS.textDim, false, "center"));
      row.add(makeCell(114, r.username || "Player", COLORS.text, false, "left"));
      row.add(makeCell(110, r.bestLapTimeMs > 0 ? formatLap(r.bestLapTimeMs) : "--", COLORS.green, false, "center"));
      row.add(makeCell(110, r.lastLapTimeMs > 0 ? formatLap(r.lastLapTimeMs) : "--", COLORS.textDim, false, "center"));
      row.add(makeCell(106, dateText, COLORS.textDim, false, "center"));
      listEl.add(row);
    }
  }

  function show() {
    if (!modalEl || !listEl) return;
    if (!isLoggedIn()) return;
    if (rootRef) rootRef.setProperties({ pointerEvents: "none" });
    let doShow = function() {
      if (!modalEl) return;
      modalEl.setProperties({ visibility: "visible", pointerEvents: "auto" });
      fetchLeaderboard();
    };
    if (typeof requestAnimationFrame !== "undefined") requestAnimationFrame(doShow);
    else setTimeout(doShow, 0);
  }

  function hide() {
    if (!modalEl) return;
    stopNoticeEffects();
    modalEl.setProperties({ visibility: "hidden", pointerEvents: "none" });
  }
