  this._yawFromDriveForward = function(obj) {
    if (!obj) return 0;
    obj.getWorldQuaternion(this.tmpQuatB);
    this.tmpVecA.set(0, 0, 1).applyQuaternion(this.tmpQuatB).setY(0);
    if (this.tmpVecA.lengthSq() < 1e-10) return 0;
    this.tmpVecA.normalize();
    return Math.atan2(this.tmpVecA.x, this.tmpVecA.z);
  };

  this._resolveSceneRefs = function() {
    this.player = game.scene.getObjectByName("Player");
    this.track = game.scene.getObjectByName("TrackWorld");
    this.chassis = game.scene.getObjectByName("ChassisModel");
    this.gates.start.obj = game.scene.getObjectByName("StartGate");
    this.gates.checkpoint.obj = game.scene.getObjectByName("CheckpointGate");
    this.gates.finish.obj = game.scene.getObjectByName("FinishGate");
    this.vehicleRoot = this.chassis && this.chassis.parent ? this.chassis.parent : this.player;
    if (this.vehicleRoot && this.player !== this.vehicleRoot) {
      this.player = this.vehicleRoot;
    }
    if (this.player) this.player.matrixAutoUpdate = true;
    this.debugInitLogged = true;
    if (this.player && !this.initialSpawnCaptured) {
      this.spawnPosition.copy(this.player.position);
      this.player.updateWorldMatrix(true, false);
      this.spawnRotationY = this._yawFromDriveForward(this.player);
      this.currentGroundY = this.player.position.y;
      this.initialSpawnCaptured = true;
    }

    let wheelFL = game.scene.getObjectByName("WheelFL");
    let wheelFR = game.scene.getObjectByName("WheelFR");
    let wheelBL = game.scene.getObjectByName("WheelBL");
    let wheelBR = game.scene.getObjectByName("WheelBR");
    let wheelParent = this.player || (wheelFL ? wheelFL.parent : null);
    const ensureWheel = (name, fallback, px, py, pz, sx, sy, sz) => {
      let existing = game.scene.getObjectByName(name);
      if (existing) return existing;
      if (!fallback || !wheelParent || !fallback.clone) return null;
      let cloned = fallback.clone(true);
      cloned.name = name;
      cloned.position.set(px, py, pz);
      cloned.scale.set(sx, sy, sz);
      wheelParent.add(cloned);
      return cloned;
    };
    wheelFR = ensureWheel("WheelFR", wheelFL, 0.85, -0.3, 1.35, 1.118, 1.118, 1.118) || wheelFR;
    wheelBL = ensureWheel("WheelBL", wheelFL, -0.85, -0.3, -1.3, -1.118, 1.118, 1.118) || wheelBL;
    wheelBR = ensureWheel("WheelBR", wheelFL, 0.85, -0.3, -1.3, 1.118, 1.118, 1.118) || wheelBR;
    this.wheels = [wheelFL, wheelFR, wheelBL, wheelBR].filter(Boolean);
    this.frontWheels = [wheelFL, wheelFR].filter(Boolean);
    this.wheelBaseQuat = {};
    this.frontWheelSteerSign = {};
    for (let i = 0; i < this.wheels.length; i++) {
      let wheel = this.wheels[i];
      if (!wheel) continue;
      this.wheelBaseQuat[wheel.uuid] = wheel.quaternion.clone();
    }
    for (let i = 0; i < this.frontWheels.length; i++) {
      let wheel = this.frontWheels[i];
      if (!wheel) continue;
      let name = wheel.name ? wheel.name.toLowerCase() : "";
      this.frontWheelSteerSign[wheel.uuid] = (name.indexOf("fl") !== -1 && wheel.scale.x < 0) ? -1 : 1;
    }

    this.bodyMeshes = [];
    this.brakeMeshes = [];
    this.glassMeshes = [];
    if (this.chassis) {
      this.chassis.traverse((child) => {
        if (!child.isMesh) return;
        let name = child.name ? child.name.toLowerCase() : "";
        if (name.indexOf("chassis_1") !== -1 || name.indexOf("bodypaint") !== -1) this.bodyMeshes.push(child);
        if (name.indexOf("brakelight") !== -1) this.brakeMeshes.push(child);
        if (name.indexOf("glass") !== -1) this.glassMeshes.push(child);
      });
      if (this.bodyMeshes.length === 0) {
        this.chassis.traverse((child) => {
          if (!child.isMesh) return;
          let name = child.name ? child.name.toLowerCase() : "";
          if (name.indexOf("glass") !== -1) return;
          if (name.indexOf("brakelight") !== -1) return;
          if (name.indexOf("wheel") !== -1) return;
          if (name.indexOf("tire") !== -1) return;
          if (name.indexOf("rim") !== -1) return;
          if (name.indexOf("window") !== -1) return;
          if (name.indexOf("headlight") !== -1) return;
          this.bodyMeshes.push(child);
        });
      }
    }

    this.groundMeshes = [];
    this.collisionMeshes = [];
    this.birds = [];
    this.clouds = [];
    this.trainNodes = [];
    this.waterNodes = [];
    this.trainBasePositions = [];
    this.waterBasePositions = [];
    this.waterCenter.set(0, 0, 0);

    if (this.track) {
      let waterCount = 0;
      this.track.traverse((child) => {
        if (!child.isMesh) return;
        child.castShadow = true;
        child.receiveShadow = true;

        let name = child.name ? child.name.toLowerCase() : "";
        let ignoredForGround = name.indexOf("cloud") !== -1 || name.indexOf("bird") !== -1 || name.indexOf("blade") !== -1;
        if (!ignoredForGround) this.groundMeshes.push(child);

        let ignoredForCollision = ignoredForGround || name.indexOf("water") !== -1 || name.indexOf("terrain") !== -1;
        if (!ignoredForCollision) this.collisionMeshes.push(child);

        if (name.indexOf("bird") !== -1) {
          this.birds.push({ mesh: child, baseRotY: child.rotation.y });
        } else if (name.indexOf("cloud") !== -1) {
          this.clouds.push({ mesh: child, baseRotY: child.rotation.y });
      } else if (name.indexOf("train") !== -1 || name.indexOf("locomotive") !== -1 || name.indexOf("wagon") !== -1) {
          this.trainNodes.push(child);
          this.trainBasePositions.push(child.position.clone());
        } else if (name.indexOf("water") !== -1) {
          this.waterNodes.push(child);
          this.waterBasePositions.push(child.position.clone());
          this.tmpBox.setFromObject(child);
          this.tmpBox.getCenter(this.tmpVecA);
          this.waterCenter.add(this.tmpVecA);
          waterCount += 1;
        }
      });
      if (waterCount > 0) this.waterCenter.multiplyScalar(1 / waterCount);
    }
  };

  this._applyColor = function() {
    let color = new THREE.Color(COLOR_PALETTE[this.colorIndex % COLOR_PALETTE.length]);
    let touched = 0;
    let withColorProp = 0;
    for (let i = 0; i < this.bodyMeshes.length; i++) {
      let mesh = this.bodyMeshes[i];
      if (!mesh.material) continue;
      let mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
      for (let j = 0; j < mats.length; j++) {
        let mat = mats[j];
        touched += 1;
        if (!mat || !mat.color) continue;
        if (!this.bodyMaterialPrepared) {
          mat.vertexColors = false;
          if (mat.map) mat.map = null;
        }
        withColorProp += 1;
        mat.color.copy(color);
        mat.needsUpdate = true;
      }
    }
    this.bodyMaterialPrepared = true;
    if (colorText) colorText.setProperties({ text: "Color: " + COLOR_PALETTE[this.colorIndex % COLOR_PALETTE.length].toUpperCase() });
    this._setNotice("Car color: " + COLOR_PALETTE[this.colorIndex % COLOR_PALETTE.length].toUpperCase(), 1.2);
  };

  this._setNotice = function(message, duration, blink) {
    this.noticeMessage = message;
    this.noticeTimer = duration || 2.5;
    this.noticeBlink = !!blink;
    this.noticeBlinkTimer = 0;
    this.noticeBlinkOn = true;
    if (centerNoticeText) {
      centerNoticeText.setProperties({
        text: message,
        color: this.noticeBlink ? "#ffe600" : "#39ff14"
      });
    }
    if (centerNoticePanel) {
      centerNoticePanel.setProperties({
        borderColor: this.noticeBlink ? "#ffd400" : "#00ff85",
        backgroundColor: this.noticeBlink ? "rgba(36, 30, 0, 0.94)" : "rgba(0, 18, 12, 0.92)"
      });
    }
    setVisible(centerNoticePanel, !!message);
  };

  this._toggleHelp = function() {
    this.helpOpen = !this.helpOpen;
    setVisible(helpOverlay, this.helpOpen);
  };

  this._sendLeaderboardCommand = function(type, data) {
    if (!this.erth || !this.erth.store) return;
    this.leaderboardCommandSeq = (this.leaderboardCommandSeq || 0) + 1;
    this.erth.store.set("prg_leaderboardCommand", {
      seq: this.leaderboardCommandSeq,
      type: type,
      data: data || null
    });
  };

  this._toggleLeaderboard = function() {
    this.leaderboardOpen = !this.leaderboardOpen;
    this._sendLeaderboardCommand(this.leaderboardOpen ? LEADERBOARD_EVENTS.OPEN : LEADERBOARD_EVENTS.CLOSE);
  };

  this._toggleSound = function() {
    this.soundEnabled = !this.soundEnabled;
    if (soundText) soundText.setProperties({ text: "Sound: " + (this.soundEnabled ? "ON" : "OFF") });
    if (!this.soundEnabled) this._forceMuteLoops();
  };

  this._cycleCamera = function() {
    this.cameraModeIndex = (this.cameraModeIndex + 1) % CAMERA_MODES.length;
    if (cameraText) cameraText.setProperties({ text: "Camera: " + readableCamera(CAMERA_MODES[this.cameraModeIndex]) });
    this._setNotice("Camera: " + readableCamera(CAMERA_MODES[this.cameraModeIndex]), 1.5);
  };

  this._cycleColor = function() {
    this.colorIndex = (this.colorIndex + 1) % COLOR_PALETTE.length;
    this.lastColorPickAt = Date.now();
    this._applyColor();
  };

  this._startMenu = function() {
    this.active = true;
    this.finished = false;
    this.timerStarted = false;
    this.startGatePassed = false;
    this.checkpointPassed = false;
    this.finishTimeMs = 0;
    setVisible(introOverlay, false);
    setVisible(finishOverlay, false);
    this._setNotice("Cross the start gate to begin the timer.", 4.0);
  };

  this._resetVehicle = function(keepMenuOpen) {
    if (!this.player) return;
    this.player.position.copy(this.spawnPosition);
    this.player.rotation.set(0, this.spawnRotationY, 0);
    this.forwardSpeed = 0;
    this.verticalSpeed = 0;
    this.currentGroundY = this.spawnPosition.y;
    let spawnGroundHit = this._sampleGround(this.player.position);
    if (spawnGroundHit) {
      this.currentGroundY = spawnGroundHit.point.y + 0.72;
      this.player.position.y = this.currentGroundY;
    }
    this.boostAmount = BOOST_MAX;
    this.wheelSpin = 0;
    this.airborne = false;
    this.timerStarted = false;
    this.finished = false;
    this.startTimeMs = 0;
    this.finishTimeMs = 0;
    this.bestCheckpointMs = 0;
    this.lastCheckpointMs = 0;
    this.noticeTimer = 0;
    this.noticeMessage = "";
    this.pendingLeaderboardNotice = "";
    setVisible(centerNoticePanel, false);
    this.gates.start.inside = false;
    this.gates.checkpoint.inside = false;
    this.gates.finish.inside = false;
    this.startGatePassed = false;
    this.checkpointPassed = false;
    setVisible(finishOverlay, false);
    this.leaderboardOpen = false;
    this._sendLeaderboardCommand(LEADERBOARD_EVENTS.CLOSE);
    if (keepMenuOpen) {
      this.active = false;
      setVisible(introOverlay, true);
    } else {
      this.active = true;
      this._setNotice("Cross the start gate to begin the timer.", 3.5);
    }
  };

  this._getSendWs = function() {
    return null;
  };

  this._getSessionUser = function() {
    if (game && typeof game.getUserId === "function") {
      const userId = game.getUserId();
      if (userId) return { _id: userId, name: "Player" };
    }
    return null;
  };

  this._saveRaceProgress = function(finishMs, onDone) {
    let sendWs = this._getSendWs();
    let user = this._getSessionUser();
    if (!sendWs || !user || !user._id) {
      if (onDone) onDone();
      return;
    }
    let behavior = this;
    let username = String(user.name || user.username || "Player").trim() || "Player";
    let oldRank = 0;
    sendWs("api:gameProgress:getLeaderboard", { limit: 20, sortBy: "ranking" }, function(lbBefore) {
      if (lbBefore && lbBefore.success && Array.isArray(lbBefore.data)) {
        for (let i = 0; i < lbBefore.data.length; i++) {
          if (lbBefore.data[i] && lbBefore.data[i].userId === user._id) {
            oldRank = i + 1;
            break;
          }
        }
      }
      sendWs("api:gameProgress:get", {}, function(resp) {
        let existing = resp && resp.success && resp.data ? resp.data : null;
        let meta = existing && existing.metadata ? existing.metadata : {};
        let prevBest = meta.bestLapTimeMs != null ? parseInt(meta.bestLapTimeMs, 10) : 0;
        if (isNaN(prevBest) || prevBest <= 0) prevBest = finishMs;
        let bestLap = Math.min(prevBest, finishMs);
        let rankingScore = 1000000000 - bestLap;
        sendWs("api:gameProgress:update", {
          ranking: rankingScore,
          metadata: {
            username: username,
            date: new Date().toISOString(),
            lastFinishedAt: new Date().toISOString(),
            lastLapTimeMs: finishMs,
            bestLapTimeMs: bestLap,
            ranking: rankingScore
          }
        }, function() {
          sendWs("api:gameProgress:getLeaderboard", { limit: 20, sortBy: "ranking" }, function(lbAfter) {
            if (!lbAfter || !lbAfter.success || !Array.isArray(lbAfter.data)) {
              if (onDone) onDone();
              return;
            }
            let newRank = 0;
            for (let i = 0; i < lbAfter.data.length; i++) {
              if (lbAfter.data[i] && lbAfter.data[i].userId === user._id) {
                newRank = i + 1;
                break;
              }
            }
            behavior.lastRank = newRank;
            if (oldRank === 0) {
              behavior.pendingLeaderboardNotice = newRank > 0
                ? ("You are now rank #" + newRank + ".")
                : "Great run! You are now on the leaderboard.";
            } else if (newRank > 0 && newRank < oldRank) {
              behavior.pendingLeaderboardNotice = "Great run! You moved up to rank #" + newRank + ".";
            } else if (newRank > 0) {
              behavior.pendingLeaderboardNotice = "Awesome! Your current rank is #" + newRank + ".";
            }
            if (onDone) onDone();
          });
        });
      });
    });
  };

  this._recordFinish = function() {
    this.finished = true;
    this.finishTimeMs = Date.now() - this.startTimeMs;
    if (finishTitleText) finishTitleText.setProperties({ text: "Finished in " + formatTimeMs(this.finishTimeMs) + "s" });
    this._saveRaceProgress(this.finishTimeMs, () => {
      this.leaderboardOpen = true;
      this._sendLeaderboardCommand(LEADERBOARD_EVENTS.OPEN);
      if (this.pendingLeaderboardNotice) {
        const msg = this.pendingLeaderboardNotice;
        this.pendingLeaderboardNotice = "";
        this._setNotice("🏆 " + msg + " 🏆", 10.0, true);
      }
    });
    setVisible(finishOverlay, true);
    this._setNotice("Finish!", 2.5);
  };

  this._handleGateCrossings = function() {
    if (!this.player) return;

    let gateNames = ["start", "checkpoint", "finish"];
    for (let i = 0; i < gateNames.length; i++) {
      let key = gateNames[i];
      let gate = this.gates[key];
      if (!gate.obj) continue;
      this.tmpVecA.copy(this.player.position);
      gate.obj.worldToLocal(this.tmpVecA);
      let inside = Math.abs(this.tmpVecA.x) <= gate.halfX &&
        Math.abs(this.tmpVecA.y) <= gate.halfY &&
        Math.abs(this.tmpVecA.z) <= gate.halfZ;

      if (inside && !gate.inside) {
        let nearCenterSlice = Math.abs(this.tmpVecA.z) <= gate.halfZ * 0.35;
        let nearSpawnForStart = this.player.position.distanceTo(this.spawnPosition) <= START_ARM_MAX_DISTANCE;
        if (key === "start" && this.active && !this.timerStarted && !this.finished && nearCenterSlice && nearSpawnForStart) {
          this.timerStarted = true;
          this.startGatePassed = true;
          this.startTimeMs = Date.now();
          this.finishTimeMs = 0;
          this.checkpointPassed = false;
          this._setNotice("Go!", 1.5);
        } else if (key === "checkpoint" && this.startGatePassed && this.timerStarted && !this.finished && nearCenterSlice) {
          let now = Date.now() - this.startTimeMs;
          let diff = this.bestCheckpointMs > 0 ? now - this.bestCheckpointMs : now;
          let prefix = this.bestCheckpointMs > 0 && diff > 0 ? "+" : "";
          this.lastCheckpointMs = now;
          if (this.bestCheckpointMs === 0 || now < this.bestCheckpointMs) this.bestCheckpointMs = now;
          this.checkpointPassed = true;
          this.boostAmount = BOOST_MAX;
          this.checkpointFlash = CHECKPOINT_FLASH_TIME;
          if (splitText) splitText.setProperties({ text: "Checkpoint " + formatTimeMs(now) + "s  " + prefix + formatTimeMs(Math.abs(diff)) + "s" });
          this._setNotice("Checkpoint", 1.5);
        } else if (key === "finish" && this.startGatePassed && this.timerStarted && !this.finished && this.checkpointPassed) {
          if (nearCenterSlice) this._recordFinish();
        }
      }
      gate.inside = inside;
    }
  };

  this._getHitNormal = function(hit) {
    if (!hit || !hit.face || !hit.object) return this.up;
    this.tmpMatrix.getNormalMatrix(hit.object.matrixWorld);
    this.tmpVecA.copy(hit.face.normal).applyMatrix3(this.tmpMatrix).normalize();
    return this.tmpVecA;
  };

  this._resolveCollisions = function(fromPos, candidatePos, moveVec) {
    let moveLen = moveVec.length();
    if (moveLen < 0.0001 || this.collisionMeshes.length === 0) return;

    this.tmpVecA.copy(moveVec).normalize();
    this.tmpVecB.crossVectors(this.tmpVecA, this.up).normalize();

    let bestHit = null;
    let offsets = [0, 0.65, -0.65];
    for (let i = 0; i < offsets.length; i++) {
      this.tmpVecC.copy(fromPos).addScaledVector(this.up, 0.65).addScaledVector(this.tmpVecB, offsets[i]);
      this.raycaster.set(this.tmpVecC, this.tmpVecA);
      this.raycaster.far = moveLen + this.collisionRadius + 0.05;
      let hits = this.raycaster.intersectObjects(this.collisionMeshes, false);
      if (hits.length === 0) continue;
      let hit = hits[0];
      let normal = this._getHitNormal(hit).clone();
      if (Math.abs(normal.y) < 0.55) {
        hit._worldNormal = normal;
        if (!bestHit || hit.distance < bestHit.distance) bestHit = hit;
      }
    }

    if (!bestHit) return;

    let overlap = Math.max(0, moveLen + this.collisionRadius - bestHit.distance);
    let normal = bestHit._worldNormal || this.up;
    let slideVec = moveVec.clone().projectOnPlane(normal);
    candidatePos.copy(fromPos).add(slideVec.multiplyScalar(0.8));
    candidatePos.addScaledVector(normal, overlap + 0.05);

    let impactSpeed = Math.abs(this.forwardSpeed);
    this.forwardSpeed *= 0.72;
    if (impactSpeed > 18 && Date.now() - this.lastImpact > 180) {
      this.lastImpact = Date.now();
      this._playOneShot("crash");
    }
  };

  this._sampleGround = function(position) {
    if (this.groundMeshes.length === 0) return null;
    this.tmpVecA.copy(position).addScaledVector(this.up, 30);
    this.raycaster.set(this.tmpVecA, new THREE.Vector3(0, -1, 0));
    this.raycaster.far = 80;
    let hits = this.raycaster.intersectObjects(this.groundMeshes, false);
    if (hits.length === 0) return null;
    return hits[0];
  };

  this._readInput = function() {
    let im = game.inputManager;
    let steer = im ? (im.getMotion("lateral") || 0) : 0;
    let throttle = im ? (im.getMotion("forward") || 0) : 0;
    let steerWheel = clamp(this.touchSteerAxis || 0, -1, 1);
    let touchAccelerate = im && im.getAction && im.getAction("jump");
    let touchBrake = im && im.getAction && (im.getAction("interact") || im.getAction("use"));
    if (this.touchBoostAsGas) touchAccelerate = true;
    if (this.rawInput.left) steer -= 1;
    if (this.rawInput.right) steer += 1;
    if (this.rawInput.forward) throttle += 1;
    if (this.rawInput.backward) throttle -= 1;
    if (Math.abs(steerWheel) > 0.001) steer = steerWheel;
    steer = clamp(steer, -1, 1);
    throttle = clamp(throttle, -1, 1);

    if (touchAccelerate) throttle = Math.max(throttle, 1);
    if (touchBrake && throttle <= 0) throttle = Math.min(throttle, -1);

    if (Math.abs(steer) < 0.05) steer = 0;
    if (Math.abs(throttle) < 0.05) throttle = 0;

    this.steerInput = steer;
    this.throttleInput = throttle;
    this.isBraking = !!this.keys.brake || !!touchBrake;
    this.isBoosting = !!this.keys.boost && this.boostAmount > 0;
  };

  this._drive = function(dt) {
    if (!this.player) return;
    let prevPos = this.player.position.clone();
    this._readInput();

    let accelMax = this.maxSpeed * (this.isBoosting ? this.boostMultiplier : 1);
    if (this.isBoosting) this.boostAmount = Math.max(0, this.boostAmount - dt * 60);

    if (this.isBraking && this.forwardSpeed > 5) {
      this.forwardSpeed = moveToward(this.forwardSpeed, 0, this.brakeStrength * dt * 2.2);
    } else if (this.throttleInput > 0.05) {
      this.forwardSpeed = moveToward(this.forwardSpeed, accelMax, this.acceleration * dt * (this.isBoosting ? 1.3 : 1.0));
    } else if (this.throttleInput < -0.05) {
      if (this.forwardSpeed > 4) {
        this.forwardSpeed = moveToward(this.forwardSpeed, 0, this.brakeStrength * dt * 1.6);
      } else {
        this.forwardSpeed = moveToward(this.forwardSpeed, -this.reverseMaxSpeed, this.acceleration * dt * 0.55);
      }
    } else {
      this.forwardSpeed = moveToward(this.forwardSpeed, 0, this.acceleration * dt * (this.isBraking ? 0.8 : 0.35));
    }

    let speedRatio = clamp01(Math.abs(this.forwardSpeed) / Math.max(this.maxSpeed, 0.001));
    let direction = this.forwardSpeed >= 0 ? -1 : 1;
    this.steerFiltered = THREE.MathUtils.lerp(this.steerFiltered, this.steerInput, Math.min(1, dt * 7));
    let turnRate = this.steerFiltered * this.steerStrength * dt * (0.2 + speedRatio * 0.45) * direction;
    this.player.rotation.y += turnRate;

    this.forward.set(0, 0, 1).applyQuaternion(this.player.quaternion).setY(0).normalize();
    let moveDistance = this.forwardSpeed * WORLD_SPEED_SCALE * dt;
    let fromPos = this.player.position.clone();
    let candidatePos = this.player.position.clone().addScaledVector(this.forward, moveDistance);
    let moveVec = candidatePos.clone().sub(fromPos);

    this._resolveCollisions(fromPos, candidatePos, moveVec);

    let groundHit = this._sampleGround(candidatePos);
    if (groundHit) {
      let groundY = groundHit.point.y + 0.72;
      if (this.airborne) {
        this.verticalSpeed -= this.gravity * dt;
        this.currentGroundY += this.verticalSpeed * dt;
        if (this.currentGroundY <= groundY) {
          this.currentGroundY = groundY;
          this.verticalSpeed = 0;
          this.airborne = false;
        }
      } else {
        let drop = this.currentGroundY - groundY;
        if (drop > 0.9 && Math.abs(this.forwardSpeed) > 24) {
          this.airborne = true;
          this.verticalSpeed = Math.max(2.4, Math.abs(this.forwardSpeed) * 0.03);
          this.currentGroundY += this.verticalSpeed * dt;
        } else {
          this.currentGroundY = THREE.MathUtils.lerp(this.currentGroundY, groundY, Math.min(1, dt * 12));
        }
      }
    } else {
      this.airborne = true;
      this.verticalSpeed -= this.gravity * dt;
      this.currentGroundY += this.verticalSpeed * dt;
    }

    candidatePos.y = this.currentGroundY;
    this.player.position.copy(candidatePos);
    this.player.updateMatrixWorld(true);
    this.lastAppliedPosition.copy(candidatePos);
    this.speedMph = Math.abs(this.forwardSpeed);
    if (Math.abs(this.player.position.x) > 260 || Math.abs(this.player.position.z) > 320 || this.player.position.y < -20) {
      this._resetVehicle(false);
    }
  };

  this._updateVehicleVisuals = function(dt) {
    this.wheelSpin += (this.forwardSpeed * WORLD_SPEED_SCALE * dt) / 0.38;
    let steerAngle = this.steerFiltered * 0.3;
    let speedRatio = clamp01(Math.abs(this.forwardSpeed) / Math.max(this.maxSpeed, 0.001));
    let shake = speedRatio * (this.isBoosting ? 0.03 : 0.01);

    for (let i = 0; i < this.wheels.length; i++) {
      let wheel = this.wheels[i];
      if (!wheel) continue;
      let baseQ = this.wheelBaseQuat[wheel.uuid];
      if (!baseQ) {
        this.wheelBaseQuat[wheel.uuid] = wheel.quaternion.clone();
        baseQ = this.wheelBaseQuat[wheel.uuid];
      }
      this.tmpQuat.setFromAxisAngle(new THREE.Vector3(1, 0, 0), this.wheelSpin);
      if (this.frontWheelSteerSign[wheel.uuid]) {
        let steerSign = this.frontWheelSteerSign[wheel.uuid];
        this.tmpQuatB.setFromAxisAngle(new THREE.Vector3(0, 1, 0), steerAngle * steerSign);
        wheel.quaternion.copy(baseQ).multiply(this.tmpQuatB).multiply(this.tmpQuat);
      } else {
        wheel.quaternion.copy(baseQ).multiply(this.tmpQuat);
      }
    }

    if (this.chassis) {
      this.chassis.rotation.z = THREE.MathUtils.lerp(this.chassis.rotation.z, (-this.steerFiltered * this.forwardSpeed) / 280, dt * 4);
      this.chassis.rotation.x = Math.sin(this.time * 20) * shake * 0.6;
    }

    for (let i = 0; i < this.brakeMeshes.length; i++) {
      let mesh = this.brakeMeshes[i];
      if (mesh.material && mesh.material.emissive) {
        mesh.material.emissive.set(this.isBraking ? "#ff2200" : "#220000");
        mesh.material.opacity = this.isBraking ? 1 : 0.3;
        mesh.material.transparent = true;
      }
    }

    for (let i = 0; i < this.glassMeshes.length; i++) {
      let mesh = this.glassMeshes[i];
      if (mesh.material) {
        mesh.material.transparent = true;
        mesh.material.opacity = CAMERA_MODES[this.cameraModeIndex] === "FIRST_PERSON" ? 0.1 : 0.75;
      }
    }
  };

  this._updateCamera = function(dt) {
    if (!this.player || !game.camera) return;
    let cam = game.camera;
    let mode = CAMERA_MODES[this.cameraModeIndex];
    let speedRatio = clamp01(Math.abs(this.forwardSpeed) / Math.max(this.maxSpeed, 0.001));
    let swayStrength = this.isBoosting ? (speedRatio + 0.1) * 0.008 : speedRatio * 0.004;

    this.forward.set(0, 0, 1).applyQuaternion(this.player.quaternion).setY(0).normalize();
    this.right.crossVectors(this.forward, this.up).normalize();
    let anchor = this.chassis && this.chassis.getWorldPosition ? this.chassis.getWorldPosition(this.tmpVecB) : this.player.position;

    if (mode === "FIRST_PERSON") {
      this.cameraTarget.copy(anchor)
        .addScaledVector(this.right, 0.03 + Math.sin(-this.steerFiltered) * speedRatio * 0.05)
        .addScaledVector(this.up, 1.05)
        .addScaledVector(this.forward, 2.2);
      this.cameraLook.copy(anchor).addScaledVector(this.forward, 35).addScaledVector(this.up, 1.05);
      cam.fov = THREE.MathUtils.lerp(cam.fov, 68, dt * 5);
    } else if (mode === "BIRD_EYE") {
      this.cameraTarget.copy(anchor)
        .addScaledVector(this.up, 22 + speedRatio * 4)
        .addScaledVector(this.forward, -0.5);
      this.cameraLook.copy(anchor);
      cam.fov = THREE.MathUtils.lerp(cam.fov, 48, dt * 4);
    } else {
      this.cameraTarget.copy(anchor)
        .addScaledVector(this.right, (Math.sin(this.steerFiltered) * this.forwardSpeed) / 60)
        .addScaledVector(this.up, 1.1 + (this.isBoosting ? -0.08 : 0))
        .addScaledVector(this.forward, -3.8 + speedRatio * 0.25 + (this.isBraking ? 0.18 : 0));
      this.cameraLook.copy(anchor).addScaledVector(this.forward, 4.6).addScaledVector(this.up, 0.72);
      cam.fov = THREE.MathUtils.lerp(cam.fov, this.isBoosting ? 76 : 72, dt * 5);
    }

    cam.position.lerp(this.cameraTarget, Math.min(1, dt * 12));
    cam.lookAt(this.cameraLook);
    cam.position.addScaledVector(this.right, Math.sin(this.time * (this.isBoosting ? 16 : 10)) * swayStrength);
    cam.position.addScaledVector(this.up, Math.sin(this.time * (this.isBoosting ? 18 : 11)) * swayStrength * 0.6);
    if (typeof cam.updateProjectionMatrix === "function") cam.updateProjectionMatrix();
  };

  this._updateWorld = function() {
    let birdTime = this.time * 0.8;
    for (let i = 0; i < this.birds.length; i++) {
      let item = this.birds[i];
      item.mesh.rotation.y = item.baseRotY + birdTime / (i + 1);
    }

    let cloudTime = this.time * 0.22;
    for (let i = 0; i < this.clouds.length; i++) {
      let item = this.clouds[i];
      item.mesh.rotation.y = item.baseRotY + cloudTime / (i + 1);
    }

    let trainOffset = ((this.time * 12) % 220) - 110;
    let trainDir = this.tmpVecA.set(1, 0, -0.09).normalize();
    if (this.trainNodes.length > 0) {
      let center = new THREE.Vector3();
