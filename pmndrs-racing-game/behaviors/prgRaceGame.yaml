      if (this.noticeBlink) {
        this.noticeBlinkTimer += dt;
        if (this.noticeBlinkTimer >= 0.2) {
          this.noticeBlinkTimer = 0;
          this.noticeBlinkOn = !this.noticeBlinkOn;
          if (centerNoticeText) centerNoticeText.setProperties({ color: this.noticeBlinkOn ? "#ffe600" : "#fff3a6" });
          if (centerNoticePanel) centerNoticePanel.setProperties({ borderColor: this.noticeBlinkOn ? "#ffd400" : "#fff06a" });
        }
      }
      if (this.noticeTimer <= 0) {
        if (centerNoticeText) centerNoticeText.setProperties({ text: "", color: "#39ff14" });
        if (centerNoticePanel) centerNoticePanel.setProperties({ borderColor: "#00ff85", backgroundColor: "rgba(0, 18, 12, 0.92)" });
        this.noticeBlink = false;
        setVisible(centerNoticePanel, false);
      }
    }
    if (this.checkpointFlash > 0) {
      this.checkpointFlash -= dt;
      if (this.checkpointFlash <= 0 && splitText) splitText.setProperties({ text: "Checkpoint: --" });
    }

    let elapsedText = "00:00";
    if (this.timerStarted && !this.finished) elapsedText = formatTimeMs(Date.now() - this.startTimeMs);
    else if (this.finished) elapsedText = formatTimeMs(this.finishTimeMs);

    if (statusText) {
      let status = "Status: Waiting to start";
      if (this.active && !this.timerStarted) status = "Status: Armed - cross the start gate";
      else if (this.timerStarted && !this.finished) status = "Status: Racing";
      else if (this.finished) status = "Status: Finished";
      statusText.setProperties({ text: status });
    }
    if (titleText) titleText.setProperties({ text: "Timer: " + elapsedText + "s" });
    if (speedText) speedText.setProperties({ text: "Speed: " + this.speedMph.toFixed(0) + " mph" });
    if (boostText) {
      let boostColor = this.boostAmount > 60 ? "#78ff78" : this.boostAmount > 30 ? "#ffe266" : "#ff6666";
      boostText.setProperties({ text: "Boost: " + this.boostAmount.toFixed(0), color: boostColor });
    }

    if (root) UIKitPointerEvents.update(dt);
  };

  this._cleanupUi = function() {
    if (!root) return;
    try {
      UIKitPointerEvents.unregisterRoot(root);
      if (hotkeysRoot) UIKitPointerEvents.unregisterRoot(hotkeysRoot);
      if (introRoot) UIKitPointerEvents.unregisterRoot(introRoot);
      UIKitPointerEvents.deinitialize();
    } catch (e) {}
    if (root.parent) root.parent.remove(root);
    if (hotkeysRoot && hotkeysRoot.parent) hotkeysRoot.parent.remove(hotkeysRoot);
    if (introRoot && introRoot.parent) introRoot.parent.remove(introRoot);
    root = null;
    hotkeysRoot = null;
    introRoot = null;
    infoStack = null;
    introOverlay = null;
    finishOverlay = null;
    helpOverlay = null;
    leaderboardOverlay = null;
    titleText = null;
    statusText = null;
    timerText = null;
    splitText = null;
    speedText = null;
    boostText = null;
    cameraText = null;
    soundText = null;
    colorText = null;
    finishTitleText = null;
    finishListText = null;
    leaderboardListText = null;
    centerNoticePanel = null;
    centerNoticeText = null;
    startButton = null;
    restartButton = null;
    hudTopRow = null;
    hudLeftPanel = null;
    hudBottomLeft = null;
    introModalTitle = null;
    introModalBody = null;
    introPickColorLabel = null;
    introHintsText = null;
    introColorRow = null;
    helpTitleText = null;
    helpLineTexts = [];
    leaderboardTitleText = null;
    colorPickerButtons = null;
  };

  this.dispose = function() {
    this._keyEdgePrev = { c: false, p: false, r: false, i: false, l: false, u: false, h: false, m: false };
    this._startEdgePrev = false;
    this.rawInput = { forward: false, backward: false, left: false, right: false, start: false };
    this.rawActions = { c: false, p: false, r: false, i: false, l: false, u: false, h: false, m: false };
    if (this.honkStopTimer) {
      clearTimeout(this.honkStopTimer);
      this.honkStopTimer = null;
    }
    this.keyDownHandler = null;
    this.keyUpHandler = null;
    this.touchHonkToken = null;
    this.touchBoostDownToken = null;
    this.touchBoostUpToken = null;
    this.touchLeaderboardToken = null;
    this.touchBoostAsGas = false;
    this.touchSteerAxis = 0;
    if (this.touchSteerBound && game && game.inputManager && typeof game.inputManager.getVirtualDispatcher === "function") {
      const vd = game.inputManager.getVirtualDispatcher();
      if (vd && typeof vd.setAxisListener === "function") vd.setAxisListener("steer", function() {});
    }
    this.touchSteerBound = false;
    this._cleanupUi();
    // Inline audio teardown for static-analysis visibility (stop/remove listener)
    this.unlockFn = null;
    this.audioUnlockGestureHandler = null;
    this.pendingAudioUnlock = false;
    this._audioUnlockPrimaryPrev = 0;
    const audioKeys = ["engine", "accelerate", "boost", "brake", "honk", "crash", "train", "water"];
    for (let i = 0; i < audioKeys.length; i++) {
      const sound = this.audio[audioKeys[i]];
      if (sound && sound.isPlaying) sound.stop();
      if (sound && typeof sound.disconnect === "function") sound.disconnect();
      this.audio[audioKeys[i]] = null;
    }
    if (this.listener && game && game.camera) game.camera.remove(this.listener);
    this.listener = null;
  };

  this.onStop = function() {
    this.dispose();
  };
